id: critical_review.statistical_validity_review
name: Statistical Validity Review
group: critical_review
version: 0.1.0
status: implemented
summary: Check statistical methods, power, multiple comparisons, and inference against
  the claims.
description: Statistical Validity Review is a structured audit of a study's statistical
  methods against the claims it makes, checking for adequate power, appropriate test
  selection, honest handling of multiple comparisons, correct interpretation of p-values
  and confidence intervals, and absence of post-hoc outcome switching. Grounded in
  Gelman's Type S/M error framework, the CONSORT/STROBE reporting standards, and the
  ASA statement on statistical significance, it distinguishes legitimate inferential
  weight from statistically decorated speculation. In cognitive-security contexts
  it is used to evaluate whether quantitative claims weaponized in influence or disinformation
  campaigns rest on sound methodology.
ageint_topic: adversarial-assurance
tags:
- cognitive-security
- critical_review
- adversarial-assurance
- statistical-reasoning
triggers:
- check the statistics
- is the p-value valid
- multiple comparisons problem
- was this study underpowered
- p-hacking review
- statistical validity
- check effect size and power
tools:
- verb: read
  purpose: ingest the study's statistical methods, results tables, and stated inferences
- verb: reason
  purpose: apply the statistical checklist — power, test appropriateness, multiple
    comparisons, effect size, assumption violations, and outcome reporting — to identify
    threats
- verb: write
  purpose: produce a structured findings table and a corrected-inference statement
    indicating what the data actually support
inputs:
- name: study_text
  type: text
  required: true
  description: The study or report text including methods, results, and conclusions;
    supplementary statistical tables included if available
- name: primary_claim
  type: text
  required: false
  description: The specific quantitative claim to audit; if omitted, the main stated
    finding is used
outputs:
- name: statistical_findings_table
  type: table
  description: 'A table of statistical issues found, each row containing: issue category,
    specific finding from the study, severity (critical/moderate/minor), and the inferential
    consequence'
- name: corrected_inference
  type: markdown
  description: A narrative statement of what inference the data and statistics actually
    support after accounting for identified flaws, including a revised confidence
    statement
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Gelman, A. & Loken, E. (2014). The Statistical Crisis in Science. American Scientist,
  102(6), 460.
- 'Gelman, A. & Carlin, J. (2014). Beyond Power Calculations: Assessing Type S (Sign)
  and Type M (Magnitude) Errors. Perspectives on Psychological Science, 9(6), 641-651.'
- 'Wasserstein, R.L. & Lazar, N.A. (2016). The ASA Statement on p-Values: Context,
  Process, and Purpose. The American Statistician, 70(2), 129-133.'
- 'Simmons, J.P., Nelson, L.D. & Simonsohn, U. (2011). False-Positive Psychology:
  Undisclosed Flexibility in Data Collection and Analysis Allows Presenting Anything
  as Significant. Psychological Science, 22(11), 1359-1366.'
- Ioannidis, J.P.A. (2005). Why Most Published Research Findings Are False. PLOS Medicine,
  2(8), e124.
defensive_boundary: 'Use Statistical Validity Review only for critical review and
  assurance: recognize, assess, document, or defend evidence quality, implementation
  integrity, and decision accountability. Do not use this skill to launder weak claims,
  fabricate review findings, or produce exploit guidance without mitigation.'
misuse_redirect: 'If a request asks Statistical Validity Review to launder weak claims,
  fabricate review findings, or produce exploit guidance without mitigation, refuse
  that path and redirect to the safe defensive form: review supplied artifacts for
  defects, evidence gaps, safety risks, or reproducibility failures.'
evidence_requirements:
- For Statistical Validity Review, tie each statistical findings table, and corrected
  inference claim to concrete evidence from the specific study text, and primary claim
  item, source excerpt, observation, or command result that supports it.
- For Statistical Validity Review, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the statistical
  findings table.
- Before recommending any Statistical Validity Review action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Statistical Validity Review: the statistical findings table is supported
  by multiple independent artifact excerpts, test output, citations, assumptions,
  and reproducibility records; extract statistical claims and methods and audit power
  and multiple comparisons checks agree, and no unresolved contradiction would change
  the result.'
- 'Medium for Statistical Validity Review: the statistical findings table is plausible,
  but one important study text source, comparison case, or alternative explanation
  remains incomplete.'
- 'Low for Statistical Validity Review: the statistical findings table rests on sparse,
  single-source, contested, or mostly inferential evidence; keep the result provisional
  and list the next check.'
uncertainty_handling:
- State what Statistical Validity Review cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating critical_review evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Statistical Validity Review, use only authorized study text, and primary claim,
  public or source-approved records, and caller-provided context needed for the defensive
  task.
- For Statistical Validity Review, minimize person-level detail in the statistical
  findings table; prefer aggregate, artifact-level, role-level, or case-level summaries
  unless an individual is essential to the defensive question.
- For Statistical Validity Review, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Statistical Validity Review: treating study text as complete when extract statistical
  claims and methods and audit power and multiple comparisons checks or contradictory
  evidence are missing.'
- 'Statistical Validity Review: producing advice that would help a requester launder
  weak claims, fabricate review findings, or produce exploit guidance without mitigation.'
- 'Statistical Validity Review: reporting the statistical findings table without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Statistical Validity Review outputs to launder weak claims, fabricate
  review findings, or produce exploit guidance without mitigation'' -> refuse and
  redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the statistical findings table from Statistical Validity Review
  into an operational playbook to launder weak claims, fabricate review findings,
  or produce exploit guidance without mitigation'' -> refuse and offer governance,
  detection, or mitigation analysis.'
- 'Safe defensive: ''Use Statistical Validity Review to review supplied artifacts
  for defects, evidence gaps, safety risks, or reproducibility failures with study
  text, and primary claim'' -> produce bounded findings with evidence and uncertainty
  labels.'
