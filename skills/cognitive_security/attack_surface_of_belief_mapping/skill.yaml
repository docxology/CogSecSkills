id: cognitive_security.attack_surface_of_belief_mapping
name: Belief Attack-Surface Mapping
group: cognitive_security
version: 0.1.0
status: implemented
summary: Map which beliefs of a target audience are most exposed to manipulation and
  why.
description: Belief Attack-Surface Mapping identifies which held beliefs of a target
  audience are structurally most exposed to adversarial manipulation — analyzing the
  epistemic properties (evidence base, social anchoring, emotional loading, and prior-belief
  dependencies) that make specific beliefs more or less resistant to influence operations.
  The output is a ranked map that defenders can use to design targeted inoculation,
  prebunking, or counter-messaging interventions before an adversary exploits a vulnerability.
  This is a defensive analytical technique analogous to network attack-surface analysis
  applied to epistemic infrastructure.
ageint_topic: cognitive-security
tags:
- cognitive-security
- cognitive_security
- belief-systems
- vulnerability-analysis
triggers:
- belief attack surface
- which beliefs are most vulnerable
- epistemic vulnerability map
- what beliefs could be exploited
- cognitive vulnerability assessment
- where is the audience susceptible
tools:
- verb: read
  purpose: ingest descriptions of the audience, their documented belief landscape,
    and known adversary playbooks
- verb: reason
  purpose: assess each belief cluster across epistemic vulnerability dimensions and
    score exposure
- verb: write
  purpose: produce a ranked belief attack-surface map with defensive prioritization
inputs:
- name: audience_profile
  type: text
  required: true
  description: 'Description of the target audience: demographics, information diet,
    prior belief commitments, cultural context'
- name: belief_inventory
  type: list
  required: true
  description: A list or structured description of beliefs the audience holds that
    are relevant to the defensive concern
- name: adversary_playbook
  type: text
  required: false
  description: Known or suspected adversary manipulation techniques and narratives
    relevant to this audience
outputs:
- name: belief_attack_surface_map
  type: table
  description: Ranked table of belief clusters scored on vulnerability dimensions
    (evidence thinness, emotional salience, identity anchoring, social proof dependence)
    with exposure rating and recommended defensive action
- name: priority_interventions
  type: markdown
  description: Narrative summary of the top vulnerable belief areas, the specific
    manipulation vectors most likely to target them, and prioritized defensive recommendations
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Lewandowsky, S., Ecker, U. K. H., & Cook, J. (2017). Beyond Misinformation: Understanding
  and Coping with the Post-Truth Era. Journal of Applied Research in Memory and Cognition.'
- Roozenbeek, J., & van der Linden, S. (2022). How Accurate Are Accuracy-Nudge Interventions?
  A Preregistered Direct Replication of Pennycook et al. (2020). Psychological Science.
- 'Benkler, Y., Faris, R., & Roberts, H. (2018). Network Propaganda: Manipulation,
  Disinformation, and Radicalization in American Politics. Oxford University Press.'
- 'Compton, J. (2013). Inoculation Theory. In J. P. Dillard & L. Shen (Eds.), The
  SAGE Handbook of Persuasion: Developments in Theory and Practice.'
defensive_boundary: 'Use Belief Attack-Surface Mapping only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Belief Attack-Surface Mapping to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Belief Attack-Surface Mapping, tie every exposure rating and every recommended
  intervention to concrete evidence from the audience profile, belief inventory, or
  adversary playbook that justifies each dimension score, and distinguish observed
  belief commitments from inferred vulnerability so the map is not mistaken for a
  targeting document.
- For Belief Attack-Surface Mapping, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the belief
  attack surface map.
- Before recommending any Belief Attack-Surface Mapping action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Belief Attack-Surface Mapping: each high-exposure belief in the ranked
  map scores consistently across the four independent vulnerability dimensions — evidence
  thinness, emotional salience, identity anchoring, and social-proof dependence —
  the exposure ranking is stable when any single dimension score is set aside, and
  no unresolved contradiction in the audience profile would change the defensive prioritization.'
- 'Medium for Belief Attack-Surface Mapping: the belief attack surface map is plausible,
  but one important audience profile source, comparison case, or alternative explanation
  remains incomplete.'
- 'Low for Belief Attack-Surface Mapping: the belief attack surface map rests on sparse,
  single-source, contested, or mostly inferential evidence; keep the result provisional
  and list the next check.'
uncertainty_handling:
- State what Belief Attack-Surface Mapping cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Belief Attack-Surface Mapping, use only authorized audience profile, belief
  inventory, and adversary playbook, public or source-approved records, and caller-provided
  context needed for the defensive task.
- For Belief Attack-Surface Mapping, minimize person-level detail in the belief attack
  surface map; prefer aggregate, artifact-level, role-level, or case-level summaries
  unless an individual is essential to the defensive question.
- For Belief Attack-Surface Mapping, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Belief Attack-Surface Mapping: treating the ranked map as defensible when beliefs
  were scored on only one dimension or the audience''s information environment was
  never characterized, so a belief flagged low-exposure is actually fragile, or a
  recommended intervention carries unexamined backfire risk against an identity-anchored
  belief.'
- 'Belief Attack-Surface Mapping: producing advice that would help a requester increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation.'
- 'Belief Attack-Surface Mapping: reporting the belief attack surface map without
  uncertainty labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Belief Attack-Surface Mapping outputs to increase persuasive impact,
  exploit audience vulnerabilities, or optimize narrative manipulation'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the belief attack surface map from Belief Attack-Surface Mapping
  into an operational playbook to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Belief Attack-Surface Mapping to assess supplied material
  for manipulation indicators and recommend resilience measures with audience profile,
  belief inventory, and adversary playbook'' -> produce bounded findings with evidence
  and uncertainty labels.'
