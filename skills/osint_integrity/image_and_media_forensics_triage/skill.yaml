id: osint_integrity.image_and_media_forensics_triage
name: Image & Media Forensics Triage
group: osint_integrity
version: 0.1.0
status: implemented
summary: Triage media for reuse, editing, and context-collapse before treating it
  as evidence.
description: Image and media forensics triage is a rapid, systematic workflow for
  assessing whether a photograph, video, or audio clip has been re-used from an unrelated
  context, digitally edited, or stripped of the context needed to interpret it honestly.
  It applies reverse-image search, error-level analysis (ELA), metadata inspection,
  and contextual plausibility checks before any piece of media is admitted as evidence
  in an analysis. The goal is to surface red flags quickly — a full forensic examination
  is triggered only when triage finds anomalies.
ageint_topic: osint-integrity
tags:
- cognitive-security
- osint_integrity
- media-verification
triggers:
- is this image real
- check if this photo has been altered
- triage this media
- verify this video
- detect image manipulation
- image forensics
- media forensics triage
tools:
- verb: read
  purpose: ingest the media file and any accompanying claims or contextual information
- verb: web
  purpose: run reverse-image search and lookup the image against known archives to
    detect prior use or recycling
- verb: reason
  purpose: apply structured triage criteria across reuse, editing artifacts, and context-collapse
    indicators
- verb: write
  purpose: produce a triage report with findings, red flags, and recommended next
    steps
inputs:
- name: media_item
  type: text
  required: true
  description: URL or file reference for the image, video, or audio clip to be triaged
- name: accompanying_claim
  type: text
  required: false
  description: The narrative or claim the media is being used to support
- name: source_account
  type: text
  required: false
  description: The account or outlet that published the media, for credibility cross-reference
outputs:
- name: triage_report
  type: markdown
  description: 'Structured triage results: reuse verdict, editing red flags, context-collapse
    indicators, confidence level, and recommended follow-on action (accept / escalate
    to deep forensics / reject)'
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Hicks, M. et al. (2020). Verification Handbook for Disinformation and Media Manipulation.
  European Journalism Centre.
- First Draft News (2019). Visual Verification Guide. firstdraftnews.org.
- Farid, H. (2022). Photo Forensics. MIT Press.
- Kee, E. & Farid, H. (2010). Exposing Digital Forgeries from JPEG Ghosts. IEEE Transactions
  on Information Forensics and Security, 6(4).
defensive_boundary: 'Use Image & Media Forensics Triage only for OSINT integrity and
  source-verification defense: recognize, assess, document, or defend source provenance,
  privacy, chain of custody, and public-source accountability. Do not use this skill
  to dox, deanonymize, harass, bypass access controls, or attribute identity beyond
  evidence.'
misuse_redirect: 'If a request asks Image & Media Forensics Triage to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence, refuse that
  path and redirect to the safe defensive form: verify supplied claims, media, sources,
  or datasets with documented public-source methods.'
evidence_requirements:
- For Image & Media Forensics Triage, bind each finding to a labeled source — source
  records, custody notes, metadata, corroborating references, and contradiction logs,
  a cited reference, or an explicitly marked inference — and never present inference
  as observed evidence.
- For Image & Media Forensics Triage, keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Image & Media Forensics Triage recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Image & Media Forensics Triage: independent lines of source
  records, custody notes, metadata, corroborating references, and contradiction logs
  converge, credible alternatives have been tested, and the conclusion would survive
  removing any single source.'
- 'Medium confidence for Image & Media Forensics Triage: the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Image & Media Forensics Triage: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Image & Media Forensics Triage cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Image
  & Media Forensics Triage should collect to separate the live alternatives.
privacy_legal_constraints:
- For Image & Media Forensics Triage, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Image & Media Forensics Triage, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Image & Media Forensics Triage, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Image & Media Forensics Triage failure: overstating identity, location, attribution,
  or source reliability from incomplete public traces.'
- 'Image & Media Forensics Triage failure: producing guidance that would help a requester
  dox, deanonymize, harass, bypass access controls, or attribute identity beyond evidence.'
- 'Image & Media Forensics Triage failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Image & Media Forensics Triage to dox, deanonymize, harass, bypass
  access controls, or attribute identity beyond evidence'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Image & Media Forensics Triage into an operational playbook to dox,
  deanonymize, harass, bypass access controls, or attribute identity beyond evidence''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Image & Media Forensics Triage to verify supplied claims,
  media, sources, or datasets with documented public-source methods'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
