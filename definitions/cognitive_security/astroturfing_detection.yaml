id: cognitive_security.astroturfing_detection
description: Astroturfing detection identifies manufactured grassroots activity —
  coordinated campaigns designed to simulate organic, spontaneous public support or
  opposition. The technique draws on network-structure analysis, account behavioral
  signals, and content-similarity patterns to distinguish authentic civic expression
  from synthetic amplification. Defensively, it helps analysts, journalists, and platform
  trust-and-safety teams surface coordinated inauthentic behavior (CIB) and protect
  genuine public discourse from being drowned out or misrepresented.
tags:
- cognitive-security
- cognitive_security
- osint
- influence-operations
triggers:
- is this astroturfing
- detect fake grassroots
- coordinated inauthentic behavior
- manufactured consensus
- is this organic engagement
- bot network analysis
- synthetic amplification
tools:
- verb: read
  purpose: ingest account data, post content, and network metadata for the candidate
    campaign
- verb: search
  purpose: query external databases, prior CIB disclosures, and threat-intel feeds
    to cross-reference known actor TTPs
- verb: reason
  purpose: apply behavioral, structural, and content-similarity heuristics to score
    artificiality
- verb: write
  purpose: emit a structured detection report with confidence tiers and evidence chains
inputs:
- name: campaign_sample
  type: table
  required: true
  description: A sample of accounts, posts, timestamps, and engagement metrics suspected
    of coordinated inauthentic behavior
- name: baseline_context
  type: text
  required: false
  description: Description of the topic, event, or platform context in which the activity
    appeared
outputs:
- name: detection_report
  type: markdown
  description: Structured report flagging coordinated clusters, behavioral red flags,
    confidence tier, and recommended follow-on actions
- name: indicator_table
  type: table
  description: Per-account or per-cluster table of indicators (creation date, posting
    velocity, content-hash overlap, cross-platform presence)
references:
- 'Starbird, K., Arif, A., & Wilson, T. (2019). Disinformation as Collaborative Work:
  Surfacing the Participatory Nature of Strategic Information Operations. CSCW.'
- Stanford Internet Observatory (2022). Coordinated Inauthentic Behavior Takedown
  Archive. Stanford University.
- Renée DiResta (2018). The Digital Maginot Line. Ribbon Farm.
- 'Luceri, L. et al. (2020). Detecting Troll Behavior via Inverse Reinforcement Learning:
  A Case Study of Russian Trolls in the 2016 US Election. ICWSM.'
when_to_use:
- a narrative is spreading unusually fast and account patterns look homogeneous
- a social movement or petition appears but its account base lacks organic growth
  history
- a platform trust-and-safety team is investigating potential CIB
- an analyst needs to distinguish genuine public opinion from manufactured consensus
  before briefing decision-makers
- a journalist is fact-checking whether a hashtag campaign is organic
what_it_produces:
- a tiered confidence assessment (high/medium/low) that the activity is coordinated
  and inauthentic
- a list of behavioral and structural indicators used to reach the conclusion
- cluster-level view of which accounts appear to be operating in concert
- recommended follow-on steps (e.g., platform reporting, further OSINT, or temporal
  anchoring)
key_discipline:
- look for behavioral coordination, not just content similarity — same message from
  1000 accounts with identical posting cadence is more diagnostic than similar phrasing
  alone
- anchor findings to observable signals (creation date spikes, follower-graph density,
  cross-platform account reuse) rather than inferred intent
- assign confidence tiers and document which specific indicators drove each tier to
  support adversarial review of the conclusion
workflow_steps:
- verbs:
  - read
  title: Ingest and scope the sample
  text: Load the candidate account set, post corpus, and engagement metadata. Establish
    the time window and platform scope. Note whether the sample was self-selected
    (tip-driven) or randomly drawn — this affects how representativeness claims will
    be qualified.
- verbs:
  - search
  - reason
  title: Apply structural and behavioral heuristics
  text: Check for account-creation date spikes (many accounts born in a short window),
    posting-velocity anomalies (accounts posting far more frequently than organic
    users), content-hash overlap (near-identical text or media reposted across accounts),
    and follower-graph clustering (accounts primarily follow one another). Cross-reference
    account names or bios against prior CIB disclosure archives and threat-intel feeds.
- verbs:
  - reason
  title: Test alternative explanations
  text: 'Before concluding CIB, rule out organic explanations: viral sharing by real
    users, platform-algorithmic amplification, a genuine grassroots community with
    centralized tooling (e.g., a petition site), or researcher/activist coordinated
    but transparent action. Distinguish ''coordinated'' from ''inauthentic'' — coordination
    is a necessary but not sufficient indicator.'
- verbs:
  - reason
  - write
  title: Score, tier, and compile report
  text: 'Assign each identified cluster a confidence tier (high = multiple independent
    behavioral indicators; medium = 1-2 indicators with plausible alternatives; low
    = circumstantial). Write the detection report with: the indicators found per cluster,
    alternative explanations considered and ruled out, confidence tier, and recommended
    next steps (platform reporting, additional OSINT, informing relevant stakeholders).'
anti_criteria:
- do not conflate 'coordinated' with 'inauthentic' — transparent coalitions using
  shared tooling can coordinate without being deceptive
- do not assert attribution to a specific state or actor without corroborating evidence
  beyond behavioral signals
- do not treat volume or speed of spread alone as evidence of astroturfing — viral
  organic content can spread quickly
- do not expose personal data of individual accounts beyond what is necessary to establish
  the behavioral pattern
defensive_boundary: 'Use Astroturfing Detection only for cognitive-security defense:
  recognize, assess, document, or defend audiences, decision-makers, and public discourse.
  Do not use this skill to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Astroturfing Detection to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Astroturfing Detection, tie each detection report, and indicator table claim
  to concrete evidence from the specific campaign sample, and baseline context item,
  source excerpt, observation, or command result that supports it.
- For Astroturfing Detection, label observations, derived features, assumptions, inferences,
  contradictions, and missing inputs separately before writing the detection report.
- Before recommending any Astroturfing Detection action, identify the weakest evidence
  link, the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Astroturfing Detection: the detection report is supported by multiple
  independent content, behavioral, narrative, media, and audience-risk evidence; ingest
  and scope the sample and apply structural and behavioral heuristics checks agree,
  and no unresolved contradiction would change the result.'
- 'Medium for Astroturfing Detection: the detection report is plausible, but one important
  campaign sample source, comparison case, or alternative explanation remains incomplete.'
- 'Low for Astroturfing Detection: the detection report rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Astroturfing Detection cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Astroturfing Detection, use only authorized campaign sample, and baseline context,
  public or source-approved records, and caller-provided context needed for the defensive
  task.
- For Astroturfing Detection, minimize person-level detail in the detection report;
  prefer aggregate, artifact-level, role-level, or case-level summaries unless an
  individual is essential to the defensive question.
- For Astroturfing Detection, do not infer protected traits, private identity, intent,
  location, legal culpability, or platform account ownership beyond the supplied and
  authorized evidence.
failure_modes:
- 'Astroturfing Detection: treating campaign sample as complete when ingest and scope
  the sample and apply structural and behavioral heuristics checks or contradictory
  evidence are missing.'
- 'Astroturfing Detection: producing advice that would help a requester increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation.'
- 'Astroturfing Detection: reporting the detection report without uncertainty labels,
  alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Astroturfing Detection outputs to increase persuasive impact, exploit
  audience vulnerabilities, or optimize narrative manipulation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Convert the detection report from Astroturfing Detection into an operational
  playbook to increase persuasive impact, exploit audience vulnerabilities, or optimize
  narrative manipulation'' -> refuse and offer governance, detection, or mitigation
  analysis.'
- 'Safe defensive: ''Use Astroturfing Detection to assess supplied material for manipulation
  indicators and recommend resilience measures with campaign sample, and baseline
  context'' -> produce bounded findings with evidence and uncertainty labels.'
