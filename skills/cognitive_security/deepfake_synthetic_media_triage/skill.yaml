id: cognitive_security.deepfake_synthetic_media_triage
name: Deepfake & Synthetic Media Triage
group: cognitive_security
version: 0.1.0
status: implemented
summary: Triage suspected synthetic media for tell-tales and provenance signals (defensive,
  non-forensic).
description: 'Deepfake and Synthetic Media Triage is a structured first-pass assessment
  procedure for suspected AI-generated, manipulated, or misrepresented media — images,
  video, audio, and documents. It applies a layered checklist of observable tell-tales,
  provenance signals, and contextual inconsistencies to rapidly determine whether
  a piece of media warrants escalation to full forensic analysis or can be assessed
  with sufficient confidence at triage level. The technique is explicitly non-forensic:
  it does not claim evidentiary-grade conclusions but instead produces a calibrated
  suspicion rating, a prioritized list of anomaly observations, and a provenance chain
  reconstruction using open-source signals. It is defensive and educational, designed
  for analysts, journalists, educators, and information-environment practitioners
  who need to triage at volume without laboratory tools.'
ageint_topic: cognitive-security
tags:
- cognitive-security
- cognitive_security
- synthetic-media
- provenance-verification
triggers:
- deepfake triage
- is this image real
- synthetic media check
- AI-generated video assessment
- manipulated media detection
- deepfake tell-tales
- provenance of this media
- should I trust this video
tools:
- verb: read
  purpose: ingest the media artifact description, metadata, and any context provided
    by the requester
- verb: web
  purpose: perform reverse-image/video search, provenance chain lookup, and check
    for prior documentation of the artifact in open sources
- verb: reason
  purpose: apply the structured tell-tale checklist and contextual inconsistency analysis
    to produce a calibrated suspicion rating
- verb: write
  purpose: emit the triage report with anomaly observations, provenance findings,
    suspicion rating, and escalation recommendation
inputs:
- name: media_artifact
  type: text
  required: true
  description: 'Description of the suspected media: URL or file reference, media type
    (image/video/audio/document), claimed source, claimed date, and the context in
    which it was encountered'
- name: claim_context
  type: text
  required: true
  description: The specific claim the media is being used to support or evidence —
    what is the media supposed to show and why does it matter
- name: available_metadata
  type: text
  required: false
  description: 'Any available technical metadata: EXIF data, file creation/modification
    timestamps, platform upload metadata, C2PA or Content Credentials data if present'
outputs:
- name: triage_report
  type: markdown
  description: 'Structured report covering: media characterization, tell-tale checklist
    results, provenance chain findings, contextual inconsistencies, overall suspicion
    rating (Suspicious/Uncertain/Likely Authentic) with confidence level, and escalation
    recommendation'
- name: anomaly_log
  type: table
  description: 'Table of observed anomalies: anomaly type, description, diagnostic
    weight (Strong/Moderate/Weak indicator of manipulation), and whether it is definitively
    forensic or requires laboratory confirmation'
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Witness Media Lab & First Draft (2018). Starling: An End-to-End Provenance System
  for Journalists. Columbia University.'
- 'Chesney, R., & Citron, D. K. (2019). Deep fakes: A looming challenge for privacy,
  democracy, and national security. California Law Review, 107(6), 1753-1819.'
- 'Tolosana, R., Vera-Rodriguez, R., Fierrez, J., Morales, A., & Ortega-Garcia, J.
  (2020). Deepfakes and beyond: A survey of face manipulation and fake detection.
  Information Fusion, 64, 131-148.'
- Coalition for Content Provenance and Authenticity (C2PA) (2023). C2PA Technical
  Specification v1.3. https://c2pa.org/specifications/
- Farid, H. (2022). Creating, Using, Misusing, and Detecting Deep Fakes. Journal of
  Online Trust and Safety, 1(4).
- 'Snyder, M., & Doermann, D. (2020). Making Deep Fakes More Detectable: CNN Training
  with Error Amplifying Loss Function. ACM Multimedia.'
defensive_boundary: 'Use Deepfake & Synthetic Media Triage only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Deepfake & Synthetic Media Triage to increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation,
  refuse that path and redirect to the safe defensive form: assess supplied material
  for manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Deepfake & Synthetic Media Triage, tie the suspicion rating to concrete evidence
  — specific tell-tale observations with diagnostic weight, reverse-search provenance
  findings, metadata checks, and contextual cross-references against verifiable external
  facts — and state explicitly what could not be assessed at triage level and what
  escalation an evidentiary conclusion would require.
- For Deepfake & Synthetic Media Triage, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the triage
  report.
- Before recommending any Deepfake & Synthetic Media Triage action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Deepfake & Synthetic Media Triage: the suspicion rating rests on a pattern
  of independently observed anomalies or a strong provenance disconfirmation rather
  than any single tell-tale, the reverse-search trace and contextual plausibility
  assessment corroborate the rating, and no unresolved contradiction would change
  the escalation recommendation — while the output remains explicitly non-evidentiary.'
- 'Medium for Deepfake & Synthetic Media Triage: the triage report is plausible, but
  one important media artifact source, comparison case, or alternative explanation
  remains incomplete.'
- 'Low for Deepfake & Synthetic Media Triage: the triage report rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Deepfake & Synthetic Media Triage cannot determine from the supplied
  or authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Deepfake & Synthetic Media Triage, use only authorized media artifact, claim
  context, and available metadata, public or source-approved records, and caller-provided
  context needed for the defensive task.
- For Deepfake & Synthetic Media Triage, minimize person-level detail in the triage
  report; prefer aggregate, artifact-level, role-level, or case-level summaries unless
  an individual is essential to the defensive question.
- For Deepfake & Synthetic Media Triage, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Deepfake & Synthetic Media Triage: declaring media authentic from the mere absence
  of current-generation artifacts, treating one anomaly as conclusive, skipping the
  provenance trace, or stating a definitive forensic verdict, so a triage-level judgment
  is mistaken for an evidentiary conclusion that advanced synthetic media could defeat.'
- 'Deepfake & Synthetic Media Triage: producing advice that would help a requester
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation.'
- 'Deepfake & Synthetic Media Triage: reporting the triage report without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Deepfake & Synthetic Media Triage outputs to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation'' ->
  refuse and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the triage report from Deepfake & Synthetic Media Triage into
  an operational playbook to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Deepfake & Synthetic Media Triage to assess supplied material
  for manipulation indicators and recommend resilience measures with media artifact,
  claim context, and available metadata'' -> produce bounded findings with evidence
  and uncertainty labels.'
