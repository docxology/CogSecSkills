id: osint_integrity.collection_plan_design
description: Collection plan design translates intelligence requirements into a disciplined,
  scoped, and ethically bounded OSINT collection strategy before any data is gathered.
  The plan specifies what information is needed and why, which open sources are in
  scope, what collection methods are lawful and proportionate, how data will be stored
  and protected, and what review checkpoints govern the effort. Establishing these
  parameters in advance prevents scope creep, reduces legal exposure, and ensures
  that collected material remains relevant to the stated analytic question. It is
  the upstream governance document for all subsequent OSINT work.
tags:
- cognitive-security
- osint_integrity
- collection-management
- ethics
triggers:
- plan OSINT collection
- define collection scope
- intelligence requirements
- what sources should we collect
- design a collection strategy
tools:
- verb: read
  purpose: ingest the intelligence requirement, prior collection records, legal constraints,
    and organizational policies
- verb: reason
  purpose: derive collection priorities, source selection criteria, ethical boundaries,
    and risk assessment from the requirement
- verb: ask
  purpose: clarify ambiguous requirements or confirm legal/ethical authorization from
    the tasking authority before proceeding
- verb: write
  purpose: produce the structured collection plan document including scope, sources,
    methods, legal basis, and review schedule
inputs:
- name: intelligence_requirement
  type: text
  required: true
  description: The specific analytic question or decision the collection must answer,
    stated in precise terms
- name: legal_and_policy_constraints
  type: text
  required: true
  description: Applicable laws, organizational policies, and ethical frameworks governing
    collection (e.g., privacy law, terms of service)
- name: available_resources
  type: text
  required: false
  description: Personnel, tools, time, and budget available for the collection effort
outputs:
- name: collection_plan
  type: markdown
  description: Structured document specifying the requirement, in-scope sources, collection
    methods, legal basis, data handling rules, and review checkpoints
- name: source_priority_matrix
  type: table
  description: Ranked list of sources with rationale, expected yield, reliability
    tier, and access method
references:
- 'Lowenthal, M. M. (2019). Intelligence: From Secrets to Policy (8th ed.). CQ Press.'
- NATO (2016). Open Source Intelligence Handbook. NATO Open Source Intelligence Reader.
- Pherson, R. H. & Heuer, R. J. (2021). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press.
when_to_use:
- At the start of any OSINT investigation before collecting any data
- When an existing investigation risks expanding beyond its original mandate
- When the legal or ethical basis for collection is unclear or contested
- When multiple analysts or teams will contribute to a single collection effort and
  coordination is needed
what_it_produces:
- A written collection plan that can be reviewed for compliance and approved before
  collection begins
- A source priority matrix that guides analyst effort toward highest-yield, lowest-risk
  sources first
- Explicit documentation of what is out of scope, reducing later scope creep disputes
key_discipline:
- Start from the intelligence requirement, not from the available tools — collection
  that cannot answer the requirement wastes resources and creates liability
- 'State legal basis explicitly: passive observation, publicly available data, and
  active elicitation each carry different legal and ethical burdens'
- Scope exclusions are as important as inclusions — what you will not collect defines
  the ethical boundary
- Build in review checkpoints so that scope can be reassessed if the analytic question
  evolves
workflow_steps:
- verbs:
  - read
  - ask
  title: Clarify the intelligence requirement
  text: Read the tasking or analytic question. Ask the tasking authority to resolve
    ambiguities about what decision will be made with the intelligence, what level
    of confidence is required, and what the deadline is. Confirm authorization for
    the collection.
- verbs:
  - reason
  title: Derive scope, sources, and ethical boundaries
  text: Map the requirement to information types and candidate open sources. Assess
    each source against legal constraints, terms-of-service obligations, and proportionality.
    Exclude sources where collection would be disproportionate, legally ambiguous,
    or outside the analytic requirement. Identify the legal basis for each included
    source.
- verbs:
  - reason
  - write
  title: Design collection methods and data handling rules
  text: For each in-scope source, specify the collection method (manual review, automated
    scraping, API, archive query), storage location, access controls, retention period,
    and deletion trigger. Define who may access the data and under what conditions.
- verbs:
  - write
  title: Draft the plan and source priority matrix
  text: Produce the written collection plan document and the source priority table.
    Obtain approval from the tasking authority and legal or compliance review before
    collection begins. Record the approval in the plan.
anti_criteria:
- Do not begin collection before legal basis and scope are documented and approved
- Do not include sources in the plan simply because they are accessible — include
  only those that can plausibly answer the stated requirement
- Do not treat the collection plan as static — it must be updated if the analytic
  question or legal environment changes mid-effort
defensive_boundary: 'Use Collection Plan Design only for OSINT integrity and source-verification
  defense: recognize, assess, document, or defend source provenance, privacy, chain
  of custody, and public-source accountability. Do not use this skill to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence.'
misuse_redirect: 'If a request asks Collection Plan Design to dox, deanonymize, harass,
  bypass access controls, or attribute identity beyond evidence, refuse that path
  and redirect to the safe defensive form: verify supplied claims, media, sources,
  or datasets with documented public-source methods.'
evidence_requirements:
- For Collection Plan Design, bind each finding to a labeled source — source records,
  custody notes, metadata, corroborating references, and contradiction logs, a cited
  reference, or an explicitly marked inference — and never present inference as observed
  evidence.
- For Collection Plan Design, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Collection Plan Design recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Collection Plan Design: independent lines of source records,
  custody notes, metadata, corroborating references, and contradiction logs converge,
  credible alternatives have been tested, and the conclusion would survive removing
  any single source.'
- 'Medium confidence for Collection Plan Design: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Collection Plan Design: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Collection Plan Design cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Collection
  Plan Design should collect to separate the live alternatives.
privacy_legal_constraints:
- For Collection Plan Design, use only data the caller is authorized to analyze, drawn
  from public or source-approved records.
- For Collection Plan Design, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Collection Plan Design, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Collection Plan Design failure: overstating identity, location, attribution, or
  source reliability from incomplete public traces.'
- 'Collection Plan Design failure: producing guidance that would help a requester
  dox, deanonymize, harass, bypass access controls, or attribute identity beyond evidence.'
- 'Collection Plan Design failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Collection Plan Design to dox, deanonymize, harass, bypass access
  controls, or attribute identity beyond evidence'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Collection Plan Design into an operational playbook to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence'' -> refuse
  and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Collection Plan Design to verify supplied claims, media,
  sources, or datasets with documented public-source methods'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
