id: sat.quadrant_crunching
name: Quadrant Crunching
group: sat
version: 0.1.0
status: implemented
summary: Systematically permute key assumptions into a matrix of alternative outcomes.
description: Quadrant Crunching (Pherson & Heuer) systematically permutes two or more
  key uncertain assumptions into a matrix of alternative outcome cells, forcing analysts
  to confront possibilities they would otherwise ignore. Each cell of the matrix represents
  a distinct scenario whose internal logic must be examined for coherence and plausibility.
  The technique counteracts tunnel vision by making the full combinatorial space of
  assumption combinations explicit and visible rather than allowing the dominant mental
  model to crowd out alternatives.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- alternative-analysis
triggers:
- quadrant crunching
- permute assumptions
- scenario matrix
- map all combinations
- 2x2 scenario analysis
tools:
- verb: read
  purpose: ingest the problem statement, the current dominant assessment, and any
    stated key assumptions
- verb: reason
  purpose: identify the two or more most consequential uncertain variables, assign
    binary or ternary poles, generate and evaluate each matrix cell for internal coherence
    and plausibility
- verb: write
  purpose: produce the labeled matrix, per-cell scenario narratives, plausibility
    ratings, and analytic implications
inputs:
- name: problem_statement
  type: text
  required: true
  description: the analytic question or judgment under review
- name: dominant_assessment
  type: text
  required: false
  description: the current leading hypothesis or baseline forecast, if one exists
- name: candidate_assumptions
  type: list
  required: false
  description: a seed list of key assumptions identified by prior analysis; the technique
    will refine and select among them
outputs:
- name: scenario_matrix
  type: table
  description: rows and columns labeled by assumption poles, each cell containing
    a scenario label and brief narrative
- name: scenario_narratives
  type: markdown
  description: 'per-cell elaborations: internal logic, plausibility rating (High /
    Medium / Low / Incoherent), key indicators, and implications for the analytic
    question'
- name: neglected_cells
  type: markdown
  description: explicit identification of matrix cells the dominant assessment ignores
    or rates as impossible, with reasoning
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Pherson, R. H. & Heuer, R. J. (2021). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Chapter on Quadrant Crunching.
- Pherson, K. H. & Pherson, R. H. (2012). Critical Thinking for Strategic Intelligence.
  CQ Press.
defensive_boundary: 'Use Quadrant Crunching only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Quadrant Crunching to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Quadrant Crunching, anchor each cell's coherence judgment, plausibility rating,
  and confirming indicators to concrete evidence rather than to confidence in the
  base case, document the evidentiary reason any cell is labeled incoherent, and bind
  the neglected-cell findings to specific evidence showing the dominant assessment's
  blind spot rather than asserting it.
- For Quadrant Crunching, label observations, derived features, assumptions, inferences,
  contradictions, and missing inputs separately before writing the scenario matrix.
- Before recommending any Quadrant Crunching action, identify the weakest evidence
  link, the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Quadrant Crunching: the two axes were chosen for maximum consequence and
  genuine independent uncertainty, every coherent matrix cell was examined on its
  own internal logic before its evidence-anchored plausibility rating, the neglected
  cells the dominant assessment ignores are explicitly surfaced with reasoning, and
  no unresolved contradiction would change which alternatives deserve attention.'
- 'Medium for Quadrant Crunching: the scenario matrix is plausible, but one important
  problem statement source, comparison case, or alternative explanation remains incomplete.'
- 'Low for Quadrant Crunching: the scenario matrix rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Quadrant Crunching cannot determine from the supplied or authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating sat evidence to collect when confidence is low
  or medium.
privacy_legal_constraints:
- For Quadrant Crunching, use only authorized problem statement, dominant assessment,
  and candidate assumptions, public or source-approved records, and caller-provided
  context needed for the defensive task.
- For Quadrant Crunching, minimize person-level detail in the scenario matrix; prefer
  aggregate, artifact-level, role-level, or case-level summaries unless an individual
  is essential to the defensive question.
- For Quadrant Crunching, do not infer protected traits, private identity, intent,
  location, legal culpability, or platform account ownership beyond the supplied and
  authorized evidence.
failure_modes:
- 'Quadrant Crunching: declaring the scenario space mapped while letting the dominant
  assessment pre-filter cells as impossible without incoherence reasoning, choosing
  axes that are correlated rather than independent or merely easy to enumerate, or
  anchoring plausibility on analyst confidence instead of evidence, so the matrix
  reproduces tunnel vision under the appearance of having considered all combinations.'
- 'Quadrant Crunching: producing advice that would help a requester force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Quadrant Crunching: reporting the scenario matrix without uncertainty labels, alternative
  explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Quadrant Crunching outputs to force a preferred conclusion, hide
  uncertainty, or use the technique to rationalize manipulation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Convert the scenario matrix from Quadrant Crunching into an operational
  playbook to force a preferred conclusion, hide uncertainty, or use the technique
  to rationalize manipulation'' -> refuse and offer governance, detection, or mitigation
  analysis.'
- 'Safe defensive: ''Use Quadrant Crunching to apply the structured technique to supplied
  evidence while preserving alternatives and uncertainty with problem statement, dominant
  assessment, and candidate assumptions'' -> produce bounded findings with evidence
  and uncertainty labels.'
