id: sat.red_hat_analysis
description: Red Hat Analysis (also called Red Team Perspective or Enemy-Think) requires
  the analyst to step fully inside an adversary's worldview — their goals, constraints,
  organizational culture, decision calculus, and risk tolerance — and reason forward
  from that frame rather than projecting one's own. The purpose is to anticipate adversary
  actions, identify exploitable vulnerabilities, and avoid the mirror-imaging error
  of assuming the adversary thinks and values as we do. In cognitive-security contexts
  it also surfaces how adversaries model and manipulate target audiences, revealing
  influence vectors that mirror-imaging would hide.
tags:
- cognitive-security
- sat
- adversary-modeling
triggers:
- red hat analysis
- think like the adversary
- enemy think
- what would they do
- adversary perspective
- mirror imaging risk
tools:
- verb: read
  purpose: ingest all available information about the adversary's stated goals, past
    behavior, organizational culture, constraints, and decision-making history
- verb: reason
  purpose: 'construct the adversary''s internal frame: goals, constraints, risk tolerance,
    perceived opportunities, and likely decision logic — then reason forward to probable
    actions'
- verb: write
  purpose: emit the adversary profile, inferred decision calculus, most probable and
    most dangerous courses of action, and mirror-imaging risks identified
inputs:
- name: adversary_profile
  type: text
  required: true
  description: 'available information on the adversary: identity, stated objectives,
    past actions, organizational culture, known constraints, and decision-making authorities'
- name: situation_context
  type: text
  required: true
  description: the current situation the adversary is facing, including perceived
    threats, opportunities, and the environment from their vantage point
- name: analytic_question
  type: text
  required: false
  description: the specific question the adversary-perspective analysis should answer
    (e.g., what action will they take next, how will they interpret our signal)
outputs:
- name: adversary_frame
  type: markdown
  description: 'structured reconstruction of the adversary''s worldview: goals, constraints,
    risk tolerance, information environment, and key decision variables as they understand
    them'
- name: courses_of_action
  type: markdown
  description: most probable and most dangerous adversary courses of action (COAs),
    with the internal reasoning chain the adversary would follow to choose each
- name: mirror_imaging_flags
  type: markdown
  description: explicit identification of assumptions in the current analytic line
    that project our own values or logic onto the adversary without evidence
references:
- Pherson, R. H. & Heuer, R. J. (2021). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Chapter on Red Hat Analysis.
- Heuer, R. J. (1999). Psychology of Intelligence Analysis. Center for the Study of
  Intelligence, CIA. Chapter 8 (mirror imaging).
- Jervis, R. (1976). Perception and Misperception in International Politics. Princeton
  University Press.
when_to_use:
- the analytic question involves predicting or understanding adversary decisions,
  intentions, or influence operations
- there is risk of mirror imaging — projecting own values, risk tolerance, or decision
  logic onto a culturally or ideologically distinct actor
- assessing how an adversary perceives and will respond to a signal, policy, or action
- identifying which cognitive vulnerabilities or information gaps an adversary is
  likely to exploit in a target audience
what_it_produces:
- a structured adversary worldview profile covering goals, constraints, culture, and
  decision calculus
- ranked adversary courses of action with internal reasoning chains from the adversary's
  perspective
- explicit mirror-imaging flags — places where current analysis assumes adversary
  rationality matches our own
key_discipline:
- reason from inside the adversary's frame, not from yours — their logic must be coherent
  given their values, not ours
- use the adversary's own stated goals, doctrinal documents, and behavioral history
  as primary anchors, not inferred intent
- distinguish between what the adversary wants, what they believe, and what they can
  do — collapsing these produces mirror imaging
- the most dangerous course of action is not necessarily the most probable; both must
  be separately assessed
workflow_steps:
- verbs:
  - read
  - reason
  title: Build the adversary frame
  text: 'Read all available adversary profile information. Construct the adversary''s
    internal worldview: their primary goals and how they prioritize among them; their
    perceived constraints (resource, legal, normative, reputational); their risk tolerance
    inferred from past behavior; the information environment they operate in; and
    their organizational decision culture (centralized vs. distributed, risk-seeking
    vs. risk-averse). Explicitly set aside your own evaluative frame at each step.'
- verbs:
  - reason
  title: Develop adversary courses of action
  text: 'From inside the adversary''s frame, identify the options available to them
    in the current situation. For each plausible option, trace the internal decision
    logic: what goal it serves, what risk it carries from their perspective, and what
    they would need to believe for it to be their preferred choice. Identify the Most
    Probable COA and the Most Dangerous COA separately. Note where these diverge —
    divergence is analytically important.'
- verbs:
  - reason
  - write
  title: Flag mirror imaging and emit findings
  text: 'Review the current analytic line for mirror-imaging assumptions: places where
    adversary behavior is being explained by reference to how we would behave. For
    each flag, state the assumption, the evidence for and against it, and an alternative
    adversary-logic explanation. Emit the adversary frame, COAs with internal reasoning,
    and the mirror-imaging flag list. Include indicators that would confirm or disconfirm
    each COA.'
anti_criteria:
- do not evaluate adversary options by our own values or risk calculus — an action
  that seems irrational from our frame may be optimal from theirs
- do not conflate the adversary's capability with their intent, or their rhetoric
  with their actual decision goals
- do not allow the exercise to become advocacy for the adversary's position — the
  purpose is understanding, not sympathy or operational planning
- do not present only the most probable COA without separately surfacing the most
  dangerous one
defensive_boundary: 'Use Red Hat Analysis only for structured analytic technique support:
  recognize, assess, document, or defend analytic rigor, alternative hypotheses, and
  calibrated judgment. Do not use this skill to force a preferred conclusion, hide
  uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Red Hat Analysis to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Red Hat Analysis, bind each finding to a labeled source — hypotheses, assumptions,
  indicators, evidence tables, and confidence notes, a cited reference, or an explicitly
  marked inference — and never present inference as observed evidence.
- For Red Hat Analysis, keep observations, assumptions, inferences, and missing information
  in separate labeled categories.
- Before issuing any Red Hat Analysis recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Red Hat Analysis: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Red Hat Analysis: the evidence supports the conclusion, but
  one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Red Hat Analysis: the evidence is sparse, single-source, contested,
  or mostly inferential, so competing explanations must be preserved in the output.'
uncertainty_handling:
- State plainly what Red Hat Analysis cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Red
  Hat Analysis should collect to separate the live alternatives.
privacy_legal_constraints:
- For Red Hat Analysis, use only data the caller is authorized to analyze, drawn from
  public or source-approved records.
- For Red Hat Analysis, protect privacy by preferring aggregate, role-level, or artifact-level
  summaries over individual targeting unless an individual is essential to the defensive
  question.
- For Red Hat Analysis, do not infer protected traits, private identity, intent, location,
  or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Red Hat Analysis failure: using the method as a checklist while skipping diagnostic
  evidence and disconfirming tests.'
- 'Red Hat Analysis failure: producing guidance that would help a requester force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Red Hat Analysis failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Red Hat Analysis to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Red Hat Analysis into an operational playbook to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Red Hat Analysis to apply the structured technique to supplied
  evidence while preserving alternatives and uncertainty'' -> produce bounded findings
  with explicit evidence and uncertainty labels.'
