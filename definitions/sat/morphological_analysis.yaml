id: sat.morphological_analysis
description: Morphological analysis (Zwicky 1969; Ritchey 2011) decomposes a complex
  problem into its independent parameters, enumerates the discrete values each parameter
  can take, and maps the full cross-product to bound the space of possible configurations.
  In intelligence and cognitive-security contexts it prevents premature closure on
  a single scenario by forcing analysts to articulate every combination that remains
  logically consistent with current evidence, including surprising or low-salience
  possibilities.
tags:
- cognitive-security
- sat
- scenario-generation
- bounded-analysis
triggers:
- enumerate all possibilities
- what combinations are possible
- morphological analysis
- parameter space
- bound the scenarios
- what haven't we considered
tools:
- verb: read
  purpose: ingest problem description, prior analysis, and any constraints already
    known about the parameter space
- verb: reason
  purpose: identify independent dimensions, enumerate value sets, prune logically
    impossible combinations, and assess each surviving cell
- verb: write
  purpose: produce the morphological box (matrix), the pruned scenario list, and priority
    findings
inputs:
- name: problem_statement
  type: text
  required: true
  description: A concise statement of the issue or threat being analyzed (e.g., 'Who
    might conduct a coordinated inauthentic behavior campaign against this election
    and how?')
- name: known_constraints
  type: list
  required: false
  description: Established facts or logical constraints that rule out certain parameter
    values or combinations upfront
outputs:
- name: morphological_box
  type: table
  description: A matrix whose rows are parameters and whose columns are possible values;
    each cell contains its value label and a brief rationale
- name: scenario_inventory
  type: markdown
  description: A list of all logically consistent cross-product combinations (scenarios),
    each with an evidence status (supported / neutral / contradicted) and a brief
    description
- name: priority_findings
  type: markdown
  description: Analytic commentary identifying the most-likely scenario, the most-dangerous
    scenario, and any combination that current collection posture is blind to
references:
- Zwicky, F. (1969). Discovery, Invention, Research Through the Morphological Approach.
  Macmillan.
- 'Ritchey, T. (2011). Wicked Problems – Social Messes: Decision Support Modelling
  with Morphological Analysis. Springer.'
- Heuer, R. J., & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis, 2nd ed. CQ Press. Chapter 7 (Scenario Analysis).
- Pherson, R. H., & Pherson, K. H. (2020). Critical Thinking for Strategic Intelligence,
  3rd ed. CQ Press.
when_to_use:
- an analysis is at risk of anchoring on the most familiar or most recent scenario
  while ignoring equally plausible alternatives
- a threat space has multiple independent axes (actor identity, method, target, timing)
  and all combinations need to be surfaced before prioritization
- collection requirements need to be written to discriminate among specific configurations
  in the parameter space
- a cognitive-security audit needs to catalogue the distinct narrative architectures
  an influence operation could adopt
what_it_produces:
- a complete enumeration of logically possible scenarios bounded by the chosen parameters
- explicit identification of which combinations are ruled out by known constraints
  and why
- a scenario inventory tagged by current evidential support, enabling targeted collection
  to close gaps
key_discipline:
- parameters must be genuinely independent — if two dimensions co-vary mechanically,
  collapse them into one
- enumerate value sets exhaustively before pruning — premature pruning re-introduces
  the closure the technique is designed to prevent
- record the reason for every pruned cell; a cell removed for the wrong reason is
  where the surprise will come from
- the most-dangerous scenario and the most-likely scenario are often different cells
  — report both
workflow_steps:
- verbs:
  - read
  - reason
  title: Decompose into parameters
  text: Read the problem statement and identify 3–7 independent parameters that together
    define the space of possible configurations. For each parameter, enumerate 2–5
    discrete values it could take. Record parameters as rows and values as columns
    in the morphological box.
- verbs:
  - reason
  title: Prune impossible combinations
  text: Cross each parameter value against all values of every other parameter. Mark
    any combination that is logically impossible, physically infeasible, or ruled
    out by confirmed evidence. Document the ruling-out reason for every pruned cell.
    The surviving cells form the feasible scenario inventory.
- verbs:
  - reason
  title: Assess surviving scenarios
  text: 'For each surviving combination, assess: (a) current evidential support (supported
    / neutral / contradicted by available reporting), (b) likelihood given base rates
    and context, (c) consequence if realized, and (d) whether current collection can
    distinguish this scenario from its neighbors.'
- verbs:
  - write
  title: Report findings
  text: Produce the morphological box as a table, the scenario inventory as an annotated
    list, and priority findings calling out the most-likely scenario, the most-dangerous
    scenario, and any collection gap that prevents disambiguation of high-consequence
    cells.
anti_criteria:
- do not prune cells based on intuition or familiarity before documenting the logical
  or evidential basis for exclusion
- do not allow the parameter list to be dominated by factors whose values are already
  known — the technique's value is in the under-explored dimensions
- do not report only the most-likely scenario; the most-dangerous scenario must always
  appear in the output even if assessed as low probability
defensive_boundary: 'Use Morphological Analysis only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Morphological Analysis to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Morphological Analysis, tie each morphological box, scenario inventory, and
  priority findings claim to concrete evidence from the specific problem statement,
  and known constraints item, source excerpt, observation, or command result that
  supports it.
- For Morphological Analysis, label observations, derived features, assumptions, inferences,
  contradictions, and missing inputs separately before writing the morphological box.
- Before recommending any Morphological Analysis action, identify the weakest evidence
  link, the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Morphological Analysis: the morphological box is supported by multiple
  independent hypotheses, assumptions, indicators, evidence tables, and confidence
  notes; decompose into parameters and prune impossible combinations checks agree,
  and no unresolved contradiction would change the result.'
- 'Medium for Morphological Analysis: the morphological box is plausible, but one
  important problem statement source, comparison case, or alternative explanation
  remains incomplete.'
- 'Low for Morphological Analysis: the morphological box rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Morphological Analysis cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating sat evidence to collect when confidence is low
  or medium.
privacy_legal_constraints:
- For Morphological Analysis, use only authorized problem statement, and known constraints,
  public or source-approved records, and caller-provided context needed for the defensive
  task.
- For Morphological Analysis, minimize person-level detail in the morphological box;
  prefer aggregate, artifact-level, role-level, or case-level summaries unless an
  individual is essential to the defensive question.
- For Morphological Analysis, do not infer protected traits, private identity, intent,
  location, legal culpability, or platform account ownership beyond the supplied and
  authorized evidence.
failure_modes:
- 'Morphological Analysis: treating problem statement as complete when decompose into
  parameters and prune impossible combinations checks or contradictory evidence are
  missing.'
- 'Morphological Analysis: producing advice that would help a requester force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Morphological Analysis: reporting the morphological box without uncertainty labels,
  alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Morphological Analysis outputs to force a preferred conclusion, hide
  uncertainty, or use the technique to rationalize manipulation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Convert the morphological box from Morphological Analysis into an operational
  playbook to force a preferred conclusion, hide uncertainty, or use the technique
  to rationalize manipulation'' -> refuse and offer governance, detection, or mitigation
  analysis.'
- 'Safe defensive: ''Use Morphological Analysis to apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty with problem
  statement, and known constraints'' -> produce bounded findings with evidence and
  uncertainty labels.'
