id: sat.analysis_of_competing_hypotheses
description: 'ACH (Heuer, CIA) forces the analyst to evaluate ALL plausible hypotheses
  against ALL evidence simultaneously, rather than building a case for the first satisfactory
  explanation. The decisive move is to seek evidence that DISCONFIRMS hypotheses:
  the surviving hypothesis is the one with the least diagnostic evidence against it,
  not the one with the most evidence for it. This skill drives the full eight-step
  ACH procedure as an agentic loop.'
tags:
- cognitive-security
- sat
- hypothesis-testing
- heuer
- confirmation-bias
triggers:
- analysis of competing hypotheses
- ACH
- competing hypotheses
- which explanation is most likely
- rule out hypotheses
tools:
- verb: read
  purpose: ingest the question, candidate hypotheses, and evidence items
- verb: search
  purpose: gather additional evidence and surface missing alternatives
- verb: reason
  purpose: score each evidence item's consistency and diagnosticity per hypothesis
- verb: write
  purpose: emit the ACH matrix, ranking, sensitivity notes, and indicators
inputs:
- name: question
  type: text
  required: true
  description: the analytic question being adjudicated
- name: hypotheses
  type: list[str]
  required: false
  description: candidate explanations; the skill completes the set if partial
- name: evidence
  type: list[str]
  required: false
  description: evidence/argument items, including absence-of-evidence
outputs:
- name: matrix
  type: table
  description: hypotheses x evidence with C/I/N and diagnosticity weights
- name: ranking
  type: markdown
  description: hypotheses ordered by inconsistency score, least-disconfirmed first
- name: indicators
  type: markdown
  description: future observations that would shift the ranking
references:
- Heuer, R. J. (1999). Psychology of Intelligence Analysis, ch. 8.
- Heuer & Pherson (2014). Structured Analytic Techniques for Intelligence Analysis.
when_to_use:
- Multiple competing explanations for an event, attribution, or trend.
- You suspect you (or the source) have anchored on a first impression.
- A high-stakes judgment where confirmation bias would be costly.
what_it_produces:
- hypotheses x evidence with C/I/N and diagnosticity weights
- hypotheses ordered by inconsistency score, least-disconfirmed first
- future observations that would shift the ranking
key_discipline:
- '**Diagnosticity over weight of evidence.** Evidence consistent with *every*'
- '**Disconfirm, don''t confirm.** Rank by inconsistency, not consistency.'
- '**Absence of evidence is evidence.** A missing observation a hypothesis'
- '**Sensitivity check.** Identify which one or two items, if wrong, flip the'
workflow_steps:
- verbs:
  - reason
  - search
  title: Enumerate hypotheses
  text: 'Generate a **complete and mutually exclusive** set of hypotheses. Include
    the

    deception hypothesis ("someone wants me to believe H1") and a residual

    "something we haven''t thought of". If the user supplied a partial set, complete

    it; never evaluate fewer than three.'
- verbs:
  - read
  - search
  title: List evidence and arguments
  text: 'Assemble every relevant item: facts, arguments, assumptions, and **absence
    of

    evidence** (things that should be present under some hypothesis but are not).

    Tag each item with source and reliability (link to

    `cognitive_security.source_credibility_evaluation` if grading is needed).'
- verbs:
  - reason
  title: Build the matrix
  text: 'For each (evidence, hypothesis) cell, score consistency:

    - **C** — consistent with the hypothesis

    - **I** — inconsistent with the hypothesis

    - **N** — not applicable / no bearing'
- verbs:
  - reason
  title: Assess diagnosticity
  text: 'Mark each evidence ROW''s diagnosticity. A row that is **C for every hypothesis**

    has **no diagnostic value** — flag it and set it aside. The analysis lives in

    the rows that discriminate.'
- verbs:
  - reason
  title: Refine
  text: 'Delete non-diagnostic evidence and merge redundant hypotheses. Re-examine
    items

    where everything is "C" — you may have mis-scored, or the hypotheses are not

    truly distinct.'
- verbs:
  - reason
  title: Draw tentative conclusions
  text: 'Rank hypotheses by **inconsistency score** (count/weight of I marks). The

    hypothesis with the **fewest** inconsistencies is provisionally strongest. Do

    NOT pick the one with the most "C" marks — that is the bias trap.'
- verbs:
  - reason
  title: Sensitivity analysis
  text: 'Identify the one or two evidence items that, if wrong or deceptive, would
    change

    the ranking. State how the conclusion depends on them. Re-verify those items.'
- verbs:
  - write
  title: Report with indicators
  text: "Emit:\n- the matrix,\n- the ranking with inconsistency scores,\n- the single\
    \ most diagnostic item and the single most damaging item,\n- a calibrated confidence\
    \ statement,\n- **indicators**: future observations that would confirm or overturn\
    \ the lead\n  hypothesis (link to `sat.indicators_generation`)."
anti_criteria:
- Ranking by weight of confirming evidence instead of by least inconsistency.
- Dropping a hypothesis because it is unpopular rather than because evidence
- Treating non-diagnostic evidence as support.
defensive_boundary: 'Use Analysis of Competing Hypotheses (ACH) only for structured
  analytic technique support: recognize, assess, document, or defend analytic rigor,
  alternative hypotheses, and calibrated judgment. Do not use this skill to force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Analysis of Competing Hypotheses (ACH) to force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation,
  refuse that path and redirect to the safe defensive form: apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Analysis of Competing Hypotheses (ACH), bind each finding to a labeled source
  — hypotheses, assumptions, indicators, evidence tables, and confidence notes, a
  cited reference, or an explicitly marked inference — and never present inference
  as observed evidence.
- For Analysis of Competing Hypotheses (ACH), keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Analysis of Competing Hypotheses (ACH) recommendation, name the
  weakest evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Analysis of Competing Hypotheses (ACH): independent lines of
  hypotheses, assumptions, indicators, evidence tables, and confidence notes converge,
  credible alternatives have been tested, and the conclusion would survive removing
  any single source.'
- 'Medium confidence for Analysis of Competing Hypotheses (ACH): the evidence supports
  the conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Analysis of Competing Hypotheses (ACH): the evidence is sparse,
  single-source, contested, or mostly inferential, so competing explanations must
  be preserved in the output.'
uncertainty_handling:
- State plainly what Analysis of Competing Hypotheses (ACH) cannot determine from
  the supplied or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Analysis
  of Competing Hypotheses (ACH) should collect to separate the live alternatives.
privacy_legal_constraints:
- For Analysis of Competing Hypotheses (ACH), use only data the caller is authorized
  to analyze, drawn from public or source-approved records.
- For Analysis of Competing Hypotheses (ACH), protect privacy by preferring aggregate,
  role-level, or artifact-level summaries over individual targeting unless an individual
  is essential to the defensive question.
- For Analysis of Competing Hypotheses (ACH), do not infer protected traits, private
  identity, intent, location, or legal culpability beyond the supplied and authorized
  evidence.
failure_modes:
- 'Analysis of Competing Hypotheses (ACH) failure: using the method as a checklist
  while skipping diagnostic evidence and disconfirming tests.'
- 'Analysis of Competing Hypotheses (ACH) failure: producing guidance that would help
  a requester force a preferred conclusion, hide uncertainty, or use the technique
  to rationalize manipulation.'
- 'Analysis of Competing Hypotheses (ACH) failure: hiding uncertainty behind generic
  confidence language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Analysis of Competing Hypotheses (ACH) to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation'' -> refuse and
  redirect to defensive risk assessment.'
- 'Unsafe: ''Turn Analysis of Competing Hypotheses (ACH) into an operational playbook
  to force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation'' -> refuse and offer governance, detection, or mitigation analysis
  instead.'
- 'Safe defensive: ''Use Analysis of Competing Hypotheses (ACH) to apply the structured
  technique to supplied evidence while preserving alternatives and uncertainty'' ->
  produce bounded findings with explicit evidence and uncertainty labels.'
