id: cognitive_security.propaganda_technique_classification
name: Propaganda Technique Classification
group: cognitive_security
version: 0.1.0
status: implemented
summary: Classify content against the canonical propaganda techniques (IPA and successors).
description: Propaganda Technique Classification systematically identifies and labels
  the specific rhetorical devices in content against the canonical taxonomy established
  by the Institute for Propaganda Analysis (IPA, 1937) and extended by Jowett & O'Donnell,
  Bernays, and contemporary computational SEMEVAL frameworks. The skill maps content
  to techniques including transfer, glittering generalities, plain folks, card stacking,
  bandwagon, name-calling, and testimonial, then assesses persuasive intent and likely
  audience impact. It is a defensive, recognition-oriented skill that enables analysts
  and educators to name and explain manipulation rather than fall prey to it.
ageint_topic: cognitive-security
tags:
- cognitive-security
- cognitive_security
- propaganda-analysis
- rhetorical-analysis
triggers:
- classify propaganda techniques
- what techniques is this using
- identify rhetorical manipulation
- propaganda taxonomy
- IPA technique analysis
- detect persuasion techniques
tools:
- verb: read
  purpose: ingest the content to be classified and any contextual metadata (source,
    intended audience, platform)
- verb: reason
  purpose: apply the propaganda technique taxonomy to identify, label, and explain
    each technique present in the content
- verb: write
  purpose: produce the annotated technique classification table and interpretation
    narrative
inputs:
- name: content
  type: text
  required: true
  description: The text, speech excerpt, advertisement, social media post, or media
    item to be analyzed for propaganda techniques
- name: context_metadata
  type: text
  required: false
  description: Source, publication date, intended audience, platform, and any known
    campaign context that informs technique interpretation
- name: taxonomy_scope
  type: text
  required: false
  description: 'Optional: restrict analysis to a specific taxonomy or technique family
    (IPA seven, SEMEVAL 2020 18-class, Bernays/Ellul framing, contemporary DISARM
    techniques)'
outputs:
- name: technique_classification_table
  type: table
  description: 'Table mapping each identified technique to: canonical label, verbatim
    content excerpt, mechanism of persuasion, likely cognitive lever exploited, and
    confidence level'
- name: analytical_interpretation
  type: markdown
  description: 'Narrative interpretation of the technique mix: strategic intent, target
    audience vulnerabilities exploited, interaction effects between co-deployed techniques,
    and countermeasures'
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Institute for Propaganda Analysis (1937). How to Detect Propaganda. Propaganda Analysis,
  1(2), 1–4.
- Jowett, G. S., & O'Donnell, V. (2019). Propaganda and Persuasion (7th ed.). SAGE
  Publications.
- 'Da San Martino, G., et al. (2020). SemEval-2020 Task 11: Detection of Propaganda
  Techniques in News Articles. Proceedings of the 14th International Workshop on Semantic
  Evaluation (SemEval-2020).'
- Bernays, E. L. (1928). Propaganda. Horace Liveright.
- 'Ellul, J. (1965). Propaganda: The Formation of Men''s Attitudes. Knopf.'
- Haskins, E. V. (2007). Logos and Power in Isocrates and Aristotle. University of
  South Carolina Press.
defensive_boundary: 'Use Propaganda Technique Classification only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Propaganda Technique Classification to increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation,
  refuse that path and redirect to the safe defensive form: assess supplied material
  for manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Propaganda Technique Classification, bind every labelled technique to concrete
  evidence — a verbatim excerpt and the cognitive lever it exploits — and separate
  evidential technique identification from inferential intent attribution, labelling
  any intent claim that lacks supporting evidence as inference rather than classification.
- For Propaganda Technique Classification, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the technique
  classification table.
- Before recommending any Propaganda Technique Classification action, identify the
  weakest evidence link, the alternative most likely to overturn it, and the next
  discriminating check.
confidence_rubric:
- 'High for Propaganda Technique Classification: each labelled technique is anchored
  to a verbatim content excerpt and a consistently applied IPA or SemEval category,
  the identified technique mix is corroborated across passes and the context metadata,
  and no unresolved contradiction would change the analytical interpretation of strategic
  intent.'
- 'Medium for Propaganda Technique Classification: the technique classification table
  is plausible, but one important content source, comparison case, or alternative
  explanation remains incomplete.'
- 'Low for Propaganda Technique Classification: the technique classification table
  rests on sparse, single-source, contested, or mostly inferential evidence; keep
  the result provisional and list the next check.'
uncertainty_handling:
- State what Propaganda Technique Classification cannot determine from the supplied
  or authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Propaganda Technique Classification, use only authorized content, context metadata,
  and taxonomy scope, public or source-approved records, and caller-provided context
  needed for the defensive task.
- For Propaganda Technique Classification, minimize person-level detail in the technique
  classification table; prefer aggregate, artifact-level, role-level, or case-level
  summaries unless an individual is essential to the defensive question.
- For Propaganda Technique Classification, do not infer protected traits, private
  identity, intent, location, legal culpability, or platform account ownership beyond
  the supplied and authorized evidence.
failure_modes:
- 'Propaganda Technique Classification: declaring content classified when techniques
  were attributed at the whole-text level without verbatim excerpts, the extended-taxonomy
  pass was skipped, or inferred intent was reported with the same confidence as evidential
  technique identification.'
- 'Propaganda Technique Classification: producing advice that would help a requester
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation.'
- 'Propaganda Technique Classification: reporting the technique classification table
  without uncertainty labels, alternative explanations, and the next discriminating
  check.'
negative_controls:
- 'Unsafe: ''Use Propaganda Technique Classification outputs to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation'' ->
  refuse and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the technique classification table from Propaganda Technique
  Classification into an operational playbook to increase persuasive impact, exploit
  audience vulnerabilities, or optimize narrative manipulation'' -> refuse and offer
  governance, detection, or mitigation analysis.'
- 'Safe defensive: ''Use Propaganda Technique Classification to assess supplied material
  for manipulation indicators and recommend resilience measures with content, context
  metadata, and taxonomy scope'' -> produce bounded findings with evidence and uncertainty
  labels.'
