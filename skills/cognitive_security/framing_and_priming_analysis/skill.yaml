id: cognitive_security.framing_and_priming_analysis
name: Framing & Priming Analysis
group: cognitive_security
version: 0.1.0
status: implemented
summary: Surface the frames and primes shaping interpretation beneath a message's
  literal content.
description: Framing and Priming Analysis surfaces the implicit conceptual frames
  — the organizing metaphors, category choices, and contextual anchors — that shape
  how a message is received before its literal content is processed. Drawing on Lakoff's
  cognitive linguistics, Kahneman's anchoring research, and Entman's framing theory,
  the technique examines what is foregrounded vs. backgrounded, which comparison sets
  or reference points are primed, and how word choice activates preloaded schema that
  channel interpretation. The output gives analysts and communicators a principled
  account of the meta-layer of persuasion that operates beneath explicit argument.
ageint_topic: cognitive-security
tags:
- cognitive-security
- cognitive_security
- framing
- priming
triggers:
- framing analysis
- priming analysis
- what frame is this using
- hidden assumptions in language
- how is this message structured to mislead
- anchoring in media
- conceptual metaphor
- agenda-setting analysis
tools:
- verb: read
  purpose: ingest the text, transcript, or visual artifact to be analyzed at both
    surface and structural levels
- verb: reason
  purpose: identify active frames, priming devices, and the cognitive schema they
    invoke; assess interpretive consequences
- verb: write
  purpose: produce a frame inventory and reframing brief with alternative framings
    and defensive guidance
inputs:
- name: content
  type: text
  required: true
  description: The message, article, speech, or artifact to be analyzed for framing
    and priming effects
- name: alternative_versions
  type: list
  required: false
  description: Alternative versions of the same event or topic from different sources,
    enabling contrastive frame comparison
- name: audience_context
  type: text
  required: false
  description: Information about the intended audience including prior beliefs, cultural
    schema, and information environment that determine which primes activate
outputs:
- name: frame_inventory
  type: table
  description: 'Table of identified frames and primes: device type (metaphor/category/anchor/omission/salience),
    specific textual instance, schema activated, interpretive consequence, and severity
    of distortion'
- name: reframing_brief
  type: markdown
  description: Narrative analysis of the dominant frame strategy, what alternative
    framings were suppressed, and concrete counter-frame or inoculation language
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Entman, R. M. (1993). Framing: Toward Clarification of a Fractured Paradigm. Journal
  of Communication, 43(4), 51–58.'
- Lakoff, G. (2004). Don't Think of an Elephant! Know Your Values and Frame the Debate.
  Chelsea Green Publishing.
- 'Kahneman, D., Slovic, P. & Tversky, A. (1982). Judgment Under Uncertainty: Heuristics
  and Biases. Cambridge University Press.'
- Tversky, A. & Kahneman, D. (1981). The Framing of Decisions and the Psychology of
  Choice. Science, 211(4481), 453–458.
- McCombs, M. & Shaw, D. L. (1972). The Agenda-Setting Function of Mass Media. Public
  Opinion Quarterly, 36(2), 176–187.
defensive_boundary: 'Use Framing & Priming Analysis only for cognitive-security defense:
  recognize, assess, document, or defend audiences, decision-makers, and public discourse.
  Do not use this skill to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Framing & Priming Analysis to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Framing & Priming Analysis, anchor every named frame, prime, and severity rating
  to concrete evidence in the supplied content — a specific lexical choice, metaphor,
  omission, or anchor — and to the audience whose pre-loaded schema that evidence
  would activate, rather than asserting interpretive effects in the abstract.
- For Framing & Priming Analysis, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the frame
  inventory.
- Before recommending any Framing & Priming Analysis action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Framing & Priming Analysis: each entry in the frame inventory ties a named
  device to a specific textual marker and the schema it activates, the dominant-frame
  reading is corroborated by contrastive comparison across alternative versions and
  the stated audience context, and no unresolved contradiction would change the reframing
  brief.'
- 'Medium for Framing & Priming Analysis: the frame inventory is plausible, but one
  important content source, comparison case, or alternative explanation remains incomplete.'
- 'Low for Framing & Priming Analysis: the frame inventory rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Framing & Priming Analysis cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Framing & Priming Analysis, use only authorized content, alternative versions,
  and audience context, public or source-approved records, and caller-provided context
  needed for the defensive task.
- For Framing & Priming Analysis, minimize person-level detail in the frame inventory;
  prefer aggregate, artifact-level, role-level, or case-level summaries unless an
  individual is essential to the defensive question.
- For Framing & Priming Analysis, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Framing & Priming Analysis: declaring a frame mapped when the close-read of linguistic
  markers skipped the priming sequence or assessed activation without specifying the
  audience, treating every communicative framing as manipulation and missing what
  the dominant frame quietly forecloses.'
- 'Framing & Priming Analysis: producing advice that would help a requester increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation.'
- 'Framing & Priming Analysis: reporting the frame inventory without uncertainty labels,
  alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Framing & Priming Analysis outputs to increase persuasive impact,
  exploit audience vulnerabilities, or optimize narrative manipulation'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the frame inventory from Framing & Priming Analysis into an operational
  playbook to increase persuasive impact, exploit audience vulnerabilities, or optimize
  narrative manipulation'' -> refuse and offer governance, detection, or mitigation
  analysis.'
- 'Safe defensive: ''Use Framing & Priming Analysis to assess supplied material for
  manipulation indicators and recommend resilience measures with content, alternative
  versions, and audience context'' -> produce bounded findings with evidence and uncertainty
  labels.'
