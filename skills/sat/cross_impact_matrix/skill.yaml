id: sat.cross_impact_matrix
name: Cross-Impact Matrix
group: sat
version: 0.1.0
status: implemented
summary: Assess how each driver influences every other to find leverage and feedback.
description: The Cross-Impact Matrix is a structured technique for mapping how each
  driver, trend, or variable in a system affects every other one, enabling analysts
  to identify reinforcing feedback loops, inhibitory relationships, and high-leverage
  nodes whose change cascades through the system. Cells in the matrix record the direction
  and magnitude of influence (positive, negative, neutral, conditional) rather than
  independent assessments of each factor. The technique is widely used in scenario
  planning, strategic foresight, and systemic-threat analysis to surface non-obvious
  interdependencies that single-variable analysis misses.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- systems-analysis
triggers:
- how do these factors interact
- cross-impact matrix
- which variables drive the others
- find feedback loops
- map the interdependencies
tools:
- verb: read
  purpose: ingest the list of key drivers, trends, or variables and any existing analysis
    of each
- verb: reason
  purpose: assess pairwise influence relationships, identify feedback loops, and rank
    leverage points
- verb: write
  purpose: produce the filled matrix, loop inventory, leverage ranking, and analytic
    narrative
inputs:
- name: driver_list
  type: list
  required: true
  description: A set of 4–12 named drivers, trends, variables, or actors to be cross-analyzed
    (e.g., from a prior brainstorm or key-drivers step)
- name: influence_scale
  type: text
  required: false
  description: 'Optional scoring convention: e.g., +2 (strong positive), +1 (weak
    positive), 0 (negligible), -1 (weak negative), -2 (strong negative), C (conditional)'
- name: focal_question
  type: text
  required: true
  description: The analytic question or planning scenario for which interdependencies
    matter
outputs:
- name: cross_impact_matrix
  type: table
  description: N×N matrix where cell (i,j) records the influence of driver i on driver
    j, scored and briefly annotated
- name: loop_inventory
  type: markdown
  description: Identified reinforcing and balancing feedback loops, with the chain
    of drivers forming each loop
- name: leverage_ranking
  type: table
  description: Drivers ranked by aggregate outgoing influence score (active) and incoming
    influence score (passive), identifying high-leverage and highly-sensitive variables
- name: analytic_narrative
  type: markdown
  description: Interpretation of the most significant loops and leverage points relative
    to the focal question
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Gordon, T. J., & Hayward, H. (1968). Initial experiments with the cross impact matrix
  method of forecasting. Futures, 1(2), 100–116.
- Heuer, R. J., & Pherson, R. H. (2015). Structured Analytic Techniques for Intelligence
  Analysis, 3rd ed. CQ Press.
- 'Bishop, P., Hines, A., & Collins, T. (2007). The current state of scenario development:
  An overview of techniques. Foresight, 9(1), 5–25.'
defensive_boundary: 'Use Cross-Impact Matrix only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Cross-Impact Matrix to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Cross-Impact Matrix, bind each finding to a labeled source — hypotheses, assumptions,
  indicators, evidence tables, and confidence notes, a cited reference, or an explicitly
  marked inference — and never present inference as observed evidence.
- For Cross-Impact Matrix, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Cross-Impact Matrix recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Cross-Impact Matrix: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Cross-Impact Matrix: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Cross-Impact Matrix: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Cross-Impact Matrix cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Cross-Impact
  Matrix should collect to separate the live alternatives.
privacy_legal_constraints:
- For Cross-Impact Matrix, use only data the caller is authorized to analyze, drawn
  from public or source-approved records.
- For Cross-Impact Matrix, protect privacy by preferring aggregate, role-level, or
  artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Cross-Impact Matrix, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Cross-Impact Matrix failure: using the method as a checklist while skipping diagnostic
  evidence and disconfirming tests.'
- 'Cross-Impact Matrix failure: producing guidance that would help a requester force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Cross-Impact Matrix failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Cross-Impact Matrix to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Cross-Impact Matrix into an operational playbook to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Cross-Impact Matrix to apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
