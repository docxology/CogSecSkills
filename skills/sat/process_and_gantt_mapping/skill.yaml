id: sat.process_and_gantt_mapping
name: Process & Gantt Mapping
group: sat
version: 0.1.0
status: implemented
summary: Lay out a process or adversary plan as sequenced, dependency-aware steps.
description: Process and Gantt Mapping is a structured analytic technique that decomposes
  a complex activity — an adversary plan, a supply chain, a disinformation campaign,
  or an operational sequence — into discrete, dependency-ordered steps laid out on
  a timeline. The visual sequence reveals critical path nodes, prerequisite chains,
  observable tripwires, and resource-intensive choke points that prose analysis obscures.
  In cognitive-security work it is used to model how an influence operation, deception
  campaign, or hostile cognitive attack is likely structured so that indicators can
  be assigned to specific nodes and disruption points identified.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- timeline-analysis
triggers:
- process mapping
- Gantt chart for adversary plan
- sequence the steps
- timeline of the operation
- dependency diagram
- critical path analysis
tools:
- verb: read
  purpose: ingest source intelligence, process descriptions, or prior assessments
    of the activity to be mapped
- verb: reason
  purpose: decompose the activity into discrete steps, establish dependencies, estimate
    durations, and identify critical-path and choke-point nodes
- verb: write
  purpose: produce the structured process map, dependency table, Gantt representation,
    and associated indicators list
inputs:
- name: activity_description
  type: text
  required: true
  description: Description of the adversary plan, operational sequence, or process
    to be mapped — can be a partial description inferred from intelligence fragments
- name: known_steps
  type: list
  required: false
  description: Any steps or events already confirmed or strongly indicated by source
    reporting
- name: time_constraints
  type: text
  required: false
  description: Known or estimated time windows, deadlines, or triggering events that
    anchor the timeline
outputs:
- name: process_map
  type: markdown
  description: 'Step-by-step decomposition of the activity with: step name, dependencies,
    estimated duration, required resources, observable indicators, and confidence
    level for each step'
- name: gantt_table
  type: table
  description: Tabular Gantt representation showing steps as rows, time as columns,
    critical-path steps flagged, and choke points identified
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Pherson, R. H., & Heuer, R. J. (2021). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Chapter: Process Maps and Gantt Charts.'
- Gantt, H. L. (1910). Work, Wages, and Profits. Engineering Magazine Co.
- 'Clark, R. M. (2013). Intelligence Analysis: A Target-Centric Approach (4th ed.).
  CQ Press. Chapter on Target System Analysis.'
defensive_boundary: 'Use Process & Gantt Mapping only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Process & Gantt Mapping to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Process & Gantt Mapping, bind each finding to a labeled source — hypotheses,
  assumptions, indicators, evidence tables, and confidence notes, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Process & Gantt Mapping, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Process & Gantt Mapping recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Process & Gantt Mapping: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Process & Gantt Mapping: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Process & Gantt Mapping: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Process & Gantt Mapping cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Process
  & Gantt Mapping should collect to separate the live alternatives.
privacy_legal_constraints:
- For Process & Gantt Mapping, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Process & Gantt Mapping, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Process & Gantt Mapping, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Process & Gantt Mapping failure: using the method as a checklist while skipping
  diagnostic evidence and disconfirming tests.'
- 'Process & Gantt Mapping failure: producing guidance that would help a requester
  force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation.'
- 'Process & Gantt Mapping failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Process & Gantt Mapping to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Process & Gantt Mapping into an operational playbook to force a
  preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Process & Gantt Mapping to apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
