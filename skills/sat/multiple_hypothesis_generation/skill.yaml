id: sat.multiple_hypothesis_generation
name: Multiple Hypothesis Generation
group: sat
version: 0.1.0
status: implemented
summary: Force a complete, mutually exclusive hypothesis set before evaluating any
  one.
description: Multiple Hypothesis Generation (MHG) is a structured analytic technique
  that requires analysts to produce a complete, mutually exclusive and collectively
  exhaustive (MECE) set of hypotheses before evaluating any of them individually.
  Developed by Heuer and Pherson as a precursor to Analysis of Competing Hypotheses
  (ACH), MHG counters confirmation bias and anchoring by ensuring that the hypothesis
  set is not inadvertently incomplete — the most common failure mode in analytical
  forecasting and cognitive-security threat assessment.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- hypothesis-generation
- bias-mitigation
triggers:
- generate hypotheses
- what are all the explanations
- competing explanations
- make sure we haven't missed anything
- hypothesis generation
- what else could explain this
tools:
- verb: read
  purpose: ingest the observed evidence, prior analytic judgments, and any stated
    initial hypotheses
- verb: reason
  purpose: apply MECE discipline to generate, deduplicate, and completeness-check
    the hypothesis set; identify assumption dependencies
- verb: write
  purpose: output the labeled, mutually exclusive hypothesis set with supporting rationale
    for each hypothesis and any identified gaps
inputs:
- name: evidence_set
  type: list
  required: true
  description: The collection of observations, reporting items, or anomalies to be
    explained — each as a distinct numbered item
- name: initial_hypotheses
  type: list
  required: false
  description: Any hypotheses already under consideration; MHG will check these for
    mutual exclusivity and completeness and augment them
- name: domain_context
  type: text
  required: false
  description: Background information about the actor space, base rates, and analytic
    context that constrains plausible hypotheses
outputs:
- name: hypothesis_set
  type: markdown
  description: A labeled, MECE list of hypotheses (H1, H2, …, Hn), each with a one-paragraph
    description, its key distinguishing claim, and the evidence most relevant to it
- name: completeness_check
  type: markdown
  description: 'A structured audit documenting: (a) the MECE test result for each
    pair of hypotheses, (b) any logical remainder (the space not covered by any hypothesis),
    and (c) hypotheses that overlap and were merged or split'
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Heuer, R. J. (1999). Psychology of Intelligence Analysis. Center for the Study of
  Intelligence, CIA. Chapter 8.
- Heuer, R. J., & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis, 2nd ed. CQ Press. Chapter 4.
- Pherson, R. H., & Pherson, K. H. (2020). Critical Thinking for Strategic Intelligence,
  3rd ed. CQ Press.
- 'Nickerson, R. S. (1998). Confirmation bias: A ubiquitous phenomenon in many guises.
  Review of General Psychology, 2(2), 175–220.'
defensive_boundary: 'Use Multiple Hypothesis Generation only for structured analytic
  technique support: recognize, assess, document, or defend analytic rigor, alternative
  hypotheses, and calibrated judgment. Do not use this skill to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Multiple Hypothesis Generation to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation,
  refuse that path and redirect to the safe defensive form: apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Multiple Hypothesis Generation, bind each finding to a labeled source — hypotheses,
  assumptions, indicators, evidence tables, and confidence notes, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Multiple Hypothesis Generation, keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Multiple Hypothesis Generation recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Multiple Hypothesis Generation: independent lines of hypotheses,
  assumptions, indicators, evidence tables, and confidence notes converge, credible
  alternatives have been tested, and the conclusion would survive removing any single
  source.'
- 'Medium confidence for Multiple Hypothesis Generation: the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Multiple Hypothesis Generation: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Multiple Hypothesis Generation cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Multiple
  Hypothesis Generation should collect to separate the live alternatives.
privacy_legal_constraints:
- For Multiple Hypothesis Generation, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Multiple Hypothesis Generation, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Multiple Hypothesis Generation, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Multiple Hypothesis Generation failure: using the method as a checklist while skipping
  diagnostic evidence and disconfirming tests.'
- 'Multiple Hypothesis Generation failure: producing guidance that would help a requester
  force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation.'
- 'Multiple Hypothesis Generation failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Multiple Hypothesis Generation to force a preferred conclusion, hide
  uncertainty, or use the technique to rationalize manipulation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Multiple Hypothesis Generation into an operational playbook to force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Multiple Hypothesis Generation to apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
