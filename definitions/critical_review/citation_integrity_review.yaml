id: critical_review.citation_integrity_review
description: Citation Integrity Review is a systematic audit that verifies each citation
  in a document actually exists, that the cited source says what the author claims
  it says, and that the source genuinely supports the specific point being made at
  that location. In cognitive-security contexts, citation misrepresentation — whether
  through fabrication, selective quotation, context stripping, or source laundering
  — is a primary mechanism for lending false authority to disinformation or manipulated
  narratives; this review defends against that attack surface.
tags:
- cognitive-security
- critical_review
- source-verification
- disinformation-defense
triggers:
- citation integrity
- verify citations
- check references
- fabricated citations
- source verification
- citation audit
- do the sources say what they claim
tools:
- verb: read
  purpose: ingest the document and extract every citation, footnote, and reference
    claim
- verb: web
  purpose: retrieve cited sources to confirm existence, access the actual text, and
    check what the source genuinely states
- verb: reason
  purpose: compare what the author claims the source says against what the source
    actually says, and assess whether the source supports the cited point
- verb: write
  purpose: emit the citation integrity audit table and narrative with a verdict and
    severity rating for each citation
inputs:
- name: document
  type: text
  required: true
  description: The document or report containing citations to be audited — include
    footnotes, endnotes, and in-text references
- name: citation_list
  type: list
  required: false
  description: Optional pre-extracted list of citations to audit; if omitted the review
    extracts them from the document
outputs:
- name: citation_audit_table
  type: table
  description: 'A table with one row per citation: citation identifier, in-text claim
    made, source existence verdict, what the source actually states, match assessment
    (accurate / partial / distorted / fabricated), and severity rating'
- name: integrity_summary
  type: markdown
  description: A narrative summary of overall citation integrity, patterns of misrepresentation
    found, the most serious violations, and recommendations for whether the document
    can be trusted or should be rejected
references:
- Roozenbeek, J., & van der Linden, S. (2019). Fake news game confers psychological
  resistance against online misinformation. Palgrave Communications, 5(1), 65.
- 'Wardle, C., & Derakhshan, H. (2017). Information Disorder: Toward an Interdisciplinary
  Framework for Research and Policy Making. Council of Europe.'
- Bik, E. M., Casadevall, A., & Fang, F. C. (2016). The Prevalence of Inappropriate
  Image Duplication in Biomedical Research Publications. mBio, 7(3). (On citation
  and evidence misrepresentation patterns.)
- Pherson, R. H., & Pherson, K. H. (2020). Critical Thinking for Strategic Intelligence
  (3rd ed.). CQ Press. Chapter on Source Evaluation.
when_to_use:
- When a document's conclusions rest heavily on cited authorities and those citations
  have not been independently verified
- When reviewing material from an unfamiliar or potentially adversarial source that
  uses extensive references to establish credibility
- When a cited claim seems inconsistent with broader domain knowledge, suggesting
  possible misquotation or context stripping
- When conducting due diligence on a research product, policy brief, or intelligence
  report before acting on its conclusions
- When investigating a suspected disinformation product that relies on 'source laundering'
  — citing real sources inaccurately to borrow their credibility
what_it_produces:
- 'A per-citation verdict: exists / does not exist, says what is claimed / does not,
  supports the specific point / does not'
- 'A severity classification for each citation problem: fabricated (most severe),
  distorted, partial, accurate'
- An overall integrity rating for the document and a pattern analysis of how citations
  are misused
- A recommendation on whether the document can be used as a reliable source
key_discipline:
- Always check what the source actually states, not just whether it exists — a real
  source can be misquoted
- 'Distinguish four levels of citation failure: fabrication (source does not exist),
  distortion (source says the opposite or something different), selective quotation
  (source is accurate but stripped of qualifying context), and weak support (source
  is real and not distorted but does not specifically support this point)'
- Context stripping is often more dangerous than fabrication because it survives surface-level
  verification — always read the surrounding passage
- Source laundering — citing a credible intermediary that itself misquotes the primary
  — requires tracing back to the primary source
workflow_steps:
- verbs:
  - read
  title: Extract all citations and in-text claims
  text: Read the document and systematically extract every citation, footnote, and
    reference. For each, record the in-text claim the author makes at that point —
    the exact assertion the citation is supposed to support. Number each citation-claim
    pair for tracking.
- verbs:
  - web
  title: Locate and retrieve cited sources
  text: 'For each citation, attempt to locate the source: search by DOI, title, author,
    or URL. Record whether the source exists and is accessible. Flag any citations
    that cannot be located after a reasonable search as potentially fabricated. For
    accessible sources, retrieve the specific passage cited or the section most relevant
    to the in-text claim.'
- verbs:
  - reason
  title: Compare claim against source text
  text: 'For each retrievable source, compare what the author claims it says against
    what it actually says. Classify the match: accurate (source supports the claim
    faithfully), partial (source partially supports but omits important qualifications),
    distorted (source is misquoted or taken out of context to reverse or significantly
    change meaning), or fabricated (source does not exist or contains nothing resembling
    the claimed content).'
- verbs:
  - reason
  title: Assess support for the cited point
  text: Even for citations that accurately represent the source, assess whether the
    source actually supports the specific point being made in this document at this
    location. A source can be quoted accurately yet not support the argument — flag
    these as 'accurate but unsupportive.' Note when a cited source is itself secondary
    or tertiary, requiring tracing to primary evidence.
- verbs:
  - write
  title: Produce audit table and integrity summary
  text: Compile the citation audit table with one row per citation, including all
    verdicts and severity ratings. Write the integrity summary identifying overall
    patterns (systematic distortion, selective citation, occasional error, isolated
    fabrication), the most serious violations, and a recommendation on the document's
    reliability as a source.
anti_criteria:
- Do not accept a source existing as proof the citation is accurate — always check
  what the source actually states
- Do not treat accurate quotation as sufficient — check that the quoted passage genuinely
  supports the specific claim made in context
- Do not stop at the first accessible version of a source; preprints, retractions,
  and later editions can change what a source says
- Do not rate citation quality solely by journal prestige or author credential — assess
  what this specific passage actually asserts
defensive_boundary: 'Use Citation Integrity Review only for critical review and assurance:
  recognize, assess, document, or defend evidence quality, implementation integrity,
  and decision accountability. Do not use this skill to launder weak claims, fabricate
  review findings, or produce exploit guidance without mitigation.'
misuse_redirect: 'If a request asks Citation Integrity Review to launder weak claims,
  fabricate review findings, or produce exploit guidance without mitigation, refuse
  that path and redirect to the safe defensive form: review supplied artifacts for
  defects, evidence gaps, safety risks, or reproducibility failures.'
evidence_requirements:
- For Citation Integrity Review, tie each citation audit table, and integrity summary
  claim to concrete evidence from the specific document, and citation list item, source
  excerpt, observation, or command result that supports it.
- For Citation Integrity Review, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the citation
  audit table.
- Before recommending any Citation Integrity Review action, identify the weakest evidence
  link, the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Citation Integrity Review: the citation audit table is supported by multiple
  independent artifact excerpts, test output, citations, assumptions, and reproducibility
  records; extract all citations and in-text claims and locate and retrieve cited
  sources checks agree, and no unresolved contradiction would change the result.'
- 'Medium for Citation Integrity Review: the citation audit table is plausible, but
  one important document source, comparison case, or alternative explanation remains
  incomplete.'
- 'Low for Citation Integrity Review: the citation audit table rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Citation Integrity Review cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating critical_review evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Citation Integrity Review, use only authorized document, and citation list,
  public or source-approved records, and caller-provided context needed for the defensive
  task.
- For Citation Integrity Review, minimize person-level detail in the citation audit
  table; prefer aggregate, artifact-level, role-level, or case-level summaries unless
  an individual is essential to the defensive question.
- For Citation Integrity Review, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Citation Integrity Review: treating document as complete when extract all citations
  and in-text claims and locate and retrieve cited sources checks or contradictory
  evidence are missing.'
- 'Citation Integrity Review: producing advice that would help a requester launder
  weak claims, fabricate review findings, or produce exploit guidance without mitigation.'
- 'Citation Integrity Review: reporting the citation audit table without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Citation Integrity Review outputs to launder weak claims, fabricate
  review findings, or produce exploit guidance without mitigation'' -> refuse and
  redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the citation audit table from Citation Integrity Review into
  an operational playbook to launder weak claims, fabricate review findings, or produce
  exploit guidance without mitigation'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Citation Integrity Review to review supplied artifacts for
  defects, evidence gaps, safety risks, or reproducibility failures with document,
  and citation list'' -> produce bounded findings with evidence and uncertainty labels.'
