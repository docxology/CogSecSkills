id: information_environment.narrative_competition_analysis
description: Narrative Competition Analysis examines how rival narratives about the
  same event, actor, or issue compete for attention, belief, and durability in an
  information environment. Drawing on framing theory, meme-competition models, and
  computational narrative analysis, the technique identifies each narrative's core
  claim, emotional valence, target audience, rhetorical devices, and propagation channels,
  then assesses relative salience, resilience, and vulnerability to counter-narrative
  intervention. It is a defensive analytical tool for understanding the landscape
  before designing protective communications or resilience strategies.
tags:
- cognitive-security
- information_environment
- narrative-analysis
triggers:
- competing narratives
- which narrative is winning
- how do rival framings compare
- narrative competition
- assess narrative salience
- map the narrative landscape
tools:
- verb: read
  purpose: ingest texts, media items, and engagement data representing the competing
    narratives
- verb: reason
  purpose: apply framing and narrative-competition frameworks to characterize each
    narrative and assess relative salience
- verb: search
  purpose: gather additional examples and engagement metrics across platforms to assess
    narrative reach
- verb: write
  purpose: produce a narrative competition map and assessment report
inputs:
- name: narrative_corpus
  type: list
  required: true
  description: A representative sample of texts, posts, or media items representing
    each competing narrative about the topic under analysis
- name: topic_definition
  type: text
  required: true
  description: The event, actor, policy, or situation that is the subject of narrative
    competition, with a defined time window
- name: engagement_metrics
  type: table
  required: false
  description: Platform engagement data (shares, views, reactions) per narrative item,
    used to assess relative salience and audience reach
outputs:
- name: narrative_competition_map
  type: table
  description: 'Structured comparison of competing narratives: core claim, emotional
    frame, target audience, propagation channels, estimated salience, rhetorical strengths,
    and identified vulnerabilities'
- name: competition_assessment_report
  type: markdown
  description: Analytical report covering narrative dynamics, salience trends, resilience
    factors, and recommendations for monitoring or protective intervention
references:
- 'Entman, R.M. (1993). Framing: Toward clarification of a fractured paradigm. Journal
  of Communication, 43(4), 51-58.'
- Blackmore, S. (1999). The Meme Machine. Oxford University Press.
- 'Hutchinson, B. (2019). The narrative arms race: How propaganda evolves. First Draft.'
- 'Pamment, J., Nothhaft, H., Agardh-Twetman, H., & Fjällhed, A. (2018). Countering
  Information Influence Activities: A Handbook for Communicators. Swedish Civil Contingencies
  Agency (MSB).'
- Starbird, K. (2017). Examining the alternative media ecosystem through the production
  of alternative narratives of mass shooting events on Twitter. ICWSM.
when_to_use:
- Assessing the information environment before a planned public communication to understand
  what narratives the message will compete with
- Evaluating why a true and well-sourced narrative is losing salience to a false but
  emotionally resonant competitor
- Mapping adversarial narrative strategies to identify rhetorical pressure points
  and counter-narrative opportunities
- Monitoring narrative dynamics during a fast-moving crisis or information operation
- Designing resilience communications that inoculate audiences against anticipated
  false narratives
what_it_produces:
- A structured map of competing narratives with core claims, frames, audiences, and
  channels
- Relative salience estimates showing which narrative currently commands more attention
  and why
- Rhetorical analysis explaining each narrative's emotional and cognitive appeals
- Identified vulnerabilities in each narrative — factual weaknesses, logical gaps,
  or audience mismatches — that can anchor counter-narrative strategy
key_discipline:
- Narratives compete on emotional resonance and simplicity, not accuracy alone — a
  technically correct counter-narrative loses if it is emotionally inert
- 'Frame early: the first credible narrative to occupy cognitive space has a structural
  advantage (illusory truth effect, continued influence effect)'
- Assess durability, not just current salience — a narrative's ability to survive
  debunking is a separate dimension from its current spread
- Identify the narrative's core emotional appeal before designing any counter-measure;
  attacking the facts while ignoring the emotional frame rarely works
workflow_steps:
- verbs:
  - read
  - search
  title: Collect and enumerate competing narratives
  text: Gather a representative sample of content about the topic from relevant platforms
    and outlets. Identify distinct narrative threads by clustering content on shared
    core claim, attribution (who is blamed or credited), and proposed meaning. Search
    for additional examples of each identified narrative across platforms to assess
    breadth.
- verbs:
  - reason
  title: Characterize each narrative using framing analysis
  text: 'For each narrative, document: core claim (what it asserts happened), causal
    attribution (why it happened and who is responsible), moral evaluation (what the
    situation means normatively), and proposed remedy (what should be done). Identify
    the dominant emotional frame (fear, outrage, hope, contempt) and the primary rhetorical
    devices used (anecdote, statistic misuse, false equivalence, authority appeal).
    Identify the target audience and primary propagation channels.'
- verbs:
  - reason
  title: Assess salience, resilience, and competition dynamics
  text: 'Estimate relative salience using engagement metrics, search trend data, or
    media mention frequency. Assess resilience: does the narrative actively incorporate
    rebuttals? Does it have a loyal core audience insulated from counter-evidence?
    Analyze competition dynamics: are the narratives directly refuting each other,
    or competing for attention on parallel tracks? Identify which narrative currently
    holds frame advantage and why.'
- verbs:
  - write
  title: Produce the competition map and assessment report
  text: 'Write the narrative competition map table and the full assessment report.
    The report should cover: narrative characterizations, salience comparison, resilience
    analysis, competition dynamics, identified rhetorical vulnerabilities in false
    narratives, and recommendations for monitoring cadence or protective communication
    strategy. Clearly separate analytical findings from any recommended communications
    actions.'
anti_criteria:
- Do not conflate narrative salience with truth value — a highly salient narrative
  may be false, and a low-salience narrative may be accurate
- Do not design counter-narrative messaging within this analytical workflow; this
  technique produces analysis, not communications products
- Do not use audience characterizations to demean or stereotype the people who hold
  a narrative — the goal is understanding, not contempt
- Do not treat narrative competition as zero-sum; sometimes the goal is to raise information
  quality across the ecosystem, not to 'win' for one side
defensive_boundary: 'Use Narrative Competition Analysis only for information-environment
  monitoring and platform-risk defense: recognize, assess, document, or defend platform
  integrity, narrative context, and authentic community behavior. Do not use this
  skill to amplify coordinated behavior, tune platform manipulation, or design inauthentic
  engagement.'
misuse_redirect: 'If a request asks Narrative Competition Analysis to amplify coordinated
  behavior, tune platform manipulation, or design inauthentic engagement, refuse that
  path and redirect to the safe defensive form: map supplied narratives, automation
  signals, or platform affordance risks for defensive review.'
evidence_requirements:
- For Narrative Competition Analysis, tie each narrative characterization, salience
  estimate, and identified rhetorical vulnerability to concrete evidence from the
  supplied narrative corpus and engagement metrics, citing the specific text excerpt
  or metric that supports it, and keep analytical findings separate from any recommended
  communications response.
- For Narrative Competition Analysis, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the narrative
  competition map.
- Before recommending any Narrative Competition Analysis action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Narrative Competition Analysis: the narrative competition map characterizes
  each rival framing''s core claim, emotional frame, and rhetorical devices from a
  representative corpus, the relative-salience ranking is corroborated by independent
  engagement and search-trend signals, and no unresolved contradiction would change
  the judgment of which narrative currently holds frame advantage.'
- 'Medium for Narrative Competition Analysis: the narrative competition map is plausible,
  but one important narrative corpus source, comparison case, or alternative explanation
  remains incomplete.'
- 'Low for Narrative Competition Analysis: the narrative competition map rests on
  sparse, single-source, contested, or mostly inferential evidence; keep the result
  provisional and list the next check.'
uncertainty_handling:
- State what Narrative Competition Analysis cannot determine from the supplied or
  authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating information_environment evidence to collect when
  confidence is low or medium.
privacy_legal_constraints:
- For Narrative Competition Analysis, use only authorized narrative corpus, topic
  definition, and engagement metrics, public or source-approved records, and caller-provided
  context needed for the defensive task.
- For Narrative Competition Analysis, minimize person-level detail in the narrative
  competition map; prefer aggregate, artifact-level, role-level, or case-level summaries
  unless an individual is essential to the defensive question.
- For Narrative Competition Analysis, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Narrative Competition Analysis: treating the corpus as a complete picture of the
  landscape when distinct narrative threads were never enumerated, salience was conflated
  with truth value, or a narrative''s durability against debunking was left unassessed,
  so the comparison rests on an incomplete reading of the competing framings.'
- 'Narrative Competition Analysis: producing advice that would help a requester amplify
  coordinated behavior, tune platform manipulation, or design inauthentic engagement.'
- 'Narrative Competition Analysis: reporting the narrative competition map without
  uncertainty labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Narrative Competition Analysis outputs to amplify coordinated behavior,
  tune platform manipulation, or design inauthentic engagement'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Convert the narrative competition map from Narrative Competition Analysis
  into an operational playbook to amplify coordinated behavior, tune platform manipulation,
  or design inauthentic engagement'' -> refuse and offer governance, detection, or
  mitigation analysis.'
- 'Safe defensive: ''Use Narrative Competition Analysis to map supplied narratives,
  automation signals, or platform affordance risks for defensive review with narrative
  corpus, topic definition, and engagement metrics'' -> produce bounded findings with
  evidence and uncertainty labels.'
