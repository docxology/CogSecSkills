id: sat.ranking_and_prioritization
name: Ranking & Prioritization
group: sat
version: 0.1.0
status: implemented
summary: Order items by weighted criteria (ranked voting, paired comparison, weighted
  scoring).
description: Ranking and Prioritization techniques (including paired comparison, weighted
  scoring, and ranked voting) impose structured criteria on a list of items — threats,
  hypotheses, options, or findings — to produce a defensible, criterion-transparent
  ordering. Rather than relying on unaided intuition or the implicit dominance of
  the most vocal participant, these methods make evaluative weights explicit and replicable.
  In cognitive-security contexts the technique surfaces hidden priority divergence
  among analysts and defends against availability and anchoring biases that distort
  informal ranking.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- decision-support
triggers:
- rank these options
- prioritize threats
- weighted scoring
- paired comparison
- what matters most
- rank by importance
tools:
- verb: read
  purpose: ingest the item list, the decision context, and any pre-stated criteria
    or weights
- verb: reason
  purpose: select or derive scoring criteria, assign weights, perform pairwise or
    weighted comparisons, and resolve ties
- verb: write
  purpose: emit the scoring matrix, ranked list with scores, weight rationale, and
    sensitivity notes
- verb: ask
  purpose: elicit missing criteria weights or priority values from the analyst or
    decision maker when they cannot be inferred
inputs:
- name: item_list
  type: list
  required: true
  description: the items to be ranked (threats, hypotheses, options, indicators, etc.)
- name: criteria
  type: list
  required: false
  description: evaluation criteria with optional weights; if omitted, the skill will
    derive candidate criteria from the decision context
- name: decision_context
  type: text
  required: false
  description: the purpose of the ranking (e.g., resource allocation, analytic focus,
    response sequencing) to guide criterion selection
outputs:
- name: scoring_matrix
  type: table
  description: items as rows, criteria as columns, with raw scores, weights, and weighted
    totals
- name: ranked_list
  type: markdown
  description: items in priority order with total weighted score, brief rationale
    for top and bottom placements, and ties noted
- name: sensitivity_analysis
  type: markdown
  description: identification of items whose rank would change most if key weights
    shifted; highlights where the ranking is fragile
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Pherson, R. H. & Heuer, R. J. (2021). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Chapter on Ranking, Scoring, and Prioritizing.
- Saaty, T. L. (1980). The Analytic Hierarchy Process. McGraw-Hill. (foundational
  pairwise-comparison method)
defensive_boundary: 'Use Ranking & Prioritization only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Ranking & Prioritization to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation,
  refuse that path and redirect to the safe defensive form: apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Ranking & Prioritization, bind each finding to a labeled source — hypotheses,
  assumptions, indicators, evidence tables, and confidence notes, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Ranking & Prioritization, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Ranking & Prioritization recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Ranking & Prioritization: independent lines of hypotheses,
  assumptions, indicators, evidence tables, and confidence notes converge, credible
  alternatives have been tested, and the conclusion would survive removing any single
  source.'
- 'Medium confidence for Ranking & Prioritization: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Ranking & Prioritization: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Ranking & Prioritization cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Ranking
  & Prioritization should collect to separate the live alternatives.
privacy_legal_constraints:
- For Ranking & Prioritization, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Ranking & Prioritization, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Ranking & Prioritization, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Ranking & Prioritization failure: using the method as a checklist while skipping
  diagnostic evidence and disconfirming tests.'
- 'Ranking & Prioritization failure: producing guidance that would help a requester
  force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation.'
- 'Ranking & Prioritization failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Ranking & Prioritization to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Ranking & Prioritization into an operational playbook to force a
  preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Ranking & Prioritization to apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
