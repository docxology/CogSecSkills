id: cognitive_security.trust_and_credibility_modeling
description: 'Trust and credibility modeling maps the signals, heuristics, and institutional
  structures through which actors in an information system assess source reliability
  — and identifies how those pathways are exploited in influence operations. Drawing
  on Metzger & Flanagin''s credibility research, social-capital theory, and the computational
  trust literature, this technique produces a structured model of how trust is established
  (competence + benevolence + integrity signals), transferred across networks (trust
  transitivity), and weaponized (credential mimicry, parasocial trust, authority spoofing).
  The goal is defensive: to audit trust architecture for vulnerabilities before adversaries
  exploit them.'
tags:
- cognitive-security
- cognitive_security
- trust
- credibility
triggers:
- trust modeling
- credibility assessment
- how is trust established here
- who do people trust and why
- trust exploitation
- source credibility
- map the trust network
- credibility heuristics
tools:
- verb: read
  purpose: ingest the information environment, actor set, and relevant credibility
    signals or prior assessments
- verb: reason
  purpose: construct the trust model, identify credibility pathways, and analyze exploitation
    vectors
- verb: search
  purpose: look up source histories, institutional credibility records, and known
    influence-operation tactics that target trust
- verb: write
  purpose: produce the structured trust model, credibility-pathway diagram, and vulnerability
    audit with hardening recommendations
inputs:
- name: information_environment
  type: text
  required: true
  description: description of the information ecosystem being modeled — platform,
    community, institution, or domain
- name: actor_set
  type: list
  required: true
  description: the sources, intermediaries, and audiences whose trust relationships
    are to be modeled
- name: threat_actor_context
  type: text
  required: false
  description: known or suspected adversary capabilities and prior trust-exploitation
    tactics in this environment
- name: existing_credibility_signals
  type: table
  required: false
  description: observable credibility markers already in evidence — verifications,
    institutional affiliations, endorsements, track records
outputs:
- name: trust_model
  type: markdown
  description: structured model of how trust is established and transferred in the
    environment, with credibility-dimension scores (competence, benevolence, integrity)
    for key actors
- name: exploitation_vulnerability_audit
  type: table
  description: row-per-vulnerability table mapping each trust pathway to an exploitation
    technique, likelihood, impact, and hardening recommendation
references:
- Metzger, M. J., & Flanagin, A. J. (2013). Credibility and trust of information in
  online environments. Journal of Pragmatics, 59, 210–220.
- Mayer, R. C., Davis, J. H., & Schoorman, F. D. (1995). An integrative model of organizational
  trust. Academy of Management Review, 20(3), 709–734.
- Ratkiewicz, J., et al. (2011). Detecting and tracking the spread of astroturf memes
  in microblog streams. Proceedings of WWW 2011.
- 'Cialdini, R. B. (2009). Influence: Science and Practice (5th ed.). Pearson.'
- 'Wardle, C., & Derakhshan, H. (2017). Information Disorder: Toward an Interdisciplinary
  Framework for Research and Policy Making. Council of Europe Report DGI(2017)09.'
- 'Castelfranchi, C., & Falcone, R. (2010). Trust Theory: A Socio-Cognitive and Computational
  Model. Wiley.'
when_to_use:
- auditing an information environment for trust vulnerabilities before a high-stakes
  event (election, crisis, product launch)
- investigating how an influence operation gained traction by exploiting legitimate
  credibility pathways
- designing counter-influence measures and needing to understand what trust signals
  the target audience actually uses
- evaluating a new source or actor's credibility claims in a domain where credentials
  can be mimicked
- training analysts or communicators to recognize trust-exploitation tactics in the
  wild
- post-incident analysis of how a false narrative achieved credibility with a specific
  audience
what_it_produces:
- a layered trust model showing competence, benevolence, and integrity signals for
  key actors and how these combine into composite credibility judgments
- a trust-transfer map tracing how credibility flows from high-trust anchors (institutions,
  peer endorsers) to novel or unknown sources
- a heuristic inventory — the mental shortcuts the audience actually uses to assess
  credibility (verification badges, affiliation signals, writing style, social proof)
- an exploitation vulnerability audit mapping each trust pathway to known attack techniques
  (credential mimicry, parasocial relationship manufacture, institutional spoofing,
  authority cascade attacks)
- hardening recommendations prioritized by pathway criticality and attack feasibility
key_discipline:
- 'trust has three independently exploitable components: competence (can they know?),
  benevolence (do they care about me?), and integrity (do they tell the truth?) —
  model all three separately'
- 'trust is transitive and asymmetric: endorsement from a high-trust anchor confers
  credibility to unknown actors, but not vice versa — map these directional flows
  explicitly'
- 'heuristic-based credibility assessment (surface signals: verification marks, institutional
  logos, authoritative tone) is the norm, not the exception — this is where attackers
  invest'
- parasocial trust — the one-sided sense of relationship with media figures, influencers,
  or AI personas — transfers credibility without requiring reciprocal verification
- distinguish trust-establishment (building from scratch) from trust-transfer (borrowing
  from a trusted anchor) from trust-exploitation (weaponizing existing trust) — each
  requires different defensive measures
- 'trust architecture has network effects: a single compromised high-trust node can
  cascade credibility across many downstream actors'
workflow_steps:
- verbs:
  - read
  title: Map the actor set and environment
  text: 'Read all available information about the information environment and its
    actors: who produces content, who intermediates it (editors, aggregators, influencers,
    algorithms), and who consumes it. Document observable credibility signals already
    in use — verification badges, institutional affiliations, track records, endorsement
    chains. Note which credibility signals are easily mimicked versus which require
    genuine institutional standing.'
- verbs:
  - search
  title: Establish credibility histories and threat precedents
  text: Search for prior credibility assessments, fact-check records, and institutional
    track records for key actors. Look up known influence-operation tactics that have
    targeted similar information environments — which trust pathways have adversaries
    previously exploited, and with what success. Cross-reference actor affiliations
    against known front-organization patterns or credential-laundering networks.
- verbs:
  - reason
  title: Build the trust model
  text: 'Apply the three-component trust framework to each key actor: rate Competence
    (expertise signals, track record accuracy, domain authority), Benevolence (alignment
    of actor''s interests with the audience''s wellbeing), and Integrity (consistency
    between stated values and actions, transparency about methods and funding). Map
    trust-transfer pathways — which high-trust anchors are endorsing or being cited
    by which lower-trust actors, and in which direction credibility is flowing. Identify
    the heuristics the audience actually uses (as opposed to what they say they use)
    by examining what content achieves high engagement and what sources they repeatedly
    cite.'
- verbs:
  - reason
  title: Identify exploitation vectors
  text: 'For each trust pathway in the model, identify the corresponding exploitation
    technique: (1) Credential mimicry — logos, titles, domain names that echo legitimate
    institutions; (2) Authority cascade — using one genuine citation to build a laundered
    credibility chain; (3) Parasocial trust manufacture — long-running engagement
    strategies that build felt relationship without reciprocal accountability; (4)
    Competence-benevolence split attacks — establishing competence through accurate
    early content, then exploiting accumulated credibility for false claims; (5) Integrity
    theater — performative transparency that signals honesty while concealing actual
    conflicts. Rate each vector by attack feasibility and potential impact.'
- verbs:
  - reason
  - write
  title: Audit vulnerabilities and write recommendations
  text: Rank the identified trust vulnerabilities by combined criticality score (pathway
    centrality × exploitation feasibility × impact). Write the structured trust model
    document and exploitation vulnerability audit table. For each high-priority vulnerability,
    specify a concrete hardening measure — provenance labeling, cross-source triangulation
    requirements, transparency disclosures, or audience inoculation messaging. Note
    which hardening measures require institutional action versus which can be implemented
    by individual analysts or communicators. Explicitly bound the model's confidence
    and note actors or pathways where data was insufficient for reliable assessment.
anti_criteria:
- do not conflate credibility with accuracy — high-credibility sources can disseminate
  false information and low-credibility sources can be accidentally correct; model
  them as distinct properties
- do not treat institutional affiliation as a reliable credibility proxy without independently
  verifying that affiliation is genuine and that the institution's credibility extends
  to the specific claim domain
- do not limit the model to formal source relationships — parasocial, peer-network,
  and algorithmic-recommendation trust pathways are often the primary exploitation
  vectors and must be included
- do not produce a static trust model without noting the conditions under which it
  would change — trust architecture shifts rapidly during crises, scandals, or coordinated
  attacks on anchor institutions
- do not recommend audience education alone as the primary hardening measure — literacy
  interventions are necessary but insufficient; structural fixes to credibility signals
  and platform architecture are required for durable protection
defensive_boundary: 'Use Trust & Credibility Modeling only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Trust & Credibility Modeling to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Trust & Credibility Modeling, tie each trust model, and exploitation vulnerability
  audit claim to concrete evidence from the specific information environment, actor
  set, and threat actor context item, source excerpt, observation, or command result
  that supports it.
- For Trust & Credibility Modeling, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the trust
  model.
- Before recommending any Trust & Credibility Modeling action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Trust & Credibility Modeling: the trust model is supported by multiple
  independent content, behavioral, narrative, media, and audience-risk evidence; map
  the actor set and environment and establish credibility histories and threat precedents
  checks agree, and no unresolved contradiction would change the result.'
- 'Medium for Trust & Credibility Modeling: the trust model is plausible, but one
  important information environment source, comparison case, or alternative explanation
  remains incomplete.'
- 'Low for Trust & Credibility Modeling: the trust model rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Trust & Credibility Modeling cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Trust & Credibility Modeling, use only authorized information environment, actor
  set, and threat actor context, public or source-approved records, and caller-provided
  context needed for the defensive task.
- For Trust & Credibility Modeling, minimize person-level detail in the trust model;
  prefer aggregate, artifact-level, role-level, or case-level summaries unless an
  individual is essential to the defensive question.
- For Trust & Credibility Modeling, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Trust & Credibility Modeling: treating information environment as complete when
  map the actor set and environment and establish credibility histories and threat
  precedents checks or contradictory evidence are missing.'
- 'Trust & Credibility Modeling: producing advice that would help a requester increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation.'
- 'Trust & Credibility Modeling: reporting the trust model without uncertainty labels,
  alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Trust & Credibility Modeling outputs to increase persuasive impact,
  exploit audience vulnerabilities, or optimize narrative manipulation'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the trust model from Trust & Credibility Modeling into an operational
  playbook to increase persuasive impact, exploit audience vulnerabilities, or optimize
  narrative manipulation'' -> refuse and offer governance, detection, or mitigation
  analysis.'
- 'Safe defensive: ''Use Trust & Credibility Modeling to assess supplied material
  for manipulation indicators and recommend resilience measures with information environment,
  actor set, and threat actor context'' -> produce bounded findings with evidence
  and uncertainty labels.'
