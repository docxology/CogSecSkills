id: sat.indicators_validation
name: Indicators Validation
group: sat
version: 0.1.0
status: implemented
summary: 'Test indicators for diagnosticity: do they actually discriminate between
  outcomes?'
description: Indicators Validation is a quality-control technique that stress-tests
  a candidate indicator set to determine whether each indicator genuinely discriminates
  among the scenarios it is claimed to distinguish. It applies diagnosticity tests
  — asking whether an indicator would appear under only one outcome, under several,
  or under all — and prunes or restructures the indicator set accordingly. This prevents
  the common failure mode in which analysts collect confirmatory data against indicators
  that would appear regardless of which outcome is unfolding.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- warning-analysis
- diagnosticity
triggers:
- validate these indicators
- test indicator diagnosticity
- are these indicators any good
- do my indicators discriminate
- indicators validation
- check my warning list
tools:
- verb: read
  purpose: ingest the candidate indicator set, the associated scenarios or hypotheses,
    and any prior indicator reviews
- verb: reason
  purpose: apply diagnosticity tests to each indicator, identify overlap and false-diagnostic
    indicators, and derive a validated set
- verb: write
  purpose: produce the validated indicators matrix with disposition rationale for
    each item
inputs:
- name: candidate_indicators
  type: table
  required: true
  description: the indicator set to be validated, ideally including each indicator's
    claimed scenario association
- name: scenarios_or_hypotheses
  type: list
  required: true
  description: the full set of scenarios or hypotheses the indicators are meant to
    distinguish
- name: base_rate_context
  type: text
  required: false
  description: known base rates or historical frequencies of candidate indicators,
    used to assess false-positive risk
outputs:
- name: validated_indicators_matrix
  type: table
  description: the revised indicator matrix showing each indicator with its validated
    diagnostic weight, disposition (retain/revise/drop), and rationale
- name: validation_report
  type: markdown
  description: a narrative explaining the validation logic, systemic weaknesses found
    in the original set, and recommendations for gaps in coverage
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Heuer, R. J., Jr., & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis (2nd ed.). CQ Press/SAGE. Chapter 8, 'Indicators Validation'.
- 'Grabo, C. M. (2004). Anticipating Surprise: Analysis for Strategic Warning. Joint
  Military Intelligence College.'
- Mandel, D. R., & Barnes, A. (2014). Accuracy of forecasts in strategic intelligence.
  Proceedings of the National Academy of Sciences, 111(30), 10984-10989.
- Pherson, R. H. (2012). Handbook of Analytic Tools and Techniques (4th ed.). Pherson
  Associates.
defensive_boundary: 'Use Indicators Validation only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Indicators Validation to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Indicators Validation, bind each finding to a labeled source — hypotheses, assumptions,
  indicators, evidence tables, and confidence notes, a cited reference, or an explicitly
  marked inference — and never present inference as observed evidence.
- For Indicators Validation, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Indicators Validation recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Indicators Validation: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Indicators Validation: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Indicators Validation: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Indicators Validation cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Indicators
  Validation should collect to separate the live alternatives.
privacy_legal_constraints:
- For Indicators Validation, use only data the caller is authorized to analyze, drawn
  from public or source-approved records.
- For Indicators Validation, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Indicators Validation, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Indicators Validation failure: using the method as a checklist while skipping diagnostic
  evidence and disconfirming tests.'
- 'Indicators Validation failure: producing guidance that would help a requester force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Indicators Validation failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Indicators Validation to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Indicators Validation into an operational playbook to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Indicators Validation to apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
