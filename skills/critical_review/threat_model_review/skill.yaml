id: critical_review.threat_model_review
name: Threat Model Review
group: critical_review
version: 0.1.0
status: implemented
summary: Review a system's threat model for missing actors, surfaces, and assumptions.
description: 'Threat Model Review systematically audits an existing threat model —
  such as a STRIDE, PASTA, attack tree, or narrative threat assessment — to identify
  missing actors, overlooked attack surfaces, unvalidated assumptions, and incomplete
  trust boundaries. The technique applies adversarial thinking to the threat model
  itself, asking whether it captures the realistic threat population, whether its
  mitigations are actually implemented, and whether its scope boundaries are justified
  or merely convenient. In cognitive-security contexts this extends to information-environment
  threat models: identifying omitted influence actors, uncovered cognitive attack
  surfaces, and assumptions about audience resilience that have not been empirically
  validated.'
ageint_topic: adversarial-assurance
tags:
- cognitive-security
- critical_review
- adversarial-assurance
- threat-modeling
triggers:
- review this threat model
- what actors are missing from our threat model
- are there attack surfaces we haven't considered
- check our STRIDE model
- validate our threat assessment
- red team our threat model
- threat model gaps
tools:
- verb: read
  purpose: ingest the existing threat model, its scope statement, actor list, attack
    surface inventory, and stated mitigations
- verb: reason
  purpose: apply adversarial review to identify missing actors, surfaces, trust-boundary
    errors, unvalidated assumptions, and mitigation gaps
- verb: write
  purpose: produce a structured gap report mapping each finding to threat-model dimension,
    severity, and recommended remediation
inputs:
- name: threat_model
  type: text
  required: true
  description: 'The existing threat model document: STRIDE table, PASTA analysis,
    attack tree, or narrative threat assessment to be reviewed'
- name: system_description
  type: text
  required: false
  description: A description of the system or information environment being modeled,
    if not fully embedded in the threat model; used to independently derive what actors
    and surfaces should be present
- name: review_focus
  type: text
  required: false
  description: 'Optional focus area: e.g., insider threats, supply chain actors, cognitive/social
    engineering surfaces, or a specific trust boundary'
outputs:
- name: gap_report
  type: table
  description: 'A structured table of identified gaps: each row contains dimension
    (actors/surfaces/assumptions/mitigations/scope), specific finding, severity (critical/high/medium/low),
    and recommended remediation or addition'
- name: assumption_register
  type: markdown
  description: A list of explicit and implicit assumptions found in the threat model,
    each tagged as validated, unvalidated-plausible, or unvalidated-risky
- name: revised_scope_recommendation
  type: markdown
  description: A narrative recommendation on whether the threat model's scope boundaries
    are justified or should be expanded, with rationale
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Shostack, A. (2014). Threat Modeling: Designing for Security. Wiley. (esp. Ch.
  3 on finding threats and Ch. 14 on threat model review)'
- 'Herley, C. & Van Oorschot, P.C. (2017). SoK: Science, Security and the Elusive
  Goal of Security as a Scientific Pursuit. IEEE Symposium on Security and Privacy.'
- 'Swanson, M. et al. (2010). NIST SP 800-30 Rev. 1: Guide for Conducting Risk Assessments.
  NIST.'
- Hutchins, E.M., Cloppert, M.J. & Amin, R.M. (2011). Intelligence-Driven Computer
  Network Defense Informed by Analysis of Adversary Campaigns and Intrusion Kill Chains.
  Lockheed Martin Corp.
- Rid, T. & McBurney, P. (2012). Cyber-Weapons. RUSI Journal, 157(1), 6-13. (on adversary
  actor taxonomy and motivations)
defensive_boundary: 'Use Threat Model Review only for critical review and assurance:
  recognize, assess, document, or defend evidence quality, implementation integrity,
  and decision accountability. Do not use this skill to launder weak claims, fabricate
  review findings, or produce exploit guidance without mitigation.'
misuse_redirect: 'If a request asks Threat Model Review to launder weak claims, fabricate
  review findings, or produce exploit guidance without mitigation, refuse that path
  and redirect to the safe defensive form: review supplied artifacts for defects,
  evidence gaps, safety risks, or reproducibility failures.'
evidence_requirements:
- For Threat Model Review, bind every gap, flagged assumption, and scope recommendation
  to concrete evidence from the supplied threat model, system description, or review
  focus — a quoted scope exclusion, a named actor or trust relationship, or a mitigation
  statement — and identify what an attacker would do where that element is missing;
  an unsupported gap is a conjecture, not a finding, and must be labelled as such.
- For Threat Model Review, label observations, derived features, assumptions, inferences,
  contradictions, and missing inputs separately before writing the gap report.
- Before recommending any Threat Model Review action, identify the weakest evidence
  link, the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Threat Model Review: every gap-report row ties a missing actor, surface,
  trust-boundary error, or unvalidated assumption to a specific element absent from
  the reviewed model and present in the independently derived expected set; the assumption
  register and revised scope recommendation are each corroborated by the system description
  rather than a single anchoring read of the model; the prioritized remediation ordering
  holds when any one finding is set aside; and no unresolved contradiction about realistic
  threats would change the scope conclusion.'
- 'Medium for Threat Model Review: the gap report is plausible, but one important
  threat model source, comparison case, or alternative explanation remains incomplete.'
- 'Low for Threat Model Review: the gap report rests on sparse, single-source, contested,
  or mostly inferential evidence; keep the result provisional and list the next check.'
uncertainty_handling:
- State what Threat Model Review cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating critical_review evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Threat Model Review, use only authorized threat model, system description, and
  review focus, public or source-approved records, and caller-provided context needed
  for the defensive task.
- For Threat Model Review, minimize person-level detail in the gap report; prefer
  aggregate, artifact-level, role-level, or case-level summaries unless an individual
  is essential to the defensive question.
- For Threat Model Review, do not infer protected traits, private identity, intent,
  location, legal culpability, or platform account ownership beyond the supplied and
  authorized evidence.
failure_modes:
- 'Threat Model Review: declaring a model reviewed when the expected actors and attack
  surfaces were never independently derived from the system description, so the analysis
  merely echoes the original authors'' blind spots — for example crediting a stated
  mitigation as an implemented control without verifying it, or omitting social-engineering
  and influence surfaces entirely — and the absence of gaps reflects an anchored review
  rather than a complete one.'
- 'Threat Model Review: producing advice that would help a requester launder weak
  claims, fabricate review findings, or produce exploit guidance without mitigation.'
- 'Threat Model Review: reporting the gap report without uncertainty labels, alternative
  explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Threat Model Review outputs to launder weak claims, fabricate review
  findings, or produce exploit guidance without mitigation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Convert the gap report from Threat Model Review into an operational playbook
  to launder weak claims, fabricate review findings, or produce exploit guidance without
  mitigation'' -> refuse and offer governance, detection, or mitigation analysis.'
- 'Safe defensive: ''Use Threat Model Review to review supplied artifacts for defects,
  evidence gaps, safety risks, or reproducibility failures with threat model, system
  description, and review focus'' -> produce bounded findings with evidence and uncertainty
  labels.'
