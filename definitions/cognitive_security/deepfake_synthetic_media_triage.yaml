id: cognitive_security.deepfake_synthetic_media_triage
description: 'Deepfake and Synthetic Media Triage is a structured first-pass assessment
  procedure for suspected AI-generated, manipulated, or misrepresented media — images,
  video, audio, and documents. It applies a layered checklist of observable tell-tales,
  provenance signals, and contextual inconsistencies to rapidly determine whether
  a piece of media warrants escalation to full forensic analysis or can be assessed
  with sufficient confidence at triage level. The technique is explicitly non-forensic:
  it does not claim evidentiary-grade conclusions but instead produces a calibrated
  suspicion rating, a prioritized list of anomaly observations, and a provenance chain
  reconstruction using open-source signals. It is defensive and educational, designed
  for analysts, journalists, educators, and information-environment practitioners
  who need to triage at volume without laboratory tools.'
tags:
- cognitive-security
- cognitive_security
- synthetic-media
- provenance-verification
triggers:
- deepfake triage
- is this image real
- synthetic media check
- AI-generated video assessment
- manipulated media detection
- deepfake tell-tales
- provenance of this media
- should I trust this video
tools:
- verb: read
  purpose: ingest the media artifact description, metadata, and any context provided
    by the requester
- verb: web
  purpose: perform reverse-image/video search, provenance chain lookup, and check
    for prior documentation of the artifact in open sources
- verb: reason
  purpose: apply the structured tell-tale checklist and contextual inconsistency analysis
    to produce a calibrated suspicion rating
- verb: write
  purpose: emit the triage report with anomaly observations, provenance findings,
    suspicion rating, and escalation recommendation
inputs:
- name: media_artifact
  type: text
  required: true
  description: 'Description of the suspected media: URL or file reference, media type
    (image/video/audio/document), claimed source, claimed date, and the context in
    which it was encountered'
- name: claim_context
  type: text
  required: true
  description: The specific claim the media is being used to support or evidence —
    what is the media supposed to show and why does it matter
- name: available_metadata
  type: text
  required: false
  description: 'Any available technical metadata: EXIF data, file creation/modification
    timestamps, platform upload metadata, C2PA or Content Credentials data if present'
outputs:
- name: triage_report
  type: markdown
  description: 'Structured report covering: media characterization, tell-tale checklist
    results, provenance chain findings, contextual inconsistencies, overall suspicion
    rating (Suspicious/Uncertain/Likely Authentic) with confidence level, and escalation
    recommendation'
- name: anomaly_log
  type: table
  description: 'Table of observed anomalies: anomaly type, description, diagnostic
    weight (Strong/Moderate/Weak indicator of manipulation), and whether it is definitively
    forensic or requires laboratory confirmation'
references:
- 'Witness Media Lab & First Draft (2018). Starling: An End-to-End Provenance System
  for Journalists. Columbia University.'
- 'Chesney, R., & Citron, D. K. (2019). Deep fakes: A looming challenge for privacy,
  democracy, and national security. California Law Review, 107(6), 1753-1819.'
- 'Tolosana, R., Vera-Rodriguez, R., Fierrez, J., Morales, A., & Ortega-Garcia, J.
  (2020). Deepfakes and beyond: A survey of face manipulation and fake detection.
  Information Fusion, 64, 131-148.'
- Coalition for Content Provenance and Authenticity (C2PA) (2023). C2PA Technical
  Specification v1.3. https://c2pa.org/specifications/
- Farid, H. (2022). Creating, Using, Misusing, and Detecting Deep Fakes. Journal of
  Online Trust and Safety, 1(4).
- 'Snyder, M., & Doermann, D. (2020). Making Deep Fakes More Detectable: CNN Training
  with Error Amplifying Loss Function. ACM Multimedia.'
when_to_use:
- when a piece of media is being used to support an important factual claim and its
  authenticity is in question
- when operating at volume in an information environment where full forensic analysis
  of every item is not feasible
- when advising a newsroom, analyst, or policy-maker who needs a rapid credibility
  assessment before acting on media-evidenced claims
- when training analysts or journalists to recognize synthetic media tell-tales as
  part of a media literacy program
- when a suspected deepfake has surfaced in a high-stakes context (election, conflict,
  public health) and a rapid triage is needed before escalation decisions
what_it_produces:
- 'a structured tell-tale checklist assessment covering: facial/body physics anomalies
  (for images/video), audio-visual synchronization, background and shadow consistency,
  EXIF and metadata integrity, provenance chain (where did this originate and how
  did it travel)'
- a reverse-search provenance trace identifying earliest known appearances of the
  media
- 'contextual plausibility assessment: does the media''s claimed context (location,
  time, event) cohere with verifiable external facts'
- a calibrated suspicion rating — Suspicious / Uncertain / Likely Authentic — with
  an explicit confidence level and the specific observations driving it
- 'a clear escalation recommendation: whether laboratory forensic analysis, platform
  reporting, or expert consultation is warranted'
key_discipline:
- 'triage is not forensics: always state that this is a non-evidentiary assessment
  and label confidence accurately'
- no single tell-tale is conclusive — a suspicion rating requires a pattern of anomalies
  or a strong provenance disconfirmation
- provenance is often more diagnostic than visual tell-tales — where and when the
  media first appeared often exposes synthetic origin faster than pixel-level analysis
- contextual implausibility (the event couldn't have happened this way) can be more
  reliable than technical tell-tales that improve with each model generation
- absence of tell-tales does not establish authenticity — state explicitly what cannot
  be ruled out at triage level
- the C2PA/Content Credentials ecosystem is the emergent positive-provenance standard;
  check for it but do not treat absence as manipulation evidence
workflow_steps:
- verbs:
  - read
  title: Characterize the artifact and claim
  text: 'Read the media description and claim context. Record: media type; claimed
    source, creator, and date; the specific claim the media evidences; and any metadata
    provided. Note the stakes and why this assessment is being requested.'
- verbs:
  - web
  title: Provenance trace
  text: 'Perform reverse-image or reverse-video search (Google Lens, TinEye, InVID/WeVerify)
    to find the earliest known appearance of the media. Check whether the media has
    been documented before in a different context (re-used archival footage, mis-dated
    photographs, previously debunked synthetic content). Look for C2PA Content Credentials
    or similar provenance attestations. Document the provenance chain: origin, spread
    path, and any context changes.'
- verbs:
  - reason
  title: Apply tell-tale checklist
  text: 'Work through the structured tell-tale checklist by media type. For images/video:
    facial physics (skin texture, eye reflections, teeth, hair boundaries, ear geometry),
    lighting and shadow consistency, background spatial coherence, motion blur naturalness,
    audio-visual lip synchronization. For audio: prosody naturalness, background noise
    consistency, acoustic environment match to claimed location. For documents: font
    inconsistency, metadata date mismatches, OCR artifact patterns. For all types:
    check metadata (EXIF GPS, camera model, software tag) against claimed provenance.
    Note each anomaly with its diagnostic weight.'
- verbs:
  - reason
  title: Contextual plausibility assessment
  text: 'Assess whether the claimed context (location, date, event, persons present)
    is consistent with verifiable external facts: satellite imagery, known event schedules,
    confirmed presence of individuals at claimed location. Identify any contextual
    implausibilities that independently disconfirm the claimed context regardless
    of technical authenticity. Rate contextual plausibility as: Consistent / Implausible
    / Directly contradicted.'
- verbs:
  - reason
  - write
  title: Synthesize rating and draft report
  text: 'Integrate tell-tale checklist, provenance findings, and contextual plausibility
    into an overall suspicion rating: Suspicious (multiple strong anomalies or provenance
    disconfirmation), Uncertain (mixed signals, some anomalies but no definitive disconfirmation),
    or Likely Authentic (no significant anomalies, provenance consistent, context
    plausible). State confidence level explicitly. Determine escalation recommendation.
    Write the triage_report and anomaly_log.'
- verbs:
  - write
  title: Emit triage report with caveats
  text: 'Output the final triage_report and anomaly_log. Include mandatory caveats:
    this is a non-evidentiary triage assessment; specific observations that could
    not be assessed at triage level; and the escalation path if evidentiary conclusions
    are required. Never state a definitive conclusion of manipulation or authenticity
    — state the suspicion rating and its confidence level.'
anti_criteria:
- do not claim evidentiary or forensic-grade conclusions — always label the output
  as a triage assessment with explicit confidence bounds
- do not declare media 'authentic' based solely on absence of observable tell-tales
  — advanced synthetic media may not show current-generation artifacts
- do not treat a single anomaly as conclusive evidence of manipulation — require a
  pattern or a strong provenance disconfirmation
- do not name or assert the identity of persons depicted in the media as part of the
  triage — identity claims require separate verification
- do not provide an assessment that could be used to certify media for legal proceedings
  — triage outputs are not admissible forensic evidence
defensive_boundary: 'Use Deepfake & Synthetic Media Triage only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Deepfake & Synthetic Media Triage to increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation,
  refuse that path and redirect to the safe defensive form: assess supplied material
  for manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Deepfake & Synthetic Media Triage, bind each finding to a labeled source — content,
  behavioral, narrative, media, and audience-risk evidence, a cited reference, or
  an explicitly marked inference — and never present inference as observed evidence.
- For Deepfake & Synthetic Media Triage, keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Deepfake & Synthetic Media Triage recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Deepfake & Synthetic Media Triage: independent lines of content,
  behavioral, narrative, media, and audience-risk evidence converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Deepfake & Synthetic Media Triage: the evidence supports
  the conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Deepfake & Synthetic Media Triage: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Deepfake & Synthetic Media Triage cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Deepfake
  & Synthetic Media Triage should collect to separate the live alternatives.
privacy_legal_constraints:
- For Deepfake & Synthetic Media Triage, use only data the caller is authorized to
  analyze, drawn from public or source-approved records.
- For Deepfake & Synthetic Media Triage, protect privacy by preferring aggregate,
  role-level, or artifact-level summaries over individual targeting unless an individual
  is essential to the defensive question.
- For Deepfake & Synthetic Media Triage, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Deepfake & Synthetic Media Triage failure: mistaking persuasive resonance for verified
  harm or intent.'
- 'Deepfake & Synthetic Media Triage failure: producing guidance that would help a
  requester increase persuasive impact, exploit audience vulnerabilities, or optimize
  narrative manipulation.'
- 'Deepfake & Synthetic Media Triage failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Deepfake & Synthetic Media Triage to increase persuasive impact,
  exploit audience vulnerabilities, or optimize narrative manipulation'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Turn Deepfake & Synthetic Media Triage into an operational playbook to
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation'' -> refuse and offer governance, detection, or mitigation analysis
  instead.'
- 'Safe defensive: ''Use Deepfake & Synthetic Media Triage to assess supplied material
  for manipulation indicators and recommend resilience measures'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
