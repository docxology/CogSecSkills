id: cognitive_security.prebunking_inoculation_design
description: Prebunking (inoculation) design applies psychological inoculation theory
  to build audience resistance to manipulation before exposure occurs. Drawing on
  Banas & Rains (2010) and the WHO-endorsed work of van der Linden et al., it exposes
  audiences to a weakened dose of a manipulation technique — named, explained, and
  refuted — so they recognize and resist the real attack when it arrives. This skill
  designs inoculation content (messaging, modules, games, or embedded warnings) tailored
  to a specific manipulation technique and target audience.
tags:
- cognitive-security
- cognitive_security
- inoculation
- prebunking
triggers:
- prebunk this narrative
- design inoculation content
- build resistance before they see this
- preemptive refutation
- inoculation theory
tools:
- verb: read
  purpose: ingest the manipulation technique to be inoculated against, the target
    audience profile, and any existing prebunking assets
- verb: reason
  purpose: select inoculation structure (technique-based or issue-based), determine
    appropriate exposure dose, and map to audience cognitive state
- verb: write
  purpose: 'produce the inoculation content: warning message, weakened-dose example,
    refutation, and efficacy-check items'
inputs:
- name: manipulation_technique
  type: text
  required: true
  description: The specific rhetorical or manipulation technique to inoculate against
    (e.g., false dichotomy, fear appeal, fake expert, ad hominem, emotional scarcity
    trigger)
- name: target_audience
  type: text
  required: true
  description: 'Description of the audience to be inoculated: prior beliefs, platform
    context, literacy level, and any known vulnerabilities or motivational biases'
- name: deployment_context
  type: text
  required: false
  description: Channel and format constraints for delivering the inoculation content
    (social media post, video short, classroom module, embedded browser warning, interactive
    game)
- name: existing_prebunking_assets
  type: list
  required: false
  description: Any pre-existing inoculation messages, explainer videos, or Go Viral
    / Bad News game modules relevant to this technique
outputs:
- name: inoculation_content
  type: markdown
  description: 'Formatted inoculation message or module including: explicit warning
    about the technique, weakened-dose example, named refutation, and suggested call-to-action
    for the audience'
- name: efficacy_check_items
  type: table
  description: Test items to assess whether the inoculation transferred — recognition
    prompts and attitudinal probes aligned to the targeted technique
- name: design_rationale
  type: markdown
  description: 'Explanation of the choices made: inoculation type (technique-based
    vs. issue-based), exposure dose calibration, refutation strategy, and audience-fit
    reasoning'
references:
- van der Linden, S., Leiserowitz, A., Rosenthal, S., & Maibach, E. (2017). Inoculating
  the Public against Misinformation about Climate Change. Global Challenges, 1(2),
  1600008.
- Roozenbeek, J., & van der Linden, S. (2019). Fake news game confers psychological
  resistance against online misinformation. Palgrave Communications, 5(1), 65.
- Banas, J. A., & Rains, S. A. (2010). A Meta-Analysis of Research on Inoculation
  Theory. Communication Monographs, 77(3), 281–311.
- 'Cook, J., Lewandowsky, S., & Ecker, U. K. H. (2017). Neutralizing misinformation
  through inoculation: Exposing misleading argumentation techniques reduces their
  influence. PLOS ONE, 12(5), e0175799.'
- 'Basol, M., Roozenbeek, J., & van der Linden, S. (2020). Good news about Bad News:
  Gamified inoculation boosts confidence and cognitive immunity against fake news.
  Journal of Cognition, 3(1), 2.'
when_to_use:
- a known manipulation technique is likely to be deployed against an audience before
  they encounter it
- designing a media-literacy curriculum that goes beyond passive knowledge to active
  resistance
- an information environment is anticipated to become contested (pre-election, pre-crisis,
  pre-campaign) and proactive defense is feasible
- evaluating or adapting existing prebunking assets (Go Viral, Bad News, Cranky Uncle)
  for a specific audience or technique
what_it_produces:
- a formatted inoculation message or module with explicit warning, weakened-dose example,
  named refutation, and audience call-to-action
- efficacy-check test items to assess resistance transfer
- design rationale explaining inoculation type, dose calibration, and audience fit
key_discipline:
- always name and explain the manipulation technique explicitly — passive exposure
  to a bad example without labeling it does not confer resistance
- 'calibrate the weakened dose: strong enough to be recognized as the real technique,
  weak enough not to persuade or traumatize'
- technique-based inoculation (against a rhetorical move, e.g., 'false expert') generalizes
  better across topics than issue-based inoculation (against a specific claim)
- inoculation decays over time — design for booster delivery, especially before anticipated
  high-exposure events
workflow_steps:
- verbs:
  - read
  title: Characterize the technique and audience
  text: 'Ingest the manipulation technique specification and audience profile. Identify:
    (a) which psychological lever the technique exploits (fear, tribal identity, authority,
    scarcity, social proof); (b) the audience''s prior exposure to this technique
    and their baseline attitudes; (c) any deployment constraints (format, channel,
    length, language register).'
- verbs:
  - reason
  title: Select inoculation structure and dose
  text: 'Choose between technique-based inoculation (names and explains the rhetorical
    move, domain-agnostic, better generalization) and issue-based inoculation (refutes
    a specific claim directly, faster but topic-locked). Calibrate the weakened-dose
    example: it must be identifiable as the real technique without being persuasive.
    Determine refutation strategy: for technique-based, provide a worked deconstruction;
    for issue-based, provide a factual correction with source. Identify whether the
    audience motivation state is likely to be hot (aroused, fast) or cold (deliberative)
    at deployment time, and adjust format accordingly.'
- verbs:
  - write
  title: Draft the inoculation content
  text: 'Write the inoculation message in this sequence: (1) Explicit warning — name
    the technique and state it will be used to mislead; (2) Weakened-dose example
    — show a mild instance of the technique in action; (3) Refutation — explain why
    the technique is misleading and what the legitimate version looks like; (4) Call
    to action — give the audience a specific recognition or verification behavior
    to practice. Keep language at audience literacy level. Flag emotional trigger
    points that require extra care not to model the technique being refuted.'
- verbs:
  - write
  title: Produce efficacy-check items and design rationale
  text: 'Write 3–5 test items that probe resistance: recognition prompts (can the
    audience spot the technique in a novel example?), attitudinal probes (has their
    confidence in the technique''s persuasiveness decreased?), and behavioral probes
    (will they share content using this technique?). Document design choices and their
    evidence base in the design rationale output.'
anti_criteria:
- do not model the manipulation technique so vividly in the weakened dose that it
  functions as actual persuasion — dose calibration is non-negotiable
- do not produce generic 'think before you share' messaging without tying it to a
  specific named technique and refutation
- 'do not ignore attitudinal backlash risk: audiences who feel lectured or patronized
  may reactively increase trust in the technique being inoculated against'
- do not skip efficacy-check items — untested inoculation content has unknown resistance-transfer
  and may provide false assurance
defensive_boundary: 'Use Prebunking & Inoculation Design only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Prebunking & Inoculation Design to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Prebunking & Inoculation Design, tie each inoculation content, efficacy check
  items, and design rationale claim to concrete evidence from the specific manipulation
  technique, target audience, and deployment context item, source excerpt, observation,
  or command result that supports it.
- For Prebunking & Inoculation Design, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the inoculation
  content.
- Before recommending any Prebunking & Inoculation Design action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Prebunking & Inoculation Design: the inoculation content is supported
  by multiple independent content, behavioral, narrative, media, and audience-risk
  evidence; characterize the technique and audience and select inoculation structure
  and dose checks agree, and no unresolved contradiction would change the result.'
- 'Medium for Prebunking & Inoculation Design: the inoculation content is plausible,
  but one important manipulation technique source, comparison case, or alternative
  explanation remains incomplete.'
- 'Low for Prebunking & Inoculation Design: the inoculation content rests on sparse,
  single-source, contested, or mostly inferential evidence; keep the result provisional
  and list the next check.'
uncertainty_handling:
- State what Prebunking & Inoculation Design cannot determine from the supplied or
  authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Prebunking & Inoculation Design, use only authorized manipulation technique,
  target audience, and deployment context, public or source-approved records, and
  caller-provided context needed for the defensive task.
- For Prebunking & Inoculation Design, minimize person-level detail in the inoculation
  content; prefer aggregate, artifact-level, role-level, or case-level summaries unless
  an individual is essential to the defensive question.
- For Prebunking & Inoculation Design, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Prebunking & Inoculation Design: treating manipulation technique as complete when
  characterize the technique and audience and select inoculation structure and dose
  checks or contradictory evidence are missing.'
- 'Prebunking & Inoculation Design: producing advice that would help a requester increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation.'
- 'Prebunking & Inoculation Design: reporting the inoculation content without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Prebunking & Inoculation Design outputs to increase persuasive impact,
  exploit audience vulnerabilities, or optimize narrative manipulation'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the inoculation content from Prebunking & Inoculation Design
  into an operational playbook to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Prebunking & Inoculation Design to assess supplied material
  for manipulation indicators and recommend resilience measures with manipulation
  technique, target audience, and deployment context'' -> produce bounded findings
  with evidence and uncertainty labels.'
