id: counterintelligence.insider_threat_indicator_review
name: Insider Threat Indicator Review
group: counterintelligence
version: 0.1.0
status: implemented
summary: Review behavioral and access indicators of insider risk within ethical/legal
  bounds.
description: Insider Threat Indicator Review is a structured counterintelligence assessment
  technique for systematically reviewing behavioral, technical, and contextual indicators
  that a person with authorized access may pose an elevated risk of unauthorized disclosure,
  sabotage, espionage, or fraud. The technique applies recognized behavioral science
  and counterintelligence indicator frameworks — including CPNI and NITTF guidance
  — while maintaining strict respect for privacy, civil liberties, due process, and
  the legal bounds governing employee monitoring. It is designed to support referral
  decisions to security programs, not to reach final determinations of guilt or culpability.
ageint_topic: counterintelligence
tags:
- cognitive-security
- counterintelligence
- insider-risk
triggers:
- insider threat
- employee risk indicators
- trusted insider concern
- suspicious behavior by authorized user
- review behavioral indicators
- insider risk assessment
tools:
- verb: read
  purpose: ingest the behavioral observations, access logs, and contextual information
    provided for review
- verb: reason
  purpose: systematically apply insider threat indicator frameworks to the evidence
    and assess aggregate risk level
- verb: write
  purpose: produce a structured indicator review report with risk rating, caveats,
    and recommended next steps
inputs:
- name: behavioral_observations
  type: text
  required: true
  description: Factual descriptions of observed behaviors, statements, or anomalies
    of concern — not interpretations or conclusions
- name: access_and_technical_indicators
  type: text
  required: false
  description: Anomalous access patterns, data movement, or system activity observed
    through authorized monitoring
- name: contextual_background
  type: text
  required: false
  description: 'Relevant context: role, tenure, recent stressors, performance history,
    security clearance status — provided only within authorized HR and security program
    scope'
outputs:
- name: insider_threat_indicator_review_report
  type: markdown
  description: A structured report mapping observed indicators to established framework
    categories, an aggregate risk rating with rationale, scope and methodology caveats,
    and recommended next steps for the insider threat program or security officer
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- National Insider Threat Task Force (NITTF). (2017). Insider Threat Program Maturity
  Framework. Office of the Director of National Intelligence.
- 'Centre for the Protection of National Infrastructure (CPNI). (2013). Insider Threat:
  Defined and Explained. UK Government.'
- Shaw, E., Fischer, L., & Rose, A. (2009). Insider Risk Evaluation and Audit. Technical
  Report TR09-02. Defense Personnel Security Research Center (PERSEREC).
- Cappelli, D., Moore, A., & Trzeciak, R. (2012). The CERT Guide to Insider Threats.
  Addison-Wesley / SEI Carnegie Mellon.
- U.S. Department of Homeland Security. (2014). Combating the Insider Threat. National
  Cybersecurity and Communications Integration Center.
defensive_boundary: 'Use Insider Threat Indicator Review only for counterintelligence
  and analytic-process defense: recognize, assess, document, or defend analytic teams,
  collection processes, and institutional trust boundaries. Do not use this skill
  to evade detection, improve elicitation, profile targets for exploitation, or conceal
  tradecraft.'
misuse_redirect: 'If a request asks Insider Threat Indicator Review to evade detection,
  improve elicitation, profile targets for exploitation, or conceal tradecraft, refuse
  that path and redirect to the safe defensive form: review supplied interactions
  or processes for deception, elicitation, or insider-risk indicators.'
evidence_requirements:
- For Insider Threat Indicator Review, bind each finding to a labeled source — interaction
  records, process artifacts, deception indicators, and alternative explanations,
  a cited reference, or an explicitly marked inference — and never present inference
  as observed evidence.
- For Insider Threat Indicator Review, keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Insider Threat Indicator Review recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Insider Threat Indicator Review: independent lines of interaction
  records, process artifacts, deception indicators, and alternative explanations converge,
  credible alternatives have been tested, and the conclusion would survive removing
  any single source.'
- 'Medium confidence for Insider Threat Indicator Review: the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Insider Threat Indicator Review: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Insider Threat Indicator Review cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Insider
  Threat Indicator Review should collect to separate the live alternatives.
privacy_legal_constraints:
- For Insider Threat Indicator Review, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Insider Threat Indicator Review, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Insider Threat Indicator Review, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Insider Threat Indicator Review failure: turning defensive tradecraft recognition
  into operational evasion advice.'
- 'Insider Threat Indicator Review failure: producing guidance that would help a requester
  evade detection, improve elicitation, profile targets for exploitation, or conceal
  tradecraft.'
- 'Insider Threat Indicator Review failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Insider Threat Indicator Review to evade detection, improve elicitation,
  profile targets for exploitation, or conceal tradecraft'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Insider Threat Indicator Review into an operational playbook to
  evade detection, improve elicitation, profile targets for exploitation, or conceal
  tradecraft'' -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Insider Threat Indicator Review to review supplied interactions
  or processes for deception, elicitation, or insider-risk indicators'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
