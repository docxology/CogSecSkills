id: sat.starbursting
description: Starbursting is a structured brainstorming technique that generates questions—organized
  by the six interrogatives Who, What, When, Where, Why, and How—before attempting
  to answer them. By systematically exhausting the question space first, it prevents
  analysts from leaping to premature conclusions, surfaces unknown unknowns, and identifies
  which gaps in knowledge are most consequential. In cognitive-security settings it
  is particularly useful for mapping the full attack surface of an influence operation
  or information environment before committing analytical resources.
tags:
- cognitive-security
- sat
- question-generation
triggers:
- what questions should we be asking
- starbursting
- map the unknowns
- generate questions before answers
- who what when where why how
tools:
- verb: read
  purpose: ingest the topic, problem statement, or artifact that will be questioned
- verb: reason
  purpose: systematically generate questions across all six interrogative categories
    and prioritize by analytic importance
- verb: write
  purpose: produce the question map organized by interrogative and ranked by priority
inputs:
- name: topic_or_artifact
  type: text
  required: true
  description: the subject, plan, event, actor, narrative, or artifact to be questioned
- name: context
  type: text
  required: false
  description: background information, prior analysis, or constraints that shape which
    questions are most pressing
outputs:
- name: question_map
  type: table
  description: questions organized by interrogative (Who/What/When/Where/Why/How),
    with a priority rating and notes on what answering each question would reveal
- name: key_unknowns_summary
  type: markdown
  description: the highest-priority unanswered questions and their analytic significance
references:
- Pherson, K. H., & Pherson, R. H. (2012). Critical Thinking for Strategic Intelligence.
  CQ Press. Chapter 4.
- Heuer, R. J., & Pherson, R. H. (2015). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press.
when_to_use:
- a new topic, actor, or operation is being scoped and analysts may not yet know what
  they do not know
- premature closure on an answer is suspected and rigorous question generation is
  needed to reopen the problem
- planning collection requirements or research tasks where an exhaustive question
  list drives prioritization
- evaluating an influence narrative to identify which aspects have not been interrogated
what_it_produces:
- a comprehensive question map across all six interrogatives, making unknown unknowns
  explicit
- a prioritized list of the most consequential unanswered questions
- a basis for collection requirements, research tasks, or further structured analysis
key_discipline:
- generate questions before seeking any answers — answering prematurely closes down
  question generation
- each interrogative (Who/What/When/Where/Why/How) must produce multiple questions,
  not just one
- questions about absence are as important as questions about presence (e.g., 'Why
  is X NOT mentioned?')
workflow_steps:
- verbs:
  - read
  title: Frame the topic
  text: 'Read the topic statement or artifact. Define the boundaries: what is the
    subject being questioned, and what time frame, actor set, or information environment
    is in scope?'
- verbs:
  - reason
  title: Generate questions per interrogative
  text: Working through each interrogative in turn—Who, What, When, Where, Why, How—generate
    at least three to five questions per category. Include questions about absences,
    counterfactuals, and adversary intent. Do not attempt to answer any question at
    this stage.
- verbs:
  - reason
  title: Rate and prioritize
  text: 'For each question, estimate its analytic priority: how much would the answer
    change the assessment? Classify as High / Medium / Low. Flag questions that are
    currently unanswerable (collection gap) versus those answerable from existing
    sources.'
- verbs:
  - write
  title: Produce the question map and key unknowns summary
  text: Emit the full question table organized by interrogative with priority ratings.
    Write the key-unknowns summary highlighting the highest-priority unanswered questions
    and what analytic collection actions they imply.
anti_criteria:
- do not answer questions during the generation phase — answering during generation
  anchors and prunes the question space
- do not treat a sparse interrogative category (e.g., only one 'Why' question) as
  complete — push for multiple questions per category
- do not discard awkward or uncomfortable questions; the most uncomfortable are often
  the most analytically important
defensive_boundary: 'Use Starbursting only for structured analytic technique support:
  recognize, assess, document, or defend analytic rigor, alternative hypotheses, and
  calibrated judgment. Do not use this skill to force a preferred conclusion, hide
  uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Starbursting to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Starbursting, bind each finding to a labeled source — hypotheses, assumptions,
  indicators, evidence tables, and confidence notes, a cited reference, or an explicitly
  marked inference — and never present inference as observed evidence.
- For Starbursting, keep observations, assumptions, inferences, and missing information
  in separate labeled categories.
- Before issuing any Starbursting recommendation, name the weakest evidentiary link
  and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Starbursting: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Starbursting: the evidence supports the conclusion, but one
  important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Starbursting: the evidence is sparse, single-source, contested,
  or mostly inferential, so competing explanations must be preserved in the output.'
uncertainty_handling:
- State plainly what Starbursting cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Starbursting
  should collect to separate the live alternatives.
privacy_legal_constraints:
- For Starbursting, use only data the caller is authorized to analyze, drawn from
  public or source-approved records.
- For Starbursting, protect privacy by preferring aggregate, role-level, or artifact-level
  summaries over individual targeting unless an individual is essential to the defensive
  question.
- For Starbursting, do not infer protected traits, private identity, intent, location,
  or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Starbursting failure: using the method as a checklist while skipping diagnostic
  evidence and disconfirming tests.'
- 'Starbursting failure: producing guidance that would help a requester force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Starbursting failure: hiding uncertainty behind generic confidence language instead
  of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Starbursting to force a preferred conclusion, hide uncertainty, or
  use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Starbursting into an operational playbook to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation'' -> refuse and
  offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Starbursting to apply the structured technique to supplied
  evidence while preserving alternatives and uncertainty'' -> produce bounded findings
  with explicit evidence and uncertainty labels.'
