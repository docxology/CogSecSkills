id: sat.devils_advocacy
description: Devil's Advocacy is a Heuer & Pherson challenge-analysis technique in
  which an analyst is deliberately assigned to construct the most credible principled
  case AGAINST a prevailing consensus or lead judgment. The goal is not to win but
  to test whether the consensus is robust under serious challenge or merely comfortable.
  The advocate exposes the assumptions the judgment rests on, mines the evidence base
  for contradicting or merely-assumed items, mounts the best alternative interpretation
  in good faith, and then honestly reports whether the consensus survived and what
  new collection would resolve the dispute.
tags:
- cognitive-security
- sat
- challenge-analysis
- heuer
triggers:
- devil's advocate
- challenge the consensus
- stress-test the lead judgment
- argue the contrary case
- is our consensus robust
- test the prevailing view
tools:
- verb: read
  purpose: Ingest the consensus judgment, its supporting evidence, and the stated
    or implicit assumptions it rests on.
- verb: reason
  purpose: Identify vulnerable assumptions and construct the strongest good-faith
    alternative interpretation against the consensus.
- verb: write
  purpose: Record the counter-case, the robustness verdict, and the new collection
    that would resolve the dispute.
inputs:
- name: consensus_judgment
  type: text
  required: true
  description: The prevailing consensus or lead judgment to be challenged, stated
    as a clear claim.
- name: evidence_base
  type: text
  required: true
  description: The evidence, sources, and assumptions the consensus judgment currently
    rests on.
outputs:
- name: counter_case
  type: markdown
  description: The strongest good-faith principled case against the consensus, with
    its supporting evidence and reasoning.
- name: robustness_verdict
  type: markdown
  description: Assessment of whether the consensus survived the challenge, plus the
    new collection that would resolve the dispute.
references:
- Heuer & Pherson (2014). Structured Analytic Techniques for Intelligence Analysis.
when_to_use:
- A consensus or lead judgment has formed quickly, with little dissent, and you
- A high-stakes judgment rests on a small number of key assumptions that have
- Group dynamics, hierarchy, or momentum may be suppressing legitimate
- You need to surface what new collection or evidence would actually resolve a
what_it_produces:
- A restatement of the consensus and the explicit assumptions and evidence it
- The strongest good-faith counter-case a capable adversary-analyst would mount,
- 'A robustness verdict: did the consensus survive the challenge, partially'
key_discipline:
- bind every finding to evidence and defensive use
workflow_steps:
- verbs:
  - read
  - write
  title: State the consensus and its foundations
  text: Restate the lead judgment as a clear claim, enumerate its cited evidence,
    and list the explicit and implicit assumptions it rests on.
- verbs:
  - reason
  title: Select the most vulnerable assumptions
  text: Choose load-bearing assumptions that are unexamined, inherited from analogy,
    unsupported by evidence, or resting on absence of contradiction.
- verbs:
  - read
  - reason
  title: Review the evidence base for soft spots
  text: Separate evidence that genuinely supports the consensus from evidence that
    is assumed, ambiguous, single-sourced, missing, or contradictory.
- verbs:
  - reason
  title: Construct the strongest alternative interpretation
  text: Build the most credible good-faith alternative reading of the same evidence,
    as a capable opposing analyst would.
- verbs:
  - reason
  - write
  title: Marshal the counter-case honestly
  text: Assemble the counter-case with its supporting facts, causal logic, predictions,
    and its own limitations.
- verbs:
  - reason
  - write
  title: Assess robustness and resolving collection
  text: State whether the consensus survived intact, survived with caveats, or failed,
    then name the evidence that would resolve the dispute.
anti_criteria:
- '**No straw man.** The counter-case must be the strongest real case against the'
- '**No contrarianism for its own sake.** The exercise tests robustness; it is'
- '**No suppression of the result.** If the consensus fails the challenge, report'
- '**No collapsing of evidence categories.** Do not treat merely-assumed or'
defensive_boundary: 'Use Devil''s Advocacy only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Devil''s Advocacy to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Devil's Advocacy, tie the counter-case and the robustness verdict to specific
  evidence from the consensus judgment and its evidence base, keep merely-assumed,
  single-sourced, and contradictory items in distinct categories rather than collapsing
  them, and name the new collection whose evidence would resolve the dispute.
- For Devil's Advocacy, label observations, derived features, assumptions, inferences,
  contradictions, and missing inputs separately before writing the counter case.
- Before recommending any Devil's Advocacy action, identify the weakest evidence link,
  the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Devil''s Advocacy: the counter-case is the strongest good-faith reading
  a capable opposing analyst would mount, the consensus''s load-bearing assumptions
  and evidence soft spots are surfaced from independent corroboration, the robustness
  verdict honestly reflects whether the consensus held, and no unresolved contradiction
  would change that verdict.'
- 'Medium for Devil''s Advocacy: the counter case is plausible, but one important
  consensus judgment source, comparison case, or alternative explanation remains incomplete.'
- 'Low for Devil''s Advocacy: the counter case rests on sparse, single-source, contested,
  or mostly inferential evidence; keep the result provisional and list the next check.'
uncertainty_handling:
- State what Devil's Advocacy cannot determine from the supplied or authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating sat evidence to collect when confidence is low
  or medium.
privacy_legal_constraints:
- For Devil's Advocacy, use only authorized consensus judgment, and evidence base,
  public or source-approved records, and caller-provided context needed for the defensive
  task.
- For Devil's Advocacy, minimize person-level detail in the counter case; prefer aggregate,
  artifact-level, role-level, or case-level summaries unless an individual is essential
  to the defensive question.
- For Devil's Advocacy, do not infer protected traits, private identity, intent, location,
  legal culpability, or platform account ownership beyond the supplied and authorized
  evidence.
failure_modes:
- 'Devil''s Advocacy: mounting a straw-man or contrarian-for-its-own-sake challenge,
  or suppressing a result in which the consensus actually failed, so the exercise
  produces the reassurance of having been challenged without genuinely testing whether
  the lead judgment is robust or merely comfortable.'
- 'Devil''s Advocacy: producing advice that would help a requester force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Devil''s Advocacy: reporting the counter case without uncertainty labels, alternative
  explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Devil''s Advocacy outputs to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Convert the counter case from Devil''s Advocacy into an operational playbook
  to force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation'' -> refuse and offer governance, detection, or mitigation analysis.'
- 'Safe defensive: ''Use Devil''s Advocacy to apply the structured technique to supplied
  evidence while preserving alternatives and uncertainty with consensus judgment,
  and evidence base'' -> produce bounded findings with evidence and uncertainty labels.'
