id: critical_review.logical_coherence_review
name: Logical Coherence Review
group: critical_review
version: 0.1.0
status: implemented
summary: Test an argument's internal consistency and the validity of its inferential
  steps.
description: Logical Coherence Review tests an argument's internal consistency and
  the validity of its inferential steps by mapping claims to their supporting premises
  and checking whether the conclusions follow by valid deductive or inductive inference.
  It identifies formal fallacies (affirming the consequent, undistributed middle,
  equivocation), informal fallacies (ad hominem, strawman, slippery slope), hidden
  premises, and equivocal use of key terms. In the cognitive-security domain, logical
  coherence review is a first-line defense against narratives that appear compelling
  through rhetorical momentum rather than sound inference — including disinformation
  frames, policy recommendations resting on non-sequiturs, and intelligence assessments
  where the analytic confidence overstates the logical support.
ageint_topic: adversarial-assurance
tags:
- cognitive-security
- critical_review
- argumentation
- fallacy-detection
triggers:
- logic check
- fallacy review
- argument validity
- coherence check
- does this follow
- non-sequitur
- internal consistency
tools:
- verb: read
  purpose: ingest the argument, claim set, or narrative to be assessed
- verb: reason
  purpose: map inferential structure, identify premises, check validity, and classify
    fallacies
- verb: write
  purpose: produce the annotated argument map, fallacy register, and coherence verdict
inputs:
- name: argument_text
  type: text
  required: true
  description: the argument, report section, narrative, or policy document whose logical
    structure is to be assessed
- name: key_claims
  type: list
  required: false
  description: the specific conclusions the analyst wants to focus on, if a long document
    contains multiple arguments
outputs:
- name: argument_map
  type: markdown
  description: 'structured decomposition of the argument: conclusion, supporting premises
    (P1…Pn), linking inferences, and hidden premises surfaced'
- name: fallacy_register
  type: table
  description: rows = identified fallacy or coherence failure; columns = type (formal/informal),
    location in text, description, severity
- name: coherence_verdict
  type: markdown
  description: summary verdict — whether the conclusion follows from the stated premises,
    under what conditions it would hold, and recommendations for strengthening or
    rejecting the argument
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Walton, D. (2008). Informal Logic: A Pragmatic Approach (2nd ed.). Cambridge University
  Press.'
- Toulmin, S. (1958). The Uses of Argument. Cambridge University Press.
- Hamblin, C. L. (1970). Fallacies. Methuen.
- Heuer, R. J. & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis (2nd ed.), Ch. 7. CQ Press.
defensive_boundary: 'Use Logical Coherence Review only for critical review and assurance:
  recognize, assess, document, or defend evidence quality, implementation integrity,
  and decision accountability. Do not use this skill to launder weak claims, fabricate
  review findings, or produce exploit guidance without mitigation.'
misuse_redirect: 'If a request asks Logical Coherence Review to launder weak claims,
  fabricate review findings, or produce exploit guidance without mitigation, refuse
  that path and redirect to the safe defensive form: review supplied artifacts for
  defects, evidence gaps, safety risks, or reproducibility failures.'
evidence_requirements:
- For Logical Coherence Review, bind each finding to a labeled source — artifact excerpts,
  test output, citations, assumptions, and reproducibility records, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Logical Coherence Review, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Logical Coherence Review recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Logical Coherence Review: independent lines of artifact excerpts,
  test output, citations, assumptions, and reproducibility records converge, credible
  alternatives have been tested, and the conclusion would survive removing any single
  source.'
- 'Medium confidence for Logical Coherence Review: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Logical Coherence Review: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Logical Coherence Review cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Logical
  Coherence Review should collect to separate the live alternatives.
privacy_legal_constraints:
- For Logical Coherence Review, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Logical Coherence Review, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Logical Coherence Review, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Logical Coherence Review failure: performing theatrical critique without concrete
  evidence, severity, or remediation path.'
- 'Logical Coherence Review failure: producing guidance that would help a requester
  launder weak claims, fabricate review findings, or produce exploit guidance without
  mitigation.'
- 'Logical Coherence Review failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Logical Coherence Review to launder weak claims, fabricate review
  findings, or produce exploit guidance without mitigation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Logical Coherence Review into an operational playbook to launder
  weak claims, fabricate review findings, or produce exploit guidance without mitigation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Logical Coherence Review to review supplied artifacts for
  defects, evidence gaps, safety risks, or reproducibility failures'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
