id: sat.structured_analogies
name: Structured Analogies
group: sat
version: 0.1.0
status: implemented
summary: Reason from a disciplined set of comparable historical cases, not a single
  anecdote.
description: Structured Analogies (also called Historical Analogy Analysis) is a structured-analytic
  technique that selects, evaluates, and systematically compares a set of historical
  precedent cases to a current situation rather than relying on a single, intuitively
  chosen anecdote. By making the selection criteria explicit and requiring analysis
  of both similarities and dissimilarities across multiple cases, it constrains the
  cognitive tendency to over-extend a single vivid precedent. In cognitive-security
  contexts it is used to assess whether a suspected influence operation or adversarial
  narrative campaign resembles documented historical patterns and what those precedents
  predict about likely trajectories and countermeasures.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- analogy-reasoning
triggers:
- find historical parallels
- structured analogies
- compare to precedent cases
- historical analogy analysis
- what has happened before
tools:
- verb: read
  purpose: ingest the current situation description and any provided candidate cases
- verb: search
  purpose: identify additional candidate historical cases from knowledge sources when
    the initial set is thin
- verb: reason
  purpose: select cases using explicit criteria, map similarities and dissimilarities,
    and derive lessons
- verb: write
  purpose: produce the multi-case comparison table, confidence-weighted lessons, and
    analytic narrative
inputs:
- name: current_situation
  type: text
  required: true
  description: description of the present case to be analyzed by analogy
- name: candidate_cases
  type: list
  required: false
  description: analyst-nominated historical cases to consider; if absent the agent
    identifies candidates
- name: comparison_dimensions
  type: list
  required: false
  description: specific attributes to compare across cases (e.g., actor type, medium,
    timeline, outcome); if omitted the agent proposes dimensions
outputs:
- name: case_comparison_table
  type: table
  description: selected historical cases compared to the current situation on each
    dimension, with similarity and dissimilarity ratings
- name: lessons_and_predictions
  type: markdown
  description: confidence-weighted lessons drawn from the case set, predicted trajectories,
    and noted limitations of the analogy
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'May, E. R. (1973). Lessons of the Past: The Use and Misuse of History in American
  Foreign Policy. Oxford University Press.'
- Heuer, R. J., & Pherson, R. H. (2015). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Ch. 8.
- 'Neustadt, R. E., & May, E. R. (1986). Thinking in Time: The Uses of History for
  Decision-Makers. Free Press.'
defensive_boundary: 'Use Structured Analogies only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Structured Analogies to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Structured Analogies, bind each finding to a labeled source — hypotheses, assumptions,
  indicators, evidence tables, and confidence notes, a cited reference, or an explicitly
  marked inference — and never present inference as observed evidence.
- For Structured Analogies, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Structured Analogies recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Structured Analogies: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Structured Analogies: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Structured Analogies: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Structured Analogies cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Structured
  Analogies should collect to separate the live alternatives.
privacy_legal_constraints:
- For Structured Analogies, use only data the caller is authorized to analyze, drawn
  from public or source-approved records.
- For Structured Analogies, protect privacy by preferring aggregate, role-level, or
  artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Structured Analogies, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Structured Analogies failure: using the method as a checklist while skipping diagnostic
  evidence and disconfirming tests.'
- 'Structured Analogies failure: producing guidance that would help a requester force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Structured Analogies failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Structured Analogies to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Structured Analogies into an operational playbook to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Structured Analogies to apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
