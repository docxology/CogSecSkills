id: osint_integrity.metadata_integrity_check
name: Metadata Integrity Check
group: osint_integrity
version: 0.1.0
status: implemented
summary: Use and sanity-check file/post metadata while accounting for stripping and
  spoofing.
description: 'Metadata integrity check extracts and critically evaluates embedded
  file and post metadata — EXIF, XMP, IPTC, platform timestamps, author fields, device
  identifiers — while explicitly accounting for the fact that metadata can be stripped,
  altered, or spoofed. The technique treats metadata as a corroborating signal rather
  than ground truth: consistent metadata raises confidence, but inconsistent or absent
  metadata must be explained before any evidential use. It is routinely applied in
  OSINT, legal discovery, and journalism verification workflows.'
ageint_topic: osint-integrity
tags:
- cognitive-security
- osint_integrity
- provenance
triggers:
- check the metadata
- what does the EXIF say
- metadata analysis
- verify file metadata
- who created this file
- when was this actually taken
- metadata integrity
tools:
- verb: read
  purpose: ingest the file or post and extract all available metadata fields
- verb: reason
  purpose: cross-check metadata fields for internal consistency and against external
    corroborating evidence; assess spoofing and stripping risk
- verb: write
  purpose: produce a structured metadata assessment with field-by-field confidence
    ratings and an overall integrity verdict
inputs:
- name: media_file_or_post
  type: text
  required: true
  description: File path, URL, or description of the document, image, video, or social-media
    post whose metadata is to be checked
- name: claimed_provenance
  type: text
  required: false
  description: Stated origin, author, date, or location that the metadata should corroborate
outputs:
- name: metadata_assessment
  type: table
  description: Field-by-field table of metadata values, expected vs. observed consistency,
    spoofing risk notes, and an overall integrity confidence verdict
- name: integrity_narrative
  type: markdown
  description: Plain-language summary of what the metadata does and does not establish,
    and what additional corroboration is needed
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- ExifTool Documentation. Harvey, P. (2003–present). exiftool.org.
- Sammons, J. (2012). The Basics of Digital Forensics. Syngress.
- First Draft News (2019). Visual Verification Guide, Chapter on Metadata. firstdraftnews.org.
- Berghel, H. (2000). Hiding Data, Forensics, and Anti-Forensics. Communications of
  the ACM, 50(4).
defensive_boundary: 'Use Metadata Integrity Check only for OSINT integrity and source-verification
  defense: recognize, assess, document, or defend source provenance, privacy, chain
  of custody, and public-source accountability. Do not use this skill to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence.'
misuse_redirect: 'If a request asks Metadata Integrity Check to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence, refuse that
  path and redirect to the safe defensive form: verify supplied claims, media, sources,
  or datasets with documented public-source methods.'
evidence_requirements:
- For Metadata Integrity Check, bind each finding to a labeled source — source records,
  custody notes, metadata, corroborating references, and contradiction logs, a cited
  reference, or an explicitly marked inference — and never present inference as observed
  evidence.
- For Metadata Integrity Check, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Metadata Integrity Check recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Metadata Integrity Check: independent lines of source records,
  custody notes, metadata, corroborating references, and contradiction logs converge,
  credible alternatives have been tested, and the conclusion would survive removing
  any single source.'
- 'Medium confidence for Metadata Integrity Check: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Metadata Integrity Check: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Metadata Integrity Check cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Metadata
  Integrity Check should collect to separate the live alternatives.
privacy_legal_constraints:
- For Metadata Integrity Check, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Metadata Integrity Check, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Metadata Integrity Check, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Metadata Integrity Check failure: overstating identity, location, attribution,
  or source reliability from incomplete public traces.'
- 'Metadata Integrity Check failure: producing guidance that would help a requester
  dox, deanonymize, harass, bypass access controls, or attribute identity beyond evidence.'
- 'Metadata Integrity Check failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Metadata Integrity Check to dox, deanonymize, harass, bypass access
  controls, or attribute identity beyond evidence'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Metadata Integrity Check into an operational playbook to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence'' -> refuse
  and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Metadata Integrity Check to verify supplied claims, media,
  sources, or datasets with documented public-source methods'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
