id: sat.starbursting
name: Starbursting
group: sat
version: 0.1.0
status: implemented
summary: Generate questions (who/what/when/where/why/how) before answers to map the
  unknowns.
description: Starbursting is a structured brainstorming technique that generates questions—organized
  by the six interrogatives Who, What, When, Where, Why, and How—before attempting
  to answer them. By systematically exhausting the question space first, it prevents
  analysts from leaping to premature conclusions, surfaces unknown unknowns, and identifies
  which gaps in knowledge are most consequential. In cognitive-security settings it
  is particularly useful for mapping the full attack surface of an influence operation
  or information environment before committing analytical resources.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- question-generation
triggers:
- what questions should we be asking
- starbursting
- map the unknowns
- generate questions before answers
- who what when where why how
tools:
- verb: read
  purpose: ingest the topic, problem statement, or artifact that will be questioned
- verb: reason
  purpose: systematically generate questions across all six interrogative categories
    and prioritize by analytic importance
- verb: write
  purpose: produce the question map organized by interrogative and ranked by priority
inputs:
- name: topic_or_artifact
  type: text
  required: true
  description: the subject, plan, event, actor, narrative, or artifact to be questioned
- name: context
  type: text
  required: false
  description: background information, prior analysis, or constraints that shape which
    questions are most pressing
outputs:
- name: question_map
  type: table
  description: questions organized by interrogative (Who/What/When/Where/Why/How),
    with a priority rating and notes on what answering each question would reveal
- name: key_unknowns_summary
  type: markdown
  description: the highest-priority unanswered questions and their analytic significance
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Pherson, K. H., & Pherson, R. H. (2012). Critical Thinking for Strategic Intelligence.
  CQ Press. Chapter 4.
- Heuer, R. J., & Pherson, R. H. (2015). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press.
defensive_boundary: 'Use Starbursting only for structured analytic technique support:
  recognize, assess, document, or defend analytic rigor, alternative hypotheses, and
  calibrated judgment. Do not use this skill to force a preferred conclusion, hide
  uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Starbursting to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Starbursting, tie every question and every priority rating to concrete evidence
  from the topic statement or artifact and its context, citing the excerpt or gap
  that makes the question pressing, and justify with evidence why answering it would
  shift the assessment rather than asserting importance by intuition.
- For Starbursting, label observations, derived features, assumptions, inferences,
  contradictions, and missing inputs separately before writing the question map.
- Before recommending any Starbursting action, identify the weakest evidence link,
  the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Starbursting: the question map covers all six interrogatives with multiple
  questions each including questions of absence, the priority ranking of the key unknowns
  is stable across independent reviewers of the topic, and no unresolved contradiction
  in the framing would alter which unanswered questions are judged most consequential.'
- 'Medium for Starbursting: the question map is plausible, but one important topic
  or artifact source, comparison case, or alternative explanation remains incomplete.'
- 'Low for Starbursting: the question map rests on sparse, single-source, contested,
  or mostly inferential evidence; keep the result provisional and list the next check.'
uncertainty_handling:
- State what Starbursting cannot determine from the supplied or authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating sat evidence to collect when confidence is low
  or medium.
privacy_legal_constraints:
- For Starbursting, use only authorized topic or artifact, and context, public or
  source-approved records, and caller-provided context needed for the defensive task.
- For Starbursting, minimize person-level detail in the question map; prefer aggregate,
  artifact-level, role-level, or case-level summaries unless an individual is essential
  to the defensive question.
- For Starbursting, do not infer protected traits, private identity, intent, location,
  legal culpability, or platform account ownership beyond the supplied and authorized
  evidence.
failure_modes:
- 'Starbursting: declaring the question map complete when one or more interrogatives
  produced only a token question or when answers were drafted during the generation
  phase, so premature closure was baked in and the most uncomfortable unknowns were
  never surfaced.'
- 'Starbursting: producing advice that would help a requester force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
- 'Starbursting: reporting the question map without uncertainty labels, alternative
  explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Starbursting outputs to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Convert the question map from Starbursting into an operational playbook
  to force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation'' -> refuse and offer governance, detection, or mitigation analysis.'
- 'Safe defensive: ''Use Starbursting to apply the structured technique to supplied
  evidence while preserving alternatives and uncertainty with topic or artifact, and
  context'' -> produce bounded findings with evidence and uncertainty labels.'
