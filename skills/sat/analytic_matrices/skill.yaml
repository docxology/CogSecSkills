id: sat.analytic_matrices
name: Analytic Matrices
group: sat
version: 0.1.0
status: implemented
summary: Cross-tabulate variables to organize evidence and reveal relationships.
description: Analytic Matrices organize analytic variables (hypotheses, actors, drivers,
  criteria) as rows and columns of a structured grid, then systematically populate
  each cell with evidence, ratings, or judgments. The technique makes the analyst's
  logic explicit and auditable, surfaces blank cells (missing evidence) and conflicting
  cells (contradictory evidence), and reduces the cognitive load of tracking multiple
  dimensions simultaneously. It is used in intelligence analysis as a pre-step to
  ACH, in option analysis, and in influence-operation assessment to map actors against
  capabilities and behaviors.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- evidence-organization
- structured-reasoning
triggers:
- analytic matrix
- cross-tab the evidence
- organize variables in a grid
- map actors to capabilities
- compare options systematically
- evidence matrix
tools:
- verb: read
  purpose: ingest the evidence set, hypotheses or options, and relevant variables
    to populate the matrix
- verb: reason
  purpose: select the correct matrix type, determine row/column dimensions, rate each
    cell, and interpret patterns
- verb: write
  purpose: produce the completed matrix, a legend, a summary of patterns, and analytic
    implications
inputs:
- name: analytic_question
  type: text
  required: true
  description: The focal analytic question driving the matrix construction
- name: variables_or_hypotheses
  type: list
  required: true
  description: The set of hypotheses, options, actors, or criteria to place on one
    axis of the matrix
- name: evidence_or_criteria
  type: list
  required: true
  description: The evidence items, indicators, capabilities, or evaluation criteria
    to place on the other axis
outputs:
- name: analytic_matrix
  type: table
  description: Completed grid with rows and columns labeled, each cell populated with
    a rating, evidence summary, or consistency judgment, and a legend explaining the
    rating scheme
- name: pattern_summary
  type: markdown
  description: 'Written interpretation of matrix patterns: which rows dominate, where
    gaps exist, where conflicts occur, and what the overall pattern implies for the
    analytic question'
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Heuer, R. J., & Pherson, R. H. (2015). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Chapter on Matrices.
- Pherson, R. H. (2018). Handbook of Analytic Tools and Techniques (5th ed.). Pherson
  Associates.
- Heuer, R. J. (1999). Psychology of Intelligence Analysis. Center for the Study of
  Intelligence, CIA. Chapter on ACH (which uses a matrix format).
- 'Clark, R. M. (2013). Intelligence Analysis: A Target-Centric Approach (4th ed.).
  CQ Press.'
defensive_boundary: 'Use Analytic Matrices only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Analytic Matrices to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Analytic Matrices, bind each finding to a labeled source — hypotheses, assumptions,
  indicators, evidence tables, and confidence notes, a cited reference, or an explicitly
  marked inference — and never present inference as observed evidence.
- For Analytic Matrices, keep observations, assumptions, inferences, and missing information
  in separate labeled categories.
- Before issuing any Analytic Matrices recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Analytic Matrices: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Analytic Matrices: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Analytic Matrices: the evidence is sparse, single-source, contested,
  or mostly inferential, so competing explanations must be preserved in the output.'
uncertainty_handling:
- State plainly what Analytic Matrices cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Analytic
  Matrices should collect to separate the live alternatives.
privacy_legal_constraints:
- For Analytic Matrices, use only data the caller is authorized to analyze, drawn
  from public or source-approved records.
- For Analytic Matrices, protect privacy by preferring aggregate, role-level, or artifact-level
  summaries over individual targeting unless an individual is essential to the defensive
  question.
- For Analytic Matrices, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Analytic Matrices failure: using the method as a checklist while skipping diagnostic
  evidence and disconfirming tests.'
- 'Analytic Matrices failure: producing guidance that would help a requester force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Analytic Matrices failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Analytic Matrices to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Analytic Matrices into an operational playbook to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Analytic Matrices to apply the structured technique to supplied
  evidence while preserving alternatives and uncertainty'' -> produce bounded findings
  with explicit evidence and uncertainty labels.'
