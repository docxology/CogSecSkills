id: counterintelligence.indicators_of_deception_analysis
name: Indicators of Deception Analysis
group: counterintelligence
version: 0.1.0
status: implemented
summary: Apply the MOM/POP/MOSES/EVE deception-detection checklists to a body of evidence.
description: Indicators of Deception Analysis applies the structured MOM/POP/MOSES/EVE
  analytical framework to a body of evidence to assess whether an adversary may be
  conducting an active denial-and-deception (D&D) operation. MOM evaluates Motive,
  Opportunity, and Means; POP identifies Potential indicators of deception based on
  evidence anomalies; MOSES checks Manipulation, Omission, Selective emphasis, and
  Exaggeration patterns; and EVE applies Evidence, Validation, and Evaluation criteria.
  The combined framework converts an otherwise intuitive 'something seems off' judgment
  into a structured, documentable deception-hypothesis test.
ageint_topic: counterintelligence
tags:
- cognitive-security
- counterintelligence
- deception-detection
triggers:
- indicators of deception
- MOM POP MOSES EVE
- something seems off about this intelligence
- deception analysis
- is this information planted
- denial and deception check
- anomaly in the evidence
tools:
- verb: read
  purpose: ingest the body of evidence, intelligence reporting, or communication under
    analysis
- verb: reason
  purpose: apply each checklist component (MOM, POP, MOSES, EVE) systematically and
    synthesize findings
- verb: write
  purpose: produce a structured deception-assessment report with confidence ratings
    and recommended analytic responses
inputs:
- name: evidence_corpus
  type: text
  required: true
  description: The intelligence reports, documents, communications, or data under
    review for potential deception indicators
- name: source_profile
  type: text
  required: false
  description: 'Known information about the source(s): access, past reliability, relationship
    to the subject, and any known adversary deception history'
- name: baseline_expectations
  type: text
  required: false
  description: What the analyst would expect to see in this domain absent deception
    — used to identify anomalies
outputs:
- name: deception_assessment_report
  type: markdown
  description: A structured report applying each framework component, listing identified
    indicators with evidence citations, an overall deception-likelihood rating, and
    recommended analytic and collection responses
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Heuer, R. J., & Pherson, R. H. (2015). Structured Analytic Techniques for Intelligence
  Analysis (2nd ed.). CQ Press. (Chapter on Indicators of Deception, MOM/POP/MOSES/EVE.)
- 'Whaley, B. (2007). Stratagem: Deception and Surprise in War. Artech House.'
- Daniel, D. C., & Herbig, K. L. (Eds.). (1981). Strategic Military Deception. Pergamon
  Press.
- Pherson, R. H., & Pherson, K. H. (2017). Critical Thinking for Strategic Intelligence
  (2nd ed.). CQ Press.
defensive_boundary: 'Use Indicators of Deception Analysis only for counterintelligence
  and analytic-process defense: recognize, assess, document, or defend analytic teams,
  collection processes, and institutional trust boundaries. Do not use this skill
  to evade detection, improve elicitation, profile targets for exploitation, or conceal
  tradecraft.'
misuse_redirect: 'If a request asks Indicators of Deception Analysis to evade detection,
  improve elicitation, profile targets for exploitation, or conceal tradecraft, refuse
  that path and redirect to the safe defensive form: review supplied interactions
  or processes for deception, elicitation, or insider-risk indicators.'
evidence_requirements:
- For Indicators of Deception Analysis, bind each finding to a labeled source — interaction
  records, process artifacts, deception indicators, and alternative explanations,
  a cited reference, or an explicitly marked inference — and never present inference
  as observed evidence.
- For Indicators of Deception Analysis, keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Indicators of Deception Analysis recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Indicators of Deception Analysis: independent lines of interaction
  records, process artifacts, deception indicators, and alternative explanations converge,
  credible alternatives have been tested, and the conclusion would survive removing
  any single source.'
- 'Medium confidence for Indicators of Deception Analysis: the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Indicators of Deception Analysis: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Indicators of Deception Analysis cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Indicators
  of Deception Analysis should collect to separate the live alternatives.
privacy_legal_constraints:
- For Indicators of Deception Analysis, use only data the caller is authorized to
  analyze, drawn from public or source-approved records.
- For Indicators of Deception Analysis, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Indicators of Deception Analysis, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Indicators of Deception Analysis failure: turning defensive tradecraft recognition
  into operational evasion advice.'
- 'Indicators of Deception Analysis failure: producing guidance that would help a
  requester evade detection, improve elicitation, profile targets for exploitation,
  or conceal tradecraft.'
- 'Indicators of Deception Analysis failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Indicators of Deception Analysis to evade detection, improve elicitation,
  profile targets for exploitation, or conceal tradecraft'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Indicators of Deception Analysis into an operational playbook to
  evade detection, improve elicitation, profile targets for exploitation, or conceal
  tradecraft'' -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Indicators of Deception Analysis to review supplied interactions
  or processes for deception, elicitation, or insider-risk indicators'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
