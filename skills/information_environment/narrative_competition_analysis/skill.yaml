id: information_environment.narrative_competition_analysis
name: Narrative Competition Analysis
group: information_environment
version: 0.1.0
status: implemented
summary: Analyze how rival narratives compete for attention, belief, and durability.
description: Narrative Competition Analysis examines how rival narratives about the
  same event, actor, or issue compete for attention, belief, and durability in an
  information environment. Drawing on framing theory, meme-competition models, and
  computational narrative analysis, the technique identifies each narrative's core
  claim, emotional valence, target audience, rhetorical devices, and propagation channels,
  then assesses relative salience, resilience, and vulnerability to counter-narrative
  intervention. It is a defensive analytical tool for understanding the landscape
  before designing protective communications or resilience strategies.
ageint_topic: information-environment
tags:
- cognitive-security
- information_environment
- narrative-analysis
triggers:
- competing narratives
- which narrative is winning
- how do rival framings compare
- narrative competition
- assess narrative salience
- map the narrative landscape
tools:
- verb: read
  purpose: ingest texts, media items, and engagement data representing the competing
    narratives
- verb: reason
  purpose: apply framing and narrative-competition frameworks to characterize each
    narrative and assess relative salience
- verb: search
  purpose: gather additional examples and engagement metrics across platforms to assess
    narrative reach
- verb: write
  purpose: produce a narrative competition map and assessment report
inputs:
- name: narrative_corpus
  type: list
  required: true
  description: A representative sample of texts, posts, or media items representing
    each competing narrative about the topic under analysis
- name: topic_definition
  type: text
  required: true
  description: The event, actor, policy, or situation that is the subject of narrative
    competition, with a defined time window
- name: engagement_metrics
  type: table
  required: false
  description: Platform engagement data (shares, views, reactions) per narrative item,
    used to assess relative salience and audience reach
outputs:
- name: narrative_competition_map
  type: table
  description: 'Structured comparison of competing narratives: core claim, emotional
    frame, target audience, propagation channels, estimated salience, rhetorical strengths,
    and identified vulnerabilities'
- name: competition_assessment_report
  type: markdown
  description: Analytical report covering narrative dynamics, salience trends, resilience
    factors, and recommendations for monitoring or protective intervention
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Entman, R.M. (1993). Framing: Toward clarification of a fractured paradigm. Journal
  of Communication, 43(4), 51-58.'
- Blackmore, S. (1999). The Meme Machine. Oxford University Press.
- 'Hutchinson, B. (2019). The narrative arms race: How propaganda evolves. First Draft.'
- 'Pamment, J., Nothhaft, H., Agardh-Twetman, H., & Fjällhed, A. (2018). Countering
  Information Influence Activities: A Handbook for Communicators. Swedish Civil Contingencies
  Agency (MSB).'
- Starbird, K. (2017). Examining the alternative media ecosystem through the production
  of alternative narratives of mass shooting events on Twitter. ICWSM.
defensive_boundary: 'Use Narrative Competition Analysis only for information-environment
  monitoring and platform-risk defense: recognize, assess, document, or defend platform
  integrity, narrative context, and authentic community behavior. Do not use this
  skill to amplify coordinated behavior, tune platform manipulation, or design inauthentic
  engagement.'
misuse_redirect: 'If a request asks Narrative Competition Analysis to amplify coordinated
  behavior, tune platform manipulation, or design inauthentic engagement, refuse that
  path and redirect to the safe defensive form: map supplied narratives, automation
  signals, or platform affordance risks for defensive review.'
evidence_requirements:
- For Narrative Competition Analysis, bind each finding to a labeled source — platform
  observations, narrative movement, automation signals, and provenance data, a cited
  reference, or an explicitly marked inference — and never present inference as observed
  evidence.
- For Narrative Competition Analysis, keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Narrative Competition Analysis recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Narrative Competition Analysis: independent lines of platform
  observations, narrative movement, automation signals, and provenance data converge,
  credible alternatives have been tested, and the conclusion would survive removing
  any single source.'
- 'Medium confidence for Narrative Competition Analysis: the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Narrative Competition Analysis: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Narrative Competition Analysis cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Narrative
  Competition Analysis should collect to separate the live alternatives.
privacy_legal_constraints:
- For Narrative Competition Analysis, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Narrative Competition Analysis, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Narrative Competition Analysis, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Narrative Competition Analysis failure: treating engagement volume as proof of
  authenticity or coordinated intent.'
- 'Narrative Competition Analysis failure: producing guidance that would help a requester
  amplify coordinated behavior, tune platform manipulation, or design inauthentic
  engagement.'
- 'Narrative Competition Analysis failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Narrative Competition Analysis to amplify coordinated behavior, tune
  platform manipulation, or design inauthentic engagement'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Narrative Competition Analysis into an operational playbook to amplify
  coordinated behavior, tune platform manipulation, or design inauthentic engagement''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Narrative Competition Analysis to map supplied narratives,
  automation signals, or platform affordance risks for defensive review'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
