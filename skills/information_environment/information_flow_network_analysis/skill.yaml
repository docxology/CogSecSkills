id: information_environment.information_flow_network_analysis
name: Information Flow Network Analysis
group: information_environment
version: 0.1.0
status: implemented
summary: Analyze how information propagates through a network to find amplifiers and
  bottlenecks.
description: Information Flow Network Analysis maps how specific content, narratives,
  or claims propagate through social and media networks by modeling the information
  environment as a directed graph of accounts, publications, and linking relationships.
  It identifies amplifiers (super-spreaders), gatekeepers (bottlenecks that shape
  what passes), bridges (cross-community connectors), and sinks (endpoints where narratives
  lose velocity). The technique draws on network science, computational social science,
  and OSINT tradecraft to characterize the structural conditions that enable or constrain
  narrative spread.
ageint_topic: information-environment
tags:
- cognitive-security
- information_environment
- network-analysis
triggers:
- how did this narrative spread
- map information flow
- find amplifiers in this network
- who are the super-spreaders
- network topology of this campaign
- trace content propagation
tools:
- verb: read
  purpose: ingest network edge data, post propagation chains, and account metadata
- verb: reason
  purpose: compute network metrics and identify structural roles (amplifiers, bridges,
    gatekeepers)
- verb: write
  purpose: produce a network analysis report with role classifications, flow maps,
    and defensive implications
inputs:
- name: propagation_data
  type: table
  required: true
  description: 'Directed edge list of content-sharing events: source account, target
    account or platform, content ID, timestamp — covering the narrative or campaign
    under analysis'
- name: narrative_seed
  type: text
  required: true
  description: The specific claim, hashtag, URL, or narrative fragment whose propagation
    is being traced
- name: account_metadata
  type: table
  required: false
  description: 'Supplementary account attributes: follower count, verified status,
    community affiliation, platform — used to weight edges and label nodes'
outputs:
- name: network_role_map
  type: table
  description: Per-account role classification (seed, amplifier, bridge, gatekeeper,
    sink), key network metrics (in-degree, out-degree, betweenness centrality, clustering
    coefficient), and influence estimate
- name: flow_analysis_report
  type: markdown
  description: Narrative description of the propagation pattern, identified structural
    vulnerabilities, community-crossing events, velocity timeline, and cognitive-security
    implications
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Vosoughi, S., Roy, D., & Aral, S. (2018). The spread of true and false news online.
  Science, 359(6380), 1146-1151.
- 'Benkler, Y., Faris, R., & Roberts, H. (2018). Network Propaganda: Manipulation,
  Disinformation, and Radicalization in American Politics. Oxford University Press.'
- Borgatti, S.P. (2005). Centrality and network flow. Social Networks, 27(1), 55-71.
- 'Starbird, K., Arif, A., & Wilson, T. (2019). Disinformation as collaborative work:
  Surfacing the participatory nature of strategic information operations. CSCW.'
defensive_boundary: 'Use Information Flow Network Analysis only for information-environment
  monitoring and platform-risk defense: recognize, assess, document, or defend platform
  integrity, narrative context, and authentic community behavior. Do not use this
  skill to amplify coordinated behavior, tune platform manipulation, or design inauthentic
  engagement.'
misuse_redirect: 'If a request asks Information Flow Network Analysis to amplify coordinated
  behavior, tune platform manipulation, or design inauthentic engagement, refuse that
  path and redirect to the safe defensive form: map supplied narratives, automation
  signals, or platform affordance risks for defensive review.'
evidence_requirements:
- For Information Flow Network Analysis, tie each network role map, and flow analysis
  report claim to concrete evidence from the specific propagation data, narrative
  seed, and account metadata item, source excerpt, observation, or command result
  that supports it.
- For Information Flow Network Analysis, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the network
  role map.
- Before recommending any Information Flow Network Analysis action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Information Flow Network Analysis: the network role map is supported by
  multiple independent platform observations, narrative movement, automation signals,
  and provenance data; construct the propagation graph and compute network metrics
  and classify roles checks agree, and no unresolved contradiction would change the
  result.'
- 'Medium for Information Flow Network Analysis: the network role map is plausible,
  but one important propagation data source, comparison case, or alternative explanation
  remains incomplete.'
- 'Low for Information Flow Network Analysis: the network role map rests on sparse,
  single-source, contested, or mostly inferential evidence; keep the result provisional
  and list the next check.'
uncertainty_handling:
- State what Information Flow Network Analysis cannot determine from the supplied
  or authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating information_environment evidence to collect when
  confidence is low or medium.
privacy_legal_constraints:
- For Information Flow Network Analysis, use only authorized propagation data, narrative
  seed, and account metadata, public or source-approved records, and caller-provided
  context needed for the defensive task.
- For Information Flow Network Analysis, minimize person-level detail in the network
  role map; prefer aggregate, artifact-level, role-level, or case-level summaries
  unless an individual is essential to the defensive question.
- For Information Flow Network Analysis, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Information Flow Network Analysis: treating propagation data as complete when construct
  the propagation graph and compute network metrics and classify roles checks or contradictory
  evidence are missing.'
- 'Information Flow Network Analysis: producing advice that would help a requester
  amplify coordinated behavior, tune platform manipulation, or design inauthentic
  engagement.'
- 'Information Flow Network Analysis: reporting the network role map without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Information Flow Network Analysis outputs to amplify coordinated
  behavior, tune platform manipulation, or design inauthentic engagement'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the network role map from Information Flow Network Analysis into
  an operational playbook to amplify coordinated behavior, tune platform manipulation,
  or design inauthentic engagement'' -> refuse and offer governance, detection, or
  mitigation analysis.'
- 'Safe defensive: ''Use Information Flow Network Analysis to map supplied narratives,
  automation signals, or platform affordance risks for defensive review with propagation
  data, narrative seed, and account metadata'' -> produce bounded findings with evidence
  and uncertainty labels.'
