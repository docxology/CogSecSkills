id: cognitive_security.epistemic_security_posture_review
description: Epistemic Security Posture Review assesses the structural integrity of
  how an organization forms, updates, and protects its beliefs about the world — evaluating
  whether its knowledge-acquisition and decision-support processes are resistant to
  manipulation, capture, and degradation. Drawing on epistemology, organizational
  learning theory, and cognitive-security frameworks (Benkler et al., Allenby & Garreau),
  it examines information sourcing, analytic culture, feedback mechanisms, and adversarial
  exposure. The output is a posture scorecard and remediation roadmap identifying
  the epistemic attack surfaces most likely to be exploited.
tags:
- cognitive-security
- cognitive_security
- organizational-resilience
- epistemics
triggers:
- epistemic security
- how does our organization know what it knows
- information environment audit
- epistemic posture
- epistemic resilience
- knowledge integrity review
- assess our defenses against disinformation
tools:
- verb: read
  purpose: ingest organizational documents, process descriptions, and prior audit
    findings that describe current epistemic practices
- verb: ask
  purpose: elicit structured information from stakeholders about sourcing, analytic
    culture, dissent channels, and adversarial awareness when documents are insufficient
- verb: reason
  purpose: evaluate practices against epistemic-security criteria, identify attack
    surfaces, and score posture dimensions
- verb: write
  purpose: produce the posture scorecard, vulnerability narrative, and prioritized
    remediation roadmap
inputs:
- name: organizational_profile
  type: text
  required: true
  description: 'Description of the organization: mission, decision-making context,
    adversarial exposure, and information environment it operates in'
- name: epistemic_practices
  type: text
  required: false
  description: Description of existing information-sourcing practices, analytic workflows,
    red-team or dissent mechanisms, and media/source policies
- name: known_incidents
  type: list
  required: false
  description: Previous instances of misinformation, manipulation, or information
    failure affecting organizational decisions
outputs:
- name: posture_scorecard
  type: table
  description: Dimension-by-dimension scoring (e.g., source diversity, analytic dissent
    culture, feedback loops, adversarial awareness, personnel training) with current
    maturity level and vulnerability rating
- name: attack_surface_narrative
  type: markdown
  description: Narrative description of the highest-priority epistemic vulnerabilities,
    how each could be exploited, and what adverse outcomes would follow
- name: remediation_roadmap
  type: markdown
  description: Prioritized list of concrete improvements with expected posture gain,
    implementation complexity, and owner recommendations
references:
- 'Benkler, Y., Faris, R. & Roberts, H. (2018). Network Propaganda: Manipulation,
  Disinformation, and Radicalization in American Politics. Oxford University Press.'
- 'Allenby, B. & Garreau, J. (2017). Weaponized Narrative: The New Battlespace. ASU
  Center on the Future of War.'
- 'Lewandowsky, S., Ecker, U. K. H., & Cook, J. (2017). Beyond Misinformation: Understanding
  and Coping with the ''Post-Truth'' Era. Journal of Applied Research in Memory and
  Cognition, 6(4), 353–369.'
- Mercier, H. & Sperber, D. (2017). The Enigma of Reason. Harvard University Press.
- 'Tetlock, P. E. & Gardner, D. (2015). Superforecasting: The Art and Science of Prediction.
  Crown Publishers.'
when_to_use:
- Before or after an organization has been targeted by disinformation or influence
  operations and needs a systematic vulnerability inventory
- During strategic planning cycles to assess whether epistemic infrastructure is adequate
  for the threat environment
- When leadership suspects analytic groupthink, source monoculture, or suppression
  of dissent is degrading decision quality
- As part of a broader organizational resilience audit for entities operating in high-adversarial-information
  environments
- When onboarding a new analytic team or restructuring intelligence/communications
  functions
what_it_produces:
- A multi-dimension posture scorecard rating current maturity on source diversity,
  analytic culture, feedback integrity, adversarial awareness, and training
- A ranked inventory of epistemic attack surfaces with concrete exploitation scenarios
  for each
- A prioritized remediation roadmap linking each vulnerability to a specific structural
  fix with implementation guidance
- Baseline metrics that can be re-administered periodically to track posture improvement
key_discipline:
- Epistemic security is structural, not individual — the unit of analysis is the organization's
  knowledge-formation process, not any one person's beliefs
- Distinguish closed epistemic loops (feedback tells the organization what it already
  believes) from open ones (evidence can overturn prior belief)
- 'An attack surface is an exploitable dependency: any single point of information
  supply, any suppressed dissent channel, any unverified source chain'
- Rate vulnerability by adversarial incentive x exploitability x impact on decisions
  — not just by theoretical weakness
workflow_steps:
- verbs:
  - read
  - ask
  title: Map the epistemic architecture
  text: 'Ingest available documentation of information-sourcing workflows, analytic
    processes, editorial or intelligence review chains, and dissent mechanisms. If
    documentation is sparse, ask targeted questions to key stakeholders covering:
    Where does the organization get its information? Who can challenge a dominant
    interpretation? How are errors or manipulation attempts reported and processed?'
- verbs:
  - reason
  title: Score posture dimensions
  text: 'Evaluate the architecture against six epistemic security dimensions: (1)
    Source diversity — is there single-point dependency or adversarially captureable
    monoculture? (2) Analytic culture — are challenge and dissent institutionally
    licensed? (3) Feedback integrity — do wrong beliefs get corrected or self-reinforced?
    (4) Adversarial awareness — does the organization model who is trying to manipulate
    it and how? (5) Personnel training — do staff recognize manipulation techniques
    and know escalation paths? (6) Boundary management — how does information from
    outside the organization enter and get vetted? Rate each 1–5 and flag critical
    gaps.'
- verbs:
  - reason
  title: Identify and rank attack surfaces
  text: 'From the dimension scores, enumerate exploitable attack surfaces. For each,
    describe: the specific structural weakness, the adversarial technique most likely
    to exploit it, the plausible downstream decision impact, and the detection difficulty.
    Rank surfaces by (adversarial incentive) x (exploitability) x (decision impact).'
- verbs:
  - write
  title: Produce scorecard and roadmap
  text: 'Write the posture scorecard as a structured table. Write the attack surface
    narrative for the top-ranked vulnerabilities. Write the remediation roadmap: for
    each vulnerability, specify the structural fix, expected posture gain, implementation
    complexity (low/medium/high), and recommended owner. Sequence recommendations
    by urgency and dependency.'
anti_criteria:
- Do not reduce epistemic security to media literacy training for individuals — the
  review must assess structural and organizational factors
- Do not score dimensions without evidence; if information is unavailable, mark the
  gap explicitly rather than assuming baseline competence
- Do not produce a roadmap that only addresses the most visible problem — single-point
  fixes in complex epistemic systems often shift the attack surface rather than reducing
  it
- Do not conflate information security (CIA triad for data) with epistemic security
  — they overlap but the core threats and mitigations differ substantially
defensive_boundary: 'Use Epistemic Security Posture Review only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Epistemic Security Posture Review to increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation,
  refuse that path and redirect to the safe defensive form: assess supplied material
  for manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Epistemic Security Posture Review, bind each finding to a labeled source — content,
  behavioral, narrative, media, and audience-risk evidence, a cited reference, or
  an explicitly marked inference — and never present inference as observed evidence.
- For Epistemic Security Posture Review, keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Epistemic Security Posture Review recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Epistemic Security Posture Review: independent lines of content,
  behavioral, narrative, media, and audience-risk evidence converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Epistemic Security Posture Review: the evidence supports
  the conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Epistemic Security Posture Review: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Epistemic Security Posture Review cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Epistemic
  Security Posture Review should collect to separate the live alternatives.
privacy_legal_constraints:
- For Epistemic Security Posture Review, use only data the caller is authorized to
  analyze, drawn from public or source-approved records.
- For Epistemic Security Posture Review, protect privacy by preferring aggregate,
  role-level, or artifact-level summaries over individual targeting unless an individual
  is essential to the defensive question.
- For Epistemic Security Posture Review, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Epistemic Security Posture Review failure: mistaking persuasive resonance for verified
  harm or intent.'
- 'Epistemic Security Posture Review failure: producing guidance that would help a
  requester increase persuasive impact, exploit audience vulnerabilities, or optimize
  narrative manipulation.'
- 'Epistemic Security Posture Review failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Epistemic Security Posture Review to increase persuasive impact,
  exploit audience vulnerabilities, or optimize narrative manipulation'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Turn Epistemic Security Posture Review into an operational playbook to
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation'' -> refuse and offer governance, detection, or mitigation analysis
  instead.'
- 'Safe defensive: ''Use Epistemic Security Posture Review to assess supplied material
  for manipulation indicators and recommend resilience measures'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
