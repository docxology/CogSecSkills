id: critical_review.red_team_review
description: Red-Team Review adversarially stresses an artifact — a plan, policy,
  argument, model, system, or narrative — to find failure modes, attack surfaces,
  and exploitable assumptions that the authors did not anticipate. Drawing on the
  structured analytic tradition of Devil's Advocacy and structured Team A/Team B analysis,
  the security tradition of adversarial red teaming, and the structured attack decomposition
  of threat modeling, the reviewer deliberately adopts an opposing or adversarial
  stance and builds the strongest possible critique, attack, or counter-narrative
  the artifact could face. Devil's Advocacy is a single analyst (or this skill) constructing
  the strongest contrary case against the prevailing view; structured Team A/Team
  B uses two independent teams that produce competing products to be adjudicated.
  This skill emulates the contrary case as one product and flags Team A/Team B as
  the heavier alternative when shared assumptions between reviewer and author are
  the real risk. The output is a ranked catalog of vulnerabilities, exploitation paths,
  compounding attack chains, mitigations, and an explicit go / no-go recommendation
  — not a balanced review. The goal is maximum stress, not fairness. In cognitive-security
  contexts this includes identifying how a disinformation actor or manipulative adversary
  could exploit a proposed policy, narrative, or analytical product.
tags:
- cognitive-security
- critical_review
- adversarial
- challenge-analysis
triggers:
- red team
- stress test
- adversarial review
- poke holes
- attack this plan
- devil's advocate
- what could go wrong
- find the flaw
- threat model this
- attack surface
- exploitability and impact
- go/no-go decision
tools:
- verb: read
  purpose: ingest the artifact and extract its stated goals, assumptions, dependencies,
    trust boundaries, and design rationale into an enumerable target set
- verb: reason
  purpose: build the adversary model, enumerate the attack surface, invert assumptions,
    trace compounding chains, and rank vulnerabilities by exploitability times impact
- verb: write
  purpose: produce the ranked vulnerability catalog, adversarial narrative, mitigations,
    and the explicit go / no-go / go-with-conditions recommendation
inputs:
- name: artifact
  type: text
  required: true
  description: the plan, policy, argument, model, system, or narrative to be stress-tested
- name: adversary_profile
  type: text
  required: false
  description: a description of the adversary whose perspective the red team should
    adopt, decomposed into intent, capability and resources, access, and risk tolerance
- name: review_scope
  type: list
  required: false
  description: specific dimensions to focus on (e.g., logical, operational, technical,
    informational, reputational)
outputs:
- name: vulnerability_catalog
  type: table
  description: rows = identified vulnerability or failure mode; columns = id, category/dimension,
    description, artifact-map reference, exploitation path, exploitability (1-5),
    impact (1-5), priority band, inherent-or-remediable, mitigation
- name: red_team_narrative
  type: markdown
  description: adversarial narrative — the strongest case against the artifact, written
    from the opposing perspective and routed through the highest-priority compounding
    chains, followed by mitigations and an explicit go / no-go recommendation
references:
- Heuer, R. J. & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis (2nd ed.), Ch. 7 (Devil's Advocacy, Team A/Team B). CQ Press.
- 'Zenko, M. (2015). Red Team: How to Succeed by Thinking Like the Enemy. Basic Books.'
- NIST SP 800-115 (2008). Technical Guide to Information Security Testing and Assessment.
  §4.3 Adversarial Techniques.
- Chang, W. & Tetlock, P. (2016). Rethinking the Training of Intelligence Analysts.
  Intelligence and National Security 31(6).
- 'Shostack, A. (2014). Threat Modeling: Designing for Security. Wiley. (trust boundaries,
  entry-point enumeration, structured attack decomposition).'
- MITRE ATT&CK (attack.mitre.org) — adversary tactics, techniques, and procedures
  taxonomy, for grounding capability and access modeling.
when_to_use:
- before committing to a plan, policy, or analytical judgment where overconfidence
  or groupthink is plausible
- when a narrative or information campaign needs to be evaluated for exploitability
  by an adversary
- when a proposed cognitive-security countermeasure needs stress-testing before deployment
- when an analytical product has been produced by a team with shared assumptions and
  an independent adversarial check is warranted
- when an organization needs to identify how an adversary would undermine a proposed
  decision or communication
- when the existing analysis was produced inside a single shared frame and a single
  strong contrary case is wanted (Devil's Advocacy posture) — as opposed to when the
  stakes justify two independent teams building competing products to be adjudicated
  (structured Team A/Team B), which this skill emulates as one product but should
  flag as a heavier alternative
what_it_produces:
- a ranked vulnerability catalog with exploitation paths, exploitability and impact
  scores, priority bands, and mitigations for each identified failure mode
- an adversarial narrative — the strongest case an opposing actor could make against
  the artifact, routed through the highest-priority compounding attack chains
- explicit compounding chains showing how a low-impact flaw can unlock a high-impact
  one, re-banded to the worst outcome the chain reaches
- a set of mitigation recommendations addressing the highest-priority vulnerabilities,
  each re-tested against the modeled adversary to confirm it holds
- an explicit classification of each top vulnerability as inherent (informs go/no-go)
  or remediable (receives a mitigation)
- a go / no-go / go-with-conditions recommendation that states the residual risk a
  decision-maker would accept if the artifact proceeds unchanged
key_discipline:
- commit fully to the adversarial perspective — half-hearted red teaming produces
  the illusion of scrutiny without the substance
- make exploitability and impact concrete before ranking — rate exploitability by
  the modeled adversary's required capability and access (trivial / feasible-with-effort
  / requires-rare-capability) and impact by consequence to the artifact's goal (cosmetic
  / degrading / mission-defeating), then rank on the product so a trivially exploitable
  mission-defeating flaw outranks a hard-to-reach cosmetic one
- rank vulnerabilities by exploitability times impact, never by how uncomfortable
  they are to surface or by the seniority of whoever introduced them
- the red team's job is to find failure modes, not to balance them against strengths
  — balance is for the final synthesis, not the red team phase
- distinguish vulnerabilities that are inherent to the approach from those that are
  remediable — remediable ones get mitigations, inherent ones plus any high-exploitability
  high-impact chain that mitigations cannot fully close feed the go/no-go call
workflow_steps:
- verbs:
  - read
  title: Ingest and model the adversary
  text: 'Read the artifact end to end. Reason out two structured tables. (a) ARTIFACT
    MAP: list every load-bearing claim, stated assumption, dependency, and trust boundary,
    each with the line or section it comes from — this is the target set Step 2 must
    cover. (b) ADVERSARY PROFILE: if one was supplied, internalize it; otherwise construct
    one with explicit fields — Intent (what outcome the adversary wants the artifact
    to produce or fail to produce), Capability and Resources (skills, tooling, funding,
    time, insider access, compute), Access (where the adversary can touch the artifact
    — its entry points and trust boundaries), and Risk Tolerance (how much exposure
    the adversary will accept). Name at least one concrete adversary archetype (e.g.
    disinformation operator, malicious insider, resource-constrained external attacker)
    rather than a generic critic. Where no profile is supplied, construct the model
    from who most benefits if the artifact fails, and state it as assumptions to be
    tested, not facts. Every later finding must reference a row in the ARTIFACT MAP
    and an entry in the ADVERSARY PROFILE.'
- verbs:
  - reason
  title: Enumerate the attack surface
  text: 'Adopt the adversary profile fully. Walk every row of the ARTIFACT MAP against
    this checklist and record at least one probe result — a vulnerability or an explicit
    "no finding" — per applicable cell. LOGICAL: which assumptions are false, unstated,
    or attackable; where the argument depends on a premise the adversary can deny
    or falsify. OPERATIONAL: which execution steps can be delayed, starved of inputs,
    mis-sequenced, or disrupted; what single points of failure exist. TECHNICAL: which
    design or implementation gaps are exploitable; what inputs are unvalidated; where
    trust boundaries leak. INFORMATIONAL: how the artifact can be selectively quoted,
    reframed, or weaponized in the information environment; what narrative an adversary
    builds from it. REPUTATIONAL: how the artifact can be turned against its own authors
    or sponsors. For each finding record the ARTIFACT MAP row, the dimension, a one-line
    description, and the adversary capability it requires. Generate without filtering
    for comfort. Before leaving this step, confirm every ARTIFACT MAP row was probed
    in every applicable dimension and flag any cell left blank as a coverage gap,
    not a clean result.'
- verbs:
  - reason
  title: Invert assumptions and trace compounding chains
  text: For each key assumption in the ARTIFACT MAP, ask what the adversary gains
    if it is false, and treat the inverted assumption as a candidate vulnerability.
    Then connect individual vulnerabilities into compounding attack chains, writing
    each as an ordered sequence (Finding A unlocks Finding B escalates to outcome
    C). A chain's impact is the worst outcome it reaches, which can exceed any single
    link's score, so a low-impact flaw that unlocks a high-impact one is a high-priority
    chain even if each link looks minor alone. Record the chains explicitly — the
    worst real-world failures are sequences, not single points.
- verbs:
  - reason
  title: Score and rank by exploitability times impact
  text: 'Score every finding and chain on two 1-5 axes against the modeled adversary.
    EXPLOITABILITY (1 = requires capabilities or access the adversary lacks; 3 = feasible
    with moderate effort within the profile; 5 = trivial, the adversary can do it
    now with no special access). IMPACT (1 = cosmetic or easily absorbed; 3 = meaningful
    degradation of the artifact''s goal; 5 = catastrophic, defeats the core objective
    or causes irreversible harm). Compute Priority = Exploitability times Impact (range
    1-25) and assign a band: CRITICAL (15 or more), HIGH (9-14), MEDIUM (4-8), LOW
    (below 4). Re-band each chain to the worst outcome it reaches. Record a one-line
    justification for each axis score so the rating is auditable, not asserted. Select
    every CRITICAL and HIGH finding for deep treatment in Step 5; carry MEDIUM and
    LOW into the catalog with scores only.'
- verbs:
  - reason
  - write
  title: Write the adversarial narrative and test mitigations
  text: Write the adversarial narrative as the strongest coherent case the modeled
    adversary would make against the artifact, in their voice, routing through the
    highest-priority compounding chains rather than listing isolated concerns. Then
    shift back to analyst and write one specific, actionable mitigation per CRITICAL
    or HIGH finding. For each mitigation, re-run the same adversary against it in
    one line — does the fix hold, or does the adversary route around it? Discard or
    strengthen any mitigation that merely restates the existing design without substantive
    change.
- verbs:
  - write
  title: Compile catalog and render the go/no-go recommendation
  text: 'Produce the ranked vulnerability catalog table with columns id, category
    or dimension, description, ARTIFACT MAP reference, exploitation path, exploitability
    (1-5), impact (1-5), priority band, inherent-or-remediable, and mitigation, sorted
    by priority descending. Partition findings into REMEDIABLE (a substantive mitigation
    reduces the band) and INHERENT (no mitigation short of abandoning or redesigning
    the approach removes the risk). Finalize the adversarial narrative and the compounding
    chains. Close with an explicit GO / NO-GO / GO-WITH-CONDITIONS recommendation:
    NO-GO if any INHERENT finding is CRITICAL; GO-WITH-CONDITIONS if all CRITICAL
    and HIGH findings are remediable, listing the mitigations that are preconditions;
    GO only if no CRITICAL or HIGH finding remains after mitigation. State the residual
    risk that remains under the recommended path.'
anti_criteria:
- do not soften the adversarial perspective — an incomplete red team that avoids uncomfortable
  findings provides false assurance
- do not conflate a red-team review with a balanced review — the goal is maximum stress,
  not balance
- do not rank vulnerabilities by how senior the person who introduced them is
- do not terminate the review after finding the first major vulnerability — the worst
  flaw often compounds with secondary ones
- do not produce mitigations that merely restate the existing design without substantive
  change
- do not let the red team inherit the author's framing and vocabulary — if the critique
  reuses the artifact's own assumptions and definitions it is a sanity check, not
  an adversarial review, and the most dangerous shared blind spots go unexamined
- do not record a vulnerability without a reference to a specific ARTIFACT MAP row
  and the adversary capability it requires — ungrounded findings are speculation,
  not red-teaming
- do not assign a priority band without both an exploitability and an impact score
  with stated justification — unscored rankings are unreproducible
- do not report fewer dimensions probed than apply to the artifact — a dimension skipped
  without an explicit no-finding note is a coverage gap masquerading as a clean result
- do not present the exploitability and impact scores or the resulting go/no-go as
  objective measurement — they are calibrated analyst estimates against a modeled
  adversary, two reviewers may reasonably differ by a band, and the go/no-go is a
  recommendation for human adjudication, not an automated verdict; peer-check the
  scores behind every CRITICAL or HIGH finding before the go/no-go is acted on
defensive_boundary: 'Use Red-Team Review only for critical review and assurance: recognize,
  assess, document, or defend evidence quality, implementation integrity, and decision
  accountability. Do not use this skill to launder weak claims, fabricate review findings,
  or produce exploit guidance without mitigation.'
misuse_redirect: 'If a request asks Red-Team Review to launder weak claims, fabricate
  review findings, or produce exploit guidance without mitigation, refuse that path
  and redirect to the safe defensive form: review supplied artifacts for defects,
  evidence gaps, safety risks, or reproducibility failures.'
evidence_requirements:
- For Red-Team Review, tie every entry in the vulnerability catalog and every claim
  in the red-team narrative to concrete evidence — a quoted excerpt from the artifact,
  a referenced row of the artifact map, a stated capability in the adversary profile,
  a review-scope item, an observation, or a command result — and name the adversary
  capability that would turn that evidence into an exploit. A vulnerability with no
  cited evidence and no plausible exploitation path is a speculation, not a finding,
  and is labelled as such.
- For Red-Team Review, label observations, derived features, assumptions, and inferences
  (each marked as inference, not evidence) separately before writing the vulnerability
  catalog, so a reader can tell what was seen from what was reasoned.
- Before recommending any Red-Team Review go/no-go action, identify the weakest evidence
  link behind the highest-ranked finding, the alternative adversary model most likely
  to overturn it, and the next discriminating check that would settle it.
confidence_rubric:
- 'High for Red-Team Review: the highest-ranked vulnerabilities are each tied to specific
  artifact excerpts and a coherent adversary capability, the exploitability-by-impact
  ranking is stable when any single excerpt is removed, the adversary model and the
  enumerated attack surface are mutually consistent, and no unresolved contradiction
  in the adversarial narrative would change the go/no-go conclusion.'
- 'Medium for Red-Team Review: the vulnerability catalog is plausible, but one important
  artifact source, comparison case, or alternative adversary model remains incomplete.'
- 'Low for Red-Team Review: the vulnerability catalog rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next discriminating check.'
uncertainty_handling:
- State what Red-Team Review cannot determine from the supplied or authorized evidence,
  including which attack paths remain unknown.
- Preserve credible alternative adversary models and exploitation hypotheses rather
  than forcing a single worst-case narrative or attribution.
- Recommend the next discriminating piece of evidence to collect when confidence is
  low or medium, and name the alternative adversary model it would help rule out.
- Treat exploitability and impact scores as analyst estimates, not measurements; flag
  findings where two reviewers could reasonably score differently, and state that
  the priority bands and go/no-go are calibrated judgments to be peer-checked rather
  than objective values.
privacy_legal_constraints:
- For Red-Team Review, use only the authorized artifact, adversary profile, and review
  scope, together with public or source-approved records and the caller-provided context
  needed for the defensive task.
- For Red-Team Review, minimize person-level detail in the vulnerability catalog;
  prefer aggregate, artifact-level, role-level, or case-level summaries unless an
  individual is essential to the defensive question.
- For Red-Team Review, do not infer protected traits, private identity, intent, location,
  legal culpability, or platform account ownership beyond the supplied and authorized
  evidence.
failure_modes:
- 'Red-Team Review: declaring the artifact stress-tested when the adversary model
  was never grounded (no intent, capability, or access assumptions) or the attack-surface
  enumeration skipped a relevant dimension (logical, operational, technical, informational,
  reputational), so the absence of findings reflects an incomplete review rather than
  a hardened artifact.'
- 'Red-Team Review: producing advice that would help a requester launder weak claims,
  fabricate review findings, or produce exploit guidance without mitigation.'
- 'Red-Team Review: reporting the vulnerability catalog without uncertainty labels,
  alternative adversary models, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Red-Team Review outputs to launder weak claims, fabricate review
  findings, or produce exploit guidance without mitigation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Convert the Red-Team Review vulnerability catalog into a deployable attack
  recipe with no mitigations'' -> refuse and offer governance, detection, or mitigation
  analysis of the same vulnerabilities instead.'
- 'Safe defensive: ''Use Red-Team Review to review supplied artifacts for defects,
  evidence gaps, safety risks, or reproducibility failures with artifact, adversary
  profile, and review scope'' -> produce a bounded vulnerability catalog and adversarial
  narrative with evidence labels, uncertainty labels, and a go/no-go recommendation.'
