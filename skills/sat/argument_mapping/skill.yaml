id: sat.argument_mapping
name: Argument Mapping
group: sat
version: 0.1.0
status: implemented
summary: Diagram claims, premises, and inferential links to expose logical structure
  and gaps.
description: Argument Mapping (also called argument diagramming or claim-premise visualization)
  represents the logical structure of a complex argument as a directed graph of claims,
  sub-claims, premises, evidence nodes, and inferential connectors — showing which
  conclusions depend on which premises and where inferential gaps, circular reasoning,
  or unsupported leaps occur. Originating in informal logic and philosophy of reasoning
  (van Eemeren, Toulmin), it was adapted for intelligence analysis by Pherson and
  applied in cognitive-security contexts to expose the structural vulnerabilities
  of narratives and the load-bearing assumptions that, if undermined, collapse the
  whole argument. It is the diagnostic complement to Red Team critique.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- logical-analysis
- narrative-deconstruction
triggers:
- argument mapping
- diagram the argument
- map the logic
- what does this conclusion depend on
- find the load-bearing assumptions
- expose the reasoning structure
- claim-premise diagram
tools:
- verb: read
  purpose: ingest the argument, narrative, report, or policy document to be mapped
- verb: reason
  purpose: identify claims, sub-claims, premises, evidence, inferential connectors,
    implicit assumptions, and logical gaps
- verb: write
  purpose: produce the argument map in structured notation, a vulnerability assessment,
    and a load-bearing-assumption report
inputs:
- name: argument_source
  type: text
  required: true
  description: The text, narrative, report, or argument to be mapped — can be an analytic
    product, an influence narrative, or an adversary's stated justification
- name: focal_claim
  type: text
  required: false
  description: The main conclusion or claim to trace, if the source contains multiple
    independent arguments
outputs:
- name: argument_map
  type: markdown
  description: A structured representation of the argument showing the top-level claim,
    supporting sub-claims and premises, evidence citations, inferential connectors
    (supports / rebuts / qualifies), and flagged gaps or implicit assumptions
- name: load_bearing_assumption_list
  type: table
  description: A ranked list of the assumptions whose falsification would most damage
    or collapse the conclusion, with confidence ratings and suggested tests
- name: logical_gap_report
  type: markdown
  description: Description of inferential leaps, missing evidence nodes, circular
    structures, or equivocations found in the argument
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Toulmin, S. (1958). The Uses of Argument. Cambridge University Press.
- van Eemeren, F. H., & Grootendorst, R. (2004). A Systematic Theory of Argumentation.
  Cambridge University Press.
- Pherson, R. H., & Pherson, K. H. (2021). Critical Thinking for Strategic Intelligence
  (3rd ed.). CQ Press.
- Heuer, R. J., & Pherson, R. H. (2015). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press.
- Ratcliffe, J. (2008). Intelligence-Led Policing. Willan Publishing. (Chapter on
  analytical reasoning structure)
defensive_boundary: 'Use Argument Mapping only for structured analytic technique support:
  recognize, assess, document, or defend analytic rigor, alternative hypotheses, and
  calibrated judgment. Do not use this skill to force a preferred conclusion, hide
  uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Argument Mapping to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Argument Mapping, tie each argument map, load bearing assumption list, and logical
  gap report claim to concrete evidence from the specific argument source, and focal
  claim item, source excerpt, observation, or command result that supports it.
- For Argument Mapping, label observations, derived features, assumptions, inferences,
  contradictions, and missing inputs separately before writing the argument map.
- Before recommending any Argument Mapping action, identify the weakest evidence link,
  the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Argument Mapping: the argument map is supported by multiple independent
  hypotheses, assumptions, indicators, evidence tables, and confidence notes; identify
  the top-level conclusion and extract claims, premises, and evidence checks agree,
  and no unresolved contradiction would change the result.'
- 'Medium for Argument Mapping: the argument map is plausible, but one important argument
  source source, comparison case, or alternative explanation remains incomplete.'
- 'Low for Argument Mapping: the argument map rests on sparse, single-source, contested,
  or mostly inferential evidence; keep the result provisional and list the next check.'
uncertainty_handling:
- State what Argument Mapping cannot determine from the supplied or authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating sat evidence to collect when confidence is low
  or medium.
privacy_legal_constraints:
- For Argument Mapping, use only authorized argument source, and focal claim, public
  or source-approved records, and caller-provided context needed for the defensive
  task.
- For Argument Mapping, minimize person-level detail in the argument map; prefer aggregate,
  artifact-level, role-level, or case-level summaries unless an individual is essential
  to the defensive question.
- For Argument Mapping, do not infer protected traits, private identity, intent, location,
  legal culpability, or platform account ownership beyond the supplied and authorized
  evidence.
failure_modes:
- 'Argument Mapping: treating argument source as complete when identify the top-level
  conclusion and extract claims, premises, and evidence checks or contradictory evidence
  are missing.'
- 'Argument Mapping: producing advice that would help a requester force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Argument Mapping: reporting the argument map without uncertainty labels, alternative
  explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Argument Mapping outputs to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Convert the argument map from Argument Mapping into an operational playbook
  to force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation'' -> refuse and offer governance, detection, or mitigation analysis.'
- 'Safe defensive: ''Use Argument Mapping to apply the structured technique to supplied
  evidence while preserving alternatives and uncertainty with argument source, and
  focal claim'' -> produce bounded findings with evidence and uncertainty labels.'
