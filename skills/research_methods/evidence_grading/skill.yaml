id: research_methods.evidence_grading
name: Evidence Grading
group: research_methods
version: 0.1.0
status: implemented
summary: Grade evidence by quality and relevance using an explicit, repeatable rubric.
description: Evidence Grading is a structured technique for systematically rating
  each piece of evidence on two independent axes — quality (methodological rigor,
  source reliability, and internal validity) and relevance (how directly the evidence
  addresses the analytic question at hand) — using an explicit, repeatable rubric
  so that different analysts reach consistent grades from the same materials. The
  technique prevents high-quality-but-irrelevant evidence from inflating confidence
  in a conclusion, and high-relevance-but-low-quality evidence from anchoring judgments.
  It is foundational to systematic reviews, intelligence source evaluation, and any
  workflow where heterogeneous evidence must be compared or weighted.
ageint_topic: research-methods
tags:
- cognitive-security
- research_methods
- evidence-evaluation
- analytic-standards
triggers:
- grade this evidence
- rate source quality
- evidence quality assessment
- how reliable is this source
- weigh the evidence
- evaluate evidence strength
tools:
- verb: read
  purpose: ingest the analytic question and the evidence items with their provenance
    metadata
- verb: reason
  purpose: apply quality and relevance rubric criteria to each evidence item and derive
    grades
- verb: write
  purpose: emit a graded evidence table with per-item scores and an aggregated weight-of-evidence
    summary
inputs:
- name: analytic_question
  type: text
  required: true
  description: the specific question or hypothesis the evidence is meant to address
- name: evidence_items
  type: list
  required: true
  description: 'list of evidence items, each with: content summary, source type, provenance,
    date, and any known collection or reporting limitations'
- name: grading_rubric
  type: text
  required: false
  description: optional custom rubric; if omitted the technique uses the standard
    ODNI/Heuer-Pherson quality tiers (A-F for source reliability, 1-6 for information
    credibility)
outputs:
- name: graded_evidence_table
  type: table
  description: table with one row per evidence item, columns for quality grade, relevance
    grade, composite weight, and a brief justification note for each grade
- name: weight_of_evidence_summary
  type: markdown
  description: narrative summary of where the body of evidence points, which grades
    dominate, and what gaps or contradictions exist
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Heuer, R. J., & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis (2nd ed.). CQ Press. (NATO STANAG 2511 source reliability / information
  credibility matrix, pp. 60-62.)
- 'Guyatt, G. H., et al. (2008). GRADE: An Emerging Consensus on Rating Quality of
  Evidence and Strength of Recommendations. BMJ, 336(7650), 924-926.'
- 'Office of the Director of National Intelligence (2015). ICD 203: Analytic Standards.
  ODNI.'
- Pherson, R. H., & Pherson, K. H. (2020). Critical Thinking for Strategic Intelligence
  (3rd ed.). CQ Press.
defensive_boundary: 'Use Evidence Grading only for research-methods and synthesis
  integrity: recognize, assess, document, or defend reproducibility, calibrated confidence,
  and transparent synthesis. Do not use this skill to cherry-pick sources, fabricate
  citations, or overstate certainty from weak evidence.'
misuse_redirect: 'If a request asks Evidence Grading to cherry-pick sources, fabricate
  citations, or overstate certainty from weak evidence, refuse that path and redirect
  to the safe defensive form: synthesize supplied or authorized sources with explicit
  confidence and uncertainty labels.'
evidence_requirements:
- For Evidence Grading, tie each graded evidence table, and weight of evidence summary
  claim to concrete evidence from the specific analytic question, evidence items,
  and grading rubric item, source excerpt, observation, or command result that supports
  it.
- For Evidence Grading, label observations, derived features, assumptions, inferences,
  contradictions, and missing inputs separately before writing the graded evidence
  table.
- Before recommending any Evidence Grading action, identify the weakest evidence link,
  the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Evidence Grading: the graded evidence table is supported by multiple independent
  study designs, source quality, reproducibility artifacts, and uncertainty records;
  inventory and characterize each evidence item and grade quality for each item checks
  agree, and no unresolved contradiction would change the result.'
- 'Medium for Evidence Grading: the graded evidence table is plausible, but one important
  analytic question source, comparison case, or alternative explanation remains incomplete.'
- 'Low for Evidence Grading: the graded evidence table rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Evidence Grading cannot determine from the supplied or authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating research_methods evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Evidence Grading, use only authorized analytic question, evidence items, and
  grading rubric, public or source-approved records, and caller-provided context needed
  for the defensive task.
- For Evidence Grading, minimize person-level detail in the graded evidence table;
  prefer aggregate, artifact-level, role-level, or case-level summaries unless an
  individual is essential to the defensive question.
- For Evidence Grading, do not infer protected traits, private identity, intent, location,
  legal culpability, or platform account ownership beyond the supplied and authorized
  evidence.
failure_modes:
- 'Evidence Grading: treating analytic question as complete when inventory and characterize
  each evidence item and grade quality for each item checks or contradictory evidence
  are missing.'
- 'Evidence Grading: producing advice that would help a requester cherry-pick sources,
  fabricate citations, or overstate certainty from weak evidence.'
- 'Evidence Grading: reporting the graded evidence table without uncertainty labels,
  alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Evidence Grading outputs to cherry-pick sources, fabricate citations,
  or overstate certainty from weak evidence'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Convert the graded evidence table from Evidence Grading into an operational
  playbook to cherry-pick sources, fabricate citations, or overstate certainty from
  weak evidence'' -> refuse and offer governance, detection, or mitigation analysis.'
- 'Safe defensive: ''Use Evidence Grading to synthesize supplied or authorized sources
  with explicit confidence and uncertainty labels with analytic question, evidence
  items, and grading rubric'' -> produce bounded findings with evidence and uncertainty
  labels.'
