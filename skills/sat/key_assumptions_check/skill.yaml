id: sat.key_assumptions_check
name: Key Assumptions Check
group: sat
version: 0.1.0
status: implemented
summary: Surface, classify, and stress-test the load-bearing assumptions an analysis
  rests on.
description: 'The Key Assumptions Check (Heuer & Pherson) makes explicit the stated
  and UNSTATED beliefs an analytic line silently depends on, then interrogates each:
  why we believe it, what evidence supports it, and under what conditions it would
  NOT hold. Each assumption is classified as solid, caveated, unsupported, or a key
  uncertainty, and the few that are both load-bearing AND uncertain are flagged as
  "key assumptions". The decisive question for each is "if this assumption is wrong,
  does the conclusion collapse?" — the technique rewrites the judgment to expose that
  dependence and names the collection that would test it.'
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- assumptions
- heuer
triggers:
- key assumptions check
- what are we assuming
- check our assumptions
- what is this analysis taking for granted
- which assumptions are load-bearing
tools:
- verb: read
  purpose: ingest the analytic line, judgment, and the evidence cited for it
- verb: reason
  purpose: surface unstated assumptions, test each, and classify confidence
- verb: write
  purpose: emit the assumptions table, key-assumption flags, and rewritten judgment
inputs:
- name: judgment
  type: text
  required: true
  description: the analytic conclusion or estimate to be examined
- name: analytic_line
  type: text
  required: false
  description: the reasoning, evidence, and arguments leading to the judgment
- name: stated_assumptions
  type: list[str]
  required: false
  description: assumptions the author has already made explicit, if any
outputs:
- name: assumptions_table
  type: table
  description: every stated and unstated assumption with rationale, contrary conditions,
    and confidence class
- name: key_assumptions
  type: markdown
  description: the load-bearing and uncertain assumptions, with collapse analysis
- name: revised_judgment
  type: markdown
  description: the conclusion rewritten to expose its dependence on key assumptions,
    plus collection that would test them
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Heuer & Pherson (2014). Structured Analytic Techniques for Intelligence Analysis.
defensive_boundary: 'Use Key Assumptions Check only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Key Assumptions Check to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Key Assumptions Check, bind each finding to a labeled source — hypotheses, assumptions,
  indicators, evidence tables, and confidence notes, a cited reference, or an explicitly
  marked inference — and never present inference as observed evidence.
- For Key Assumptions Check, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Key Assumptions Check recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Key Assumptions Check: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Key Assumptions Check: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Key Assumptions Check: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Key Assumptions Check cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Key
  Assumptions Check should collect to separate the live alternatives.
privacy_legal_constraints:
- For Key Assumptions Check, use only data the caller is authorized to analyze, drawn
  from public or source-approved records.
- For Key Assumptions Check, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Key Assumptions Check, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Key Assumptions Check failure: using the method as a checklist while skipping diagnostic
  evidence and disconfirming tests.'
- 'Key Assumptions Check failure: producing guidance that would help a requester force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Key Assumptions Check failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Key Assumptions Check to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Key Assumptions Check into an operational playbook to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Key Assumptions Check to apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
