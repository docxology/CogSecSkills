id: osint_integrity.geolocation_verification
name: Geolocation Verification
group: osint_integrity
version: 0.1.0
status: implemented
summary: Confirm where imagery was taken using corroborating geographic features (defensive
  OSINT).
description: Geolocation verification cross-references visual and contextual clues
  in imagery — terrain, vegetation, architecture, shadows, signage, infrastructure
  — against authoritative mapping data to confirm or refute a claimed location. It
  is a defensive OSINT discipline used to detect context-collapsed or fabricated imagery
  before it is treated as evidence. The technique draws on sun-angle computation,
  map comparison, satellite imagery, and street-level reference data. It provides
  an independently verifiable anchor for where and when a visual was plausibly captured.
ageint_topic: osint-integrity
tags:
- cognitive-security
- osint_integrity
- media-verification
triggers:
- verify where this image was taken
- confirm the location of this footage
- geolocate this photo
- is this image from where it claims
- geolocation verification
tools:
- verb: read
  purpose: ingest the image, its metadata, and any claimed location context
- verb: web
  purpose: query satellite imagery, street-level mapping, and sun-angle calculators
    to find matching features
- verb: reason
  purpose: triangulate geographic features across multiple reference sources and assess
    consistency of shadow angles and landmarks
- verb: write
  purpose: produce a structured geolocation assessment with confidence rating and
    supporting evidence
inputs:
- name: image_or_video
  type: text
  required: true
  description: URL, file reference, or description of the visual content to be geolocated
- name: claimed_location
  type: text
  required: false
  description: The location the image or video is claimed to depict, if stated
- name: claimed_date_time
  type: text
  required: false
  description: Stated date and time of capture, used for shadow-angle and vegetation
    cross-checks
outputs:
- name: geolocation_assessment
  type: markdown
  description: 'Structured report: candidate location(s) with confidence level, corroborating
    features, contradictory signals, and methodology notes'
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Bellingcat Geolocation Investigation Handbook (2021). bellingcat.com.
- 'Toler, A. (2023). How to Geolocate Images: A Bellingcat Guide. Bellingcat.'
- 'Hicks, M. (2020). Verification Handbook: For Disinformation and Media Manipulation.
  European Journalism Centre.'
defensive_boundary: 'Use Geolocation Verification only for OSINT integrity and source-verification
  defense: recognize, assess, document, or defend source provenance, privacy, chain
  of custody, and public-source accountability. Do not use this skill to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence.'
misuse_redirect: 'If a request asks Geolocation Verification to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence, refuse that
  path and redirect to the safe defensive form: verify supplied claims, media, sources,
  or datasets with documented public-source methods.'
evidence_requirements:
- For Geolocation Verification, bind each finding to a labeled source — source records,
  custody notes, metadata, corroborating references, and contradiction logs, a cited
  reference, or an explicitly marked inference — and never present inference as observed
  evidence.
- For Geolocation Verification, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Geolocation Verification recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Geolocation Verification: independent lines of source records,
  custody notes, metadata, corroborating references, and contradiction logs converge,
  credible alternatives have been tested, and the conclusion would survive removing
  any single source.'
- 'Medium confidence for Geolocation Verification: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Geolocation Verification: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Geolocation Verification cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Geolocation
  Verification should collect to separate the live alternatives.
privacy_legal_constraints:
- For Geolocation Verification, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Geolocation Verification, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Geolocation Verification, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Geolocation Verification failure: overstating identity, location, attribution,
  or source reliability from incomplete public traces.'
- 'Geolocation Verification failure: producing guidance that would help a requester
  dox, deanonymize, harass, bypass access controls, or attribute identity beyond evidence.'
- 'Geolocation Verification failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Geolocation Verification to dox, deanonymize, harass, bypass access
  controls, or attribute identity beyond evidence'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Geolocation Verification into an operational playbook to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence'' -> refuse
  and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Geolocation Verification to verify supplied claims, media,
  sources, or datasets with documented public-source methods'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
