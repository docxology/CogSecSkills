id: cognitive_security.attack_surface_of_belief_mapping
description: Belief Attack-Surface Mapping identifies which held beliefs of a target
  audience are structurally most exposed to adversarial manipulation — analyzing the
  epistemic properties (evidence base, social anchoring, emotional loading, and prior-belief
  dependencies) that make specific beliefs more or less resistant to influence operations.
  The output is a ranked map that defenders can use to design targeted inoculation,
  prebunking, or counter-messaging interventions before an adversary exploits a vulnerability.
  This is a defensive analytical technique analogous to network attack-surface analysis
  applied to epistemic infrastructure.
tags:
- cognitive-security
- cognitive_security
- belief-systems
- vulnerability-analysis
triggers:
- belief attack surface
- which beliefs are most vulnerable
- epistemic vulnerability map
- what beliefs could be exploited
- cognitive vulnerability assessment
- where is the audience susceptible
tools:
- verb: read
  purpose: ingest descriptions of the audience, their documented belief landscape,
    and known adversary playbooks
- verb: reason
  purpose: assess each belief cluster across epistemic vulnerability dimensions and
    score exposure
- verb: write
  purpose: produce a ranked belief attack-surface map with defensive prioritization
inputs:
- name: audience_profile
  type: text
  required: true
  description: 'Description of the target audience: demographics, information diet,
    prior belief commitments, cultural context'
- name: belief_inventory
  type: list
  required: true
  description: A list or structured description of beliefs the audience holds that
    are relevant to the defensive concern
- name: adversary_playbook
  type: text
  required: false
  description: Known or suspected adversary manipulation techniques and narratives
    relevant to this audience
outputs:
- name: belief_attack_surface_map
  type: table
  description: Ranked table of belief clusters scored on vulnerability dimensions
    (evidence thinness, emotional salience, identity anchoring, social proof dependence)
    with exposure rating and recommended defensive action
- name: priority_interventions
  type: markdown
  description: Narrative summary of the top vulnerable belief areas, the specific
    manipulation vectors most likely to target them, and prioritized defensive recommendations
references:
- 'Lewandowsky, S., Ecker, U. K. H., & Cook, J. (2017). Beyond Misinformation: Understanding
  and Coping with the Post-Truth Era. Journal of Applied Research in Memory and Cognition.'
- Roozenbeek, J., & van der Linden, S. (2022). How Accurate Are Accuracy-Nudge Interventions?
  A Preregistered Direct Replication of Pennycook et al. (2020). Psychological Science.
- 'Benkler, Y., Faris, R., & Roberts, H. (2018). Network Propaganda: Manipulation,
  Disinformation, and Radicalization in American Politics. Oxford University Press.'
- 'Compton, J. (2013). Inoculation Theory. In J. P. Dillard & L. Shen (Eds.), The
  SAGE Handbook of Persuasion: Developments in Theory and Practice.'
when_to_use:
- designing a pre-emptive defense against anticipated influence operations targeting
  a specific community
- advising a communications team on which narratives to inoculate audiences against
  before an adversary can seed them
- conducting a red-team assessment of an audience's epistemic resilience
- prioritizing limited prebunking or media-literacy resources across a complex belief
  landscape
- informing policy decisions about where epistemic infrastructure investment is most
  urgently needed
what_it_produces:
- a ranked map of belief vulnerabilities ordered by exploitation likelihood and potential
  impact
- 'per-belief scoring on four vulnerability dimensions: evidence thinness, emotional
  salience, identity anchoring, and social proof dependence'
- the manipulation vectors (narrative frames, emotional appeals, messenger types)
  most likely to exploit each high-exposure belief
- a prioritized intervention menu for defenders (prebunking, counter-messaging, source
  diversification, social norm reframing)
key_discipline:
- assess beliefs across multiple independent vulnerability dimensions — a belief that
  scores high on only one dimension is far less exposed than one that scores high
  on all four
- distinguish beliefs that are epistemically thin (poorly evidenced) from those that
  are identity-anchored (correcting them triggers backfire) — the defensive intervention
  is different for each type
- focus on exposure, not just prevalence — a widely-held but well-evidenced belief
  is less dangerous to hold than a narrowly-held but epistemically fragile one that
  gatekeeps key decisions
workflow_steps:
- verbs:
  - read
  title: Ingest audience and belief landscape
  text: Review the audience profile and belief inventory. Note the information environment
    they inhabit (which sources they trust, which social networks they use), their
    prior commitments, and any existing adversary narratives already in circulation.
- verbs:
  - reason
  title: Score each belief on vulnerability dimensions
  text: 'For each belief cluster, score it on four dimensions: (1) Evidence thinness
    — how well-supported is the belief by verifiable, widely-accessible evidence?
    (2) Emotional salience — how much is the belief bound up with fear, moral outrage,
    or in-group loyalty? (3) Identity anchoring — how closely tied is holding this
    belief to the audience''s self-concept or group membership? (4) Social proof dependence
    — does the audience''s confidence in the belief rest primarily on perceived consensus
    rather than direct evidence? Record scores and rationale for each.'
- verbs:
  - reason
  title: Map manipulation vectors to vulnerable beliefs
  text: 'For beliefs with high exposure scores, identify the specific adversary manipulation
    vectors they are susceptible to: e.g., a belief that is both emotionally salient
    and evidence-thin is vulnerable to emotionally-charged disinformation; an identity-anchored
    belief is vulnerable to in-group messenger exploitation and tribal norm signaling.
    Cross-reference against the adversary playbook if available.'
- verbs:
  - write
  title: Produce ranked map and defensive priorities
  text: 'Compile the belief attack-surface table ranked by composite vulnerability
    score. For each high-exposure belief, specify: the dominant manipulation vectors,
    the estimated impact if exploited, and the recommended defensive action (prebunking
    campaign, source-diversification initiative, norm-based reframing, or alliance
    with trusted in-group messengers). Flag any beliefs where intervention may itself
    carry backfire risk.'
anti_criteria:
- do not treat this map as a targeting document — it is a defensive tool and must
  not be used to design manipulation campaigns
- do not rank beliefs by political valence or policy preference — vulnerability is
  an epistemic property, not a content judgment
- do not reduce all vulnerability to a single score without documenting the component
  dimension scores — defenders need the breakdown to choose the right intervention
  type
- do not assume high emotional salience alone equals high vulnerability — emotional
  investment can also motivate verification behavior
defensive_boundary: 'Use Belief Attack-Surface Mapping only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Belief Attack-Surface Mapping to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Belief Attack-Surface Mapping, bind each finding to a labeled source — content,
  behavioral, narrative, media, and audience-risk evidence, a cited reference, or
  an explicitly marked inference — and never present inference as observed evidence.
- For Belief Attack-Surface Mapping, keep observations, assumptions, inferences, and
  missing information in separate labeled categories.
- Before issuing any Belief Attack-Surface Mapping recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Belief Attack-Surface Mapping: independent lines of content,
  behavioral, narrative, media, and audience-risk evidence converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Belief Attack-Surface Mapping: the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Belief Attack-Surface Mapping: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Belief Attack-Surface Mapping cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Belief
  Attack-Surface Mapping should collect to separate the live alternatives.
privacy_legal_constraints:
- For Belief Attack-Surface Mapping, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Belief Attack-Surface Mapping, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Belief Attack-Surface Mapping, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Belief Attack-Surface Mapping failure: mistaking persuasive resonance for verified
  harm or intent.'
- 'Belief Attack-Surface Mapping failure: producing guidance that would help a requester
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation.'
- 'Belief Attack-Surface Mapping failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Belief Attack-Surface Mapping to increase persuasive impact, exploit
  audience vulnerabilities, or optimize narrative manipulation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Belief Attack-Surface Mapping into an operational playbook to increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Belief Attack-Surface Mapping to assess supplied material
  for manipulation indicators and recommend resilience measures'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
