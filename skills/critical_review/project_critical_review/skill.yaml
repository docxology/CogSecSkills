id: critical_review.project_critical_review
name: Project Critical Review
group: critical_review
version: 0.1.0
status: implemented
summary: 'Adversarial-then-constructive review of a project: claims, evidence, risks,
  gaps, and go/no-go.'
description: The flagship critical-review skill. It reviews a project — codebase,
  research project, or initiative — by first MAPPING what the project claims and how
  it is built, then running an ADVERSARIAL pass that attacks every load-bearing claim
  for missing evidence, silent-failure and dual-use risk, and unstated assumptions,
  followed by a CONSTRUCTIVE pass that names genuine strengths and the cheapest fix
  for each top risk. Findings are classified by severity and confidence, every finding
  is bound to evidence (file:line or command output), and the project's own tests
  and gates are run to confirm they actually have teeth before any "all passing" claim
  is trusted. The product is a BLUF report with a calibrated go/no-go recommendation
  and the top three things to fix first.
ageint_topic: adversarial-assurance
tags:
- critical-review
- assurance
- red-team
- go-no-go
triggers:
- critical review
- review this project
- red team this project
- go/no-go
- is this ready to ship
- audit this project
- claims vs evidence
- what are the risks here
tools:
- verb: read
  purpose: ingest the artifact — code, manuscript, docs, configs, test files
- verb: search
  purpose: locate load-bearing claims, gates, and the evidence (or its absence)
- verb: exec
  purpose: run the project's own tests/gates to check they have teeth
- verb: reason
  purpose: run the adversarial and constructive passes and calibrate severity
- verb: write
  purpose: emit the BLUF report, findings table, and go/no-go recommendation
inputs:
- name: artifact
  type: path
  required: true
  description: the project root, repo, manuscript, or directory under review
- name: decision
  type: text
  required: false
  description: the decision the review informs (ship, merge, fund, publish)
- name: success_criteria
  type: list[str]
  required: false
  description: what "good enough" means for this decision; inferred if omitted
outputs:
- name: report
  type: markdown
  description: BLUF report with map, findings, strengths, and recommendation
- name: findings
  type: table
  description: each finding with severity, confidence, and evidence (file:line)
- name: recommendation
  type: markdown
  description: calibrated go/no-go plus the top three things to fix first
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Heuer & Pherson (2014). Structured Analytic Techniques — challenge analysis & structured
  self-critique.
- Google SRE (2017). Site Reliability Engineering — testing reliability & 'is the
  test actually testing?'.
defensive_boundary: 'Use Project Critical Review only for critical review and assurance:
  recognize, assess, document, or defend evidence quality, implementation integrity,
  and decision accountability. Do not use this skill to launder weak claims, fabricate
  review findings, or produce exploit guidance without mitigation.'
misuse_redirect: 'If a request asks Project Critical Review to launder weak claims,
  fabricate review findings, or produce exploit guidance without mitigation, refuse
  that path and redirect to the safe defensive form: review supplied artifacts for
  defects, evidence gaps, safety risks, or reproducibility failures.'
evidence_requirements:
- For Project Critical Review, bind each finding to a labeled source — artifact excerpts,
  test output, citations, assumptions, and reproducibility records, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Project Critical Review, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Project Critical Review recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Project Critical Review: independent lines of artifact excerpts,
  test output, citations, assumptions, and reproducibility records converge, credible
  alternatives have been tested, and the conclusion would survive removing any single
  source.'
- 'Medium confidence for Project Critical Review: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Project Critical Review: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Project Critical Review cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Project
  Critical Review should collect to separate the live alternatives.
privacy_legal_constraints:
- For Project Critical Review, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Project Critical Review, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Project Critical Review, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Project Critical Review failure: performing theatrical critique without concrete
  evidence, severity, or remediation path.'
- 'Project Critical Review failure: producing guidance that would help a requester
  launder weak claims, fabricate review findings, or produce exploit guidance without
  mitigation.'
- 'Project Critical Review failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Project Critical Review to launder weak claims, fabricate review
  findings, or produce exploit guidance without mitigation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Project Critical Review into an operational playbook to launder
  weak claims, fabricate review findings, or produce exploit guidance without mitigation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Project Critical Review to review supplied artifacts for
  defects, evidence gaps, safety risks, or reproducibility failures'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
