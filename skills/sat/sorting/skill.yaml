id: sat.sorting
name: Sorting
group: sat
version: 0.1.0
status: implemented
summary: Group large evidence sets by attributes to surface patterns and outliers.
description: Sorting is a structured-analytic technique that organizes a large evidence
  or indicator set by one or more attributes (date, source reliability, geographic
  origin, significance) so that meaningful clusters, trends, and outliers become visible.
  It converts an unordered mass of raw data into a structured view that supports pattern
  recognition and gap detection. In cognitive-security contexts, sorting exposes anomalies—items
  that do not fit the dominant cluster—which may represent deception artifacts, seeded
  disinformation, or signals of an adversary's hand.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- pattern-recognition
triggers:
- sort this evidence
- organize these indicators
- group by attribute
- surface outliers
- cluster this data
tools:
- verb: read
  purpose: ingest the raw evidence or indicator set and identify available attributes
- verb: reason
  purpose: select sorting dimensions, assign each item to clusters, and identify outliers
- verb: write
  purpose: produce the sorted table, cluster summaries, and outlier flag list
inputs:
- name: evidence_set
  type: list
  required: true
  description: the collection of evidence items, indicators, or data points to be
    sorted
- name: sort_dimensions
  type: list
  required: false
  description: analyst-selected attributes to sort by (e.g., date, source reliability,
    geography, significance); if omitted the agent proposes dimensions
outputs:
- name: sorted_table
  type: table
  description: evidence items reorganized by the selected dimensions with cluster
    labels
- name: outlier_flags
  type: markdown
  description: items that do not fit dominant clusters, with analytic significance
    noted
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Heuer, R. J., & Pherson, R. H. (2015). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Chapter 3.
- Pherson, R. H., & Heuer, R. J. (2021). Structured Analytic Techniques for Intelligence
  Analysis (4th ed.). SAGE/CQ Press.
defensive_boundary: 'Use Sorting only for structured analytic technique support: recognize,
  assess, document, or defend analytic rigor, alternative hypotheses, and calibrated
  judgment. Do not use this skill to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Sorting to force a preferred conclusion, hide
  uncertainty, or use the technique to rationalize manipulation, refuse that path
  and redirect to the safe defensive form: apply the structured technique to supplied
  evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Sorting, bind each finding to a labeled source — hypotheses, assumptions, indicators,
  evidence tables, and confidence notes, a cited reference, or an explicitly marked
  inference — and never present inference as observed evidence.
- For Sorting, keep observations, assumptions, inferences, and missing information
  in separate labeled categories.
- Before issuing any Sorting recommendation, name the weakest evidentiary link and
  the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Sorting: independent lines of hypotheses, assumptions, indicators,
  evidence tables, and confidence notes converge, credible alternatives have been
  tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Sorting: the evidence supports the conclusion, but one important
  input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Sorting: the evidence is sparse, single-source, contested, or
  mostly inferential, so competing explanations must be preserved in the output.'
uncertainty_handling:
- State plainly what Sorting cannot determine from the supplied or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Sorting
  should collect to separate the live alternatives.
privacy_legal_constraints:
- For Sorting, use only data the caller is authorized to analyze, drawn from public
  or source-approved records.
- For Sorting, protect privacy by preferring aggregate, role-level, or artifact-level
  summaries over individual targeting unless an individual is essential to the defensive
  question.
- For Sorting, do not infer protected traits, private identity, intent, location,
  or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Sorting failure: using the method as a checklist while skipping diagnostic evidence
  and disconfirming tests.'
- 'Sorting failure: producing guidance that would help a requester force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Sorting failure: hiding uncertainty behind generic confidence language instead
  of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Sorting to force a preferred conclusion, hide uncertainty, or use
  the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Sorting into an operational playbook to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation'' -> refuse and
  offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Sorting to apply the structured technique to supplied evidence
  while preserving alternatives and uncertainty'' -> produce bounded findings with
  explicit evidence and uncertainty labels.'
