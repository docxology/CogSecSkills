id: sat.alternative_futures_scenarios
name: Alternative Futures (Scenarios)
group: sat
version: 0.1.0
status: implemented
summary: Build multiple plausible futures around critical uncertainties to stress
  strategy.
description: Alternative Futures Analysis (Scenarios) constructs a small set of mutually
  exclusive, collectively exhaustive futures defined by the intersection of critical
  uncertainties, forcing analysts and decision-makers to reason beyond the single
  most-likely-outcome trap. Rooted in the RAND/Shell scenario planning tradition and
  codified for intelligence analysis by Heuer & Pherson, the technique stresses strategy
  against each scenario and surfaces indicators that discriminate between them. It
  counters anchoring, mirror-imaging, and surprise-aversion by keeping multiple divergent
  worlds simultaneously in view.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- scenario-planning
- uncertainty-management
triggers:
- alternative futures
- scenario planning
- what if the future goes differently
- stress-test our strategy
- multiple worlds
- build scenarios around uncertainties
tools:
- verb: read
  purpose: ingest the problem statement, known drivers, and existing assessments
- verb: reason
  purpose: identify critical uncertainties, construct scenario axes, populate each
    future, and derive indicators
- verb: write
  purpose: produce the scenario matrix, narrative descriptions, strategy stress-test,
    and indicator list
inputs:
- name: problem_statement
  type: text
  required: true
  description: The focal question or decision for which futures are needed
- name: known_drivers
  type: list
  required: false
  description: Trends, forces, or variables already identified as relevant to the
    outcome
- name: current_assessment
  type: text
  required: false
  description: Existing baseline or single-point forecast to be stress-tested
outputs:
- name: scenario_matrix
  type: table
  description: 2x2 (or similar) matrix cross-tabulating the two most critical, independent
    uncertainties defining the scenario space
- name: scenario_narratives
  type: markdown
  description: A brief, vivid narrative for each scenario quadrant describing its
    internal logic and key features
- name: indicator_set
  type: table
  description: Observable indicators that would signal which scenario is emerging,
    including discriminating signals unique to each
- name: strategy_stress_test
  type: markdown
  description: Assessment of how well the current strategy or plan performs under
    each scenario
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Heuer, R. J., & Pherson, R. H. (2015). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Chapter on Alternative Futures Analysis.
- 'Schwartz, P. (1991). The Art of the Long View: Planning for the Future in an Uncertain
  World. Doubleday.'
- 'Van der Heijden, K. (1996). Scenarios: The Art of Strategic Conversation. Wiley.'
- Pherson, R. H. (2018). Handbook of Analytic Tools and Techniques (5th ed.). Pherson
  Associates.
defensive_boundary: 'Use Alternative Futures (Scenarios) only for structured analytic
  technique support: recognize, assess, document, or defend analytic rigor, alternative
  hypotheses, and calibrated judgment. Do not use this skill to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Alternative Futures (Scenarios) to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation,
  refuse that path and redirect to the safe defensive form: apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Alternative Futures (Scenarios), bind each finding to a labeled source — hypotheses,
  assumptions, indicators, evidence tables, and confidence notes, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Alternative Futures (Scenarios), keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Alternative Futures (Scenarios) recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Alternative Futures (Scenarios): independent lines of hypotheses,
  assumptions, indicators, evidence tables, and confidence notes converge, credible
  alternatives have been tested, and the conclusion would survive removing any single
  source.'
- 'Medium confidence for Alternative Futures (Scenarios): the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Alternative Futures (Scenarios): the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Alternative Futures (Scenarios) cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Alternative
  Futures (Scenarios) should collect to separate the live alternatives.
privacy_legal_constraints:
- For Alternative Futures (Scenarios), use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Alternative Futures (Scenarios), protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Alternative Futures (Scenarios), do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Alternative Futures (Scenarios) failure: using the method as a checklist while
  skipping diagnostic evidence and disconfirming tests.'
- 'Alternative Futures (Scenarios) failure: producing guidance that would help a requester
  force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation.'
- 'Alternative Futures (Scenarios) failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Alternative Futures (Scenarios) to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation'' -> refuse and
  redirect to defensive risk assessment.'
- 'Unsafe: ''Turn Alternative Futures (Scenarios) into an operational playbook to
  force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation'' -> refuse and offer governance, detection, or mitigation analysis
  instead.'
- 'Safe defensive: ''Use Alternative Futures (Scenarios) to apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
