id: cognitive_security.narrative_threat_assessment
name: Narrative Threat Assessment
group: cognitive_security
version: 0.1.0
status: implemented
summary: Characterize a narrative's intent, mechanics, reach, and harm potential as
  a cognitive threat.
description: A defensive cognitive-security procedure that examines a circulating
  narrative to characterize it as a potential cognitive threat. It captures the narrative's
  claims and framing, identifies the target audience and the belief or identity levers
  it exploits, classifies the manipulation techniques present, assesses provenance
  and likely intent, estimates reach and harm potential, and recommends defensive
  responses such as prebunking and lateral reading. The output protects audiences;
  it never authors manipulation or a playbook for running an influence operation.
ageint_topic: cognitive-security
tags:
- cognitive-security
- influence-operations
- narrative
- defense
triggers:
- narrative threat assessment
- is this narrative a threat
- assess this narrative
- characterize this influence narrative
- is this disinformation or coordinated
- how harmful is this narrative
- defensive narrative analysis
tools:
- verb: read
  purpose: Read the supplied narrative artifact and any provided context (source,
    circulation samples) precisely before characterizing it.
- verb: search
  purpose: Search for corroborating provenance, prior debunks, and reach signals to
    assess organic-versus-coordinated spread without amplifying the narrative.
- verb: reason
  purpose: Decompose claims, map audience levers, classify manipulation techniques,
    and rate harm and urgency from evidence rather than speculation.
- verb: write
  purpose: Write the structured defensive assessment, including recommended prebunking
    and counter-framing responses.
inputs:
- name: narrative_text
  type: string
  required: true
  description: The narrative under assessment — the core claim plus any sub-claims
    and framing, captured verbatim or near-verbatim.
- name: context
  type: object
  required: false
  description: Optional provenance and circulation context (observed sources, platforms,
    timestamps, sample posts) used to assess intent and reach.
outputs:
- name: threat_assessment
  type: document
  description: A defensive assessment characterizing claims, target audience, manipulation
    mechanics, provenance/intent, reach, and rated harm potential and urgency.
- name: defensive_recommendations
  type: list
  description: Prioritized defensive responses (prebunking, lateral reading prompts,
    counter-framing) for protecting the target audience.
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Pamment, J. (2020). The ABCDE framework for analyzing influence operations (Actor,
  Behavior, Content, Degree, Effect), Carnegie Endowment / Partnership for Countering
  Influence Operations.
- DISARM Foundation. DISARM Framework — Disinformation Analysis and Risk Management
  (Red/Blue TTP matrices), https://disarmframework.herokuapp.com/
defensive_boundary: 'Use Narrative Threat Assessment only for cognitive-security defense:
  recognize, assess, document, or defend audiences, decision-makers, and public discourse.
  Do not use this skill to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Narrative Threat Assessment to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Narrative Threat Assessment, bind each finding to a labeled source — content,
  behavioral, narrative, media, and audience-risk evidence, a cited reference, or
  an explicitly marked inference — and never present inference as observed evidence.
- For Narrative Threat Assessment, keep observations, assumptions, inferences, and
  missing information in separate labeled categories.
- Before issuing any Narrative Threat Assessment recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Narrative Threat Assessment: independent lines of content,
  behavioral, narrative, media, and audience-risk evidence converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Narrative Threat Assessment: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Narrative Threat Assessment: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Narrative Threat Assessment cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Narrative
  Threat Assessment should collect to separate the live alternatives.
privacy_legal_constraints:
- For Narrative Threat Assessment, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Narrative Threat Assessment, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Narrative Threat Assessment, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Narrative Threat Assessment failure: mistaking persuasive resonance for verified
  harm or intent.'
- 'Narrative Threat Assessment failure: producing guidance that would help a requester
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation.'
- 'Narrative Threat Assessment failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Narrative Threat Assessment to increase persuasive impact, exploit
  audience vulnerabilities, or optimize narrative manipulation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Narrative Threat Assessment into an operational playbook to increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Narrative Threat Assessment to assess supplied material for
  manipulation indicators and recommend resilience measures'' -> produce bounded findings
  with explicit evidence and uncertainty labels.'
