id: osint_integrity.sock_puppet_detection
description: Sock-puppet detection identifies inauthentic online personas — accounts
  created to simulate independent real people — by analyzing behavioral, temporal,
  network, and content signals that distinguish coordinated inauthentic behavior from
  organic activity. The technique is a core defensive OSINT practice used to assess
  whether an apparent grassroots voice is actually a manufactured identity. Detection
  relies on converging indicators rather than any single signature, since sophisticated
  operations deliberately vary surface features to evade heuristics.
tags:
- cognitive-security
- osint_integrity
- influence-operations
triggers:
- is this account real
- detect sock puppets
- coordinated inauthentic behavior
- fake accounts
- identify bot or sock puppet
- check if this user is genuine
- sock puppet detection
tools:
- verb: read
  purpose: ingest the account profile, post history, and any network or interaction
    data available
- verb: web
  purpose: query account metadata, cross-platform identity traces, profile image reverse-search,
    and related accounts via OSINT sources
- verb: reason
  purpose: apply the behavioral, temporal, network, and content indicator framework
    to assess inauthenticity
- verb: write
  purpose: produce a structured assessment with flagged indicators, confidence level,
    and recommended disposition
inputs:
- name: account_identifier
  type: text
  required: true
  description: Username, URL, or account ID on the platform being investigated
- name: platform
  type: text
  required: true
  description: The social media platform or online community where the account operates
- name: related_accounts
  type: list
  required: false
  description: Other accounts suspected of being part of the same coordinated network,
    if already identified
- name: narrative_context
  type: text
  required: false
  description: The information operation or narrative environment where the account
    is being encountered
outputs:
- name: indicator_assessment
  type: table
  description: Table of evaluated indicators across behavioral, temporal, network,
    and content dimensions, each rated as present, absent, or unknown
- name: inauthenticity_report
  type: markdown
  description: 'Structured report: flagged indicators, alternative explanations considered,
    confidence tier, and recommended action'
references:
- 'Nimmo, B. (2020). The Breakout Scale: Measuring the Impact of Influence Operations.
  Brookings Institution.'
- Stanford Internet Observatory (2021). SIO Coordinated Inauthentic Behavior Reports.
  cyber.fsi.stanford.edu.
- 'Starbird, K., Arif, A., & Wilson, T. (2019). Disinformation as Collaborative Work:
  Surfacing the Participatory Nature of Strategic Information Operations. CSCW.'
- Ferrara, E. et al. (2016). The Rise of Social Bots. Communications of the ACM, 59(7),
  96–104.
when_to_use:
- an account is amplifying a narrative of investigative or strategic interest and
  its authenticity is uncertain
- a cluster of accounts appears to be coordinating — posting the same content within
  minutes, using similar language, or targeting the same individuals
- an OSINT investigation requires assessing whether apparent public opinion is manufactured
- a platform policy enforcement analysis needs to distinguish bots, sock puppets,
  and cyborg accounts from organic users
- an analyst needs to assess whether a source cited as 'ordinary users' is actually
  an organized network
what_it_produces:
- 'a behavioral indicator profile: posting volume, times of day, posting pace, content
  diversity, and ratio of original posts to amplifications'
- 'a temporal indicator profile: account age relative to creation of content niche,
  account-name change history, activity spikes correlated with geopolitical events'
- 'a network indicator profile: ratio of followers to following, interaction cluster
  overlap with other suspected inauthentic accounts, follower acquisition rate'
- 'a content and identity indicator profile: profile image reverse-search result,
  biographic inconsistency, language register inconsistency, topic monoculture'
- 'a confidence-tiered verdict: likely inauthentic / possible inauthentic / insufficient
  evidence / likely authentic'
key_discipline:
- no single indicator is definitive — new accounts are also started by real people,
  and not all high-volume posters are bots; require convergence across indicator classes
- compare the account against a baseline of authentic accounts in the same community
  to avoid applying inappropriate standards
- temporal spikes correlated with political events are among the strongest early signals
  — capture them before accounts are deleted
- coordinated behavior is more diagnostic than individual account properties — the
  network pattern is harder to fake than the account surface
workflow_steps:
- verbs:
  - read
  title: Collect account baseline data
  text: 'Gather all accessible account data: creation date, name/username change history,
    profile image, bio, posting history (volume, times, topics), follower/following
    counts and growth curve, and interaction patterns (what is retweeted, who is tagged).
    For each field, note whether it is present and plausible. Archive the data immediately
    — sock puppet accounts are often deleted after detection.'
- verbs:
  - web
  title: Run cross-platform and image lookups
  text: Reverse-image search the profile picture for use on other platforms or in
    stock photo databases. Search usernames and display names across platforms. Check
    whether the account cross-posts to other platforms with different claimed identities.
    Look up the account in third-party follower-audit tools that surface bot-like
    follower ratios. Query any available coordinated-inauthentic-behavior databases
    (e.g., Stanford Internet Observatory takedown archives, DFRLab datasets).
- verbs:
  - reason
  title: Apply indicator framework
  text: 'Evaluate the account against the four indicator classes: (1) Behavioral —
    posting pace above human sustainable rates (>100 posts/day sustained), near-zero
    original content, single-topic monoculture; (2) Temporal — account created shortly
    before the narrative it promotes became prominent, activity concentrated in non-local
    hours for the claimed location; (3) Network — follower-to-following ratio consistent
    with purchased followers, follower acquisition in unnatural discrete batches,
    interaction cluster that overlaps with other suspected inauthentic accounts; (4)
    Identity and content — profile image identified as AI-generated or stock photo,
    biographic details internally inconsistent, language register inconsistent with
    claimed nationality or profession. Record each indicator as present, absent, or
    unknown.'
- verbs:
  - reason
  - write
  title: Synthesize verdict and disposition
  text: 'Assess how many indicator classes are flagged and whether the pattern is
    better explained by inauthenticity or by plausible authentic behavior (e.g., a
    political activist posting intensely during a crisis). Consider alternative explanations:
    a lone real person who posts obsessively is different from a coordinated network
    even if surface indicators overlap. Assign a confidence tier. Write the inauthenticity
    report documenting each flagged indicator, alternative explanations considered,
    the confidence verdict, and a recommended disposition (flag for platform reporting,
    exclude from analysis, or continue monitoring).'
anti_criteria:
- do not label an account inauthentic from a single indicator — high posting volume,
  new account age, or a stock-looking profile photo each have innocent explanations
  in isolation
- do not conflate automation (bot) with inauthenticity (sock puppet) — a bot can post
  for an authentic person, and a sock puppet can post manually
- do not use this technique to suppress legitimate political speech — the standard
  is coordinated inauthentic behavior, not simply unpopular or adversarial viewpoints
- do not publish attribution to a specific operator without corroborating intelligence
  beyond behavioral OSINT — account signals support a hypothesis, not a definitive
  identification
defensive_boundary: 'Use Sock-Puppet Detection only for OSINT integrity and source-verification
  defense: recognize, assess, document, or defend source provenance, privacy, chain
  of custody, and public-source accountability. Do not use this skill to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence.'
misuse_redirect: 'If a request asks Sock-Puppet Detection to dox, deanonymize, harass,
  bypass access controls, or attribute identity beyond evidence, refuse that path
  and redirect to the safe defensive form: verify supplied claims, media, sources,
  or datasets with documented public-source methods.'
evidence_requirements:
- For Sock-Puppet Detection, bind each finding to a labeled source — source records,
  custody notes, metadata, corroborating references, and contradiction logs, a cited
  reference, or an explicitly marked inference — and never present inference as observed
  evidence.
- For Sock-Puppet Detection, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Sock-Puppet Detection recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Sock-Puppet Detection: independent lines of source records,
  custody notes, metadata, corroborating references, and contradiction logs converge,
  credible alternatives have been tested, and the conclusion would survive removing
  any single source.'
- 'Medium confidence for Sock-Puppet Detection: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Sock-Puppet Detection: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Sock-Puppet Detection cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Sock-Puppet
  Detection should collect to separate the live alternatives.
privacy_legal_constraints:
- For Sock-Puppet Detection, use only data the caller is authorized to analyze, drawn
  from public or source-approved records.
- For Sock-Puppet Detection, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Sock-Puppet Detection, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Sock-Puppet Detection failure: overstating identity, location, attribution, or
  source reliability from incomplete public traces.'
- 'Sock-Puppet Detection failure: producing guidance that would help a requester dox,
  deanonymize, harass, bypass access controls, or attribute identity beyond evidence.'
- 'Sock-Puppet Detection failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Sock-Puppet Detection to dox, deanonymize, harass, bypass access
  controls, or attribute identity beyond evidence'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Sock-Puppet Detection into an operational playbook to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence'' -> refuse
  and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Sock-Puppet Detection to verify supplied claims, media, sources,
  or datasets with documented public-source methods'' -> produce bounded findings
  with explicit evidence and uncertainty labels.'
