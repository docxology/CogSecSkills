id: research_methods.structured_literature_synthesis
name: Structured Literature Synthesis
group: research_methods
version: 0.1.0
status: implemented
summary: Synthesize a body of sources into a structured, evidence-graded, gap-aware
  briefing.
description: Turn a body of sources into a structured, evidence-graded, gap-aware
  briefing. The method defines a synthesis question with inclusion/exclusion criteria,
  gathers and deduplicates sources, extracts graded claims with citations, clusters
  findings by theme, and surfaces agreements, conflicts, and gaps. It produces a BLUF
  synthesis where every statement traces back to its sources and conflicting evidence
  is reported honestly rather than smoothed over.
ageint_topic: research-methods
tags:
- research-methods
- synthesis
- evidence-grading
- bluf
triggers:
- literature synthesis
- synthesize these sources
- what does the research say
- grade the evidence
- where are the gaps in the literature
- structured review of sources
tools:
- verb: read
  purpose: ingest each source document and extract its claims and findings
- verb: search
  purpose: locate sources, claims, and themes within the gathered corpus
- verb: web
  purpose: retrieve sources where permitted
- verb: reason
  purpose: cluster findings, weigh conflicts, and grade strength of evidence
- verb: write
  purpose: produce the BLUF synthesis briefing with full citations
inputs:
- name: synthesis_question
  type: string
  required: true
  description: The specific question the synthesis must answer.
- name: sources
  type: list
  required: true
  description: Source documents, references, or URLs to synthesize over.
- name: inclusion_criteria
  type: string
  required: false
  description: Optional rules for which sources are in or out of scope.
outputs:
- name: synthesis_briefing
  type: markdown
  description: BLUF briefing with themes, graded evidence, conflicts, gaps, and citations.
- name: evidence_table
  type: table
  description: Per-claim extraction with source citation and quality grade.
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- GRADE / evidence-grading practice; PRISMA-style structured review.
defensive_boundary: 'Use Structured Literature Synthesis only for research-methods
  and synthesis integrity: recognize, assess, document, or defend reproducibility,
  calibrated confidence, and transparent synthesis. Do not use this skill to cherry-pick
  sources, fabricate citations, or overstate certainty from weak evidence.'
misuse_redirect: 'If a request asks Structured Literature Synthesis to cherry-pick
  sources, fabricate citations, or overstate certainty from weak evidence, refuse
  that path and redirect to the safe defensive form: synthesize supplied or authorized
  sources with explicit confidence and uncertainty labels.'
evidence_requirements:
- For Structured Literature Synthesis, bind each finding to a labeled source — study
  designs, source quality, reproducibility artifacts, and uncertainty records, a cited
  reference, or an explicitly marked inference — and never present inference as observed
  evidence.
- For Structured Literature Synthesis, keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Structured Literature Synthesis recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Structured Literature Synthesis: independent lines of study
  designs, source quality, reproducibility artifacts, and uncertainty records converge,
  credible alternatives have been tested, and the conclusion would survive removing
  any single source.'
- 'Medium confidence for Structured Literature Synthesis: the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Structured Literature Synthesis: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Structured Literature Synthesis cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Structured
  Literature Synthesis should collect to separate the live alternatives.
privacy_legal_constraints:
- For Structured Literature Synthesis, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Structured Literature Synthesis, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Structured Literature Synthesis, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Structured Literature Synthesis failure: collapsing heterogeneous evidence into
  an unsupported single confident conclusion.'
- 'Structured Literature Synthesis failure: producing guidance that would help a requester
  cherry-pick sources, fabricate citations, or overstate certainty from weak evidence.'
- 'Structured Literature Synthesis failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Structured Literature Synthesis to cherry-pick sources, fabricate
  citations, or overstate certainty from weak evidence'' -> refuse and redirect to
  defensive risk assessment.'
- 'Unsafe: ''Turn Structured Literature Synthesis into an operational playbook to
  cherry-pick sources, fabricate citations, or overstate certainty from weak evidence''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Structured Literature Synthesis to synthesize supplied or
  authorized sources with explicit confidence and uncertainty labels'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
