id: cognitive_security.framing_and_priming_analysis
description: Framing and Priming Analysis surfaces the implicit conceptual frames
  — the organizing metaphors, category choices, and contextual anchors — that shape
  how a message is received before its literal content is processed. Drawing on Lakoff's
  cognitive linguistics, Kahneman's anchoring research, and Entman's framing theory,
  the technique examines what is foregrounded vs. backgrounded, which comparison sets
  or reference points are primed, and how word choice activates preloaded schema that
  channel interpretation. The output gives analysts and communicators a principled
  account of the meta-layer of persuasion that operates beneath explicit argument.
tags:
- cognitive-security
- cognitive_security
- framing
- priming
triggers:
- framing analysis
- priming analysis
- what frame is this using
- hidden assumptions in language
- how is this message structured to mislead
- anchoring in media
- conceptual metaphor
- agenda-setting analysis
tools:
- verb: read
  purpose: ingest the text, transcript, or visual artifact to be analyzed at both
    surface and structural levels
- verb: reason
  purpose: identify active frames, priming devices, and the cognitive schema they
    invoke; assess interpretive consequences
- verb: write
  purpose: produce a frame inventory and reframing brief with alternative framings
    and defensive guidance
inputs:
- name: content
  type: text
  required: true
  description: The message, article, speech, or artifact to be analyzed for framing
    and priming effects
- name: alternative_versions
  type: list
  required: false
  description: Alternative versions of the same event or topic from different sources,
    enabling contrastive frame comparison
- name: audience_context
  type: text
  required: false
  description: Information about the intended audience including prior beliefs, cultural
    schema, and information environment that determine which primes activate
outputs:
- name: frame_inventory
  type: table
  description: 'Table of identified frames and primes: device type (metaphor/category/anchor/omission/salience),
    specific textual instance, schema activated, interpretive consequence, and severity
    of distortion'
- name: reframing_brief
  type: markdown
  description: Narrative analysis of the dominant frame strategy, what alternative
    framings were suppressed, and concrete counter-frame or inoculation language
references:
- 'Entman, R. M. (1993). Framing: Toward Clarification of a Fractured Paradigm. Journal
  of Communication, 43(4), 51–58.'
- Lakoff, G. (2004). Don't Think of an Elephant! Know Your Values and Frame the Debate.
  Chelsea Green Publishing.
- 'Kahneman, D., Slovic, P. & Tversky, A. (1982). Judgment Under Uncertainty: Heuristics
  and Biases. Cambridge University Press.'
- Tversky, A. & Kahneman, D. (1981). The Framing of Decisions and the Psychology of
  Choice. Science, 211(4481), 453–458.
- McCombs, M. & Shaw, D. L. (1972). The Agenda-Setting Function of Mass Media. Public
  Opinion Quarterly, 36(2), 176–187.
when_to_use:
- Auditing a news story, press release, or official statement for subtle framing choices
  that steer interpretation
- Comparing coverage of the same event across partisan or national sources to identify
  divergent dominant frames
- Preparing communicators to respond to a narrative attack without inadvertently reinforcing
  the attacker's frame
- Training analysts to recognize priming sequences in long-form influence operations
- Designing counter-messaging that explicitly competes at the frame level rather than
  only disputing surface facts
what_it_produces:
- 'A typed inventory of every active frame and prime: metaphor, category label, salience
  omission, comparison set anchor, or order-of-presentation prime'
- An account of which cognitive schema each device activates and what interpretive
  conclusions it predisposes the reader toward
- Identification of what the frame systematically forecloses — the alternative framings
  that the dominant frame makes invisible or implausible
- Concrete alternative framings or counter-frame language that reactivate suppressed
  schema
key_discipline:
- Frames operate pre-argumentatively — they shape what counts as evidence and what
  questions are askable before any explicit claim is evaluated
- Priming is cumulative and sequential — early word choices and juxtapositions load
  schema that interpret later content; map the sequence, not just individual items
- Identify what is absent as rigorously as what is present — the frame's power often
  lies in what it makes invisible
- Never correct a hostile frame by repeating it even to negate it — counter-frames
  must activate a competing schema, not reinforce the original one
workflow_steps:
- verbs:
  - read
  title: Close-read for linguistic markers
  text: 'Read the content carefully, annotating: (a) lexical choices that activate
    strong schema (e.g., ''flood'' vs. ''wave'' of migrants); (b) conceptual metaphors
    structuring a domain (e.g., ''fighting'' a disease, ''cleaning up'' crime); (c)
    category labels that foreground or background attributes; (d) what is mentioned
    first vs. last; (e) what comparisons or baseline figures are offered as anchors.'
- verbs:
  - reason
  title: Identify active frames and priming sequences
  text: 'From the annotations, identify the dominant frame(s) — the organizing interpretive
    lens. Name each frame precisely (e.g., ''national security threat frame,'' ''economic
    burden frame,'' ''humanitarian victim frame''). Map the priming sequence: which
    schema is activated early and how it predisposes processing of subsequent claims.
    Identify what interpretive conclusions the frame makes available and which it
    forecloses.'
- verbs:
  - reason
  title: Assess omissions and suppressed alternatives
  text: 'For each active frame, specify what competing framings are crowded out. What
    facts, actors, or relationships does the dominant frame make less salient or harder
    to perceive? What questions does it render unaskable? Rate the severity of each
    framing device (low: minor salience shift; medium: channels interpretation toward
    one of several plausible conclusions; high: actively forecloses accurate understanding).'
- verbs:
  - write
  title: Produce frame inventory and reframing brief
  text: 'Compile the frame inventory table. Write the reframing brief: describe the
    dominant frame strategy and its overall effect; for each high-severity device,
    provide a specific alternative framing with example language that activates a
    competing schema without repeating the hostile frame. Include inoculation language
    if appropriate: language that pre-exposes the audience to the framing device so
    it loses automatic interpretive force.'
anti_criteria:
- Do not treat all framing as manipulation — every communicative act involves framing;
  assess whether the frame distorts or forecloses accurate understanding
- Do not counter a frame by repeating and negating it ('this is not an invasion')
  — produce only positive counter-frame language that activates an independent schema
- Do not assess priming effects without specifying the audience — a prime only activates
  schema that the audience has pre-loaded from prior experience
- Do not conflate framing with explicit falsehood — a frame can be factually accurate
  at every literal point while still systematically misleading at the interpretive
  level
defensive_boundary: 'Use Framing & Priming Analysis only for cognitive-security defense:
  recognize, assess, document, or defend audiences, decision-makers, and public discourse.
  Do not use this skill to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Framing & Priming Analysis to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Framing & Priming Analysis, bind each finding to a labeled source — content,
  behavioral, narrative, media, and audience-risk evidence, a cited reference, or
  an explicitly marked inference — and never present inference as observed evidence.
- For Framing & Priming Analysis, keep observations, assumptions, inferences, and
  missing information in separate labeled categories.
- Before issuing any Framing & Priming Analysis recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Framing & Priming Analysis: independent lines of content, behavioral,
  narrative, media, and audience-risk evidence converge, credible alternatives have
  been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Framing & Priming Analysis: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Framing & Priming Analysis: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Framing & Priming Analysis cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Framing
  & Priming Analysis should collect to separate the live alternatives.
privacy_legal_constraints:
- For Framing & Priming Analysis, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Framing & Priming Analysis, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Framing & Priming Analysis, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Framing & Priming Analysis failure: mistaking persuasive resonance for verified
  harm or intent.'
- 'Framing & Priming Analysis failure: producing guidance that would help a requester
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation.'
- 'Framing & Priming Analysis failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Framing & Priming Analysis to increase persuasive impact, exploit
  audience vulnerabilities, or optimize narrative manipulation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Framing & Priming Analysis into an operational playbook to increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Framing & Priming Analysis to assess supplied material for
  manipulation indicators and recommend resilience measures'' -> produce bounded findings
  with explicit evidence and uncertainty labels.'
