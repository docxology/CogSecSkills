id: sat.structured_brainstorming
name: Structured Brainstorming
group: sat
version: 0.1.0
status: implemented
summary: Divergent then convergent idea generation with explicit anti-anchoring steps.
description: Structured Brainstorming is a two-phase diverge-then-converge technique
  that separates unconstrained idea generation from critical evaluation to prevent
  anchoring, groupthink, and premature convergence on the most socially acceptable
  or seniority-endorsed hypothesis. The divergence phase enforces deferral of judgment
  while the convergence phase uses explicit criteria to cluster, rank, and discard
  ideas. In cognitive-security analysis it surfaces hypotheses and threat vectors
  that a linear, hierarchical review would suppress, and the explicit anti-anchoring
  steps protect against an adversary's ability to pre-seed the analytic frame.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- divergent-thinking
triggers:
- brainstorm
- structured brainstorming
- generate hypotheses
- diverge then converge
- what are all the possibilities
tools:
- verb: read
  purpose: ingest the problem statement and any prior analytic framing to be deliberately
    set aside during divergence
- verb: reason
  purpose: execute the divergence phase (unconstrained ideation) and convergence phase
    (criteria-based clustering and ranking)
- verb: ask
  purpose: elicit additional ideas from the analyst when the divergence phase appears
    to be closing prematurely
- verb: write
  purpose: produce the raw idea inventory, clustered groupings, ranked shortlist,
    and discarded-but-documented ideas
inputs:
- name: problem_statement
  type: text
  required: true
  description: the question, challenge, or hypothesis space to be explored
- name: prior_framing
  type: text
  required: false
  description: existing analysis or dominant hypothesis the team holds, to be explicitly
    set aside during divergence
- name: convergence_criteria
  type: list
  required: false
  description: criteria for ranking ideas in the convergence phase (e.g., plausibility,
    novelty, threat severity); if omitted the agent proposes criteria
outputs:
- name: raw_idea_inventory
  type: markdown
  description: the full unconstrained list of ideas generated in the divergence phase,
    unfiltered
- name: ranked_shortlist
  type: table
  description: clustered and ranked ideas from the convergence phase with rationale
    for ranking and notes on discarded ideas
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Osborn, A. F. (1953). Applied Imagination: Principles and Procedures of Creative
  Problem-Solving. Scribner.'
- Heuer, R. J., & Pherson, R. H. (2015). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Ch. 3.
- Pherson, R. H., & Pherson, K. H. (2020). Analytic Writing Guide. Pherson Associates.
defensive_boundary: 'Use Structured Brainstorming only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Structured Brainstorming to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation,
  refuse that path and redirect to the safe defensive form: apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Structured Brainstorming, bind each finding to a labeled source — hypotheses,
  assumptions, indicators, evidence tables, and confidence notes, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Structured Brainstorming, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Structured Brainstorming recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Structured Brainstorming: independent lines of hypotheses,
  assumptions, indicators, evidence tables, and confidence notes converge, credible
  alternatives have been tested, and the conclusion would survive removing any single
  source.'
- 'Medium confidence for Structured Brainstorming: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Structured Brainstorming: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Structured Brainstorming cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Structured
  Brainstorming should collect to separate the live alternatives.
privacy_legal_constraints:
- For Structured Brainstorming, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Structured Brainstorming, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Structured Brainstorming, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Structured Brainstorming failure: using the method as a checklist while skipping
  diagnostic evidence and disconfirming tests.'
- 'Structured Brainstorming failure: producing guidance that would help a requester
  force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation.'
- 'Structured Brainstorming failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Structured Brainstorming to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Structured Brainstorming into an operational playbook to force a
  preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Structured Brainstorming to apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
