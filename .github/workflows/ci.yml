name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (into the uv-managed venv from setup-uv)
        # figures extra pulls matplotlib/seaborn/numpy so the figure-asset
        # tests run for real (no skips) rather than failing on a missing import.
        run: uv pip install -e ".[dev,figures]"

      - name: Lint (ruff)
        run: |
          uv run ruff check src/cogsecskills tests
          uv run ruff format --check src/cogsecskills tests

      - name: Type check (mypy)
        run: uv run mypy

      - name: Tests (pytest + coverage gate)
        run: uv run pytest --cov=cogsecskills --cov-report=term-missing --cov-fail-under=97

      - name: Validate skill library (0 errors)
        run: uv run cogsecskills validate

      - name: Quality lint (doctor)
        run: uv run cogsecskills doctor

      - name: Coherence gates (no generated-file drift)
        run: |
          uv run cogsecskills definitions --check
          uv run cogsecskills scenarios --check
          uv run cogsecskills examples --check
          uv run cogsecskills evals --check
          uv run cogsecskills dashboard --check
          uv run cogsecskills release-metadata --check
          uv run cogsecskills manuscript-assets --check
