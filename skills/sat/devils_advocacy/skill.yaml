id: sat.devils_advocacy
name: Devil's Advocacy
group: sat
version: 0.1.0
status: implemented
summary: Build the strongest principled case against the consensus to test its robustness.
description: Devil's Advocacy is a Heuer & Pherson challenge-analysis technique in
  which an analyst is deliberately assigned to construct the most credible principled
  case AGAINST a prevailing consensus or lead judgment. The goal is not to win but
  to test whether the consensus is robust under serious challenge or merely comfortable.
  The advocate exposes the assumptions the judgment rests on, mines the evidence base
  for contradicting or merely-assumed items, mounts the best alternative interpretation
  in good faith, and then honestly reports whether the consensus survived and what
  new collection would resolve the dispute.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- challenge-analysis
- heuer
triggers:
- devil's advocate
- challenge the consensus
- stress-test the lead judgment
- argue the contrary case
- is our consensus robust
- test the prevailing view
tools:
- verb: read
  purpose: Ingest the consensus judgment, its supporting evidence, and the stated
    or implicit assumptions it rests on.
- verb: reason
  purpose: Identify vulnerable assumptions and construct the strongest good-faith
    alternative interpretation against the consensus.
- verb: write
  purpose: Record the counter-case, the robustness verdict, and the new collection
    that would resolve the dispute.
inputs:
- name: consensus_judgment
  type: text
  required: true
  description: The prevailing consensus or lead judgment to be challenged, stated
    as a clear claim.
- name: evidence_base
  type: text
  required: true
  description: The evidence, sources, and assumptions the consensus judgment currently
    rests on.
outputs:
- name: counter_case
  type: markdown
  description: The strongest good-faith principled case against the consensus, with
    its supporting evidence and reasoning.
- name: robustness_verdict
  type: markdown
  description: Assessment of whether the consensus survived the challenge, plus the
    new collection that would resolve the dispute.
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Heuer & Pherson (2014). Structured Analytic Techniques for Intelligence Analysis.
defensive_boundary: 'Use Devil''s Advocacy only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Devil''s Advocacy to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Devil's Advocacy, bind each finding to a labeled source — hypotheses, assumptions,
  indicators, evidence tables, and confidence notes, a cited reference, or an explicitly
  marked inference — and never present inference as observed evidence.
- For Devil's Advocacy, keep observations, assumptions, inferences, and missing information
  in separate labeled categories.
- Before issuing any Devil's Advocacy recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Devil''s Advocacy: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Devil''s Advocacy: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Devil''s Advocacy: the evidence is sparse, single-source, contested,
  or mostly inferential, so competing explanations must be preserved in the output.'
uncertainty_handling:
- State plainly what Devil's Advocacy cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Devil's
  Advocacy should collect to separate the live alternatives.
privacy_legal_constraints:
- For Devil's Advocacy, use only data the caller is authorized to analyze, drawn from
  public or source-approved records.
- For Devil's Advocacy, protect privacy by preferring aggregate, role-level, or artifact-level
  summaries over individual targeting unless an individual is essential to the defensive
  question.
- For Devil's Advocacy, do not infer protected traits, private identity, intent, location,
  or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Devil''s Advocacy failure: using the method as a checklist while skipping diagnostic
  evidence and disconfirming tests.'
- 'Devil''s Advocacy failure: producing guidance that would help a requester force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Devil''s Advocacy failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Devil''s Advocacy to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Devil''s Advocacy into an operational playbook to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Devil''s Advocacy to apply the structured technique to supplied
  evidence while preserving alternatives and uncertainty'' -> produce bounded findings
  with explicit evidence and uncertainty labels.'
