id: sat.nominal_group_technique
name: Nominal Group Technique
group: sat
version: 0.1.0
status: implemented
summary: Silent independent ideation before discussion to counter dominance and groupthink.
description: Nominal Group Technique (NGT) is a structured ideation and prioritization
  method in which participants independently generate ideas in writing before any
  group discussion, then share, clarify, and vote on items in a controlled sequence.
  By separating divergent from convergent phases and enforcing silent individual work
  first, NGT neutralizes vocal-dominance bias, anchoring, and groupthink that corrupt
  unstructured brainstorming. In cognitive-security contexts it is used to surface
  the full range of hypotheses or threat indicators a team holds without social-pressure
  distortion.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- group-process
triggers:
- nominal group technique
- NGT
- silent idea generation before discussion
- prevent groupthink in brainstorm
- controlled voting on ideas
tools:
- verb: read
  purpose: ingest the focal question, group roster, and any prior analytic context
- verb: reason
  purpose: generate independent idea sets, perform round-robin consolidation, and
    execute the weighted-voting tally
- verb: write
  purpose: 'emit the structured NGT record: question, idea list, vote tallies, and
    ranked output'
inputs:
- name: focal_question
  type: text
  required: true
  description: The precisely worded analytic question posed to the group (e.g., 'What
    are the most plausible indicators that Actor X will escalate?')
- name: participant_idea_sets
  type: list
  required: true
  description: Independently authored idea lists from each participant, submitted
    before any discussion
- name: prior_context
  type: text
  required: false
  description: Background intelligence, prior assessments, or framing documents provided
    to all participants equally before silent generation
outputs:
- name: ngt_record
  type: markdown
  description: 'Full NGT session record: focal question, consolidated idea list with
    author tags removed, clarification notes, weighted vote tallies, and final ranked
    list of ideas'
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Delbecq, A. L., Van de Ven, A. H., & Gustafson, D. H. (1975). Group Techniques
  for Program Planning: A Guide to Nominal Group and Delphi Processes. Scott, Foresman.'
- Pherson, R. H., & Heuer, R. J. (2021). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Chapter on Idea Generation techniques.
defensive_boundary: 'Use Nominal Group Technique only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Nominal Group Technique to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Nominal Group Technique, bind each finding to a labeled source — hypotheses,
  assumptions, indicators, evidence tables, and confidence notes, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Nominal Group Technique, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Nominal Group Technique recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Nominal Group Technique: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Nominal Group Technique: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Nominal Group Technique: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Nominal Group Technique cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Nominal
  Group Technique should collect to separate the live alternatives.
privacy_legal_constraints:
- For Nominal Group Technique, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Nominal Group Technique, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Nominal Group Technique, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Nominal Group Technique failure: using the method as a checklist while skipping
  diagnostic evidence and disconfirming tests.'
- 'Nominal Group Technique failure: producing guidance that would help a requester
  force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation.'
- 'Nominal Group Technique failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Nominal Group Technique to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Nominal Group Technique into an operational playbook to force a
  preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Nominal Group Technique to apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
