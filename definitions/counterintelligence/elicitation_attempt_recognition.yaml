id: counterintelligence.elicitation_attempt_recognition
description: Elicitation attempt recognition applies counterintelligence tradecraft
  to identify when a conversation partner is systematically extracting sensitive information
  through social engineering rather than routine exchange. The technique catalogs
  canonical elicitation approaches — flattery, quid pro quo, volunteering false information
  to provoke correction, feigned ignorance, deliberate provocative statements, and
  appeals to ego or ideology — then maps observed conversational moves against that
  taxonomy. Defensive awareness of these patterns enables the target to disengage,
  provide only authorized information, or report the contact without tipping off the
  elicitor.
tags:
- cognitive-security
- counterintelligence
- social-engineering
triggers:
- someone is fishing for information
- elicitation attempt
- social engineering conversation
- someone asking leading questions
- suspicious outreach or flattery
- recognize when I am being pumped for info
tools:
- verb: read
  purpose: ingest the conversation transcript or behavioral description to analyze
- verb: reason
  purpose: match observed conversational moves against the elicitation taxonomy and
    score the pattern
- verb: write
  purpose: produce a recognition report identifying technique clusters, risk level,
    and recommended response
inputs:
- name: conversation_or_description
  type: text
  required: true
  description: A transcript, paraphrase, or behavioral description of the interaction
    under review
- name: context
  type: text
  required: false
  description: Background on the setting, relationship, and sensitivity of topics
    discussed
outputs:
- name: elicitation_recognition_report
  type: markdown
  description: A structured report identifying which elicitation techniques appear
    present, a composite risk rating, and specific recommended defensive responses
references:
- 'Navarro, J. (2012). Louder Than Words: Take Your Career from Average to Exceptional
  with the Hidden Power of Nonverbal Intelligence. HarperBusiness. (Chapter on elicitation.)'
- U.S. Defense Intelligence Agency. (2010). Elicitation Techniques. Counterintelligence
  Awareness Training series.
- 'Ekman, P. (2009). Telling Lies: Clues to Deceit in the Marketplace, Politics, and
  Marriage. W. W. Norton.'
- 'ASIS International. (2008). Elicitation: Recognizing It and Protecting Yourself.
  Security Management.'
when_to_use:
- After a conversation that felt subtly probing, flattering, or systematically redirecting
  toward sensitive topics
- When reviewing an outreach message, interview, or networking exchange for suspicious
  information-gathering patterns
- When briefing personnel on recognizing social engineering before high-exposure events
  (conferences, foreign travel, executive meetings)
- When a contact volunteers false or exaggerated information and then awaits correction
what_it_produces:
- A taxonomy-keyed mapping of observed conversational moves to known elicitation techniques
- A composite risk rating (low / medium / high) with rationale
- 'Recommended defensive postures: disengage, limit, redirect, or report'
- Indicators to watch for in any follow-up contact
key_discipline:
- Map each suspicious move to a named elicitation technique before concluding intent
  — pattern clusters are more diagnostic than single moves
- 'Distinguish elicitation from legitimate curiosity: elicitation escalates and re-probes
  when deflected; genuine curiosity does not'
- Never tip off the suspected elicitor during assessment — maintain normal affect
  while taking mental or written notes
- Err toward reporting ambiguous cases to a security officer rather than self-resolving;
  the cost of a false positive is far lower than a missed contact
workflow_steps:
- verbs:
  - read
  title: Catalog the interaction
  text: Read the conversation transcript or behavioral description in full. Note every
    question asked, statement volunteered, compliment offered, or redirect attempted,
    creating a chronological behavioral log.
- verbs:
  - reason
  title: Apply elicitation taxonomy
  text: 'Map each logged behavior to the canonical elicitation technique taxonomy:
    flattery/ego appeal, quid pro quo, volunteering false info to elicit correction,
    feigned ignorance, provocative statement, appeal to vanity/ideology, apparent
    disinterest, and topic bracketing. Score each technique hit; note whether the
    interaction re-probed after deflection (a strong positive indicator).'
- verbs:
  - reason
  title: Assess pattern and intent
  text: 'Evaluate the cluster: single isolated techniques may be benign; multiple
    techniques targeting the same sensitive topic domain are high-confidence elicitation.
    Consider the elicitor''s access, the sensitivity of the information sought, and
    any anomalies in the relationship or setting.'
- verbs:
  - write
  title: Produce recognition report and response guidance
  text: Write a structured report naming which techniques appeared, the composite
    risk rating with rationale, the information domains targeted, and specific recommended
    defensive actions (limit future contact, report to security officer, provide only
    authorized information, document the interaction).
anti_criteria:
- Do not attribute malicious intent solely on a single technique hit — a pattern of
  multiple techniques re-probing the same topic is required for high confidence
- Do not include guidance for running elicitation operations offensively — this skill
  is strictly for recognition and defense
- Do not recommend confronting the suspected elicitor directly without security officer
  guidance
- Do not treat this analysis as legally conclusive — it is a risk assessment to inform
  reporting, not a determination of guilt
defensive_boundary: 'Use Elicitation Attempt Recognition only for counterintelligence
  and analytic-process defense: recognize, assess, document, or defend analytic teams,
  collection processes, and institutional trust boundaries. Do not use this skill
  to evade detection, improve elicitation, profile targets for exploitation, or conceal
  tradecraft.'
misuse_redirect: 'If a request asks Elicitation Attempt Recognition to evade detection,
  improve elicitation, profile targets for exploitation, or conceal tradecraft, refuse
  that path and redirect to the safe defensive form: review supplied interactions
  or processes for deception, elicitation, or insider-risk indicators.'
evidence_requirements:
- For Elicitation Attempt Recognition, tie each elicitation recognition report claim
  to concrete evidence from the specific conversation or description, and context
  item, source excerpt, observation, or command result that supports it.
- For Elicitation Attempt Recognition, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the elicitation
  recognition report.
- Before recommending any Elicitation Attempt Recognition action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Elicitation Attempt Recognition: the elicitation recognition report is
  supported by multiple independent interaction records, process artifacts, deception
  indicators, and alternative explanations; catalog the interaction and apply elicitation
  taxonomy checks agree, and no unresolved contradiction would change the result.'
- 'Medium for Elicitation Attempt Recognition: the elicitation recognition report
  is plausible, but one important conversation or description source, comparison case,
  or alternative explanation remains incomplete.'
- 'Low for Elicitation Attempt Recognition: the elicitation recognition report rests
  on sparse, single-source, contested, or mostly inferential evidence; keep the result
  provisional and list the next check.'
uncertainty_handling:
- State what Elicitation Attempt Recognition cannot determine from the supplied or
  authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating counterintelligence evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Elicitation Attempt Recognition, use only authorized conversation or description,
  and context, public or source-approved records, and caller-provided context needed
  for the defensive task.
- For Elicitation Attempt Recognition, minimize person-level detail in the elicitation
  recognition report; prefer aggregate, artifact-level, role-level, or case-level
  summaries unless an individual is essential to the defensive question.
- For Elicitation Attempt Recognition, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Elicitation Attempt Recognition: treating conversation or description as complete
  when catalog the interaction and apply elicitation taxonomy checks or contradictory
  evidence are missing.'
- 'Elicitation Attempt Recognition: producing advice that would help a requester evade
  detection, improve elicitation, profile targets for exploitation, or conceal tradecraft.'
- 'Elicitation Attempt Recognition: reporting the elicitation recognition report without
  uncertainty labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Elicitation Attempt Recognition outputs to evade detection, improve
  elicitation, profile targets for exploitation, or conceal tradecraft'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the elicitation recognition report from Elicitation Attempt Recognition
  into an operational playbook to evade detection, improve elicitation, profile targets
  for exploitation, or conceal tradecraft'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Elicitation Attempt Recognition to review supplied interactions
  or processes for deception, elicitation, or insider-risk indicators with conversation
  or description, and context'' -> produce bounded findings with evidence and uncertainty
  labels.'
