id: cognitive_security.cognitive_attack_kill_chain
name: Cognitive Attack Kill Chain
group: cognitive_security
version: 0.1.0
status: implemented
summary: Stage a cognitive attack (recon→delivery→exploitation→persistence) to plan
  defenses per stage.
description: The Cognitive Attack Kill Chain adapts the cyber-security kill-chain
  model to influence operations, decomposing a cognitive attack into stages — reconnaissance,
  weaponization, delivery, exploitation, installation, command-and-control, and persistence
  — so that defenders can identify intervention points at each stage before the attack
  achieves its goal. By mapping observed or anticipated adversary activities to kill-chain
  stages, defenders can assess which stages have already been traversed, which are
  in progress, and which can still be disrupted. This is a defensive red-teaming and
  threat-modeling technique, not an operational planning framework.
ageint_topic: cognitive-security
tags:
- cognitive-security
- cognitive_security
- threat-modeling
- influence-operations
triggers:
- cognitive attack kill chain
- stages of an influence operation
- where in the kill chain
- map the influence campaign stages
- kill chain analysis for disinformation
- at what stage is the attack
- disrupt the campaign
tools:
- verb: read
  purpose: ingest case evidence, campaign artifacts, and threat intelligence describing
    observed adversary activities
- verb: search
  purpose: query threat-intelligence feeds, prior campaign analyses, and academic
    literature to fill evidence gaps and contextualize TTP patterns
- verb: reason
  purpose: map observed activities to kill-chain stages, assess stage completeness,
    and identify highest-leverage disruption points
- verb: write
  purpose: produce a staged kill-chain map, defender action table, and residual uncertainty
    assessment
inputs:
- name: campaign_evidence
  type: text
  required: true
  description: 'Observed or suspected adversary activities: accounts, content artifacts,
    distribution networks, timing, and platform behaviors'
- name: target_context
  type: text
  required: true
  description: Description of the audience being targeted, the information environment,
    and the apparent objective of the campaign
- name: prior_threat_intel
  type: text
  required: false
  description: Known TTPs, prior campaigns by the same or similar actors, or relevant
    threat reports
outputs:
- name: kill_chain_map
  type: table
  description: 'Stage-by-stage table showing: stage name, observed indicators mapped
    to that stage, stage completion assessment (completed / in-progress / not-yet-reached
    / unknown), and key uncertainties'
- name: defender_action_plan
  type: markdown
  description: Prioritized list of defender interventions per stage, describing what
    action can be taken, by whom, and what the disruption effect would be
- name: residual_uncertainty_log
  type: markdown
  description: Explicit log of what is not known, which stage assessments are low-confidence,
    and what collection would reduce key uncertainties
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Hutchins, E., Cloppert, M., & Amin, R. (2011). Intelligence-Driven Computer Network
  Defense Informed by Analysis of Adversary Campaigns and Intrusion Kill Chains. Lockheed
  Martin.
- 'Singer, P. W., & Brooking, E. T. (2018). LikeWar: The Weaponization of Social Media.
  Eamon Dolan/Houghton Mifflin Harcourt.'
- 'Rid, T. (2020). Active Measures: The Secret History of Disinformation and Political
  Warfare. Farrar, Straus and Giroux.'
- NATO StratCom Centre of Excellence (2020). Cognitive Warfare. NATO STRATCOM COE.
- 'Wardle, C., & Derakhshan, H. (2017). Information Disorder: Toward an Interdisciplinary
  Framework for Research and Policy Making. Council of Europe.'
defensive_boundary: 'Use Cognitive Attack Kill Chain only for cognitive-security defense:
  recognize, assess, document, or defend audiences, decision-makers, and public discourse.
  Do not use this skill to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Cognitive Attack Kill Chain to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Cognitive Attack Kill Chain, tie each kill chain map, defender action plan,
  and residual uncertainty log claim to concrete evidence from the specific campaign
  evidence, target context, and prior threat intel item, source excerpt, observation,
  or command result that supports it.
- For Cognitive Attack Kill Chain, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the kill
  chain map.
- Before recommending any Cognitive Attack Kill Chain action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Cognitive Attack Kill Chain: the kill chain map is supported by multiple
  independent content, behavioral, narrative, media, and audience-risk evidence; collect
  and organize campaign evidence and map evidence to kill-chain stages checks agree,
  and no unresolved contradiction would change the result.'
- 'Medium for Cognitive Attack Kill Chain: the kill chain map is plausible, but one
  important campaign evidence source, comparison case, or alternative explanation
  remains incomplete.'
- 'Low for Cognitive Attack Kill Chain: the kill chain map rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Cognitive Attack Kill Chain cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Cognitive Attack Kill Chain, use only authorized campaign evidence, target context,
  and prior threat intel, public or source-approved records, and caller-provided context
  needed for the defensive task.
- For Cognitive Attack Kill Chain, minimize person-level detail in the kill chain
  map; prefer aggregate, artifact-level, role-level, or case-level summaries unless
  an individual is essential to the defensive question.
- For Cognitive Attack Kill Chain, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Cognitive Attack Kill Chain: treating campaign evidence as complete when collect
  and organize campaign evidence and map evidence to kill-chain stages checks or contradictory
  evidence are missing.'
- 'Cognitive Attack Kill Chain: producing advice that would help a requester increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation.'
- 'Cognitive Attack Kill Chain: reporting the kill chain map without uncertainty labels,
  alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Cognitive Attack Kill Chain outputs to increase persuasive impact,
  exploit audience vulnerabilities, or optimize narrative manipulation'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the kill chain map from Cognitive Attack Kill Chain into an operational
  playbook to increase persuasive impact, exploit audience vulnerabilities, or optimize
  narrative manipulation'' -> refuse and offer governance, detection, or mitigation
  analysis.'
- 'Safe defensive: ''Use Cognitive Attack Kill Chain to assess supplied material for
  manipulation indicators and recommend resilience measures with campaign evidence,
  target context, and prior threat intel'' -> produce bounded findings with evidence
  and uncertainty labels.'
