id: cognitive_security.source_credibility_evaluation
description: 'Evaluate an information source and a specific claim along two independent
  axes using the NATO/Admiralty Code: source reliability (A–F) based on proximity,
  track record, motive, and independence; and information credibility (1–6) based
  on independent confirmation, plausibility, and consistency with known facts. Produce
  a justified two-part grade (e.g. B2) and state how that grade should bound downstream
  use of the information.'
tags:
- cognitive-security
- source-evaluation
- admiralty-code
- verification
triggers:
- source credibility
- how reliable is this source
- admiralty code
- can I trust this report
- grade this source
- is this claim corroborated
- evaluate source reliability
tools:
- verb: read
  purpose: Read the source material, the specific claim, and any provided corroborating
    documents.
- verb: search
  purpose: Look for independent sources that confirm or contradict the claim and the
    source's track record.
- verb: reason
  purpose: Weigh proximity, motive, independence, plausibility, and corroboration
    to assign the A–F and 1–6 grades.
- verb: write
  purpose: Emit the justified two-axis grade and the downstream-use bound.
inputs:
- name: source
  type: string
  required: true
  description: Identification of the information source (author, outlet, account,
    document origin).
- name: claim
  type: string
  required: true
  description: The specific factual claim to be graded for credibility.
- name: corroboration
  type: list
  required: false
  description: Optional independent sources or evidence offered to confirm the claim.
outputs:
- name: reliability_grade
  type: string
  description: Source reliability letter A–F with written justification.
- name: credibility_grade
  type: string
  description: Information credibility number 1–6 with written justification.
- name: usage_bound
  type: string
  description: How the combined grade should constrain downstream use of the information.
references:
- NATO Admiralty Code (source reliability A–F / information credibility 1–6).
when_to_use:
- Someone asks "how reliable is this source?" or "can I trust this report?"
- A claim needs a defensible, auditable credibility rating before it is acted on.
- You need to distinguish a trustworthy outlet carrying an uncorroborated rumor
what_it_produces:
- A **source-reliability letter (A–F)** with justification grounded in
- An **information-credibility number (1–6)** with justification grounded in
- A combined grade (e.g. `B2`) and an explicit statement of how that grade
key_discipline:
- The **letter** judges the *source* — its history, position, and incentives —
- The **number** judges *this specific claim* — whether independent evidence
workflow_steps:
- verbs:
  - read
  title: Identify the source and its proximity
  text: Determine who or what the source is, how close it sits to the events, what
    access it had, and whether it is primary, secondary, expert, or merely relaying
    others.
- verbs:
  - read
  - search
  title: Assess track record, motive, and independence
  text: Check past accuracy, incentives to mislead, funding or affiliation signals,
    and whether the source is independent enough to corroborate anything.
- verbs:
  - reason
  - write
  title: Assign the source-reliability letter
  text: Map proximity, track record, motive, and independence to A through F, then
    justify the letter in evidence-bound language.
- verbs:
  - read
  - search
  - reason
  title: Assess the specific claim independently
  text: Check whether the exact claim is confirmed by independent sources, plausible,
    and consistent with known facts. Distinguish confirmation from repetition.
- verbs:
  - reason
  - write
  title: Assign the information-credibility number
  text: Map corroboration and plausibility to 1 through 6, naming confirming, contradicting,
    or absent evidence.
- verbs:
  - write
  title: Preserve the two-axis distinction
  text: State that the letter grades the source and the number grades this specific
    claim, then report the combined pair such as B2.
- verbs:
  - reason
  - write
  title: Bound downstream use
  text: Translate the combined grade into practical constraints, including whether
    the claim can be used, requires more corroboration, or should be withheld.
anti_criteria:
- Do **not** conflate source reliability with claim credibility — never collapse
- Do **not** let prestige, fame, or authority substitute for corroboration of
- Do **not** assign **A1** without genuine independent confirmation — A1
- Do **not** treat repetition or re-syndication of the same originating claim as
defensive_boundary: 'Use Source Credibility Evaluation only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Source Credibility Evaluation to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Source Credibility Evaluation, tie each reliability grade, credibility grade,
  and usage bound claim to concrete evidence from the specific source, claim, and
  corroboration item, source excerpt, observation, or command result that supports
  it.
- For Source Credibility Evaluation, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the reliability
  grade.
- Before recommending any Source Credibility Evaluation action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Source Credibility Evaluation: the reliability grade is supported by multiple
  independent content, behavioral, narrative, media, and audience-risk evidence; identify
  the source and its proximity and assess track record, motive, and independence checks
  agree, and no unresolved contradiction would change the result.'
- 'Medium for Source Credibility Evaluation: the reliability grade is plausible, but
  one important source source, comparison case, or alternative explanation remains
  incomplete.'
- 'Low for Source Credibility Evaluation: the reliability grade rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Source Credibility Evaluation cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Source Credibility Evaluation, use only authorized source, claim, and corroboration,
  public or source-approved records, and caller-provided context needed for the defensive
  task.
- For Source Credibility Evaluation, minimize person-level detail in the reliability
  grade; prefer aggregate, artifact-level, role-level, or case-level summaries unless
  an individual is essential to the defensive question.
- For Source Credibility Evaluation, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Source Credibility Evaluation: treating source as complete when identify the source
  and its proximity and assess track record, motive, and independence checks or contradictory
  evidence are missing.'
- 'Source Credibility Evaluation: producing advice that would help a requester increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation.'
- 'Source Credibility Evaluation: reporting the reliability grade without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Source Credibility Evaluation outputs to increase persuasive impact,
  exploit audience vulnerabilities, or optimize narrative manipulation'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the reliability grade from Source Credibility Evaluation into
  an operational playbook to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Source Credibility Evaluation to assess supplied material
  for manipulation indicators and recommend resilience measures with source, claim,
  and corroboration'' -> produce bounded findings with evidence and uncertainty labels.'
