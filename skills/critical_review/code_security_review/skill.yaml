id: critical_review.code_security_review
name: Code Security Review
group: critical_review
version: 0.1.0
status: implemented
summary: Review code for security defects, silent failures, and unsafe fallback behavior.
description: Code Security Review is a structured audit of source code for security
  defects, silent failure modes, unsafe fallback behavior, and patterns that can be
  exploited by adversaries. Grounded in secure-code review methodology (OWASP, NIST
  SSDF), it examines authentication, authorization, input validation, error handling,
  secrets management, dependency risk, and supply-chain integrity. In cognitive-security
  contexts, code review extends to detecting logic that silently degrades or manipulates
  AI-system behavior, suppresses failure signals, or creates covert channels for adversarial
  influence.
ageint_topic: adversarial-assurance
tags:
- cognitive-security
- critical_review
- secure-code-review
- supply-chain-security
triggers:
- code security review
- security audit
- find vulnerabilities
- silent failure
- unsafe fallback
- secure code
- review this code for security issues
- supply chain risk
- dependency audit
tools:
- verb: read
  purpose: ingest the source code, configuration files, dependency manifests, and
    any threat model or security context provided
- verb: exec
  purpose: run static analysis tools, dependency vulnerability scanners, or linting
    gates to surface machine-detectable security defects
- verb: reason
  purpose: apply structured security review reasoning to identify defect classes,
    assess exploitability and impact, and evaluate silent-failure and fallback risk
    patterns
- verb: write
  purpose: emit the security findings report with severity ratings, defect descriptions,
    reproduction steps, and remediation recommendations
inputs:
- name: code
  type: text
  required: true
  description: The source code to be reviewed — may be a file, module, function, or
    diff; include configuration files and dependency manifests if available
- name: threat_model
  type: text
  required: false
  description: 'Optional description of the adversarial context: who might attack
    this code, what assets are at risk, and what attack vectors are most plausible'
- name: review_scope
  type: list
  required: false
  description: Optional list of security concern categories to prioritize (e.g., input-validation,
    authentication, error-handling, dependency-risk, silent-failure, AI-specific)
outputs:
- name: findings_table
  type: table
  description: 'A table of security findings: finding ID, defect category, location
    (file/line), severity (critical/high/medium/low/informational), description, exploitability
    assessment, and recommended remediation'
- name: security_review_narrative
  type: markdown
  description: A narrative report covering the overall security posture of the reviewed
    code, the most critical findings, patterns of unsafe behavior (especially silent
    failures and unsafe fallbacks), dependency risk summary, and a prioritized remediation
    roadmap
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- OWASP Foundation. (2023). OWASP Code Review Guide (v3.0). https://owasp.org/www-project-code-review-guide/
- NIST. (2022). Secure Software Development Framework (SSDF), SP 800-218. National
  Institute of Standards and Technology.
- Seacord, R. C. (2013). Secure Coding in C and C++ (2nd ed.). Addison-Wesley. (Applicable
  defect taxonomy.)
- Chess, B., & West, J. (2007). Secure Programming with Static Analysis. Addison-Wesley.
- 'Shostack, A. (2014). Threat Modeling: Designing for Security. Wiley.'
- CISA / NSA. (2022). Software Supply Chain Security Guidance. Cybersecurity and Infrastructure
  Security Agency.
defensive_boundary: 'Use Code Security Review only for critical review and assurance:
  recognize, assess, document, or defend evidence quality, implementation integrity,
  and decision accountability. Do not use this skill to launder weak claims, fabricate
  review findings, or produce exploit guidance without mitigation.'
misuse_redirect: 'If a request asks Code Security Review to launder weak claims, fabricate
  review findings, or produce exploit guidance without mitigation, refuse that path
  and redirect to the safe defensive form: review supplied artifacts for defects,
  evidence gaps, safety risks, or reproducibility failures.'
evidence_requirements:
- For Code Security Review, bind every finding to concrete evidence — a specific file-and-line
  excerpt, a dependency manifest entry, or captured scanner or static-analysis command
  output — and name the trust boundary and adversary action that would turn that evidence
  into an exploit, never suppressing stderr or exit codes while gathering it.
- For Code Security Review, label observations, derived features, assumptions, inferences,
  contradictions, and missing inputs separately before writing the findings table.
- Before recommending any Code Security Review action, identify the weakest evidence
  link, the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Code Security Review: each finding in the table is pinned to a specific
  file and line and corroborated by both manual tracing and automated scanner output,
  the severity and exploitability ratings hold when the trust-boundary path is re-traced,
  and no unresolved contradiction about a silent-failure or unsafe-fallback path would
  change the deployment recommendation.'
- 'Medium for Code Security Review: the findings table is plausible, but one important
  code source, comparison case, or alternative explanation remains incomplete.'
- 'Low for Code Security Review: the findings table rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Code Security Review cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating critical_review evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Code Security Review, use only authorized code, threat model, and review scope,
  public or source-approved records, and caller-provided context needed for the defensive
  task.
- For Code Security Review, minimize person-level detail in the findings table; prefer
  aggregate, artifact-level, role-level, or case-level summaries unless an individual
  is essential to the defensive question.
- For Code Security Review, do not infer protected traits, private identity, intent,
  location, legal culpability, or platform account ownership beyond the supplied and
  authorized evidence.
failure_modes:
- 'Code Security Review: treating a green automated scan as a clean bill of health
  when the manual pass for silent failures, unsafe fallbacks, and trust-boundary input
  validation was never performed, so swallowed exceptions and fail-open fallback paths
  that no tool detects propagate into a deployed system as invisible attack surface.'
- 'Code Security Review: producing advice that would help a requester launder weak
  claims, fabricate review findings, or produce exploit guidance without mitigation.'
- 'Code Security Review: reporting the findings table without uncertainty labels,
  alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Code Security Review outputs to launder weak claims, fabricate review
  findings, or produce exploit guidance without mitigation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Convert the findings table from Code Security Review into an operational
  playbook to launder weak claims, fabricate review findings, or produce exploit guidance
  without mitigation'' -> refuse and offer governance, detection, or mitigation analysis.'
- 'Safe defensive: ''Use Code Security Review to review supplied artifacts for defects,
  evidence gaps, safety risks, or reproducibility failures with code, threat model,
  and review scope'' -> produce bounded findings with evidence and uncertainty labels.'
