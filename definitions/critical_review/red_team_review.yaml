id: critical_review.red_team_review
description: Red-Team Review adversarially stresses an artifact — a plan, policy,
  argument, model, system, or narrative — to find failure modes, attack surfaces,
  and exploitable assumptions that the authors did not anticipate. Drawing on the
  structured analytic tradition of Devil's Advocacy and Team A/Team B analysis, and
  the security tradition of adversarial red teaming, the reviewer deliberately adopts
  an opposing or adversarial stance, generating the strongest possible critique, attack,
  or counter-narrative the artifact could face. The output is a ranked catalog of
  vulnerabilities, exploitation paths, and proposed mitigations, not a balanced review
  — the goal is maximum stress, not fairness. In cognitive-security contexts this
  includes identifying how a disinformation actor or manipulative adversary could
  exploit a proposed policy, narrative, or analytical product.
tags:
- cognitive-security
- critical_review
- adversarial
- challenge-analysis
triggers:
- red team
- stress test
- adversarial review
- poke holes
- attack this plan
- devil's advocate
- what could go wrong
- find the flaw
tools:
- verb: read
  purpose: ingest the artifact and its stated assumptions, goals, and design rationale
- verb: reason
  purpose: adopt the adversarial perspective to generate and rank failure modes, attack
    paths, and exploitable assumptions
- verb: write
  purpose: produce the ranked vulnerability catalog, exploitation paths, and mitigation
    recommendations
inputs:
- name: artifact
  type: text
  required: true
  description: the plan, policy, argument, model, system, or narrative to be stress-tested
- name: adversary_profile
  type: text
  required: false
  description: a description of the adversary or opposing actor whose perspective
    the red team should adopt (capabilities, goals, resources, constraints)
- name: review_scope
  type: list
  required: false
  description: specific dimensions to focus on (e.g., logical, operational, technical,
    reputational, information-environment)
outputs:
- name: vulnerability_catalog
  type: table
  description: rows = identified vulnerability or failure mode; columns = category,
    description, exploitation path, likelihood, impact, mitigation
- name: red_team_narrative
  type: markdown
  description: adversarial narrative — the strongest case against the artifact, written
    from the opposing perspective, followed by mitigation recommendations
references:
- Heuer, R. J. & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis (2nd ed.), Ch. 7 (Devil's Advocacy, Team A/Team B). CQ Press.
- 'Zenko, M. (2015). Red Team: How to Succeed by Thinking Like the Enemy. Basic Books.'
- NIST SP 800-115 (2008). Technical Guide to Information Security Testing and Assessment.
  §4.3 Adversarial Techniques.
- Chang, W. & Tetlock, P. (2016). Rethinking the Training of Intelligence Analysts.
  Intelligence and National Security 31(6).
when_to_use:
- before committing to a plan, policy, or analytical judgment where overconfidence
  or groupthink is plausible
- when a narrative or information campaign needs to be evaluated for exploitability
  by an adversary
- when a proposed cognitive-security countermeasure needs stress-testing before deployment
- when an analytical product has been produced by a team with shared assumptions and
  an independent adversarial check is warranted
- when an organization needs to identify how an adversary would undermine a proposed
  decision or communication
what_it_produces:
- a ranked vulnerability catalog with exploitation paths and mitigations for each
  identified failure mode
- an adversarial narrative — the strongest case an opposing actor could make against
  the artifact
- a set of mitigation recommendations addressing the highest-priority vulnerabilities
- identification of the assumptions whose failure would be most catastrophic
key_discipline:
- commit fully to the adversarial perspective — half-hearted red teaming produces
  the illusion of scrutiny without the substance
- rank vulnerabilities by exploitability x impact, not by how uncomfortable they are
  to surface
- the red team's job is to find failure modes, not to balance them against strengths
  — balance is for the final synthesis, not the red team phase
- distinguish vulnerabilities that are inherent to the approach from those that are
  remediable — remediable ones get mitigations, inherent ones inform go/no-go
workflow_steps:
- verbs:
  - read
  title: Ingest and model the adversary
  text: Read the artifact thoroughly. Identify its stated goals, key assumptions,
    dependencies, and design rationale. If an adversary profile is provided, internalize
    it; otherwise construct a plausible adversary profile based on who would most
    want the artifact to fail and what capabilities they would plausibly have.
- verbs:
  - reason
  title: Generate attack surface
  text: 'Adopt the adversarial perspective fully. Systematically enumerate vulnerabilities
    across relevant dimensions: logical (assumptions that could be false or attacked),
    operational (execution steps that could fail or be disrupted), technical (exploitable
    design or implementation gaps), informational (how an adversary could exploit
    the artifact in the information environment), and reputational (how the artifact
    could be weaponized against its own authors). Generate failure modes without filtering
    for comfort.'
- verbs:
  - reason
  title: Rank and select highest-priority findings
  text: For each identified vulnerability, estimate exploitability (how easily an
    adversary with the modeled capabilities could exploit it) and impact (how much
    damage successful exploitation would cause). Rank by exploitability x impact.
    Select the top vulnerabilities for deep treatment; note the rest in the catalog.
- verbs:
  - reason
  - write
  title: Write adversarial narrative
  text: Write the strongest case an adversary or critic could make against the artifact,
    from their perspective, as a coherent narrative — not as a list of concerns. This
    surfaces how the vulnerabilities compound and interact. Then shift perspective
    back to analyst and write specific, actionable mitigations for each top vulnerability.
- verbs:
  - write
  title: Compile vulnerability catalog and recommendations
  text: Produce the ranked vulnerability catalog table. Finalize the red-team narrative.
    Write a summary of the most critical findings and the mitigations most likely
    to substantially reduce risk. Flag any vulnerabilities assessed as inherent to
    the approach (not remediable) for escalation.
anti_criteria:
- do not soften the adversarial perspective — an incomplete red team that avoids uncomfortable
  findings provides false assurance
- do not conflate a red-team review with a balanced review — the goal is maximum stress,
  not balance
- do not rank vulnerabilities by how senior the person who introduced them is
- do not terminate the review after finding the first major vulnerability — the worst
  flaw often compounds with secondary ones
- do not produce mitigations that merely restate the existing design without substantive
  change
defensive_boundary: 'Use Red-Team Review only for critical review and assurance: recognize,
  assess, document, or defend evidence quality, implementation integrity, and decision
  accountability. Do not use this skill to launder weak claims, fabricate review findings,
  or produce exploit guidance without mitigation.'
misuse_redirect: 'If a request asks Red-Team Review to launder weak claims, fabricate
  review findings, or produce exploit guidance without mitigation, refuse that path
  and redirect to the safe defensive form: review supplied artifacts for defects,
  evidence gaps, safety risks, or reproducibility failures.'
evidence_requirements:
- For Red-Team Review, bind each finding to a labeled source — artifact excerpts,
  test output, citations, assumptions, and reproducibility records, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Red-Team Review, keep observations, assumptions, inferences, and missing information
  in separate labeled categories.
- Before issuing any Red-Team Review recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Red-Team Review: independent lines of artifact excerpts, test
  output, citations, assumptions, and reproducibility records converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Red-Team Review: the evidence supports the conclusion, but
  one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Red-Team Review: the evidence is sparse, single-source, contested,
  or mostly inferential, so competing explanations must be preserved in the output.'
uncertainty_handling:
- State plainly what Red-Team Review cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Red-Team
  Review should collect to separate the live alternatives.
privacy_legal_constraints:
- For Red-Team Review, use only data the caller is authorized to analyze, drawn from
  public or source-approved records.
- For Red-Team Review, protect privacy by preferring aggregate, role-level, or artifact-level
  summaries over individual targeting unless an individual is essential to the defensive
  question.
- For Red-Team Review, do not infer protected traits, private identity, intent, location,
  or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Red-Team Review failure: performing theatrical critique without concrete evidence,
  severity, or remediation path.'
- 'Red-Team Review failure: producing guidance that would help a requester launder
  weak claims, fabricate review findings, or produce exploit guidance without mitigation.'
- 'Red-Team Review failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Red-Team Review to launder weak claims, fabricate review findings,
  or produce exploit guidance without mitigation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Red-Team Review into an operational playbook to launder weak claims,
  fabricate review findings, or produce exploit guidance without mitigation'' -> refuse
  and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Red-Team Review to review supplied artifacts for defects,
  evidence gaps, safety risks, or reproducibility failures'' -> produce bounded findings
  with explicit evidence and uncertainty labels.'
