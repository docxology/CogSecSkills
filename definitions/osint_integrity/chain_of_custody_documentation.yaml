id: osint_integrity.chain_of_custody_documentation
description: Chain-of-custody documentation records every step in the collection,
  transfer, and analysis of OSINT evidence — capturing who handled each item, when,
  by what method, and what cryptographic hashes confirm it remained unaltered. The
  technique adapts law-enforcement chain-of-custody principles to open-source intelligence
  so that findings can withstand legal, journalistic, or organizational scrutiny.
  Without it, adversaries and skeptics can challenge whether evidence was fabricated,
  tampered, or misidentified. A complete chain anchors findings in verifiable, time-stamped,
  hash-confirmed records.
tags:
- cognitive-security
- osint_integrity
- evidence-integrity
- provenance
triggers:
- chain of custody
- evidence integrity
- hash and preserve
- document collection
- prove evidence wasn't tampered
tools:
- verb: read
  purpose: ingest the evidence items, existing collection logs, and any prior handling
    records
- verb: exec
  purpose: compute cryptographic hashes (SHA-256) of collected files or archived pages
    to seal integrity
- verb: write
  purpose: produce the chain-of-custody log entries, hash manifest, and custody transfer
    records
- verb: reason
  purpose: identify gaps in custody records, flag suspicious handling steps, and assess
    overall integrity
inputs:
- name: evidence_items
  type: list
  required: true
  description: Collected OSINT artifacts — URLs, screenshots, files, archived copies
    — to be documented
- name: collection_context
  type: text
  required: true
  description: Who collected each item, the tools used, the timestamp, and the original
    source URL or identifier
- name: prior_custody_log
  type: table
  required: false
  description: Any existing custody records for items that changed hands before this
    documentation step
outputs:
- name: custody_log
  type: table
  description: Structured table of each evidence item with collector, timestamp, tool,
    hash, and handling events
- name: integrity_summary
  type: markdown
  description: Narrative assessment of chain completeness, any gaps or anomalies,
    and recommendations for remediation
references:
- 'Casey, E. (2011). Digital Evidence and Computer Crime: Forensic Science, Computers,
  and the Internet. Academic Press.'
- Toler, A. & Koenig, S. (2020). Bellingcat's Chain of Custody Guidelines. Bellingcat.
- SWGDE (2016). Best Practices for Computer Forensic Acquisitions. Scientific Working
  Group on Digital Evidence.
when_to_use:
- Before sharing OSINT findings with legal, journalistic, or institutional decision-makers
  who may face adversarial challenge
- When evidence could be subpoenaed or used in formal proceedings
- After collecting from volatile sources (social media, live websites) where content
  may disappear or be altered
- When multiple analysts or teams handle the same artifacts across time
what_it_produces:
- A row-per-artifact custody table with hash, timestamps, collector identity, and
  tool used
- A completeness assessment flagging any gaps where handling is undocumented
- A hash manifest that allows third-party verification that files have not been altered
  since collection
key_discipline:
- Hash at the moment of collection — post-hoc hashing only proves integrity from that
  later moment, not from capture
- Each transfer event (person A to person B, local to cloud storage) must be logged
  as its own row
- Volatile web content must be archived to a persistent store (Wayback Machine, local
  WARC) before any hash is considered meaningful
- A gap in custody is not automatically disqualifying but must be explicitly acknowledged
  and explained
workflow_steps:
- verbs:
  - read
  title: Inventory evidence items
  text: List every artifact to be documented — files, screenshots, archived pages,
    raw URLs. Record the original collection timestamp, source URL, and the identity
    of the collector for each item.
- verbs:
  - exec
  title: Compute and record hashes
  text: Generate a SHA-256 (or SHA-3) hash of each file or archived page at the point
    of collection or at the earliest available moment. Log the hash alongside the
    timestamp in the custody table. For web captures, archive to a persistent store
    first.
- verbs:
  - reason
  title: Identify gaps and anomalies
  text: Review the chain for missing handling events, undocumented transfers, or time
    gaps where tampering could have occurred. Flag any item where the hash cannot
    be verified against the original collection moment.
- verbs:
  - write
  title: Produce custody log and integrity summary
  text: Write the structured custody table and a narrative summary that acknowledges
    gaps, explains their cause, and recommends remediation steps (re-collection, additional
    archiving, or explicit uncertainty disclosure).
anti_criteria:
- Do not backfill hashes after files have been processed, converted, or shared — only
  original-capture hashes have integrity value
- Do not omit transfer events on the assumption they are routine — every hand-off
  is a potential integrity break
- Do not declare custody complete when there are undocumented time gaps; acknowledge
  gaps explicitly in the integrity summary
defensive_boundary: 'Use Chain-of-Custody Documentation only for OSINT integrity and
  source-verification defense: recognize, assess, document, or defend source provenance,
  privacy, chain of custody, and public-source accountability. Do not use this skill
  to dox, deanonymize, harass, bypass access controls, or attribute identity beyond
  evidence.'
misuse_redirect: 'If a request asks Chain-of-Custody Documentation to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence, refuse that
  path and redirect to the safe defensive form: verify supplied claims, media, sources,
  or datasets with documented public-source methods.'
evidence_requirements:
- For Chain-of-Custody Documentation, bind each finding to a labeled source — source
  records, custody notes, metadata, corroborating references, and contradiction logs,
  a cited reference, or an explicitly marked inference — and never present inference
  as observed evidence.
- For Chain-of-Custody Documentation, keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Chain-of-Custody Documentation recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Chain-of-Custody Documentation: independent lines of source
  records, custody notes, metadata, corroborating references, and contradiction logs
  converge, credible alternatives have been tested, and the conclusion would survive
  removing any single source.'
- 'Medium confidence for Chain-of-Custody Documentation: the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Chain-of-Custody Documentation: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Chain-of-Custody Documentation cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Chain-of-Custody
  Documentation should collect to separate the live alternatives.
privacy_legal_constraints:
- For Chain-of-Custody Documentation, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Chain-of-Custody Documentation, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Chain-of-Custody Documentation, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Chain-of-Custody Documentation failure: overstating identity, location, attribution,
  or source reliability from incomplete public traces.'
- 'Chain-of-Custody Documentation failure: producing guidance that would help a requester
  dox, deanonymize, harass, bypass access controls, or attribute identity beyond evidence.'
- 'Chain-of-Custody Documentation failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Chain-of-Custody Documentation to dox, deanonymize, harass, bypass
  access controls, or attribute identity beyond evidence'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Chain-of-Custody Documentation into an operational playbook to dox,
  deanonymize, harass, bypass access controls, or attribute identity beyond evidence''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Chain-of-Custody Documentation to verify supplied claims,
  media, sources, or datasets with documented public-source methods'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
