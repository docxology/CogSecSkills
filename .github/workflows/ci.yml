name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check src/cogsecskills tests
          ruff format --check src/cogsecskills tests

      - name: Type check (mypy)
        run: mypy

      - name: Tests (pytest + coverage gate)
        run: pytest --cov=cogsecskills --cov-report=term-missing

      - name: Validate skill library (0 errors)
        run: cogsecskills validate

      - name: Quality lint (doctor)
        run: cogsecskills doctor
