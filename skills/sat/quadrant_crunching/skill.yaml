id: sat.quadrant_crunching
name: Quadrant Crunching
group: sat
version: 0.1.0
status: implemented
summary: Systematically permute key assumptions into a matrix of alternative outcomes.
description: Quadrant Crunching (Pherson & Heuer) systematically permutes two or more
  key uncertain assumptions into a matrix of alternative outcome cells, forcing analysts
  to confront possibilities they would otherwise ignore. Each cell of the matrix represents
  a distinct scenario whose internal logic must be examined for coherence and plausibility.
  The technique counteracts tunnel vision by making the full combinatorial space of
  assumption combinations explicit and visible rather than allowing the dominant mental
  model to crowd out alternatives.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- alternative-analysis
triggers:
- quadrant crunching
- permute assumptions
- scenario matrix
- map all combinations
- 2x2 scenario analysis
tools:
- verb: read
  purpose: ingest the problem statement, the current dominant assessment, and any
    stated key assumptions
- verb: reason
  purpose: identify the two or more most consequential uncertain variables, assign
    binary or ternary poles, generate and evaluate each matrix cell for internal coherence
    and plausibility
- verb: write
  purpose: produce the labeled matrix, per-cell scenario narratives, plausibility
    ratings, and analytic implications
inputs:
- name: problem_statement
  type: text
  required: true
  description: the analytic question or judgment under review
- name: dominant_assessment
  type: text
  required: false
  description: the current leading hypothesis or baseline forecast, if one exists
- name: candidate_assumptions
  type: list
  required: false
  description: a seed list of key assumptions identified by prior analysis; the technique
    will refine and select among them
outputs:
- name: scenario_matrix
  type: table
  description: rows and columns labeled by assumption poles, each cell containing
    a scenario label and brief narrative
- name: scenario_narratives
  type: markdown
  description: 'per-cell elaborations: internal logic, plausibility rating (High /
    Medium / Low / Incoherent), key indicators, and implications for the analytic
    question'
- name: neglected_cells
  type: markdown
  description: explicit identification of matrix cells the dominant assessment ignores
    or rates as impossible, with reasoning
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Pherson, R. H. & Heuer, R. J. (2021). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Chapter on Quadrant Crunching.
- Pherson, K. H. & Pherson, R. H. (2012). Critical Thinking for Strategic Intelligence.
  CQ Press.
defensive_boundary: 'Use Quadrant Crunching only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Quadrant Crunching to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Quadrant Crunching, bind each finding to a labeled source — hypotheses, assumptions,
  indicators, evidence tables, and confidence notes, a cited reference, or an explicitly
  marked inference — and never present inference as observed evidence.
- For Quadrant Crunching, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Quadrant Crunching recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Quadrant Crunching: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Quadrant Crunching: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Quadrant Crunching: the evidence is sparse, single-source, contested,
  or mostly inferential, so competing explanations must be preserved in the output.'
uncertainty_handling:
- State plainly what Quadrant Crunching cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Quadrant
  Crunching should collect to separate the live alternatives.
privacy_legal_constraints:
- For Quadrant Crunching, use only data the caller is authorized to analyze, drawn
  from public or source-approved records.
- For Quadrant Crunching, protect privacy by preferring aggregate, role-level, or
  artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Quadrant Crunching, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Quadrant Crunching failure: using the method as a checklist while skipping diagnostic
  evidence and disconfirming tests.'
- 'Quadrant Crunching failure: producing guidance that would help a requester force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Quadrant Crunching failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Quadrant Crunching to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Quadrant Crunching into an operational playbook to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Quadrant Crunching to apply the structured technique to supplied
  evidence while preserving alternatives and uncertainty'' -> produce bounded findings
  with explicit evidence and uncertainty labels.'
