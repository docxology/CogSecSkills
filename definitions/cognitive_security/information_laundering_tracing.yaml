id: cognitive_security.information_laundering_tracing
description: Information laundering tracing maps the staged process by which a fringe,
  unverified, or deceptive claim acquires apparent legitimacy through layered republication
  across progressively more credible outlets. The technique follows a claim from its
  origin through aggregator blogs, partisan news sites, think-tank summaries, and
  eventually mainstream coverage, identifying the amplification nodes that stripped
  caveats and added false authority at each step. It is closely related to the 'firehose
  of falsehood' and 'blue-check laundering' documented in disinformation research.
tags:
- cognitive-security
- cognitive_security
- disinformation
- provenance
triggers:
- information laundering
- how did this fringe claim go mainstream
- trace the legitimization of a claim
- which outlets laundered this narrative
- blue-check laundering
- how did a rumor become news
tools:
- verb: read
  purpose: ingest the claim under examination and any known publication chain artifacts
- verb: search
  purpose: locate earlier and contemporaneous publications of the claim across outlet
    tiers
- verb: web
  purpose: retrieve live pages, archive.org snapshots, and cross-references to reconstruct
    the republication chain
- verb: reason
  purpose: classify each node by outlet tier, identify where caveats were dropped
    and authority added, and assess deliberateness
- verb: write
  purpose: emit the laundering chain diagram, node annotations, and assessed legitimization
    tactics
inputs:
- name: claim_text
  type: text
  required: true
  description: The specific claim or narrative to trace, stated as precisely as possible
- name: known_publications
  type: list
  required: false
  description: Any already-known URLs or outlet names where the claim appeared, to
    seed the chain
- name: time_window
  type: text
  required: false
  description: Approximate date range to bound the search (e.g., '2023-09 to 2023-11')
outputs:
- name: laundering_chain
  type: table
  description: 'Chronological table of publication nodes: date, outlet, outlet tier,
    claim fidelity, caveats present/dropped, amplification mechanism'
- name: analysis_narrative
  type: markdown
  description: Narrative describing the legitimization arc, the key laundering nodes,
    techniques used (caveat stripping, authority borrowing, saturation), and assessed
    intent
references:
- 'Wardle, C., & Derakhshan, H. (2017). Information Disorder: Toward an interdisciplinary
  framework for research and policy making. Council of Europe Report DGI(2017)09.'
- 'Nimmo, B. (2019). The Breakout Scale: Measuring the impact of influence operations.
  Graphika.'
- 'Bradshaw, S., & Howard, P. N. (2019). The Global Disinformation Order: 2019 Global
  Inventory of Organised Social Media Manipulation. Oxford Internet Institute.'
- 'Benkler, Y., Faris, R., & Roberts, H. (2018). Network Propaganda: Manipulation,
  Disinformation, and Radicalization in American Politics. Oxford University Press.'
when_to_use:
- A fringe or unverified claim has appeared in mainstream or authoritative outlets
  and the legitimization pathway needs to be understood
- Analysts need to identify which intermediate nodes are the primary laundering conduits
  to prioritize counter-messaging
- Assessing whether a narrative's mainstream appearance was organic viral spread or
  a coordinated laundering operation
- Briefing stakeholders on how misinformation acquires false credibility before being
  debunked
what_it_produces:
- A directed chain of publication nodes from origin to mainstream with timestamps
  and outlet-tier classifications
- 'Annotation of each key laundering step: which caveats were dropped, what credibility
  was borrowed, and which actor or outlet drove amplification'
- An assessment of whether the laundering appears opportunistic (organic spread) or
  deliberate (coordinated seeding)
key_discipline:
- Follow the claim, not the framing — different outlets restate the claim; identify
  the invariant core across reframings
- Classify each node by outlet credibility tier before assessing the laundering leap
  — a Tier-3 tabloid → Tier-2 partisan blog is a smaller leap than Tier-2 → Tier-1
  mainstream
- Mark where caveats ('alleged', 'unverified', 'according to anonymous source') were
  present and when they were stripped — caveat removal is the signature of laundering
- Distinguish saturation laundering (dozens of low-credibility citations overwhelming
  search results) from blue-check laundering (a single high-credibility outlet canonizing
  the claim)
workflow_steps:
- verbs:
  - read
  title: Canonicalize the claim
  text: State the exact claim in its most precise form. Identify the variant phrasings
    used across outlets so searches catch mutations. Document the first known instance
    if already available.
- verbs:
  - search
  - web
  title: Map the publication chain
  text: Search for every known publication of the claim across outlet tiers (origin,
    fringe/aggregator, partisan, mainstream, institutional). Use archive.org to recover
    deleted pages. Record URL, date, outlet name, outlet tier (1=fringe to 5=major
    mainstream/institutional), and direct quote of the claim.
- verbs:
  - reason
  title: Identify laundering nodes and tactics
  text: 'Order publications chronologically. At each transition between tier levels,
    note: (a) which caveats were dropped, (b) what authority was borrowed or invented
    (e.g., ''experts say'', citation to earlier laundered piece), (c) whether the
    outlet added original reporting or merely aggregated. Flag nodes where the legitimization
    leap is largest.'
- verbs:
  - reason
  title: Assess coordination vs. organic spread
  text: 'Examine timing gaps between publications, cross-ownership or editorial links
    between outlets, and whether low-credibility simultaneous publications suggest
    a seeding campaign. Note signals of coordination: identical phrasing across unrelated
    outlets, suspiciously rapid Tier-1 pickup, or known state-media involvement in
    the chain.'
- verbs:
  - write
  title: Emit laundering chain and analysis
  text: Produce a chronological table of publication nodes with tier, fidelity, and
    caveat status. Write a narrative identifying the primary laundering nodes, the
    tactic used at each key step, and an overall assessment of whether the laundering
    appears opportunistic or deliberate. Flag the node(s) that most effectively legitimized
    the claim.
anti_criteria:
- Do not conflate organic viral spread with coordinated laundering without affirmative
  evidence of coordination — fast spread is not itself evidence of a campaign
- Do not omit the outlet tier classification — calling every node 'media' flattens
  the legitimization dynamic that makes laundering analytically meaningful
- Do not focus only on the most recent mainstream appearance; the full upstream chain
  must be traced to identify origin and key amplification nodes
- Do not name the laundering operation as deliberate unless the evidence (coordination
  signals, timing, identical seeding) supports that conclusion — maintain confidence
  calibration
defensive_boundary: 'Use Information Laundering Tracing only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Information Laundering Tracing to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Information Laundering Tracing, bind each finding to a labeled source — content,
  behavioral, narrative, media, and audience-risk evidence, a cited reference, or
  an explicitly marked inference — and never present inference as observed evidence.
- For Information Laundering Tracing, keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Information Laundering Tracing recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Information Laundering Tracing: independent lines of content,
  behavioral, narrative, media, and audience-risk evidence converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Information Laundering Tracing: the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Information Laundering Tracing: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Information Laundering Tracing cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Information
  Laundering Tracing should collect to separate the live alternatives.
privacy_legal_constraints:
- For Information Laundering Tracing, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Information Laundering Tracing, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Information Laundering Tracing, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Information Laundering Tracing failure: mistaking persuasive resonance for verified
  harm or intent.'
- 'Information Laundering Tracing failure: producing guidance that would help a requester
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation.'
- 'Information Laundering Tracing failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Information Laundering Tracing to increase persuasive impact, exploit
  audience vulnerabilities, or optimize narrative manipulation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Information Laundering Tracing into an operational playbook to increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Information Laundering Tracing to assess supplied material
  for manipulation indicators and recommend resilience measures'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
