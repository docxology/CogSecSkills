id: cognitive_security.narrative_threat_assessment
name: Narrative Threat Assessment
group: cognitive_security
version: 0.1.0
status: implemented
summary: Characterize a narrative's intent, mechanics, reach, and harm potential as
  a cognitive threat.
description: A defensive cognitive-security procedure that examines a circulating
  narrative to characterize it as a potential cognitive threat. It captures the narrative's
  claims and framing, identifies the target audience and the belief or identity levers
  it exploits, classifies the manipulation techniques present, assesses provenance
  and likely intent, estimates reach and harm potential, and recommends defensive
  responses such as prebunking and lateral reading. The output protects audiences;
  it never authors manipulation or a playbook for running an influence operation.
ageint_topic: cognitive-security
tags:
- cognitive-security
- influence-operations
- narrative
- defense
triggers:
- narrative threat assessment
- is this narrative a threat
- assess this narrative
- characterize this influence narrative
- is this disinformation or coordinated
- how harmful is this narrative
- defensive narrative analysis
tools:
- verb: read
  purpose: Read the supplied narrative artifact and any provided context (source,
    circulation samples) precisely before characterizing it.
- verb: search
  purpose: Search for corroborating provenance, prior debunks, and reach signals to
    assess organic-versus-coordinated spread without amplifying the narrative.
- verb: reason
  purpose: Decompose claims, map audience levers, classify manipulation techniques,
    and rate harm and urgency from evidence rather than speculation.
- verb: write
  purpose: Write the structured defensive assessment, including recommended prebunking
    and counter-framing responses.
inputs:
- name: narrative_text
  type: string
  required: true
  description: The narrative under assessment — the core claim plus any sub-claims
    and framing, captured verbatim or near-verbatim.
- name: context
  type: object
  required: false
  description: Optional provenance and circulation context (observed sources, platforms,
    timestamps, sample posts) used to assess intent and reach.
outputs:
- name: threat_assessment
  type: document
  description: A defensive assessment characterizing claims, target audience, manipulation
    mechanics, provenance/intent, reach, and rated harm potential and urgency.
- name: defensive_recommendations
  type: list
  description: Prioritized defensive responses (prebunking, lateral reading prompts,
    counter-framing) for protecting the target audience.
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Pamment, J. (2020). The ABCDE framework for analyzing influence operations (Actor,
  Behavior, Content, Degree, Effect), Carnegie Endowment / Partnership for Countering
  Influence Operations.
- DISARM Foundation. DISARM Framework — Disinformation Analysis and Risk Management
  (Red/Blue TTP matrices), https://disarmframework.herokuapp.com/
defensive_boundary: 'Use Narrative Threat Assessment only for cognitive-security defense:
  recognize, assess, document, or defend audiences, decision-makers, and public discourse.
  Do not use this skill to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Narrative Threat Assessment to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Narrative Threat Assessment, bind every captured claim, identified lever, classified
  technique, and harm rating to concrete evidence — a quoted passage held as object
  of study, an observed source, a circulation timestamp, or a prior debunk — and preserve
  credible alternatives wherever that evidence underdetermines intent or attribution.
- For Narrative Threat Assessment, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the threat
  assessment.
- Before recommending any Narrative Threat Assessment action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Narrative Threat Assessment: the captured claims, audience levers, classified
  manipulation techniques, provenance, and rated harm each rest on independent evidence
  from the narrative text and circulation context, the organic-versus-coordinated
  reading survives calibrated scrutiny, and no unresolved contradiction would change
  the harm rating or the defensive recommendations.'
- 'Medium for Narrative Threat Assessment: the threat assessment is plausible, but
  one important narrative text source, comparison case, or alternative explanation
  remains incomplete.'
- 'Low for Narrative Threat Assessment: the threat assessment rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Narrative Threat Assessment cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Narrative Threat Assessment, use only authorized narrative text, and context,
  public or source-approved records, and caller-provided context needed for the defensive
  task.
- For Narrative Threat Assessment, minimize person-level detail in the threat assessment;
  prefer aggregate, artifact-level, role-level, or case-level summaries unless an
  individual is essential to the defensive question.
- For Narrative Threat Assessment, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Narrative Threat Assessment: rating harm or naming a sponsor with false confidence
  on provenance the evidence does not support, or restating the narrative as if true
  while characterizing it, so an unfinished read amplifies the threat instead of protecting
  the target audience.'
- 'Narrative Threat Assessment: producing advice that would help a requester increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation.'
- 'Narrative Threat Assessment: reporting the threat assessment without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Narrative Threat Assessment outputs to increase persuasive impact,
  exploit audience vulnerabilities, or optimize narrative manipulation'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the threat assessment from Narrative Threat Assessment into an
  operational playbook to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Narrative Threat Assessment to assess supplied material for
  manipulation indicators and recommend resilience measures with narrative text, and
  context'' -> produce bounded findings with evidence and uncertainty labels.'
