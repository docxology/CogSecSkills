  # ───────────────────────── Critical Review & Assurance (12) ─────────────
  - {id: critical_review.project_critical_review, name: Project Critical Review, group: critical_review, status: implemented, ageint_topic: adversarial-assurance, summary: "Adversarial-then-constructive review of a project: claims, evidence, risks, gaps, and go/no-go."}
