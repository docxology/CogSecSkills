id: sat.indicators_generation
name: Indicators Generation
group: sat
version: 0.1.0
status: implemented
summary: Define observable signs that would reveal which scenario or hypothesis is
  unfolding.
description: Indicators Generation is a structured analytic technique for deriving
  a set of observable, measurable signs that would signal which of several competing
  scenarios, hypotheses, or courses of action is actually unfolding. Each indicator
  is paired with the scenario it would support or undermine, producing a diagnostic
  matrix that focuses collection and monitoring. The technique is foundational to
  warning analysis and adversarial scenario tracking in both intelligence and cognitive-security
  contexts.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- warning-analysis
- scenario-tracking
triggers:
- what signs would tell us
- generate indicators
- indicators for this scenario
- how would we know which outcome
- build a warning list
- observable signs
tools:
- verb: read
  purpose: ingest the scenario set, hypotheses, or alternative outcomes for which
    indicators are needed
- verb: reason
  purpose: derive observable indicators for each scenario and assess their diagnostic
    value
- verb: write
  purpose: produce the indicators matrix and guidance for collection prioritization
inputs:
- name: scenarios_or_hypotheses
  type: list
  required: true
  description: two or more competing scenarios, hypotheses, or alternative outcomes
    for which indicators are to be generated
- name: actor_profile
  type: text
  required: false
  description: relevant characteristics of the actor(s) involved — capabilities, doctrine,
    past behavior — to ground indicator derivation
- name: collection_environment
  type: text
  required: false
  description: description of what sources and sensors are available for observation,
    to ensure indicators are collectable
outputs:
- name: indicators_matrix
  type: table
  description: 'a table of indicators, each showing: the observable sign, which scenario(s)
    it would support, which it would undermine, its diagnostic weight, and its collection
    source'
- name: indicators_narrative
  type: markdown
  description: explanatory text covering derivation logic, diagnostic distinctions
    among scenarios, and collection priorities
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Heuer, R. J., Jr., & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis (2nd ed.). CQ Press/SAGE. Chapter 8, 'Indicators Generation'.
- 'Grabo, C. M. (2004). Anticipating Surprise: Analysis for Strategic Warning. Joint
  Military Intelligence College.'
- Johnston, R. (2005). Analytic Culture in the U.S. Intelligence Community. Center
  for the Study of Intelligence, CIA.
defensive_boundary: 'Use Indicators Generation only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Indicators Generation to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Indicators Generation, bind each finding to a labeled source — hypotheses, assumptions,
  indicators, evidence tables, and confidence notes, a cited reference, or an explicitly
  marked inference — and never present inference as observed evidence.
- For Indicators Generation, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Indicators Generation recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Indicators Generation: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Indicators Generation: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Indicators Generation: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Indicators Generation cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Indicators
  Generation should collect to separate the live alternatives.
privacy_legal_constraints:
- For Indicators Generation, use only data the caller is authorized to analyze, drawn
  from public or source-approved records.
- For Indicators Generation, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Indicators Generation, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Indicators Generation failure: using the method as a checklist while skipping diagnostic
  evidence and disconfirming tests.'
- 'Indicators Generation failure: producing guidance that would help a requester force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Indicators Generation failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Indicators Generation to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Indicators Generation into an operational playbook to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Indicators Generation to apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
