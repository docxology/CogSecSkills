id: sat.outside_in_thinking
description: Outside-In Thinking is a structured analytic technique that deliberately
  begins analysis at the broadest macro-environmental level — political, economic,
  social, technological, legal, and environmental (PESTLE) forces — before narrowing
  to the specific actors, events, or issues under study. The approach counteracts
  inside-out bias, in which analysts anchor on the immediate case and underweight
  structural drivers that constrain or enable all actors in a situation. In cognitive-security
  and intelligence analysis it ensures that systemic pressures, narrative ecosystems,
  and information-environment conditions are made explicit before tactical hypotheses
  are formed.
tags:
- cognitive-security
- sat
- contextual-analysis
triggers:
- outside-in thinking
- PESTLE analysis
- start from macro forces
- structural drivers of the issue
- context before actors
tools:
- verb: read
  purpose: ingest the focal issue, prior assessments, and any available environmental
    scans
- verb: reason
  purpose: systematically populate macro-level PESTLE factors and trace their influence
    paths to the focal issue
- verb: write
  purpose: 'produce the layered Outside-In analysis: macro context, mezzo constraints,
    focal-level implications'
inputs:
- name: focal_issue
  type: text
  required: true
  description: The specific actor behavior, event, or analytic question to be explained
    or predicted
- name: prior_assessments
  type: text
  required: false
  description: Existing analytic products or intelligence reports on the topic, used
    to identify assumptions that may reflect inside-out bias
- name: environmental_scan
  type: text
  required: false
  description: Background material covering relevant political, economic, social,
    technological, legal, or environmental conditions
outputs:
- name: outside_in_analysis
  type: markdown
  description: 'Layered analysis: (1) PESTLE macro-forces inventory, (2) mezzo-level
    organizational/institutional constraints, (3) actor/event-level focal analysis
    with macro forces explicitly linked to hypotheses, (4) key assumptions exposed
    by the outside-in frame'
references:
- 'Pherson, R. H., & Heuer, R. J. (2021). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Chapter: Outside-In Thinking.'
- Pherson, K. H., & Pherson, R. H. (2012). Critical Thinking for Strategic Intelligence.
  CQ Press.
- Fahey, L., & Narayanan, V. K. (1986). Macroenvironmental Analysis for Strategic
  Management. West Publishing.
when_to_use:
- an analysis appears to rely heavily on the recent behavior of a focal actor without
  considering structural constraints
- assessments repeatedly fail to anticipate externally driven discontinuities (sanctions,
  technological shifts, social upheaval)
- the cognitive-security task requires understanding why a narrative or influence
  operation is gaining traction in a specific information environment
- onboarding a new issue area where team familiarity is low and systemic factors are
  poorly mapped
what_it_produces:
- an explicit map of macro forces bearing on the focal issue, ordered by relevance
  and trajectory
- exposure of assumptions about stability that the focal-level analysis implicitly
  relies on
- a structured frame that connects environmental drivers to actor options, constraints,
  and likely behavior
key_discipline:
- populate the macro layer completely before writing a single sentence about the focal
  actor — premature actor focus defeats the technique
- trace at least one causal path from each relevant PESTLE factor to the focal issue;
  factors with no causal path are not relevant
- 'explicit assumption: identify at least one assumption the prior focal-level analysis
  carries that the macro scan either confirms or challenges'
workflow_steps:
- verbs:
  - read
  title: Read and state the focal issue
  text: Read the focal issue statement and any prior assessments. Record the dominant
    hypotheses or conclusions already held. These will be revisited after the macro
    scan to identify what outside forces they failed to account for.
- verbs:
  - reason
  - write
  title: Populate the PESTLE macro layer
  text: 'Systematically work through Political, Economic, Social, Technological, Legal,
    and Environmental dimensions. For each, ask: what forces are active, what is their
    direction of change, and what is their velocity? Write a brief entry for each
    that is non-trivial for the focal issue.'
- verbs:
  - reason
  - write
  title: Identify mezzo-level constraints
  text: From the PESTLE inventory, derive the organizational, institutional, and network-level
    constraints that macro forces impose on actors in the focal situation. These are
    the transmission mechanisms between macro environment and focal-actor behavior.
- verbs:
  - reason
  - write
  title: Revisit focal-level analysis with macro frame
  text: Return to the focal issue. For each dominant hypothesis, identify which macro
    forces support, undermine, or constrain it. Revise or reweight hypotheses accordingly.
    Note which macro factors are load-bearing for the conclusion and flag them as
    key assumptions.
- verbs:
  - reason
  - write
  title: Document exposed assumptions and implications
  text: List the assumptions the original inside-out framing carried that the outside-in
    scan reveals. Assess each as confirmed, challenged, or uncertain. Produce the
    final layered analysis with macro forces explicitly linked to focal-level implications.
anti_criteria:
- do not begin writing about the focal actor before the PESTLE macro layer is fully
  populated — premature actor focus is the bias this technique is designed to break
- do not list PESTLE factors that have no traceable causal path to the focal issue;
  a superficial scan produces the appearance of rigor without the substance
- do not treat the technique as complete unless at least one prior assumption from
  inside-out analysis has been explicitly confirmed or challenged
defensive_boundary: 'Use Outside-In Thinking only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Outside-In Thinking to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Outside-In Thinking, bind each finding to a labeled source — hypotheses, assumptions,
  indicators, evidence tables, and confidence notes, a cited reference, or an explicitly
  marked inference — and never present inference as observed evidence.
- For Outside-In Thinking, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Outside-In Thinking recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Outside-In Thinking: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Outside-In Thinking: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Outside-In Thinking: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Outside-In Thinking cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Outside-In
  Thinking should collect to separate the live alternatives.
privacy_legal_constraints:
- For Outside-In Thinking, use only data the caller is authorized to analyze, drawn
  from public or source-approved records.
- For Outside-In Thinking, protect privacy by preferring aggregate, role-level, or
  artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Outside-In Thinking, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Outside-In Thinking failure: using the method as a checklist while skipping diagnostic
  evidence and disconfirming tests.'
- 'Outside-In Thinking failure: producing guidance that would help a requester force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Outside-In Thinking failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Outside-In Thinking to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Outside-In Thinking into an operational playbook to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Outside-In Thinking to apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
