id: sat.key_assumptions_check
name: Key Assumptions Check
group: sat
version: 0.1.0
status: implemented
summary: >-
  Surface, classify, and stress-test the load-bearing assumptions an analysis
  rests on.
description: >-
  The Key Assumptions Check (Heuer & Pherson) makes explicit the stated and
  UNSTATED beliefs an analytic line silently depends on, then interrogates each:
  why we believe it, what evidence supports it, and under what conditions it
  would NOT hold. Each assumption is classified as solid, caveated, unsupported,
  or a key uncertainty, and the few that are both load-bearing AND uncertain are
  flagged as "key assumptions". The decisive question for each is "if this
  assumption is wrong, does the conclusion collapse?" — the technique rewrites
  the judgment to expose that dependence and names the collection that would test it.
ageint_topic: structured-analytic-techniques
tags: [cognitive-security, sat, assumptions, heuer]
triggers:
  - key assumptions check
  - what are we assuming
  - check our assumptions
  - what is this analysis taking for granted
  - which assumptions are load-bearing
tools:
  - verb: read
    purpose: ingest the analytic line, judgment, and the evidence cited for it
  - verb: reason
    purpose: surface unstated assumptions, test each, and classify confidence
  - verb: write
    purpose: emit the assumptions table, key-assumption flags, and rewritten judgment
inputs:
  - name: judgment
    type: text
    required: true
    description: the analytic conclusion or estimate to be examined
  - name: analytic_line
    type: text
    required: false
    description: the reasoning, evidence, and arguments leading to the judgment
  - name: stated_assumptions
    type: list[str]
    required: false
    description: assumptions the author has already made explicit, if any
outputs:
  - name: assumptions_table
    type: table
    description: every stated and unstated assumption with rationale, contrary conditions, and confidence class
  - name: key_assumptions
    type: markdown
    description: the load-bearing and uncertain assumptions, with collapse analysis
  - name: revised_judgment
    type: markdown
    description: the conclusion rewritten to expose its dependence on key assumptions, plus collection that would test them
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
  - "Heuer & Pherson (2014). Structured Analytic Techniques for Intelligence Analysis."
