id: sat.structured_brainstorming
name: Structured Brainstorming
group: sat
version: 0.1.0
status: implemented
summary: Divergent then convergent idea generation with explicit anti-anchoring steps.
description: Structured Brainstorming is a two-phase diverge-then-converge technique
  that separates unconstrained idea generation from critical evaluation to prevent
  anchoring, groupthink, and premature convergence on the most socially acceptable
  or seniority-endorsed hypothesis. The divergence phase enforces deferral of judgment
  while the convergence phase uses explicit criteria to cluster, rank, and discard
  ideas. In cognitive-security analysis it surfaces hypotheses and threat vectors
  that a linear, hierarchical review would suppress, and the explicit anti-anchoring
  steps protect against an adversary's ability to pre-seed the analytic frame.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- divergent-thinking
triggers:
- brainstorm
- structured brainstorming
- generate hypotheses
- diverge then converge
- what are all the possibilities
tools:
- verb: read
  purpose: ingest the problem statement and any prior analytic framing to be deliberately
    set aside during divergence
- verb: reason
  purpose: execute the divergence phase (unconstrained ideation) and convergence phase
    (criteria-based clustering and ranking)
- verb: ask
  purpose: elicit additional ideas from the analyst when the divergence phase appears
    to be closing prematurely
- verb: write
  purpose: produce the raw idea inventory, clustered groupings, ranked shortlist,
    and discarded-but-documented ideas
inputs:
- name: problem_statement
  type: text
  required: true
  description: the question, challenge, or hypothesis space to be explored
- name: prior_framing
  type: text
  required: false
  description: existing analysis or dominant hypothesis the team holds, to be explicitly
    set aside during divergence
- name: convergence_criteria
  type: list
  required: false
  description: criteria for ranking ideas in the convergence phase (e.g., plausibility,
    novelty, threat severity); if omitted the agent proposes criteria
outputs:
- name: raw_idea_inventory
  type: markdown
  description: the full unconstrained list of ideas generated in the divergence phase,
    unfiltered
- name: ranked_shortlist
  type: table
  description: clustered and ranked ideas from the convergence phase with rationale
    for ranking and notes on discarded ideas
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Osborn, A. F. (1953). Applied Imagination: Principles and Procedures of Creative
  Problem-Solving. Scribner.'
- Heuer, R. J., & Pherson, R. H. (2015). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Ch. 3.
- Pherson, R. H., & Pherson, K. H. (2020). Analytic Writing Guide. Pherson Associates.
defensive_boundary: 'Use Structured Brainstorming only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Structured Brainstorming to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation,
  refuse that path and redirect to the safe defensive form: apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Structured Brainstorming, tie every shortlist ranking and every discard decision
  to concrete evidence from the problem statement and convergence criteria, citing
  the rationale that justifies each idea's position, and label which ideas rest on
  assumption versus observation so reviewers can challenge the convergence step against
  the evidence.
- For Structured Brainstorming, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the raw
  idea inventory.
- Before recommending any Structured Brainstorming action, identify the weakest evidence
  link, the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Structured Brainstorming: the ranked shortlist emerges from a raw inventory
  broad enough that no plausible hypothesis was anchored out, the convergence ranking
  is reproducible under the stated criteria, and no unresolved contradiction in the
  problem framing would promote a discarded idea or demote a shortlisted one.'
- 'Medium for Structured Brainstorming: the raw idea inventory is plausible, but one
  important problem statement source, comparison case, or alternative explanation
  remains incomplete.'
- 'Low for Structured Brainstorming: the raw idea inventory rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Structured Brainstorming cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating sat evidence to collect when confidence is low
  or medium.
privacy_legal_constraints:
- For Structured Brainstorming, use only authorized problem statement, prior framing,
  and convergence criteria, public or source-approved records, and caller-provided
  context needed for the defensive task.
- For Structured Brainstorming, minimize person-level detail in the raw idea inventory;
  prefer aggregate, artifact-level, role-level, or case-level summaries unless an
  individual is essential to the defensive question.
- For Structured Brainstorming, do not infer protected traits, private identity, intent,
  location, legal culpability, or platform account ownership beyond the supplied and
  authorized evidence.
failure_modes:
- 'Structured Brainstorming: declaring the inventory complete when judgment intruded
  during the divergence phase or the prior dominant hypothesis anchored generation,
  so alternative threat vectors were silently pruned, and when discarded ideas were
  omitted from the record rather than logged with an explicit reason.'
- 'Structured Brainstorming: producing advice that would help a requester force a
  preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Structured Brainstorming: reporting the raw idea inventory without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Structured Brainstorming outputs to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation'' -> refuse and
  redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the raw idea inventory from Structured Brainstorming into an
  operational playbook to force a preferred conclusion, hide uncertainty, or use the
  technique to rationalize manipulation'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Structured Brainstorming to apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty with problem
  statement, prior framing, and convergence criteria'' -> produce bounded findings
  with evidence and uncertainty labels.'
