id: research_methods.evidence_grading
description: Evidence Grading is a structured technique for systematically rating
  each piece of evidence on two independent axes — quality (methodological rigor,
  source reliability, and internal validity) and relevance (how directly the evidence
  addresses the analytic question at hand) — using an explicit, repeatable rubric
  so that different analysts reach consistent grades from the same materials. The
  technique prevents high-quality-but-irrelevant evidence from inflating confidence
  in a conclusion, and high-relevance-but-low-quality evidence from anchoring judgments.
  It is foundational to systematic reviews, intelligence source evaluation, and any
  workflow where heterogeneous evidence must be compared or weighted.
tags:
- cognitive-security
- research_methods
- evidence-evaluation
- analytic-standards
triggers:
- grade this evidence
- rate source quality
- evidence quality assessment
- how reliable is this source
- weigh the evidence
- evaluate evidence strength
tools:
- verb: read
  purpose: ingest the analytic question and the evidence items with their provenance
    metadata
- verb: reason
  purpose: apply quality and relevance rubric criteria to each evidence item and derive
    grades
- verb: write
  purpose: emit a graded evidence table with per-item scores and an aggregated weight-of-evidence
    summary
inputs:
- name: analytic_question
  type: text
  required: true
  description: the specific question or hypothesis the evidence is meant to address
- name: evidence_items
  type: list
  required: true
  description: 'list of evidence items, each with: content summary, source type, provenance,
    date, and any known collection or reporting limitations'
- name: grading_rubric
  type: text
  required: false
  description: optional custom rubric; if omitted the technique uses the standard
    ODNI/Heuer-Pherson quality tiers (A-F for source reliability, 1-6 for information
    credibility)
outputs:
- name: graded_evidence_table
  type: table
  description: table with one row per evidence item, columns for quality grade, relevance
    grade, composite weight, and a brief justification note for each grade
- name: weight_of_evidence_summary
  type: markdown
  description: narrative summary of where the body of evidence points, which grades
    dominate, and what gaps or contradictions exist
references:
- Heuer, R. J., & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis (2nd ed.). CQ Press. (NATO STANAG 2511 source reliability / information
  credibility matrix, pp. 60-62.)
- 'Guyatt, G. H., et al. (2008). GRADE: An Emerging Consensus on Rating Quality of
  Evidence and Strength of Recommendations. BMJ, 336(7650), 924-926.'
- 'Office of the Director of National Intelligence (2015). ICD 203: Analytic Standards.
  ODNI.'
- Pherson, R. H., & Pherson, K. H. (2020). Critical Thinking for Strategic Intelligence
  (3rd ed.). CQ Press.
when_to_use:
- when synthesizing heterogeneous evidence of varying quality and directness
- when building an analytic line that must withstand peer review or challenge
- when preparing a structured argument and need to assign explicit weights to supporting
  evidence
- when evidence is contested and a transparent, repeatable grading process is required
  for accountability
what_it_produces:
- a graded evidence table with quality and relevance scores for each item
- a composite weight-of-evidence narrative showing where the body of evidence points
- identification of critical evidence gaps and contradictions that lower overall confidence
key_discipline:
- quality and relevance are independent axes — grade them separately before combining
- high relevance cannot compensate for low quality; they multiply, not add
- document the reasoning for each grade so a second analyst can reproduce or challenge
  it
- gaps and absences in evidence are themselves data points that belong in the graded
  table
workflow_steps:
- verbs:
  - read
  title: Inventory and characterize each evidence item
  text: Read each evidence item. Record its source type (HUMINT, SIGINT, open source,
    academic study, etc.), collection date, access path, and any known reporting limitations
    or collection gaps. Establish the rubric tiers to be used (e.g., NATO A-F reliability
    / 1-6 credibility, or GRADE tiers for scientific evidence).
- verbs:
  - reason
  title: Grade quality for each item
  text: 'For each item, assess: source reliability (historical accuracy, independence,
    access, potential bias), methodological rigor (how the information was obtained
    and verified), and internal consistency. Assign a quality grade (e.g., A/B/C/D/F
    or High/Moderate/Low) and write a one-line justification.'
- verbs:
  - reason
  title: Grade relevance for each item
  text: 'Assess how directly each item speaks to the analytic question: does it address
    the question directly, tangentially, or only by analogy? Assign a relevance grade
    and note whether the item provides confirming, disconfirming, or ambiguous signal
    relative to the hypothesis.'
- verbs:
  - reason
  - write
  title: Compute composite weight and summarize
  text: Combine quality and relevance grades into a composite weight for each item.
    Aggregate across all items to identify the weight-of-evidence direction, confidence
    tier, critical gaps (things that would strongly bear on the question but are absent),
    and any contradictions between high-weight items. Write the graded evidence table
    and weight-of-evidence summary narrative.
anti_criteria:
- do not let the volume of low-quality evidence substitute for a small number of high-quality
  items
- do not assign relevance based on whether the evidence supports the preferred conclusion
  — grade against the question, not the hypothesis
- do not omit disconfirming evidence from the graded table; a complete picture requires
  it
- do not use the same source twice as independent corroboration if they share a common
  reporting chain
defensive_boundary: 'Use Evidence Grading only for research-methods and synthesis
  integrity: recognize, assess, document, or defend reproducibility, calibrated confidence,
  and transparent synthesis. Do not use this skill to cherry-pick sources, fabricate
  citations, or overstate certainty from weak evidence.'
misuse_redirect: 'If a request asks Evidence Grading to cherry-pick sources, fabricate
  citations, or overstate certainty from weak evidence, refuse that path and redirect
  to the safe defensive form: synthesize supplied or authorized sources with explicit
  confidence and uncertainty labels.'
evidence_requirements:
- For Evidence Grading, bind each finding to a labeled source — study designs, source
  quality, reproducibility artifacts, and uncertainty records, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Evidence Grading, keep observations, assumptions, inferences, and missing information
  in separate labeled categories.
- Before issuing any Evidence Grading recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Evidence Grading: independent lines of study designs, source
  quality, reproducibility artifacts, and uncertainty records converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Evidence Grading: the evidence supports the conclusion, but
  one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Evidence Grading: the evidence is sparse, single-source, contested,
  or mostly inferential, so competing explanations must be preserved in the output.'
uncertainty_handling:
- State plainly what Evidence Grading cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Evidence
  Grading should collect to separate the live alternatives.
privacy_legal_constraints:
- For Evidence Grading, use only data the caller is authorized to analyze, drawn from
  public or source-approved records.
- For Evidence Grading, protect privacy by preferring aggregate, role-level, or artifact-level
  summaries over individual targeting unless an individual is essential to the defensive
  question.
- For Evidence Grading, do not infer protected traits, private identity, intent, location,
  or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Evidence Grading failure: collapsing heterogeneous evidence into an unsupported
  single confident conclusion.'
- 'Evidence Grading failure: producing guidance that would help a requester cherry-pick
  sources, fabricate citations, or overstate certainty from weak evidence.'
- 'Evidence Grading failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Evidence Grading to cherry-pick sources, fabricate citations, or
  overstate certainty from weak evidence'' -> refuse and redirect to defensive risk
  assessment.'
- 'Unsafe: ''Turn Evidence Grading into an operational playbook to cherry-pick sources,
  fabricate citations, or overstate certainty from weak evidence'' -> refuse and offer
  governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Evidence Grading to synthesize supplied or authorized sources
  with explicit confidence and uncertainty labels'' -> produce bounded findings with
  explicit evidence and uncertainty labels.'
