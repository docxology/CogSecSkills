id: sat.indicators_generation
description: Indicators Generation is a structured analytic technique for deriving
  a set of observable, measurable signs that would signal which of several competing
  scenarios, hypotheses, or courses of action is actually unfolding. Each indicator
  is paired with the scenario it would support or undermine, producing a diagnostic
  matrix that focuses collection and monitoring. The technique is foundational to
  warning analysis and adversarial scenario tracking in both intelligence and cognitive-security
  contexts.
tags:
- cognitive-security
- sat
- warning-analysis
- scenario-tracking
triggers:
- what signs would tell us
- generate indicators
- indicators for this scenario
- how would we know which outcome
- build a warning list
- observable signs
tools:
- verb: read
  purpose: ingest the scenario set, hypotheses, or alternative outcomes for which
    indicators are needed
- verb: reason
  purpose: derive observable indicators for each scenario and assess their diagnostic
    value
- verb: write
  purpose: produce the indicators matrix and guidance for collection prioritization
inputs:
- name: scenarios_or_hypotheses
  type: list
  required: true
  description: two or more competing scenarios, hypotheses, or alternative outcomes
    for which indicators are to be generated
- name: actor_profile
  type: text
  required: false
  description: relevant characteristics of the actor(s) involved — capabilities, doctrine,
    past behavior — to ground indicator derivation
- name: collection_environment
  type: text
  required: false
  description: description of what sources and sensors are available for observation,
    to ensure indicators are collectable
outputs:
- name: indicators_matrix
  type: table
  description: 'a table of indicators, each showing: the observable sign, which scenario(s)
    it would support, which it would undermine, its diagnostic weight, and its collection
    source'
- name: indicators_narrative
  type: markdown
  description: explanatory text covering derivation logic, diagnostic distinctions
    among scenarios, and collection priorities
references:
- Heuer, R. J., Jr., & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis (2nd ed.). CQ Press/SAGE. Chapter 8, 'Indicators Generation'.
- 'Grabo, C. M. (2004). Anticipating Surprise: Analysis for Strategic Warning. Joint
  Military Intelligence College.'
- Johnston, R. (2005). Analytic Culture in the U.S. Intelligence Community. Center
  for the Study of Intelligence, CIA.
when_to_use:
- when analysts need to monitor for a specific scenario or adversarial course of action
  in advance
- when collection resources must be allocated across competing monitoring priorities
- when an analysis of competing hypotheses (ACH) has identified scenarios whose distinction
  depends on observable events
- when building a warning tripwire set for a rapidly evolving situation
what_it_produces:
- a structured indicators matrix with each sign linked to the scenario it supports
  or undermines
- diagnostic weight ratings showing which indicators best discriminate among scenarios
- a collection and monitoring priority list tied to available sources
- a foundation for ongoing indicators monitoring and update cycles
key_discipline:
- a good indicator is observable, specific, and diagnostic — it must distinguish between
  at least two outcomes
- derive indicators from actor logic and necessary preconditions, not just from what
  you hope to see
- pair each indicator with at least one scenario it would undermine, not just one
  it confirms — avoid confirmation-only lists
- 'assess collectability: an indicator that cannot be observed serves no monitoring
  function'
workflow_steps:
- verbs:
  - read
  title: Ingest scenarios and context
  text: Read the full scenario set or hypothesis list. Note the key distinctions among
    scenarios — what makes each unique — since indicators must exploit those distinctions.
    Review any available actor profile or doctrine to ground derivation.
- verbs:
  - reason
  title: Derive candidate indicators per scenario
  text: 'For each scenario, ask: what actions, preparations, communications, or observable
    events would necessarily or probably precede or accompany this outcome? Generate
    a raw list of candidate indicators per scenario, drawing on actor logic, historical
    precedent, and necessary preconditions.'
- verbs:
  - reason
  title: Assess diagnostic value
  text: 'For each candidate indicator, assess whether it is uniquely associated with
    one scenario or shared across several. Assign a diagnostic weight: high (appears
    only under one scenario), medium (favors one over others), or low (consistent
    with multiple scenarios). Retain high- and medium-weight indicators; flag or drop
    low-weight items.'
- verbs:
  - reason
  title: Check collectability
  text: For each retained indicator, identify the collection source (open source,
    signals, human, sensor, imagery, etc.). Flag indicators that are logically sound
    but currently uncollectable — they may inform future collection planning but cannot
    serve as active tripwires.
- verbs:
  - write
  title: Produce the indicators matrix and narrative
  text: 'Format all retained indicators into a matrix table: observable sign, supporting
    scenario, undermining scenario, diagnostic weight, collection source. Write a
    brief narrative covering the logic behind key indicators, diagnostic trade-offs,
    and collection priorities.'
anti_criteria:
- do not generate indicators that are consistent with all scenarios — they have no
  diagnostic value
- do not list desired evidence as indicators — indicators are derived from actor logic
  and necessary preconditions, not from what would be convenient to find
- do not omit the 'undermining' column — an indicator that only confirms never disconfirms
  and enables confirmation bias
- do not retain uncollectable indicators in the active monitoring matrix without flagging
  them as aspirational
defensive_boundary: 'Use Indicators Generation only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Indicators Generation to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Indicators Generation, tie each indicators matrix, and indicators narrative
  claim to concrete evidence from the specific scenarios or hypotheses, actor profile,
  and collection environment item, source excerpt, observation, or command result
  that supports it.
- For Indicators Generation, label observations, derived features, assumptions, inferences,
  contradictions, and missing inputs separately before writing the indicators matrix.
- Before recommending any Indicators Generation action, identify the weakest evidence
  link, the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Indicators Generation: the indicators matrix is supported by multiple
  independent hypotheses, assumptions, indicators, evidence tables, and confidence
  notes; ingest scenarios and context and derive candidate indicators per scenario
  checks agree, and no unresolved contradiction would change the result.'
- 'Medium for Indicators Generation: the indicators matrix is plausible, but one important
  scenarios or hypotheses source, comparison case, or alternative explanation remains
  incomplete.'
- 'Low for Indicators Generation: the indicators matrix rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Indicators Generation cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating sat evidence to collect when confidence is low
  or medium.
privacy_legal_constraints:
- For Indicators Generation, use only authorized scenarios or hypotheses, actor profile,
  and collection environment, public or source-approved records, and caller-provided
  context needed for the defensive task.
- For Indicators Generation, minimize person-level detail in the indicators matrix;
  prefer aggregate, artifact-level, role-level, or case-level summaries unless an
  individual is essential to the defensive question.
- For Indicators Generation, do not infer protected traits, private identity, intent,
  location, legal culpability, or platform account ownership beyond the supplied and
  authorized evidence.
failure_modes:
- 'Indicators Generation: treating scenarios or hypotheses as complete when ingest
  scenarios and context and derive candidate indicators per scenario checks or contradictory
  evidence are missing.'
- 'Indicators Generation: producing advice that would help a requester force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Indicators Generation: reporting the indicators matrix without uncertainty labels,
  alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Indicators Generation outputs to force a preferred conclusion, hide
  uncertainty, or use the technique to rationalize manipulation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Convert the indicators matrix from Indicators Generation into an operational
  playbook to force a preferred conclusion, hide uncertainty, or use the technique
  to rationalize manipulation'' -> refuse and offer governance, detection, or mitigation
  analysis.'
- 'Safe defensive: ''Use Indicators Generation to apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty with scenarios or
  hypotheses, actor profile, and collection environment'' -> produce bounded findings
  with evidence and uncertainty labels.'
