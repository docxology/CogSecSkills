id: osint_integrity.chain_of_custody_documentation
name: Chain-of-Custody Documentation
group: osint_integrity
version: 0.1.0
status: implemented
summary: Document collection, handling, and hashing so evidence integrity is auditable.
description: Chain-of-custody documentation records every step in the collection,
  transfer, and analysis of OSINT evidence — capturing who handled each item, when,
  by what method, and what cryptographic hashes confirm it remained unaltered. The
  technique adapts law-enforcement chain-of-custody principles to open-source intelligence
  so that findings can withstand legal, journalistic, or organizational scrutiny.
  Without it, adversaries and skeptics can challenge whether evidence was fabricated,
  tampered, or misidentified. A complete chain anchors findings in verifiable, time-stamped,
  hash-confirmed records.
ageint_topic: osint-integrity
tags:
- cognitive-security
- osint_integrity
- evidence-integrity
- provenance
triggers:
- chain of custody
- evidence integrity
- hash and preserve
- document collection
- prove evidence wasn't tampered
tools:
- verb: read
  purpose: ingest the evidence items, existing collection logs, and any prior handling
    records
- verb: exec
  purpose: compute cryptographic hashes (SHA-256) of collected files or archived pages
    to seal integrity
- verb: write
  purpose: produce the chain-of-custody log entries, hash manifest, and custody transfer
    records
- verb: reason
  purpose: identify gaps in custody records, flag suspicious handling steps, and assess
    overall integrity
inputs:
- name: evidence_items
  type: list
  required: true
  description: Collected OSINT artifacts — URLs, screenshots, files, archived copies
    — to be documented
- name: collection_context
  type: text
  required: true
  description: Who collected each item, the tools used, the timestamp, and the original
    source URL or identifier
- name: prior_custody_log
  type: table
  required: false
  description: Any existing custody records for items that changed hands before this
    documentation step
outputs:
- name: custody_log
  type: table
  description: Structured table of each evidence item with collector, timestamp, tool,
    hash, and handling events
- name: integrity_summary
  type: markdown
  description: Narrative assessment of chain completeness, any gaps or anomalies,
    and recommendations for remediation
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Casey, E. (2011). Digital Evidence and Computer Crime: Forensic Science, Computers,
  and the Internet. Academic Press.'
- Toler, A. & Koenig, S. (2020). Bellingcat's Chain of Custody Guidelines. Bellingcat.
- SWGDE (2016). Best Practices for Computer Forensic Acquisitions. Scientific Working
  Group on Digital Evidence.
defensive_boundary: 'Use Chain-of-Custody Documentation only for OSINT integrity and
  source-verification defense: recognize, assess, document, or defend source provenance,
  privacy, chain of custody, and public-source accountability. Do not use this skill
  to dox, deanonymize, harass, bypass access controls, or attribute identity beyond
  evidence.'
misuse_redirect: 'If a request asks Chain-of-Custody Documentation to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence, refuse that
  path and redirect to the safe defensive form: verify supplied claims, media, sources,
  or datasets with documented public-source methods.'
evidence_requirements:
- For Chain-of-Custody Documentation, tie each custody log, and integrity summary
  claim to concrete evidence from the specific evidence items, collection context,
  and prior custody log item, source excerpt, observation, or command result that
  supports it.
- For Chain-of-Custody Documentation, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the custody
  log.
- Before recommending any Chain-of-Custody Documentation action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Chain-of-Custody Documentation: the custody log is supported by multiple
  independent source records, custody notes, metadata, corroborating references, and
  contradiction logs; inventory evidence items and compute and record hashes checks
  agree, and no unresolved contradiction would change the result.'
- 'Medium for Chain-of-Custody Documentation: the custody log is plausible, but one
  important evidence items source, comparison case, or alternative explanation remains
  incomplete.'
- 'Low for Chain-of-Custody Documentation: the custody log rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Chain-of-Custody Documentation cannot determine from the supplied or
  authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating osint_integrity evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Chain-of-Custody Documentation, use only authorized evidence items, collection
  context, and prior custody log, public or source-approved records, and caller-provided
  context needed for the defensive task.
- For Chain-of-Custody Documentation, minimize person-level detail in the custody
  log; prefer aggregate, artifact-level, role-level, or case-level summaries unless
  an individual is essential to the defensive question.
- For Chain-of-Custody Documentation, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Chain-of-Custody Documentation: treating evidence items as complete when inventory
  evidence items and compute and record hashes checks or contradictory evidence are
  missing.'
- 'Chain-of-Custody Documentation: producing advice that would help a requester dox,
  deanonymize, harass, bypass access controls, or attribute identity beyond evidence.'
- 'Chain-of-Custody Documentation: reporting the custody log without uncertainty labels,
  alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Chain-of-Custody Documentation outputs to dox, deanonymize, harass,
  bypass access controls, or attribute identity beyond evidence'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Convert the custody log from Chain-of-Custody Documentation into an operational
  playbook to dox, deanonymize, harass, bypass access controls, or attribute identity
  beyond evidence'' -> refuse and offer governance, detection, or mitigation analysis.'
- 'Safe defensive: ''Use Chain-of-Custody Documentation to verify supplied claims,
  media, sources, or datasets with documented public-source methods with evidence
  items, collection context, and prior custody log'' -> produce bounded findings with
  evidence and uncertainty labels.'
