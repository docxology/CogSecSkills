id: cognitive_security.media_literacy_assessment
name: Media Literacy Assessment
group: cognitive_security
version: 0.1.0
status: implemented
summary: Evaluate and strengthen an audience's lateral-reading and verification habits.
description: Media Literacy Assessment evaluates an audience's capacity to critically
  appraise information sources, distinguishing genuine content from manipulated or
  misleading material. It applies lateral-reading and verification heuristics drawn
  from news literacy research (SIFT, CRAAP) to diagnose specific gaps in an audience's
  epistemic habits. The output is an actionable gap map that prioritizes which verification
  competencies to strengthen and with what educational interventions.
ageint_topic: cognitive-security
tags:
- cognitive-security
- cognitive_security
- media-literacy
- verification
triggers:
- assess media literacy
- how well does this audience evaluate sources
- lateral reading audit
- measure information verification habits
- news literacy gap analysis
tools:
- verb: read
  purpose: ingest audience profile, existing media habits data, and sample content
    the audience encounters
- verb: reason
  purpose: score the audience against each media-literacy dimension (source evaluation,
    lateral reading, verification triggers, emotional override) and identify gaps
- verb: write
  purpose: produce the gap map, competency scores, and prioritized intervention recommendations
inputs:
- name: audience_profile
  type: text
  required: true
  description: 'Description of the target audience: demographics, platform use, prior
    media-literacy training, and any known vulnerability indicators'
- name: sample_content
  type: list
  required: false
  description: Representative set of content items (headlines, posts, articles) the
    audience typically encounters, used to test verification behaviors contextually
- name: existing_assessment_data
  type: text
  required: false
  description: Prior survey results, behavioral analytics, or literacy test scores
    for the audience if available
outputs:
- name: competency_gap_map
  type: table
  description: Scored breakdown of the audience across key media-literacy dimensions
    (source evaluation, lateral reading, claim verification, emotional override resistance)
    with gap severity ratings
- name: intervention_recommendations
  type: markdown
  description: Prioritized list of educational or design interventions matched to
    identified gaps, with expected efficacy and sequencing rationale
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Wineburg, S., & McGrew, S. (2019). Lateral Reading: Reading Less and Learning More
  When Evaluating Digital Information. Stanford History Education Group Working Paper
  No. 2017-A1.'
- 'Hobbs, R. (2010). Digital and Media Literacy: A Plan of Action. The Aspen Institute.'
- Caulfield, M. (2019). SIFT (The Four Moves). Hapgood. https://hapgood.us/2019/06/19/sift-the-four-moves/
- Vraga, E. K., & Tully, M. (2021). News literacy, social media behaviors, and skepticism
  toward information on social media. Information, Communication & Society, 24(2),
  150–166.
defensive_boundary: 'Use Media Literacy Assessment only for cognitive-security defense:
  recognize, assess, document, or defend audiences, decision-makers, and public discourse.
  Do not use this skill to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Media Literacy Assessment to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Media Literacy Assessment, bind each finding to a labeled source — content,
  behavioral, narrative, media, and audience-risk evidence, a cited reference, or
  an explicitly marked inference — and never present inference as observed evidence.
- For Media Literacy Assessment, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Media Literacy Assessment recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Media Literacy Assessment: independent lines of content, behavioral,
  narrative, media, and audience-risk evidence converge, credible alternatives have
  been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Media Literacy Assessment: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Media Literacy Assessment: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Media Literacy Assessment cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Media
  Literacy Assessment should collect to separate the live alternatives.
privacy_legal_constraints:
- For Media Literacy Assessment, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Media Literacy Assessment, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Media Literacy Assessment, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Media Literacy Assessment failure: mistaking persuasive resonance for verified
  harm or intent.'
- 'Media Literacy Assessment failure: producing guidance that would help a requester
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation.'
- 'Media Literacy Assessment failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Media Literacy Assessment to increase persuasive impact, exploit
  audience vulnerabilities, or optimize narrative manipulation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Media Literacy Assessment into an operational playbook to increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Media Literacy Assessment to assess supplied material for
  manipulation indicators and recommend resilience measures'' -> produce bounded findings
  with explicit evidence and uncertainty labels.'
