id: cognitive_security.emotional_manipulation_analysis
name: Emotional Manipulation Analysis
group: cognitive_security
version: 0.1.0
status: implemented
summary: Identify affective levers (fear, outrage, tribal belonging) a message exploits.
description: Emotional Manipulation Analysis identifies the specific affective levers
  — fear, outrage, disgust, in-group loyalty, grief, hope — that a message, campaign,
  or artifact deliberately exploits to bypass deliberative reasoning. Rooted in the
  dual-process literature (Kahneman) and influence-operation research (Wardle & Derakhshan),
  it deconstructs persuasion technique by technique, distinguishing legitimate pathos
  from weaponized emotion. The output is a structured threat map that analysts and
  communicators can use to recognize manipulation in real time and design inoculation
  or counter-messaging responses.
ageint_topic: cognitive-security
tags:
- cognitive-security
- cognitive_security
- affective-manipulation
- influence-analysis
triggers:
- emotional manipulation
- affective lever
- fear appeal analysis
- outrage bait
- what emotion is this exploiting
- manipulative framing
- emotional exploitation
tools:
- verb: read
  purpose: ingest the message, content, or campaign materials to be analyzed
- verb: reason
  purpose: identify which emotions are targeted, how they are triggered, and which
    cognitive shortcuts are exploited
- verb: write
  purpose: produce a structured emotional-lever map with technique labels, severity
    ratings, and defensive recommendations
inputs:
- name: content
  type: text
  required: true
  description: The message, article, social-media post, video transcript, or campaign
    excerpt to be analyzed
- name: context
  type: text
  required: false
  description: Background on the intended audience, distribution channel, and current
    socio-political climate that may amplify certain levers
outputs:
- name: emotional_lever_map
  type: table
  description: 'Table of identified affective levers: emotion targeted, specific trigger
    phrase or device, manipulation technique label, severity (low/medium/high), and
    potential audience impact'
- name: defensive_brief
  type: markdown
  description: Narrative summary explaining the overall manipulation strategy, which
    deliberative faculties are bypassed, and recommended inoculation or counter-framing
    approaches
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Kahneman, D. (2011). Thinking, Fast and Slow. Farrar, Straus and Giroux.
- 'Wardle, C. & Derakhshan, H. (2017). Information Disorder: Toward an Interdisciplinary
  Framework. Council of Europe Report DGI(2017)09.'
- 'Cialdini, R. B. (2001). Influence: Science and Practice (4th ed.). Allyn & Bacon.'
- 'Bail, C. A. (2021). Breaking the Social Media Prism: How to Make Our Platforms
  Less Polarizing. Princeton University Press.'
- 'van der Linden, S. (2023). Foolproof: Why Misinformation Infects Our Minds and
  How to Build Immunity. W. W. Norton.'
defensive_boundary: 'Use Emotional Manipulation Analysis only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Emotional Manipulation Analysis to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Emotional Manipulation Analysis, bind each finding to a labeled source — content,
  behavioral, narrative, media, and audience-risk evidence, a cited reference, or
  an explicitly marked inference — and never present inference as observed evidence.
- For Emotional Manipulation Analysis, keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Emotional Manipulation Analysis recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Emotional Manipulation Analysis: independent lines of content,
  behavioral, narrative, media, and audience-risk evidence converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Emotional Manipulation Analysis: the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Emotional Manipulation Analysis: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Emotional Manipulation Analysis cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Emotional
  Manipulation Analysis should collect to separate the live alternatives.
privacy_legal_constraints:
- For Emotional Manipulation Analysis, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Emotional Manipulation Analysis, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Emotional Manipulation Analysis, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Emotional Manipulation Analysis failure: mistaking persuasive resonance for verified
  harm or intent.'
- 'Emotional Manipulation Analysis failure: producing guidance that would help a requester
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation.'
- 'Emotional Manipulation Analysis failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Emotional Manipulation Analysis to increase persuasive impact, exploit
  audience vulnerabilities, or optimize narrative manipulation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Emotional Manipulation Analysis into an operational playbook to
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation'' -> refuse and offer governance, detection, or mitigation analysis
  instead.'
- 'Safe defensive: ''Use Emotional Manipulation Analysis to assess supplied material
  for manipulation indicators and recommend resilience measures'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
