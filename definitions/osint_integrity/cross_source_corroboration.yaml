id: osint_integrity.cross_source_corroboration
description: 'Cross-source corroboration is the practice of requiring independent
  confirmation from at least one additional source before elevating a claim from raw
  collection to an analytic finding. The technique recognizes that a single source
  — however credible — is insufficient because it may be fabricated, mistaken, or
  part of a coordinated deception campaign seeding the same narrative across multiple
  outlets. True corroboration demands source independence: two sources must not share
  a common origin, be controlled by the same actor, or derive their claim from the
  same original report. The technique is a primary defense against amplified misinformation
  and manufactured consensus.'
tags:
- cognitive-security
- osint_integrity
- verification
- source-analysis
triggers:
- corroborate this claim
- is this independently confirmed
- check multiple sources
- verify before promoting
- single source finding
tools:
- verb: read
  purpose: ingest the candidate claim and all sources currently supporting it
- verb: search
  purpose: locate additional sources that may independently confirm or contradict
    the claim
- verb: reason
  purpose: assess source independence, trace common origins, detect coordinated amplification,
    and weigh the strength of corroboration
- verb: write
  purpose: produce the corroboration assessment and a promotion decision with documented
    rationale
inputs:
- name: candidate_claim
  type: text
  required: true
  description: The specific factual claim under evaluation, stated precisely enough
    to be confirmed or disconfirmed
- name: source_list
  type: list
  required: true
  description: All sources currently asserting or reporting the claim, with publication
    date, outlet, and URL or archive link
- name: source_metadata
  type: table
  required: false
  description: Known information about each source's ownership, funding, editorial
    history, and past reliability
outputs:
- name: corroboration_assessment
  type: table
  description: Source-by-source independence analysis showing origin tracing, common-root
    findings, and corroboration tier for each source
- name: promotion_decision
  type: markdown
  description: Binary promotion decision (promote / hold) with documented rationale,
    confidence level, and conditions for future promotion if currently held
references:
- Heuer, R. J. & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis (2nd ed.). CQ Press. [Source evaluation and corroboration]
- First Draft (2019). Essential Guide to Understanding Information Disorder. First
  Draft News.
- 'Wardle, C. & Derakhshan, H. (2017). Information Disorder: Toward an Interdisciplinary
  Framework. Council of Europe.'
when_to_use:
- Before any OSINT claim is promoted from raw collection to an analytic product or
  shared finding
- When a claim is spreading rapidly across social media, news, or analyst channels
  and speed is creating pressure to accept it
- When the original source of a claim cannot be independently verified or appears
  to have been recently created
- When the topic is one where coordinated information operations are known or suspected
what_it_produces:
- 'A corroboration tier for the claim: independently confirmed, single-source only,
  or contradicted'
- An origin trace that identifies whether multiple reporting sources derive from a
  single original claim
- A documented promotion decision that can be reviewed and overturned if new corroborating
  sources emerge
key_discipline:
- Independence is defined by origin, not by number — ten outlets repeating one wire
  report is one source, not ten
- Trace each source's claim back to its original assertion; corroboration requires
  independent origination, not independent repetition
- Coordinated amplification (bot networks, state media ecosystems, astroturfing) is
  designed to defeat corroboration — look for identical phrasing, synchronized timing,
  and shared network infrastructure
- A hold decision is not a rejection — it is a documented waiting state pending additional
  independent evidence
workflow_steps:
- verbs:
  - read
  title: Characterize the claim and current source set
  text: State the claim precisely. List all sources asserting it, with publication
    timestamps and outlet identities. Identify the earliest known instance of the
    claim in the public record.
- verbs:
  - search
  - reason
  title: Trace origins and assess source independence
  text: For each source, attempt to identify where that outlet obtained the claim
    — wire service, official statement, social media post, prior report. Map the dependency
    graph. Flag sources that share a common origin as a single corroboration unit,
    not independent confirmations. Search for sources that emerged independently of
    the identified chain.
- verbs:
  - reason
  title: Assess corroboration quality and detect amplification
  text: 'Determine whether any genuinely independent sources (different origin, different
    network, different time) confirm the claim. Check for coordinated amplification
    signals: near-simultaneous posting, identical phrasing across outlets, or accounts/outlets
    created near the time of the claim. Assign a corroboration tier: confirmed (2+
    independent origins), single-source, or contradicted.'
- verbs:
  - write
  title: Document assessment and promotion decision
  text: Write the corroboration assessment table and the promotion decision with tier,
    rationale, confidence level, and — if held — the specific evidence that would
    warrant promotion. Record conditions under which the hold should be revisited.
anti_criteria:
- Do not treat multiple outlets reporting the same claim as independent corroboration
  if they can be traced to a single originating source
- Do not promote a claim simply because pressure, timing, or volume creates a sense
  of consensus — manufactured consensus is a standard influence operation technique
- Do not conflate corroboration of the existence of a report with corroboration of
  the underlying factual claim
defensive_boundary: 'Use Cross-Source Corroboration only for OSINT integrity and source-verification
  defense: recognize, assess, document, or defend source provenance, privacy, chain
  of custody, and public-source accountability. Do not use this skill to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence.'
misuse_redirect: 'If a request asks Cross-Source Corroboration to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence, refuse that
  path and redirect to the safe defensive form: verify supplied claims, media, sources,
  or datasets with documented public-source methods.'
evidence_requirements:
- For Cross-Source Corroboration, bind each finding to a labeled source — source records,
  custody notes, metadata, corroborating references, and contradiction logs, a cited
  reference, or an explicitly marked inference — and never present inference as observed
  evidence.
- For Cross-Source Corroboration, keep observations, assumptions, inferences, and
  missing information in separate labeled categories.
- Before issuing any Cross-Source Corroboration recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Cross-Source Corroboration: independent lines of source records,
  custody notes, metadata, corroborating references, and contradiction logs converge,
  credible alternatives have been tested, and the conclusion would survive removing
  any single source.'
- 'Medium confidence for Cross-Source Corroboration: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Cross-Source Corroboration: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Cross-Source Corroboration cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Cross-Source
  Corroboration should collect to separate the live alternatives.
privacy_legal_constraints:
- For Cross-Source Corroboration, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Cross-Source Corroboration, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Cross-Source Corroboration, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Cross-Source Corroboration failure: overstating identity, location, attribution,
  or source reliability from incomplete public traces.'
- 'Cross-Source Corroboration failure: producing guidance that would help a requester
  dox, deanonymize, harass, bypass access controls, or attribute identity beyond evidence.'
- 'Cross-Source Corroboration failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Cross-Source Corroboration to dox, deanonymize, harass, bypass access
  controls, or attribute identity beyond evidence'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Cross-Source Corroboration into an operational playbook to dox,
  deanonymize, harass, bypass access controls, or attribute identity beyond evidence''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Cross-Source Corroboration to verify supplied claims, media,
  sources, or datasets with documented public-source methods'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
