id: critical_review.project_critical_review
name: Project Critical Review
group: critical_review
version: 0.1.0
status: implemented
summary: >-
  Adversarial-then-constructive review of a project: claims, evidence, risks,
  gaps, and a go/no-go recommendation.
description: >-
  The flagship critical-review skill. It reviews a project — codebase, research
  project, or initiative — by first MAPPING what the project claims and how it is
  built, then running an ADVERSARIAL pass that attacks every load-bearing claim
  for missing evidence, silent-failure and dual-use risk, and unstated
  assumptions, followed by a CONSTRUCTIVE pass that names genuine strengths and
  the cheapest fix for each top risk. Findings are classified by severity and
  confidence, every finding is bound to evidence (file:line or command output),
  and the project's own tests and gates are run to confirm they actually have
  teeth before any "all passing" claim is trusted. The product is a BLUF report
  with a calibrated go/no-go recommendation and the top three things to fix first.
ageint_topic: adversarial-assurance
tags: [critical-review, assurance, red-team, go-no-go]
triggers:
  - critical review
  - review this project
  - red team this project
  - go/no-go
  - is this ready to ship
  - audit this project
  - claims vs evidence
  - what are the risks here
tools:
  - verb: read
    purpose: ingest the artifact — code, manuscript, docs, configs, test files
  - verb: search
    purpose: locate load-bearing claims, gates, and the evidence (or its absence)
  - verb: exec
    purpose: run the project's own tests/gates to check they have teeth
  - verb: reason
    purpose: run the adversarial and constructive passes and calibrate severity
  - verb: write
    purpose: emit the BLUF report, findings table, and go/no-go recommendation
inputs:
  - name: artifact
    type: path
    required: true
    description: the project root, repo, manuscript, or directory under review
  - name: decision
    type: text
    required: false
    description: the decision the review informs (ship, merge, fund, publish)
  - name: success_criteria
    type: list[str]
    required: false
    description: what "good enough" means for this decision; inferred if omitted
outputs:
  - name: report
    type: markdown
    description: BLUF report with map, findings, strengths, and recommendation
  - name: findings
    type: table
    description: each finding with severity, confidence, and evidence (file:line)
  - name: recommendation
    type: markdown
    description: calibrated go/no-go plus the top three things to fix first
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
  - "Heuer & Pherson (2014). Structured Analytic Techniques — challenge analysis & structured self-critique."
  - "Google SRE (2017). Site Reliability Engineering — testing reliability & 'is the test actually testing?'."
