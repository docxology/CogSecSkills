id: research_methods.calibrated_estimation
name: Calibrated Estimation
group: research_methods
version: 0.1.0
status: implemented
summary: Produce calibrated probability estimates with explicit reference classes
  and ranges.
description: Calibrated Estimation is a disciplined probability-elicitation technique
  in which an analyst produces numeric probability estimates (or ranges) for uncertain
  outcomes and grounds those estimates in explicitly chosen reference classes, base
  rates, and adjustment logic. Developed in the forecasting literature by Tetlock,
  Kahneman, and others, and operationalized in prediction tournaments and intelligence
  training, the technique combats overconfidence and inside-view bias by requiring
  analysts to compare the current case against a reference class of similar past cases
  before applying case-specific adjustments. The output is an estimate accompanied
  by a reference class, a stated confidence interval, and the reasoning behind any
  adjustments from the base rate.
ageint_topic: research-methods
tags:
- cognitive-security
- research_methods
- calibration
- forecasting
triggers:
- what's the probability of
- estimate the likelihood
- calibrated forecast
- base rate for this
- reference class forecasting
tools:
- verb: read
  purpose: ingest the question, available evidence, and any prior probability estimates
- verb: search
  purpose: locate base rates and reference class statistics from historical data or
    domain literature
- verb: reason
  purpose: select the reference class, derive the base rate, and apply inside-view
    adjustments with explicit logic
- verb: write
  purpose: emit the calibrated estimate with reference class, confidence interval,
    and adjustment rationale
inputs:
- name: question
  type: text
  required: true
  description: the specific, time-bound, resolvable question to be estimated (Good
    Judgment Project-style)
- name: evidence
  type: list
  required: false
  description: case-specific evidence items that may warrant adjustment from the base
    rate
- name: prior_estimate
  type: text
  required: false
  description: any existing estimate to be updated or compared against
outputs:
- name: calibrated_estimate
  type: markdown
  description: probability estimate with reference class, base rate, adjustment narrative,
    80% confidence interval, and resolution criteria
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Tetlock, P. E., & Gardner, D. (2015). Superforecasting: The Art and Science of
  Prediction. Crown.'
- Kahneman, D., Lovallo, D., & Sibony, O. (2011). Before You Make That Big Decision.
  Harvard Business Review.
- Flyvbjerg, B. (2008). Curbing Optimism Bias and Strategic Misrepresentation in Planning.
  European Planning Studies, 16(1), 3-21.
- Heuer, R. J., & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis (2nd ed.). CQ Press.
defensive_boundary: 'Use Calibrated Estimation only for research-methods and synthesis
  integrity: recognize, assess, document, or defend reproducibility, calibrated confidence,
  and transparent synthesis. Do not use this skill to cherry-pick sources, fabricate
  citations, or overstate certainty from weak evidence.'
misuse_redirect: 'If a request asks Calibrated Estimation to cherry-pick sources,
  fabricate citations, or overstate certainty from weak evidence, refuse that path
  and redirect to the safe defensive form: synthesize supplied or authorized sources
  with explicit confidence and uncertainty labels.'
evidence_requirements:
- For Calibrated Estimation, tie the point estimate, the base rate, and every adjustment
  to concrete evidence — the historical frequencies defining the reference class and
  the case-specific factors that warrant departing from it — and treat any move from
  the base rate without supporting evidence as an unjustified inside-view bias.
- For Calibrated Estimation, label observations, derived features, assumptions, inferences,
  contradictions, and missing inputs separately before writing the calibrated estimate.
- Before recommending any Calibrated Estimation action, identify the weakest evidence
  link, the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Calibrated Estimation: the probability estimate is anchored in an explicitly
  chosen reference class with a documented base rate, the inside-view adjustments
  are modest and individually justified, the stated 80% confidence interval is consistent
  with the analyst''s historical calibration record, and the resolution criteria are
  specific enough that the forecast can later be scored.'
- 'Medium for Calibrated Estimation: the calibrated estimate is plausible, but one
  important question source, comparison case, or alternative explanation remains incomplete.'
- 'Low for Calibrated Estimation: the calibrated estimate rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Calibrated Estimation cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating research_methods evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Calibrated Estimation, use only authorized question, evidence, and prior estimate,
  public or source-approved records, and caller-provided context needed for the defensive
  task.
- For Calibrated Estimation, minimize person-level detail in the calibrated estimate;
  prefer aggregate, artifact-level, role-level, or case-level summaries unless an
  individual is essential to the defensive question.
- For Calibrated Estimation, do not infer protected traits, private identity, intent,
  location, legal culpability, or platform account ownership beyond the supplied and
  authorized evidence.
failure_modes:
- 'Calibrated Estimation: skipping the reference class and reasoning only from inside-view
  case features, anchoring on a single source''s number, stating vague verbal probabilities
  instead of a numeric estimate, or omitting resolution criteria, so the forecast
  cannot be scored and overconfidence goes uncorrected.'
- 'Calibrated Estimation: producing advice that would help a requester cherry-pick
  sources, fabricate citations, or overstate certainty from weak evidence.'
- 'Calibrated Estimation: reporting the calibrated estimate without uncertainty labels,
  alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Calibrated Estimation outputs to cherry-pick sources, fabricate citations,
  or overstate certainty from weak evidence'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Convert the calibrated estimate from Calibrated Estimation into an operational
  playbook to cherry-pick sources, fabricate citations, or overstate certainty from
  weak evidence'' -> refuse and offer governance, detection, or mitigation analysis.'
- 'Safe defensive: ''Use Calibrated Estimation to synthesize supplied or authorized
  sources with explicit confidence and uncertainty labels with question, evidence,
  and prior estimate'' -> produce bounded findings with evidence and uncertainty labels.'
