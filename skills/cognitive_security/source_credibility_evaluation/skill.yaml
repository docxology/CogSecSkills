id: cognitive_security.source_credibility_evaluation
name: Source Credibility Evaluation
group: cognitive_security
version: 0.1.0
status: implemented
summary: Grade a source on reliability and a claim on credibility using the Admiralty/NATO
  scale.
description: 'Evaluate an information source and a specific claim along two independent
  axes using the NATO/Admiralty Code: source reliability (A–F) based on proximity,
  track record, motive, and independence; and information credibility (1–6) based
  on independent confirmation, plausibility, and consistency with known facts. Produce
  a justified two-part grade (e.g. B2) and state how that grade should bound downstream
  use of the information.'
ageint_topic: cognitive-security
tags:
- cognitive-security
- source-evaluation
- admiralty-code
- verification
triggers:
- source credibility
- how reliable is this source
- admiralty code
- can I trust this report
- grade this source
- is this claim corroborated
- evaluate source reliability
tools:
- verb: read
  purpose: Read the source material, the specific claim, and any provided corroborating
    documents.
- verb: search
  purpose: Look for independent sources that confirm or contradict the claim and the
    source's track record.
- verb: reason
  purpose: Weigh proximity, motive, independence, plausibility, and corroboration
    to assign the A–F and 1–6 grades.
- verb: write
  purpose: Emit the justified two-axis grade and the downstream-use bound.
inputs:
- name: source
  type: string
  required: true
  description: Identification of the information source (author, outlet, account,
    document origin).
- name: claim
  type: string
  required: true
  description: The specific factual claim to be graded for credibility.
- name: corroboration
  type: list
  required: false
  description: Optional independent sources or evidence offered to confirm the claim.
outputs:
- name: reliability_grade
  type: string
  description: Source reliability letter A–F with written justification.
- name: credibility_grade
  type: string
  description: Information credibility number 1–6 with written justification.
- name: usage_bound
  type: string
  description: How the combined grade should constrain downstream use of the information.
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- NATO Admiralty Code (source reliability A–F / information credibility 1–6).
defensive_boundary: 'Use Source Credibility Evaluation only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Source Credibility Evaluation to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Source Credibility Evaluation, bind each finding to a labeled source — content,
  behavioral, narrative, media, and audience-risk evidence, a cited reference, or
  an explicitly marked inference — and never present inference as observed evidence.
- For Source Credibility Evaluation, keep observations, assumptions, inferences, and
  missing information in separate labeled categories.
- Before issuing any Source Credibility Evaluation recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Source Credibility Evaluation: independent lines of content,
  behavioral, narrative, media, and audience-risk evidence converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Source Credibility Evaluation: the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Source Credibility Evaluation: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Source Credibility Evaluation cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Source
  Credibility Evaluation should collect to separate the live alternatives.
privacy_legal_constraints:
- For Source Credibility Evaluation, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Source Credibility Evaluation, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Source Credibility Evaluation, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Source Credibility Evaluation failure: mistaking persuasive resonance for verified
  harm or intent.'
- 'Source Credibility Evaluation failure: producing guidance that would help a requester
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation.'
- 'Source Credibility Evaluation failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Source Credibility Evaluation to increase persuasive impact, exploit
  audience vulnerabilities, or optimize narrative manipulation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Source Credibility Evaluation into an operational playbook to increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Source Credibility Evaluation to assess supplied material
  for manipulation indicators and recommend resilience measures'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
