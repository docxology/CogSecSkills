id: information_environment.bot_and_automation_detection
description: Bot and automation detection applies behavioral, temporal, network, and
  linguistic fingerprinting to distinguish automated or semi-automated accounts from
  genuine human participants in an information environment. The technique draws on
  academic research into coordinated amplification, sockpuppet behavior, and platform
  API abuse to surface accounts whose posting cadence, account-creation timing, content
  uniformity, or follower graph structure are inconsistent with organic human activity.
  Outputs support decisions about source credibility, narrative provenance, and the
  severity of inauthentic amplification.
tags:
- cognitive-security
- information_environment
- inauthenticity-detection
triggers:
- is this account a bot
- detect automated accounts
- check for bot behavior
- is this amplification organic
- bot or human
- automation signatures
tools:
- verb: read
  purpose: ingest account metadata, post history, and behavioral timelines
- verb: reason
  purpose: apply behavioral, temporal, and linguistic heuristics to classify accounts
- verb: search
  purpose: cross-reference known bot indicators and look up account reputation signals
- verb: write
  purpose: emit a structured classification report with evidence and confidence ratings
inputs:
- name: account_data
  type: table
  required: true
  description: 'Account identifiers plus available metadata: creation date, post volume,
    follower/following ratio, posting timestamps, content samples, profile completeness'
- name: context
  type: text
  required: false
  description: The platform, campaign, or event being investigated, to calibrate base
    rates and behavioral norms
outputs:
- name: account_classifications
  type: table
  description: Per-account classification (likely bot / likely human / ambiguous),
    confidence, and the primary evidence signals driving each classification
- name: detection_report
  type: markdown
  description: Summary of the detection methodology, aggregate bot-likelihood distribution,
    caveats, and recommended follow-on actions
references:
- 'Varol, O., Ferrara, E., Davis, C.A., Menczer, F., & Flammini, A. (2017). Online
  human-bot interactions: Detection, estimation, and characterization. ICWSM.'
- Ferrara, E., Varol, O., Davis, C., Menczer, F., & Flammini, A. (2016). The rise
  of social bots. Communications of the ACM, 59(7), 96-104.
- 'Beskow, D.M., & Carley, K.M. (2018). Bot-hunter: A tiered approach to detecting
  & characterizing automated activity on Twitter. SBP-BRiMS.'
- 'Nimmo, B. (2017). Anatomy of an Info-War: How Russia''s Propaganda Machine Works.
  StopFake.'
when_to_use:
- Evaluating whether a trending topic or hashtag is being artificially amplified
- Assessing the credibility of apparent grassroots support for a narrative
- Auditing follower bases of key influencers for inauthentic inflation
- Investigating accounts that spread disinformation at superhuman posting rates
- Pre-publication triage of claimed 'public sentiment' signals
what_it_produces:
- A per-account classification table with confidence and evidence rationale
- An aggregate estimate of inauthentic amplification share in the dataset
- Identified behavioral signatures that distinguish automated from human accounts
  in this specific context
- Caveats on false-positive risk for high-volume legitimate users
key_discipline:
- No single signal is diagnostic — classification requires converging behavioral,
  temporal, and network evidence
- Calibrate base rates to the platform and context before applying thresholds
- Distinguish bots (fully automated) from cyborgs (human + automated) from coordinated
  humans — they require different responses
- Report confidence levels honestly; avoid binary labels when evidence is ambiguous
workflow_steps:
- verbs:
  - read
  title: Ingest and profile accounts
  text: 'Load account metadata and post histories. Compute behavioral features: posts-per-day,
    interposting interval distribution, reply-to-original ratio, unique vocabulary
    size, profile completeness score, account age vs. follower count ratio.'
- verbs:
  - search
  title: Cross-reference known indicators
  text: Check accounts against known bot taxonomies (e.g. Astroturf botnets, amplification
    bots, content-farm accounts). Look up any available reputation signals or prior
    flagging by platform trust-and-safety teams.
- verbs:
  - reason
  title: Apply multi-signal classification
  text: 'For each account, score it on temporal regularity (inter-tweet interval entropy),
    content diversity (type-token ratio, near-duplicate detection), network position
    (follow/unfollow churn, follow-back ratio), and metadata consistency (username
    patterns, profile image uniqueness). Converge signals into a classification: likely
    bot, cyborg, coordinated human, or genuine human. Flag edge cases explicitly.'
- verbs:
  - reason
  - write
  title: Assess amplification impact and emit report
  text: Aggregate the per-account classifications to estimate inauthentic amplification
    share. Write the classification table and a detection report that documents methodology,
    confidence, specific signal evidence per account, false-positive risk factors,
    and recommended investigative or defensive actions.
anti_criteria:
- Do not classify an account as a bot based on any single signal such as high posting
  frequency alone — high-volume human journalists and activists exist
- Do not present bot classifications as definitive facts; always report confidence
  level and the evidence base
- Do not conflate automation detection with political content moderation — the technique
  assesses authenticity, not viewpoint
- Do not apply thresholds calibrated for one platform to another without recalibration
defensive_boundary: 'Use Bot & Automation Detection only for information-environment
  monitoring and platform-risk defense: recognize, assess, document, or defend platform
  integrity, narrative context, and authentic community behavior. Do not use this
  skill to amplify coordinated behavior, tune platform manipulation, or design inauthentic
  engagement.'
misuse_redirect: 'If a request asks Bot & Automation Detection to amplify coordinated
  behavior, tune platform manipulation, or design inauthentic engagement, refuse that
  path and redirect to the safe defensive form: map supplied narratives, automation
  signals, or platform affordance risks for defensive review.'
evidence_requirements:
- For Bot & Automation Detection, tie each account classifications, and detection
  report claim to concrete evidence from the specific account data, and context item,
  source excerpt, observation, or command result that supports it.
- For Bot & Automation Detection, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the account
  classifications.
- Before recommending any Bot & Automation Detection action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Bot & Automation Detection: the account classifications is supported by
  multiple independent platform observations, narrative movement, automation signals,
  and provenance data; ingest and profile accounts and cross-reference known indicators
  checks agree, and no unresolved contradiction would change the result.'
- 'Medium for Bot & Automation Detection: the account classifications is plausible,
  but one important account data source, comparison case, or alternative explanation
  remains incomplete.'
- 'Low for Bot & Automation Detection: the account classifications rests on sparse,
  single-source, contested, or mostly inferential evidence; keep the result provisional
  and list the next check.'
uncertainty_handling:
- State what Bot & Automation Detection cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating information_environment evidence to collect when
  confidence is low or medium.
privacy_legal_constraints:
- For Bot & Automation Detection, use only authorized account data, and context, public
  or source-approved records, and caller-provided context needed for the defensive
  task.
- For Bot & Automation Detection, minimize person-level detail in the account classifications;
  prefer aggregate, artifact-level, role-level, or case-level summaries unless an
  individual is essential to the defensive question.
- For Bot & Automation Detection, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Bot & Automation Detection: treating account data as complete when ingest and profile
  accounts and cross-reference known indicators checks or contradictory evidence are
  missing.'
- 'Bot & Automation Detection: producing advice that would help a requester amplify
  coordinated behavior, tune platform manipulation, or design inauthentic engagement.'
- 'Bot & Automation Detection: reporting the account classifications without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Bot & Automation Detection outputs to amplify coordinated behavior,
  tune platform manipulation, or design inauthentic engagement'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Convert the account classifications from Bot & Automation Detection into
  an operational playbook to amplify coordinated behavior, tune platform manipulation,
  or design inauthentic engagement'' -> refuse and offer governance, detection, or
  mitigation analysis.'
- 'Safe defensive: ''Use Bot & Automation Detection to map supplied narratives, automation
  signals, or platform affordance risks for defensive review with account data, and
  context'' -> produce bounded findings with evidence and uncertainty labels.'
