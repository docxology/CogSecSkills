id: cognitive_security.information_laundering_tracing
name: Information Laundering Tracing
group: cognitive_security
version: 0.1.0
status: implemented
summary: Track how a fringe claim is legitimized through layered republication into
  mainstream channels.
description: Information laundering tracing maps the staged process by which a fringe,
  unverified, or deceptive claim acquires apparent legitimacy through layered republication
  across progressively more credible outlets. The technique follows a claim from its
  origin through aggregator blogs, partisan news sites, think-tank summaries, and
  eventually mainstream coverage, identifying the amplification nodes that stripped
  caveats and added false authority at each step. It is closely related to the 'firehose
  of falsehood' and 'blue-check laundering' documented in disinformation research.
ageint_topic: cognitive-security
tags:
- cognitive-security
- cognitive_security
- disinformation
- provenance
triggers:
- information laundering
- how did this fringe claim go mainstream
- trace the legitimization of a claim
- which outlets laundered this narrative
- blue-check laundering
- how did a rumor become news
tools:
- verb: read
  purpose: ingest the claim under examination and any known publication chain artifacts
- verb: search
  purpose: locate earlier and contemporaneous publications of the claim across outlet
    tiers
- verb: web
  purpose: retrieve live pages, archive.org snapshots, and cross-references to reconstruct
    the republication chain
- verb: reason
  purpose: classify each node by outlet tier, identify where caveats were dropped
    and authority added, and assess deliberateness
- verb: write
  purpose: emit the laundering chain diagram, node annotations, and assessed legitimization
    tactics
inputs:
- name: claim_text
  type: text
  required: true
  description: The specific claim or narrative to trace, stated as precisely as possible
- name: known_publications
  type: list
  required: false
  description: Any already-known URLs or outlet names where the claim appeared, to
    seed the chain
- name: time_window
  type: text
  required: false
  description: Approximate date range to bound the search (e.g., '2023-09 to 2023-11')
outputs:
- name: laundering_chain
  type: table
  description: 'Chronological table of publication nodes: date, outlet, outlet tier,
    claim fidelity, caveats present/dropped, amplification mechanism'
- name: analysis_narrative
  type: markdown
  description: Narrative describing the legitimization arc, the key laundering nodes,
    techniques used (caveat stripping, authority borrowing, saturation), and assessed
    intent
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Wardle, C., & Derakhshan, H. (2017). Information Disorder: Toward an interdisciplinary
  framework for research and policy making. Council of Europe Report DGI(2017)09.'
- 'Nimmo, B. (2019). The Breakout Scale: Measuring the impact of influence operations.
  Graphika.'
- 'Bradshaw, S., & Howard, P. N. (2019). The Global Disinformation Order: 2019 Global
  Inventory of Organised Social Media Manipulation. Oxford Internet Institute.'
- 'Benkler, Y., Faris, R., & Roberts, H. (2018). Network Propaganda: Manipulation,
  Disinformation, and Radicalization in American Politics. Oxford University Press.'
defensive_boundary: 'Use Information Laundering Tracing only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Information Laundering Tracing to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Information Laundering Tracing, tie every node, outlet-tier classification,
  and caveat-stripping claim to concrete evidence — a dated URL, an archive.org snapshot,
  or a direct quote of the claim — and require coordination signals such as identical
  phrasing or timing before any deliberate-laundering verdict rests on that evidence.
- For Information Laundering Tracing, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the laundering
  chain.
- Before recommending any Information Laundering Tracing action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Information Laundering Tracing: the laundering chain is built from independently
  retrievable publications across the canonicalized claim and known sources, each
  tier transition and caveat-stripping node is documented with a dated artifact, and
  no unresolved contradiction would change the assessment of which node most legitimized
  the claim.'
- 'Medium for Information Laundering Tracing: the laundering chain is plausible, but
  one important claim text source, comparison case, or alternative explanation remains
  incomplete.'
- 'Low for Information Laundering Tracing: the laundering chain rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Information Laundering Tracing cannot determine from the supplied or
  authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Information Laundering Tracing, use only authorized claim text, known publications,
  and time window, public or source-approved records, and caller-provided context
  needed for the defensive task.
- For Information Laundering Tracing, minimize person-level detail in the laundering
  chain; prefer aggregate, artifact-level, role-level, or case-level summaries unless
  an individual is essential to the defensive question.
- For Information Laundering Tracing, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Information Laundering Tracing: declaring the chain traced when only the most recent
  mainstream appearance was followed and the upstream origin nodes were skipped, or
  labelling the laundering deliberate without coordination evidence, so fast organic
  spread is mistaken for an orchestrated seeding campaign.'
- 'Information Laundering Tracing: producing advice that would help a requester increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation.'
- 'Information Laundering Tracing: reporting the laundering chain without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Information Laundering Tracing outputs to increase persuasive impact,
  exploit audience vulnerabilities, or optimize narrative manipulation'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the laundering chain from Information Laundering Tracing into
  an operational playbook to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Information Laundering Tracing to assess supplied material
  for manipulation indicators and recommend resilience measures with claim text, known
  publications, and time window'' -> produce bounded findings with evidence and uncertainty
  labels.'
