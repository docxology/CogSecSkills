id: cognitive_security.influence_operation_mapping
description: Influence Operation Mapping produces a structured decomposition of a
  suspected or confirmed influence operation across four analytic dimensions — Actors,
  Behaviors, Content, and Distribution (ABCD) — adapted from the SIO framework and
  related investigative tradecraft (Graphika, Stanford Internet Observatory). The
  technique traces who is operating, what coordinated inauthentic or manipulative
  behaviors they exhibit, what narratives and content they produce, and through which
  platforms and channels content moves. The output is an operation map that supports
  attribution reasoning, platform reporting, counter-operation design, and public
  disclosure.
tags:
- cognitive-security
- cognitive_security
- influence-operations
- ABCD-framework
triggers:
- influence operation
- coordinated inauthentic behavior
- map this IO
- who is behind this campaign
- actor behavior content distribution
- ABCD framework
- disinformation network mapping
- operation attribution
tools:
- verb: read
  purpose: 'ingest collected evidence: account data, content samples, network graphs,
    platform reports, and prior attribution findings'
- verb: search
  purpose: search open sources, OSINT databases, and prior reporting to find corroborating
    evidence, known actor profiles, and infrastructure overlaps
- verb: reason
  purpose: apply ABCD decomposition, assess attribution confidence, identify coordinated
    behavior patterns, and model operation objectives
- verb: write
  purpose: produce the operation map, attribution confidence assessment, and counter-operation
    or disclosure brief
inputs:
- name: evidence_collection
  type: list
  required: true
  description: 'Collected artifacts: account handles, content samples (text/images/video),
    network data, timestamps, platform, and any prior platform or researcher findings
    about the campaign'
- name: hypothesis
  type: text
  required: false
  description: Initial hypothesis about actor identity, operation objective, or target
    audience — treated as a competing hypothesis to be tested, not a conclusion
- name: threat_actor_profiles
  type: list
  required: false
  description: Known threat actor profiles, TTPs, and infrastructure indicators from
    prior reporting (e.g., Graphika/SIO reports, DISARM framework entries) for comparison
outputs:
- name: abcd_operation_map
  type: table
  description: 'Structured ABCD decomposition table: Actors (account clusters, likely
    principals, proxies), Behaviors (coordinated inauthentic behaviors observed),
    Content (narrative themes, content formats, seeding vs. amplification), Distribution
    (platforms, channels, timing patterns, amplification networks)'
- name: attribution_assessment
  type: markdown
  description: 'Confidence-rated attribution assessment covering: technical indicators,
    behavioral fingerprints, narrative consistency with known actor objectives, alternative
    explanations, and an explicit confidence tier (low/medium/high)'
- name: counter_operation_brief
  type: markdown
  description: 'Defensive brief covering: recommended platform reporting actions,
    public disclosure options, narrative counter-strategies, and monitoring indicators
    for operation continuation'
references:
- Graphika & Stanford Internet Observatory (2020). Roadmap for Research on Influence
  Operations. Stanford Internet Observatory.
- Renée DiResta et al. (2019). The Tactics & Tropes of the Internet Research Agency.
  US Senate Select Committee on Intelligence.
- DISARM Foundation (2023). DISARM Framework v1.4. https://www.disarm.foundation/
- 'Nimmo, B. (2020). The Breakout Scale: Measuring the Impact of Influence Operations.
  Brookings Institution.'
- Starbird, K., Arif, A. & Wilson, T. (2019). Disinformation as Collaborative Work.
  Proceedings of the ACM on Human-Computer Interaction, 3(CSCW), 127.
when_to_use:
- Investigating a suspected coordinated inauthentic behavior campaign on one or more
  platforms
- Building an evidence package for platform trust-and-safety reporting or law enforcement
  referral
- Analyzing a known influence operation post-takedown to understand TTPs and build
  future detection signatures
- Comparing a new campaign to prior actor profiles to assess whether known threat
  actors are responsible
- Designing a public disclosure or counter-narrative response that requires accurate
  understanding of operation structure
what_it_produces:
- A structured ABCD map decomposing the operation by actors (account clusters and
  likely principals), behaviors (coordinated inauthentic tactics), content (narrative
  themes and formats), and distribution (platform pathways and amplification patterns)
- An attribution confidence assessment with explicit alternative hypotheses and a
  tiered confidence rating
- A behavioral fingerprint usable for detecting future operations by the same actor
  or using the same TTPs
- Prioritized defensive and counter-operation recommendations tied to the specific
  operation structure
key_discipline:
- Work the ABCD dimensions independently before synthesizing — conflating actor and
  content analysis leads to circular attribution
- Treat attribution as a hypothesis under evidence, not a conclusion; always state
  the alternative explanations and what evidence would change the assessment
- Distinguish coordinated inauthentic behavior from organic polarization — coordination
  indicators (timing, infrastructure, template reuse) must be empirical, not inferred
  from content alone
- 'Document the evidence chain: every element of the map should link to a specific
  artifact, not to an inference chain from a single indicator'
workflow_steps:
- verbs:
  - read
  title: Inventory evidence and scope operation
  text: 'Read and catalog all available evidence. Note platforms covered, time range,
    content types, account count, and any prior platform or researcher findings. Define
    the operation boundary: what is in scope for this map vs. what is out of scope
    or requires further collection.'
- verbs:
  - reason
  title: Decompose Actors
  text: 'Identify and cluster accounts by behavioral similarity: posting cadence,
    template use, network co-behavior, account age, follower patterns, and automation
    indicators. Distinguish likely principals (controllers), proxies (witting or unwitting
    amplifiers), and compromised/hijacked accounts. Note infrastructure overlaps:
    shared IP ranges, creation batch timing, cross-platform identifiers.'
- verbs:
  - reason
  title: Decompose Behaviors
  text: 'Catalog coordinated inauthentic behaviors: coordinated amplification (synchronized
    sharing spikes), sock-puppet cross-promotion, astroturfing (manufacturing false
    consensus), brigading, platform manipulation (trending exploitation, mass reporting),
    and impersonation. For each behavior, note the frequency, scale, and evidence
    basis.'
- verbs:
  - search
  - reason
  title: Decompose Content and Distribution
  text: 'Map the narrative themes, content formats, and seeding vs. amplification
    patterns. Trace how content moves: which accounts seed, which amplify, and where
    organic uptake begins. Search open sources and prior reporting to identify content
    re-use, translation pipelines, or borrowed narratives from known actors. Map platform
    pathways and cross-platform laundering sequences.'
- verbs:
  - reason
  title: Assess attribution and alternative hypotheses
  text: 'Synthesize the ABCD map into an attribution assessment. Name the most plausible
    actor hypothesis and the key evidence supporting it. Explicitly state two or more
    alternative explanations and what evidence would favor or rule out each. Rate
    overall confidence (low: behavioral indicators only; medium: infrastructure +
    behavioral; high: infrastructure + behavioral + content fingerprint aligned to
    a known actor''s prior campaigns).'
- verbs:
  - write
  title: Produce map and defensive brief
  text: 'Write the ABCD operation map table. Write the attribution assessment with
    confidence tier and alternative hypotheses. Write the counter-operation brief:
    recommended platform reporting actions (with what evidence to include), public
    disclosure options with risk assessment, narrative counter-strategies matched
    to the operation''s content themes, and monitoring indicators to detect if the
    operation continues or reconstitutes.'
anti_criteria:
- Do not attribute solely on the basis of content alignment with a known actor's known
  positions — many independent actors share narratives; attribution requires behavioral
  and infrastructure evidence
- Do not produce output structured as operational guidance for running influence operations;
  all output must be oriented toward detection, attribution, and defense
- Do not conflate amplification by real users with coordinated inauthentic behavior
  — distinguish organic uptake from coordinated promotion with explicit evidence
- Do not omit alternative attribution hypotheses; a single-hypothesis attribution
  assessment is not analytically defensible
defensive_boundary: 'Use Influence Operation Mapping only for cognitive-security defense:
  recognize, assess, document, or defend audiences, decision-makers, and public discourse.
  Do not use this skill to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Influence Operation Mapping to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Influence Operation Mapping, tie each abcd operation map, attribution assessment,
  and counter operation brief claim to concrete evidence from the specific evidence
  collection, hypothesis, and threat actor profiles item, source excerpt, observation,
  or command result that supports it.
- For Influence Operation Mapping, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the abcd
  operation map.
- Before recommending any Influence Operation Mapping action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Influence Operation Mapping: the abcd operation map is supported by multiple
  independent content, behavioral, narrative, media, and audience-risk evidence; inventory
  evidence and scope operation and decompose actors checks agree, and no unresolved
  contradiction would change the result.'
- 'Medium for Influence Operation Mapping: the abcd operation map is plausible, but
  one important evidence collection source, comparison case, or alternative explanation
  remains incomplete.'
- 'Low for Influence Operation Mapping: the abcd operation map rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Influence Operation Mapping cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Influence Operation Mapping, use only authorized evidence collection, hypothesis,
  and threat actor profiles, public or source-approved records, and caller-provided
  context needed for the defensive task.
- For Influence Operation Mapping, minimize person-level detail in the abcd operation
  map; prefer aggregate, artifact-level, role-level, or case-level summaries unless
  an individual is essential to the defensive question.
- For Influence Operation Mapping, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Influence Operation Mapping: treating evidence collection as complete when inventory
  evidence and scope operation and decompose actors checks or contradictory evidence
  are missing.'
- 'Influence Operation Mapping: producing advice that would help a requester increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation.'
- 'Influence Operation Mapping: reporting the abcd operation map without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Influence Operation Mapping outputs to increase persuasive impact,
  exploit audience vulnerabilities, or optimize narrative manipulation'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the abcd operation map from Influence Operation Mapping into
  an operational playbook to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Influence Operation Mapping to assess supplied material for
  manipulation indicators and recommend resilience measures with evidence collection,
  hypothesis, and threat actor profiles'' -> produce bounded findings with evidence
  and uncertainty labels.'
