id: osint_integrity.claim_provenance_verification
name: Claim Provenance Verification
group: osint_integrity
version: 0.1.0
status: implemented
summary: Verify a public claim by tracing it to a primary source and corroborating
  independently.
description: Takes a public claim and traces it upstream through the chain of republication
  to its earliest origin or primary source, detecting circular reporting where outlets
  merely cite one another back to a single unverified point. Assesses the primary
  source directly for scope, caveats, and whether it actually supports the claim,
  then seeks independent corroboration that does not derive from the same origin.
  Produces a documented provenance chain and a graded verdict with confidence and
  the single weakest link in the chain.
ageint_topic: osint-integrity
tags:
- osint
- provenance
- verification
- circular-reporting
- integrity
triggers:
- verify this claim
- claim provenance
- is this true
- trace this to the source
- who reported this first
- find the original source
- is this circular reporting
- does the primary source say this
tools:
- verb: read
  purpose: read the supplied claim, cited articles, and any attached documents
- verb: search
  purpose: locate earlier instances and independent reporting of the claim
- verb: web
  purpose: fetch and inspect primary and corroborating sources
- verb: reason
  purpose: assess scope match, detect circular reporting, and weigh independence
- verb: write
  purpose: record the provenance chain, chain-of-custody note, and verdict
inputs:
- name: claim
  type: string
  required: true
  description: The public claim to verify, as stated or quoted by the requester.
- name: starting_sources
  type: list
  required: false
  description: Optional URLs or citations where the requester encountered the claim.
outputs:
- name: provenance_chain
  type: structured
  description: Ordered list of sources from point-of-encounter back to origin, with
    links and timestamps.
- name: verdict
  type: structured
  description: Verified/partially/unverified/false/unverifiable with confidence and
    the single weakest link.
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- First Draft / Bellingcat verification practice (provenance, source, date, location).
defensive_boundary: 'Use Claim Provenance Verification only for OSINT integrity and
  source-verification defense: recognize, assess, document, or defend source provenance,
  privacy, chain of custody, and public-source accountability. Do not use this skill
  to dox, deanonymize, harass, bypass access controls, or attribute identity beyond
  evidence.'
misuse_redirect: 'If a request asks Claim Provenance Verification to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence, refuse that
  path and redirect to the safe defensive form: verify supplied claims, media, sources,
  or datasets with documented public-source methods.'
evidence_requirements:
- For Claim Provenance Verification, bind each finding to a labeled source — source
  records, custody notes, metadata, corroborating references, and contradiction logs,
  a cited reference, or an explicitly marked inference — and never present inference
  as observed evidence.
- For Claim Provenance Verification, keep observations, assumptions, inferences, and
  missing information in separate labeled categories.
- Before issuing any Claim Provenance Verification recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Claim Provenance Verification: independent lines of source
  records, custody notes, metadata, corroborating references, and contradiction logs
  converge, credible alternatives have been tested, and the conclusion would survive
  removing any single source.'
- 'Medium confidence for Claim Provenance Verification: the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Claim Provenance Verification: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Claim Provenance Verification cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Claim
  Provenance Verification should collect to separate the live alternatives.
privacy_legal_constraints:
- For Claim Provenance Verification, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Claim Provenance Verification, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Claim Provenance Verification, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Claim Provenance Verification failure: overstating identity, location, attribution,
  or source reliability from incomplete public traces.'
- 'Claim Provenance Verification failure: producing guidance that would help a requester
  dox, deanonymize, harass, bypass access controls, or attribute identity beyond evidence.'
- 'Claim Provenance Verification failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Claim Provenance Verification to dox, deanonymize, harass, bypass
  access controls, or attribute identity beyond evidence'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Claim Provenance Verification into an operational playbook to dox,
  deanonymize, harass, bypass access controls, or attribute identity beyond evidence''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Claim Provenance Verification to verify supplied claims,
  media, sources, or datasets with documented public-source methods'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
