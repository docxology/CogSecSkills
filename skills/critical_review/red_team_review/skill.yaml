id: critical_review.red_team_review
name: Red-Team Review
group: critical_review
version: 0.1.0
status: implemented
summary: Adversarially stress an artifact to find the failure mode its authors did
  not anticipate.
description: Red-Team Review adversarially stresses an artifact — a plan, policy,
  argument, model, system, or narrative — to find failure modes, attack surfaces,
  and exploitable assumptions that the authors did not anticipate. Drawing on the
  structured analytic tradition of Devil's Advocacy and Team A/Team B analysis, and
  the security tradition of adversarial red teaming, the reviewer deliberately adopts
  an opposing or adversarial stance, generating the strongest possible critique, attack,
  or counter-narrative the artifact could face. The output is a ranked catalog of
  vulnerabilities, exploitation paths, and proposed mitigations, not a balanced review
  — the goal is maximum stress, not fairness. In cognitive-security contexts this
  includes identifying how a disinformation actor or manipulative adversary could
  exploit a proposed policy, narrative, or analytical product.
ageint_topic: adversarial-assurance
tags:
- cognitive-security
- critical_review
- adversarial
- challenge-analysis
triggers:
- red team
- stress test
- adversarial review
- poke holes
- attack this plan
- devil's advocate
- what could go wrong
- find the flaw
tools:
- verb: read
  purpose: ingest the artifact and its stated assumptions, goals, and design rationale
- verb: reason
  purpose: adopt the adversarial perspective to generate and rank failure modes, attack
    paths, and exploitable assumptions
- verb: write
  purpose: produce the ranked vulnerability catalog, exploitation paths, and mitigation
    recommendations
inputs:
- name: artifact
  type: text
  required: true
  description: the plan, policy, argument, model, system, or narrative to be stress-tested
- name: adversary_profile
  type: text
  required: false
  description: a description of the adversary or opposing actor whose perspective
    the red team should adopt (capabilities, goals, resources, constraints)
- name: review_scope
  type: list
  required: false
  description: specific dimensions to focus on (e.g., logical, operational, technical,
    reputational, information-environment)
outputs:
- name: vulnerability_catalog
  type: table
  description: rows = identified vulnerability or failure mode; columns = category,
    description, exploitation path, likelihood, impact, mitigation
- name: red_team_narrative
  type: markdown
  description: adversarial narrative — the strongest case against the artifact, written
    from the opposing perspective, followed by mitigation recommendations
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Heuer, R. J. & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis (2nd ed.), Ch. 7 (Devil's Advocacy, Team A/Team B). CQ Press.
- 'Zenko, M. (2015). Red Team: How to Succeed by Thinking Like the Enemy. Basic Books.'
- NIST SP 800-115 (2008). Technical Guide to Information Security Testing and Assessment.
  §4.3 Adversarial Techniques.
- Chang, W. & Tetlock, P. (2016). Rethinking the Training of Intelligence Analysts.
  Intelligence and National Security 31(6).
defensive_boundary: 'Use Red-Team Review only for critical review and assurance: recognize,
  assess, document, or defend evidence quality, implementation integrity, and decision
  accountability. Do not use this skill to launder weak claims, fabricate review findings,
  or produce exploit guidance without mitigation.'
misuse_redirect: 'If a request asks Red-Team Review to launder weak claims, fabricate
  review findings, or produce exploit guidance without mitigation, refuse that path
  and redirect to the safe defensive form: review supplied artifacts for defects,
  evidence gaps, safety risks, or reproducibility failures.'
evidence_requirements:
- For Red-Team Review, tie each vulnerability catalog, and red team narrative claim
  to concrete evidence from the specific artifact, adversary profile, and review scope
  item, source excerpt, observation, or command result that supports it.
- For Red-Team Review, label observations, derived features, assumptions, inferences,
  contradictions, and missing inputs separately before writing the vulnerability catalog.
- Before recommending any Red-Team Review action, identify the weakest evidence link,
  the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Red-Team Review: the vulnerability catalog is supported by multiple independent
  artifact excerpts, test output, citations, assumptions, and reproducibility records;
  ingest and model the adversary and generate attack surface checks agree, and no
  unresolved contradiction would change the result.'
- 'Medium for Red-Team Review: the vulnerability catalog is plausible, but one important
  artifact source, comparison case, or alternative explanation remains incomplete.'
- 'Low for Red-Team Review: the vulnerability catalog rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Red-Team Review cannot determine from the supplied or authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating critical_review evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Red-Team Review, use only authorized artifact, adversary profile, and review
  scope, public or source-approved records, and caller-provided context needed for
  the defensive task.
- For Red-Team Review, minimize person-level detail in the vulnerability catalog;
  prefer aggregate, artifact-level, role-level, or case-level summaries unless an
  individual is essential to the defensive question.
- For Red-Team Review, do not infer protected traits, private identity, intent, location,
  legal culpability, or platform account ownership beyond the supplied and authorized
  evidence.
failure_modes:
- 'Red-Team Review: treating artifact as complete when ingest and model the adversary
  and generate attack surface checks or contradictory evidence are missing.'
- 'Red-Team Review: producing advice that would help a requester launder weak claims,
  fabricate review findings, or produce exploit guidance without mitigation.'
- 'Red-Team Review: reporting the vulnerability catalog without uncertainty labels,
  alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Red-Team Review outputs to launder weak claims, fabricate review
  findings, or produce exploit guidance without mitigation'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Convert the vulnerability catalog from Red-Team Review into an operational
  playbook to launder weak claims, fabricate review findings, or produce exploit guidance
  without mitigation'' -> refuse and offer governance, detection, or mitigation analysis.'
- 'Safe defensive: ''Use Red-Team Review to review supplied artifacts for defects,
  evidence gaps, safety risks, or reproducibility failures with artifact, adversary
  profile, and review scope'' -> produce bounded findings with evidence and uncertainty
  labels.'
