id: sat.morphological_analysis
name: Morphological Analysis
group: sat
version: 0.1.0
status: implemented
summary: Enumerate the parameter space of a problem to bound the set of possibilities.
description: Morphological analysis (Zwicky 1969; Ritchey 2011) decomposes a complex
  problem into its independent parameters, enumerates the discrete values each parameter
  can take, and maps the full cross-product to bound the space of possible configurations.
  In intelligence and cognitive-security contexts it prevents premature closure on
  a single scenario by forcing analysts to articulate every combination that remains
  logically consistent with current evidence, including surprising or low-salience
  possibilities.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- scenario-generation
- bounded-analysis
triggers:
- enumerate all possibilities
- what combinations are possible
- morphological analysis
- parameter space
- bound the scenarios
- what haven't we considered
tools:
- verb: read
  purpose: ingest problem description, prior analysis, and any constraints already
    known about the parameter space
- verb: reason
  purpose: identify independent dimensions, enumerate value sets, prune logically
    impossible combinations, and assess each surviving cell
- verb: write
  purpose: produce the morphological box (matrix), the pruned scenario list, and priority
    findings
inputs:
- name: problem_statement
  type: text
  required: true
  description: A concise statement of the issue or threat being analyzed (e.g., 'Who
    might conduct a coordinated inauthentic behavior campaign against this election
    and how?')
- name: known_constraints
  type: list
  required: false
  description: Established facts or logical constraints that rule out certain parameter
    values or combinations upfront
outputs:
- name: morphological_box
  type: table
  description: A matrix whose rows are parameters and whose columns are possible values;
    each cell contains its value label and a brief rationale
- name: scenario_inventory
  type: markdown
  description: A list of all logically consistent cross-product combinations (scenarios),
    each with an evidence status (supported / neutral / contradicted) and a brief
    description
- name: priority_findings
  type: markdown
  description: Analytic commentary identifying the most-likely scenario, the most-dangerous
    scenario, and any combination that current collection posture is blind to
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Zwicky, F. (1969). Discovery, Invention, Research Through the Morphological Approach.
  Macmillan.
- 'Ritchey, T. (2011). Wicked Problems – Social Messes: Decision Support Modelling
  with Morphological Analysis. Springer.'
- Heuer, R. J., & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis, 2nd ed. CQ Press. Chapter 7 (Scenario Analysis).
- Pherson, R. H., & Pherson, K. H. (2020). Critical Thinking for Strategic Intelligence,
  3rd ed. CQ Press.
defensive_boundary: 'Use Morphological Analysis only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Morphological Analysis to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Morphological Analysis, bind each finding to a labeled source — hypotheses,
  assumptions, indicators, evidence tables, and confidence notes, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Morphological Analysis, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Morphological Analysis recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Morphological Analysis: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Morphological Analysis: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Morphological Analysis: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Morphological Analysis cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Morphological
  Analysis should collect to separate the live alternatives.
privacy_legal_constraints:
- For Morphological Analysis, use only data the caller is authorized to analyze, drawn
  from public or source-approved records.
- For Morphological Analysis, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Morphological Analysis, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Morphological Analysis failure: using the method as a checklist while skipping
  diagnostic evidence and disconfirming tests.'
- 'Morphological Analysis failure: producing guidance that would help a requester
  force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation.'
- 'Morphological Analysis failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Morphological Analysis to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Morphological Analysis into an operational playbook to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Morphological Analysis to apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
