id: cognitive_security.information_provenance_tracing
name: Information Provenance Tracing
group: cognitive_security
version: 0.1.0
status: implemented
summary: Trace a claim back to its origin through the chain of republication and mutation.
description: Information provenance tracing reconstructs the origin and mutation history
  of a specific claim, image, video, or dataset by following each documented republication
  back through the chain of custody to the earliest recoverable source. Unlike information
  laundering tracing (which focuses on legitimization tactics), provenance tracing
  is a fact-finding technique that asks 'where did this actually come from and how
  has it changed?' — establishing whether a claim descends from verified reporting,
  a fabricated source, or a misrepresentation of authentic material.
ageint_topic: cognitive-security
tags:
- cognitive-security
- cognitive_security
- verification
- osint
triggers:
- information provenance
- where did this claim come from
- trace the origin of this
- who first published this
- verify the source of this claim
- reverse image search provenance
- chain of custody for this information
tools:
- verb: read
  purpose: ingest the claim, artifact, or piece of content whose provenance is under
    investigation
- verb: search
  purpose: locate earlier instances of the claim or artifact across archives, social
    media, and news databases
- verb: web
  purpose: retrieve live and archived pages, WHOIS/domain records, reverse image search
    results, and metadata from online sources
- verb: reason
  purpose: evaluate the chain of citations, assess source reliability, identify mutations
    in meaning across republications, and determine the most likely original source
- verb: write
  purpose: emit the provenance chain, source assessment, mutation log, and confidence-rated
    finding
inputs:
- name: artifact
  type: text
  required: true
  description: The claim, quote, image description, video reference, or dataset to
    trace — stated as precisely as possible, including any known URLs or identifiers
- name: known_context
  type: text
  required: false
  description: 'Any background already known about the artifact: approximate date
    first seen, platform, claimant identity'
- name: scope
  type: text
  required: false
  description: Limit the trace to particular domains, time windows, or content types
    (e.g., 'social media only', 'before 2022-01')
outputs:
- name: provenance_chain
  type: table
  description: 'Ordered table from earliest-found instance to present: date, source,
    URL/identifier, claim text or artifact hash, mutation notes, reliability assessment'
- name: origin_assessment
  type: markdown
  description: Narrative identifying the earliest recoverable source, its nature (verified
    journalist, anonymous account, state outlet, fabricated entity, etc.), how meaning
    mutated across the chain, and a confidence-rated conclusion about origin
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- First Draft News. (2017). Understanding Information Disorder. First Draft.
- 'Silverman, C. (Ed.). (2015). Verification Handbook: A definitive guide to verifying
  digital content for emergency coverage. European Journalism Centre.'
- Bellingcat Verification Handbook (2021). An Online Investigation Toolkit. Bellingcat.
- 'Holan, A. D. (2013). The Principles of the Truth-O-Meter: PolitiFact''s methodology
  for independent fact-checking. PolitiFact.'
defensive_boundary: 'Use Information Provenance Tracing only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Information Provenance Tracing to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Information Provenance Tracing, tie each provenance chain, and origin assessment
  claim to concrete evidence from the specific artifact, known context, and scope
  item, source excerpt, observation, or command result that supports it.
- For Information Provenance Tracing, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the provenance
  chain.
- Before recommending any Information Provenance Tracing action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Information Provenance Tracing: the provenance chain is supported by multiple
  independent content, behavioral, narrative, media, and audience-risk evidence; define
  and fingerprint the artifact and search backward through the chain checks agree,
  and no unresolved contradiction would change the result.'
- 'Medium for Information Provenance Tracing: the provenance chain is plausible, but
  one important artifact source, comparison case, or alternative explanation remains
  incomplete.'
- 'Low for Information Provenance Tracing: the provenance chain rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Information Provenance Tracing cannot determine from the supplied or
  authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Information Provenance Tracing, use only authorized artifact, known context,
  and scope, public or source-approved records, and caller-provided context needed
  for the defensive task.
- For Information Provenance Tracing, minimize person-level detail in the provenance
  chain; prefer aggregate, artifact-level, role-level, or case-level summaries unless
  an individual is essential to the defensive question.
- For Information Provenance Tracing, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Information Provenance Tracing: treating artifact as complete when define and fingerprint
  the artifact and search backward through the chain checks or contradictory evidence
  are missing.'
- 'Information Provenance Tracing: producing advice that would help a requester increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation.'
- 'Information Provenance Tracing: reporting the provenance chain without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Information Provenance Tracing outputs to increase persuasive impact,
  exploit audience vulnerabilities, or optimize narrative manipulation'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the provenance chain from Information Provenance Tracing into
  an operational playbook to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Information Provenance Tracing to assess supplied material
  for manipulation indicators and recommend resilience measures with artifact, known
  context, and scope'' -> produce bounded findings with evidence and uncertainty labels.'
