id: cognitive_security.emotional_manipulation_analysis
name: Emotional Manipulation Analysis
group: cognitive_security
version: 0.1.0
status: implemented
summary: Identify affective levers (fear, outrage, tribal belonging) a message exploits.
description: Emotional Manipulation Analysis identifies the specific affective levers
  — fear, outrage, disgust, in-group loyalty, grief, hope — that a message, campaign,
  or artifact deliberately exploits to bypass deliberative reasoning. Rooted in the
  dual-process literature (Kahneman) and influence-operation research (Wardle & Derakhshan),
  it deconstructs persuasion technique by technique, distinguishing legitimate pathos
  from weaponized emotion. The output is a structured threat map that analysts and
  communicators can use to recognize manipulation in real time and design inoculation
  or counter-messaging responses.
ageint_topic: cognitive-security
tags:
- cognitive-security
- cognitive_security
- affective-manipulation
- influence-analysis
triggers:
- emotional manipulation
- affective lever
- fear appeal analysis
- outrage bait
- what emotion is this exploiting
- manipulative framing
- emotional exploitation
tools:
- verb: read
  purpose: ingest the message, content, or campaign materials to be analyzed
- verb: reason
  purpose: identify which emotions are targeted, how they are triggered, and which
    cognitive shortcuts are exploited
- verb: write
  purpose: produce a structured emotional-lever map with technique labels, severity
    ratings, and defensive recommendations
inputs:
- name: content
  type: text
  required: true
  description: The message, article, social-media post, video transcript, or campaign
    excerpt to be analyzed
- name: context
  type: text
  required: false
  description: Background on the intended audience, distribution channel, and current
    socio-political climate that may amplify certain levers
outputs:
- name: emotional_lever_map
  type: table
  description: 'Table of identified affective levers: emotion targeted, specific trigger
    phrase or device, manipulation technique label, severity (low/medium/high), and
    potential audience impact'
- name: defensive_brief
  type: markdown
  description: Narrative summary explaining the overall manipulation strategy, which
    deliberative faculties are bypassed, and recommended inoculation or counter-framing
    approaches
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Kahneman, D. (2011). Thinking, Fast and Slow. Farrar, Straus and Giroux.
- 'Wardle, C. & Derakhshan, H. (2017). Information Disorder: Toward an Interdisciplinary
  Framework. Council of Europe Report DGI(2017)09.'
- 'Cialdini, R. B. (2001). Influence: Science and Practice (4th ed.). Allyn & Bacon.'
- 'Bail, C. A. (2021). Breaking the Social Media Prism: How to Make Our Platforms
  Less Polarizing. Princeton University Press.'
- 'van der Linden, S. (2023). Foolproof: Why Misinformation Infects Our Minds and
  How to Build Immunity. W. W. Norton.'
defensive_boundary: 'Use Emotional Manipulation Analysis only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Emotional Manipulation Analysis to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Emotional Manipulation Analysis, tie every identified lever and severity rating
  to concrete evidence — the quoted trigger phrase, the segment it appears in, and
  the System 1 shortcut it routes around — specify the target population for which
  the rating holds, and distinguish emotion that tracks the evidence from emotion
  decoupled from or contradicting it.
- For Emotional Manipulation Analysis, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the emotional
  lever map.
- Before recommending any Emotional Manipulation Analysis action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Emotional Manipulation Analysis: each affective lever in the map is anchored
  to the exact trigger phrase or device that activates it, mapped to the specific
  deliberative faculty it bypasses, and rated for severity against a named target
  population, with corroboration across content segments and no unresolved contradiction
  that would change the defensive brief.'
- 'Medium for Emotional Manipulation Analysis: the emotional lever map is plausible,
  but one important content source, comparison case, or alternative explanation remains
  incomplete.'
- 'Low for Emotional Manipulation Analysis: the emotional lever map rests on sparse,
  single-source, contested, or mostly inferential evidence; keep the result provisional
  and list the next check.'
uncertainty_handling:
- State what Emotional Manipulation Analysis cannot determine from the supplied or
  authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Emotional Manipulation Analysis, use only authorized content, and context, public
  or source-approved records, and caller-provided context needed for the defensive
  task.
- For Emotional Manipulation Analysis, minimize person-level detail in the emotional
  lever map; prefer aggregate, artifact-level, role-level, or case-level summaries
  unless an individual is essential to the defensive question.
- For Emotional Manipulation Analysis, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Emotional Manipulation Analysis: conflating legitimate evidence-tracking pathos
  with weaponized emotion, rendering a severity verdict without specifying the target
  audience, or omitting the cognitive shortcut a lever exploits, so the map either
  over-flags honest advocacy or produces analytically useless generic emotion labels.'
- 'Emotional Manipulation Analysis: producing advice that would help a requester increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation.'
- 'Emotional Manipulation Analysis: reporting the emotional lever map without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Emotional Manipulation Analysis outputs to increase persuasive impact,
  exploit audience vulnerabilities, or optimize narrative manipulation'' -> refuse
  and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the emotional lever map from Emotional Manipulation Analysis
  into an operational playbook to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Emotional Manipulation Analysis to assess supplied material
  for manipulation indicators and recommend resilience measures with content, and
  context'' -> produce bounded findings with evidence and uncertainty labels.'
