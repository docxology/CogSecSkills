id: osint_integrity.dataset_provenance_audit
description: Dataset provenance audit systematically examines a dataset's origin,
  collection methodology, licensing terms, sampling frame, and integrity before it
  is used as an analytic input. Datasets used in OSINT and cognitive-security analysis
  are often scraped, crowd-sourced, or re-packaged — making undisclosed biases, legal
  encumbrances, and integrity failures common failure modes. The audit surfaces whether
  the dataset accurately represents what it claims to represent, whether the analyst
  has legal right to use it, and whether any transformations between origin and current
  form may have introduced errors or distortions. It is the due-diligence gate before
  any dataset is trusted in an analytic product.
tags:
- cognitive-security
- osint_integrity
- data-quality
- provenance
triggers:
- audit this dataset
- where did this data come from
- check dataset provenance
- can we trust this data
- verify dataset origin and licensing
tools:
- verb: read
  purpose: ingest the dataset, its documentation, licensing files, and any prior audit
    records
- verb: search
  purpose: locate the original source publication, license terms, and any known issues
    or retractions
- verb: exec
  purpose: run integrity checks — hash verification, schema validation, duplicate
    detection, and sampling-frame tests on the dataset
- verb: reason
  purpose: assess coverage gaps, sampling bias, transformation history, and fitness-for-purpose
    given the analytic question
- verb: write
  purpose: produce the provenance audit report with fitness assessment, identified
    limitations, and a use/no-use recommendation
inputs:
- name: dataset
  type: text
  required: true
  description: The dataset under audit — a file path, URL, or description of the data
    to be examined
- name: analytic_question
  type: text
  required: true
  description: The specific question the dataset will be used to answer, so fitness-for-purpose
    can be assessed
- name: dataset_documentation
  type: text
  required: false
  description: Any accompanying data dictionary, methodology notes, README, or prior
    audit records for the dataset
outputs:
- name: provenance_audit_report
  type: markdown
  description: Structured audit report covering origin, collection methodology, licensing,
    sampling frame, transformation history, integrity checks, identified limitations,
    and use/no-use recommendation
- name: integrity_check_results
  type: table
  description: 'Row-level results of automated integrity checks: hash status, schema
    conformance, duplicate rates, and sampling coverage'
references:
- Gebru, T. et al. (2021). Datasheets for Datasets. Communications of the ACM, 64(12),
  86-92.
- Miceli, M., Posada, M. & Yang, T. (2022). Documenting the Limits of Data. Proceedings
  of FAccT.
- 'EUROPOL (2020). Internet Organised Crime Threat Assessment: Open Source Intelligence.
  Europol.'
when_to_use:
- Before using any externally sourced dataset in an analytic product, especially one
  that will inform decisions
- When a dataset's origin, methodology, or licensing is unclear or undocumented
- When the dataset has been transformed, aggregated, or re-packaged from its original
  form
- When the analytic question requires a representative sample of a population and
  sampling bias would materially affect conclusions
what_it_produces:
- A documented audit trail showing what is known and unknown about the dataset's origin
  and transformation history
- A fitness-for-purpose assessment tied to the specific analytic question, not a generic
  quality rating
- Explicit limitation disclosures that must accompany any product using the dataset
key_discipline:
- Fitness-for-purpose is question-specific — a dataset adequate for one analytic question
  may be severely biased for another
- Absence of documentation is itself a finding; an undocumented dataset carries unknown
  risk that must be disclosed
- 'Transformation history matters: each filter, merge, or re-labeling step can introduce
  bias or lose information that was present in the original'
- Licensing must be verified before analysis begins — using improperly licensed data
  can invalidate downstream findings and create legal liability
workflow_steps:
- verbs:
  - read
  - search
  title: Establish origin and licensing
  text: Identify the primary source of the dataset — who collected it, when, using
    what method. Locate the license or terms of use. Search for the original publication
    or methodology document. Flag if origin cannot be established or if the chain
    from original collection to current form has undocumented steps.
- verbs:
  - exec
  - reason
  title: Run integrity and sampling checks
  text: 'Compute a hash of the current dataset and compare to any published hash.
    Validate schema conformance, check for duplicates, and assess completeness. Examine
    the sampling frame: what population does the dataset claim to represent, and what
    is actually included? Identify coverage gaps, temporal biases, geographic biases,
    or platform-specific selection effects.'
- verbs:
  - reason
  title: Assess transformation history and fitness for purpose
  text: 'Reconstruct the transformation chain from original collection to the dataset
    in hand. For each transformation (filtering, aggregation, re-labeling, merging),
    assess whether it could introduce bias or information loss relevant to the analytic
    question. Rate fitness-for-purpose: directly fit, fit with disclosed limitations,
    or unfit for this question.'
- verbs:
  - write
  title: Produce the audit report and use recommendation
  text: 'Write the structured provenance audit report covering all findings. State
    the use/no-use recommendation with specific conditions: if usable, list the limitation
    disclosures that must accompany any product; if not usable, state what would make
    it acceptable or what alternative sources should be sought.'
anti_criteria:
- Do not use a dataset in an analytic product without completing the provenance audit
  and documenting its limitations
- Do not treat a large dataset as automatically representative — size does not correct
  for sampling bias
- Do not assume that because a dataset has been used by others it has been properly
  vetted; audit independently for each analytic question
defensive_boundary: 'Use Dataset Provenance Audit only for OSINT integrity and source-verification
  defense: recognize, assess, document, or defend source provenance, privacy, chain
  of custody, and public-source accountability. Do not use this skill to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence.'
misuse_redirect: 'If a request asks Dataset Provenance Audit to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence, refuse that
  path and redirect to the safe defensive form: verify supplied claims, media, sources,
  or datasets with documented public-source methods.'
evidence_requirements:
- For Dataset Provenance Audit, bind each finding to a labeled source — source records,
  custody notes, metadata, corroborating references, and contradiction logs, a cited
  reference, or an explicitly marked inference — and never present inference as observed
  evidence.
- For Dataset Provenance Audit, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Dataset Provenance Audit recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Dataset Provenance Audit: independent lines of source records,
  custody notes, metadata, corroborating references, and contradiction logs converge,
  credible alternatives have been tested, and the conclusion would survive removing
  any single source.'
- 'Medium confidence for Dataset Provenance Audit: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Dataset Provenance Audit: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Dataset Provenance Audit cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Dataset
  Provenance Audit should collect to separate the live alternatives.
privacy_legal_constraints:
- For Dataset Provenance Audit, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Dataset Provenance Audit, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Dataset Provenance Audit, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Dataset Provenance Audit failure: overstating identity, location, attribution,
  or source reliability from incomplete public traces.'
- 'Dataset Provenance Audit failure: producing guidance that would help a requester
  dox, deanonymize, harass, bypass access controls, or attribute identity beyond evidence.'
- 'Dataset Provenance Audit failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Dataset Provenance Audit to dox, deanonymize, harass, bypass access
  controls, or attribute identity beyond evidence'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Dataset Provenance Audit into an operational playbook to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence'' -> refuse
  and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Dataset Provenance Audit to verify supplied claims, media,
  sources, or datasets with documented public-source methods'' -> produce bounded
  findings with explicit evidence and uncertainty labels.'
