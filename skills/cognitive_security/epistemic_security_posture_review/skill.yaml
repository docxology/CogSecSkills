id: cognitive_security.epistemic_security_posture_review
name: Epistemic Security Posture Review
group: cognitive_security
version: 0.1.0
status: implemented
summary: Assess an organization's defenses for the integrity of how it knows what
  it knows.
description: Epistemic Security Posture Review assesses the structural integrity of
  how an organization forms, updates, and protects its beliefs about the world — evaluating
  whether its knowledge-acquisition and decision-support processes are resistant to
  manipulation, capture, and degradation. Drawing on epistemology, organizational
  learning theory, and cognitive-security frameworks (Benkler et al., Allenby & Garreau),
  it examines information sourcing, analytic culture, feedback mechanisms, and adversarial
  exposure. The output is a posture scorecard and remediation roadmap identifying
  the epistemic attack surfaces most likely to be exploited.
ageint_topic: cognitive-security
tags:
- cognitive-security
- cognitive_security
- organizational-resilience
- epistemics
triggers:
- epistemic security
- how does our organization know what it knows
- information environment audit
- epistemic posture
- epistemic resilience
- knowledge integrity review
- assess our defenses against disinformation
tools:
- verb: read
  purpose: ingest organizational documents, process descriptions, and prior audit
    findings that describe current epistemic practices
- verb: ask
  purpose: elicit structured information from stakeholders about sourcing, analytic
    culture, dissent channels, and adversarial awareness when documents are insufficient
- verb: reason
  purpose: evaluate practices against epistemic-security criteria, identify attack
    surfaces, and score posture dimensions
- verb: write
  purpose: produce the posture scorecard, vulnerability narrative, and prioritized
    remediation roadmap
inputs:
- name: organizational_profile
  type: text
  required: true
  description: 'Description of the organization: mission, decision-making context,
    adversarial exposure, and information environment it operates in'
- name: epistemic_practices
  type: text
  required: false
  description: Description of existing information-sourcing practices, analytic workflows,
    red-team or dissent mechanisms, and media/source policies
- name: known_incidents
  type: list
  required: false
  description: Previous instances of misinformation, manipulation, or information
    failure affecting organizational decisions
outputs:
- name: posture_scorecard
  type: table
  description: Dimension-by-dimension scoring (e.g., source diversity, analytic dissent
    culture, feedback loops, adversarial awareness, personnel training) with current
    maturity level and vulnerability rating
- name: attack_surface_narrative
  type: markdown
  description: Narrative description of the highest-priority epistemic vulnerabilities,
    how each could be exploited, and what adverse outcomes would follow
- name: remediation_roadmap
  type: markdown
  description: Prioritized list of concrete improvements with expected posture gain,
    implementation complexity, and owner recommendations
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Benkler, Y., Faris, R. & Roberts, H. (2018). Network Propaganda: Manipulation,
  Disinformation, and Radicalization in American Politics. Oxford University Press.'
- 'Allenby, B. & Garreau, J. (2017). Weaponized Narrative: The New Battlespace. ASU
  Center on the Future of War.'
- 'Lewandowsky, S., Ecker, U. K. H., & Cook, J. (2017). Beyond Misinformation: Understanding
  and Coping with the ''Post-Truth'' Era. Journal of Applied Research in Memory and
  Cognition, 6(4), 353–369.'
- Mercier, H. & Sperber, D. (2017). The Enigma of Reason. Harvard University Press.
- 'Tetlock, P. E. & Gardner, D. (2015). Superforecasting: The Art and Science of Prediction.
  Crown Publishers.'
defensive_boundary: 'Use Epistemic Security Posture Review only for cognitive-security
  defense: recognize, assess, document, or defend audiences, decision-makers, and
  public discourse. Do not use this skill to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Epistemic Security Posture Review to increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation,
  refuse that path and redirect to the safe defensive form: assess supplied material
  for manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Epistemic Security Posture Review, tie each posture scorecard, attack surface
  narrative, and remediation roadmap claim to concrete evidence from the specific
  organizational profile, epistemic practices, and known incidents item, source excerpt,
  observation, or command result that supports it.
- For Epistemic Security Posture Review, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the posture
  scorecard.
- Before recommending any Epistemic Security Posture Review action, identify the weakest
  evidence link, the alternative most likely to overturn it, and the next discriminating
  check.
confidence_rubric:
- 'High for Epistemic Security Posture Review: the posture scorecard is supported
  by multiple independent content, behavioral, narrative, media, and audience-risk
  evidence; map the epistemic architecture and score posture dimensions checks agree,
  and no unresolved contradiction would change the result.'
- 'Medium for Epistemic Security Posture Review: the posture scorecard is plausible,
  but one important organizational profile source, comparison case, or alternative
  explanation remains incomplete.'
- 'Low for Epistemic Security Posture Review: the posture scorecard rests on sparse,
  single-source, contested, or mostly inferential evidence; keep the result provisional
  and list the next check.'
uncertainty_handling:
- State what Epistemic Security Posture Review cannot determine from the supplied
  or authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating cognitive_security evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Epistemic Security Posture Review, use only authorized organizational profile,
  epistemic practices, and known incidents, public or source-approved records, and
  caller-provided context needed for the defensive task.
- For Epistemic Security Posture Review, minimize person-level detail in the posture
  scorecard; prefer aggregate, artifact-level, role-level, or case-level summaries
  unless an individual is essential to the defensive question.
- For Epistemic Security Posture Review, do not infer protected traits, private identity,
  intent, location, legal culpability, or platform account ownership beyond the supplied
  and authorized evidence.
failure_modes:
- 'Epistemic Security Posture Review: treating organizational profile as complete
  when map the epistemic architecture and score posture dimensions checks or contradictory
  evidence are missing.'
- 'Epistemic Security Posture Review: producing advice that would help a requester
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation.'
- 'Epistemic Security Posture Review: reporting the posture scorecard without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Epistemic Security Posture Review outputs to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation'' ->
  refuse and redirect to defensive risk assessment.'
- 'Unsafe: ''Convert the posture scorecard from Epistemic Security Posture Review
  into an operational playbook to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Epistemic Security Posture Review to assess supplied material
  for manipulation indicators and recommend resilience measures with organizational
  profile, epistemic practices, and known incidents'' -> produce bounded findings
  with evidence and uncertainty labels.'
