id: sat.premortem_analysis
description: Premortem analysis (Klein) imagines the plan has already failed, then
  works backward to surface causes — converting hindsight into foresight and licensing
  dissent a prospective review suppresses. Participants adopt the cognitive stance
  that failure has occurred and are asked why, bypassing the social pressure to defend
  a committed plan. In cognitive-security contexts it is used both to stress-test
  analytic conclusions before they reach decision-makers and to surface assumptions
  that groupthink or authority bias has suppressed.
tags:
- cognitive-security
- sat
- challenge-analysis
triggers:
- premortem
- assume this failed
- what could go wrong
- stress-test before commitment
- work backward from failure
tools:
- verb: read
  purpose: ingest the plan, conclusion, or assessment to be stress-tested
- verb: reason
  purpose: generate and rank failure causes from an assumed-failure frame
- verb: write
  purpose: emit ranked failure modes, leading indicators, and mitigations
inputs:
- name: plan_or_assessment
  type: text
  required: true
  description: The plan, analytic conclusion, or committed decision to be stress-tested
- name: time_horizon
  type: text
  required: false
  description: The projected time horizon for the imagined failure (e.g., '6 months
    from now the plan has failed badly')
outputs:
- name: failure_modes
  type: markdown
  description: Ranked failure causes, each with a plausibility x impact score, a leading
    indicator to watch for, and a mitigation or hedge
references:
- Klein, G. (2007). Performing a Project Premortem. Harvard Business Review, 85(9),
  18–19.
- 'Pherson, R. H., & Heuer, R. J. (2021). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Chapter: Premortem Analysis.'
- 'Kahneman, D. (2011). Thinking, Fast and Slow. Farrar, Straus and Giroux. Chapter
  24: The Engine of Capitalism.'
when_to_use:
- a plan or analytic conclusion is near commitment and overconfidence, groupthink,
  or authority bias is likely
- a prior review produced only mild critique that felt socially constrained
- a high-stakes assessment needs a documented dissent process before it reaches a
  decision-maker
- a team has been working on an issue long enough that loss-aversion and sunk-cost
  framing may suppress honest critique
what_it_produces:
- a ranked list of failure causes, each with a plausibility x impact estimate, a leading
  indicator, and a mitigation
- a set of assumption breaks that would be most dangerous if they occurred
- a documented dissent record that can be revisited if the prediction later fails
key_discipline:
- declare failure as a fact, not a possibility — the phrase 'it has failed badly'
  licenses candor that 'it might fail' suppresses
- rank causes by plausibility x impact, not by who raised them or how uncomfortable
  they are to hear
- every failure mode must have a leading indicator — a premortem without indicators
  is not actionable
workflow_steps:
- verbs:
  - read
  title: Frame the failure as fact
  text: 'Read the plan or assessment. State it clearly. Then declare: ''It is now
    N months later and this has failed badly.'' Treat this as established fact for
    the remainder of the exercise. Do not hedge.'
- verbs:
  - reason
  title: Generate failure causes
  text: From the assumed-failure standpoint, brainstorm every plausible reason the
    failure occurred. Include assumption breaks, external shocks, execution failures,
    adversary adaptation, and cognitive biases that distorted the original assessment.
    Quantity matters at this stage — do not filter.
- verbs:
  - reason
  - write
  title: Score, rank, and mitigate
  text: Score each cause on plausibility and impact (1–5 each; multiply for a priority
    score). Rank the list. For the top causes, write a leading indicator — an observable
    signal that would appear early if this cause were active — and a mitigation or
    contingency. Discard causes that score below threshold.
- verbs:
  - write
  title: Document and integrate
  text: Produce the final failure-modes document. Flag any causes that require a plan
    revision versus a monitoring posture. Note which assumptions, if broken, would
    most change the assessment. Archive as a dissent record.
anti_criteria:
- do not soften 'it has failed badly' into 'it might fail' or 'if it were to fail'
  — the subjunctive frame suppresses the dissent the technique is designed to surface
- do not rank causes by the seniority or popularity of whoever raised them
- do not accept a failure cause without an associated leading indicator — an unmonitorable
  cause is not actionable
defensive_boundary: 'Use Premortem Analysis only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Premortem Analysis to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Premortem Analysis, bind each finding to a labeled source — hypotheses, assumptions,
  indicators, evidence tables, and confidence notes, a cited reference, or an explicitly
  marked inference — and never present inference as observed evidence.
- For Premortem Analysis, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Premortem Analysis recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Premortem Analysis: independent lines of hypotheses, assumptions,
  indicators, evidence tables, and confidence notes converge, credible alternatives
  have been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Premortem Analysis: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Premortem Analysis: the evidence is sparse, single-source, contested,
  or mostly inferential, so competing explanations must be preserved in the output.'
uncertainty_handling:
- State plainly what Premortem Analysis cannot determine from the supplied or authorized
  evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Premortem
  Analysis should collect to separate the live alternatives.
privacy_legal_constraints:
- For Premortem Analysis, use only data the caller is authorized to analyze, drawn
  from public or source-approved records.
- For Premortem Analysis, protect privacy by preferring aggregate, role-level, or
  artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Premortem Analysis, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Premortem Analysis failure: using the method as a checklist while skipping diagnostic
  evidence and disconfirming tests.'
- 'Premortem Analysis failure: producing guidance that would help a requester force
  a preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Premortem Analysis failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Premortem Analysis to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Premortem Analysis into an operational playbook to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Premortem Analysis to apply the structured technique to supplied
  evidence while preserving alternatives and uncertainty'' -> produce bounded findings
  with explicit evidence and uncertainty labels.'
