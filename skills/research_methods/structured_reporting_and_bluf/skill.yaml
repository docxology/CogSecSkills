id: research_methods.structured_reporting_and_bluf
name: Structured Reporting & BLUF
group: research_methods
version: 0.1.0
status: implemented
summary: Write findings bottom-line-up-front with traceable evidence and stated confidence.
description: Structured Reporting with Bottom-Line-Up-Front (BLUF) is an analytic
  communication standard that places the key judgment and its confidence level in
  the first sentence or paragraph, then supports it with traceable evidence, clearly
  stated assumptions, and logical argumentation in descending order of importance.
  Originating in military and intelligence tradecraft and codified in intelligence
  community analytic standards (ICD 203, ODNI), BLUF prevents the common failure mode
  in which important caveats or contrary evidence are buried where decision-makers
  never read them. The structure enforces accountability by requiring each claim in
  the body to be traceable to a specific source or assumption stated explicitly.
ageint_topic: research-methods
tags:
- cognitive-security
- research_methods
- communication
- analytic-standards
triggers:
- write up the findings
- draft the assessment
- bottom line up front
- BLUF format
- structured analytic report
- summarize with confidence
tools:
- verb: read
  purpose: ingest the analytic judgment, evidence set, graded sources, and confidence
    assessment to be reported
- verb: reason
  purpose: structure the argument from conclusion to supporting evidence, identify
    key assumptions and caveats, and determine what belongs in the BLUF versus the
    body
- verb: write
  purpose: produce the structured report with BLUF, sourced body paragraphs, assumptions,
    caveats, and implications sections
inputs:
- name: analytic_judgment
  type: text
  required: true
  description: the main analytic conclusion or estimate, with confidence level, to
    be communicated
- name: evidence_and_sources
  type: list
  required: true
  description: the supporting evidence items and sources (ideally already graded)
    that underpin the judgment
- name: assumptions
  type: list
  required: false
  description: key assumptions the judgment depends on, for explicit statement in
    the report
- name: audience_and_purpose
  type: text
  required: false
  description: the intended audience and the decision they face, to calibrate detail
    level and implications section
outputs:
- name: structured_report
  type: markdown
  description: 'a complete structured analytic report with labeled sections: BLUF
    (key judgment + confidence), Key Evidence, Assumptions, Argument, Caveats and
    Countervailing Evidence, and Implications'
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Office of the Director of National Intelligence (2015). ICD 203: Analytic Standards.
  ODNI.'
- Heuer, R. J., & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis (2nd ed.). CQ Press.
- Pherson, R. H., & Pherson, K. H. (2020). Critical Thinking for Strategic Intelligence
  (3rd ed.). CQ Press.
- 'U.S. Army (2013). ATP 2-33.4: Intelligence Analysis. Headquarters, Department of
  the Army. (BLUF and analytic line standards.)'
defensive_boundary: 'Use Structured Reporting & BLUF only for research-methods and
  synthesis integrity: recognize, assess, document, or defend reproducibility, calibrated
  confidence, and transparent synthesis. Do not use this skill to cherry-pick sources,
  fabricate citations, or overstate certainty from weak evidence.'
misuse_redirect: 'If a request asks Structured Reporting & BLUF to cherry-pick sources,
  fabricate citations, or overstate certainty from weak evidence, refuse that path
  and redirect to the safe defensive form: synthesize supplied or authorized sources
  with explicit confidence and uncertainty labels.'
evidence_requirements:
- For Structured Reporting & BLUF, bind each finding to a labeled source — study designs,
  source quality, reproducibility artifacts, and uncertainty records, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Structured Reporting & BLUF, keep observations, assumptions, inferences, and
  missing information in separate labeled categories.
- Before issuing any Structured Reporting & BLUF recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Structured Reporting & BLUF: independent lines of study designs,
  source quality, reproducibility artifacts, and uncertainty records converge, credible
  alternatives have been tested, and the conclusion would survive removing any single
  source.'
- 'Medium confidence for Structured Reporting & BLUF: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Structured Reporting & BLUF: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Structured Reporting & BLUF cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Structured
  Reporting & BLUF should collect to separate the live alternatives.
privacy_legal_constraints:
- For Structured Reporting & BLUF, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Structured Reporting & BLUF, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Structured Reporting & BLUF, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Structured Reporting & BLUF failure: collapsing heterogeneous evidence into an
  unsupported single confident conclusion.'
- 'Structured Reporting & BLUF failure: producing guidance that would help a requester
  cherry-pick sources, fabricate citations, or overstate certainty from weak evidence.'
- 'Structured Reporting & BLUF failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Structured Reporting & BLUF to cherry-pick sources, fabricate citations,
  or overstate certainty from weak evidence'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Structured Reporting & BLUF into an operational playbook to cherry-pick
  sources, fabricate citations, or overstate certainty from weak evidence'' -> refuse
  and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Structured Reporting & BLUF to synthesize supplied or authorized
  sources with explicit confidence and uncertainty labels'' -> produce bounded findings
  with explicit evidence and uncertainty labels.'
