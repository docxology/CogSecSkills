id: cognitive_security.astroturfing_detection
name: Astroturfing Detection
group: cognitive_security
version: 0.1.0
status: implemented
summary: Distinguish manufactured grassroots activity from organic engagement.
description: Astroturfing detection identifies manufactured grassroots activity —
  coordinated campaigns designed to simulate organic, spontaneous public support or
  opposition. The technique draws on network-structure analysis, account behavioral
  signals, and content-similarity patterns to distinguish authentic civic expression
  from synthetic amplification. Defensively, it helps analysts, journalists, and platform
  trust-and-safety teams surface coordinated inauthentic behavior (CIB) and protect
  genuine public discourse from being drowned out or misrepresented.
ageint_topic: cognitive-security
tags:
- cognitive-security
- cognitive_security
- osint
- influence-operations
triggers:
- is this astroturfing
- detect fake grassroots
- coordinated inauthentic behavior
- manufactured consensus
- is this organic engagement
- bot network analysis
- synthetic amplification
tools:
- verb: read
  purpose: ingest account data, post content, and network metadata for the candidate
    campaign
- verb: search
  purpose: query external databases, prior CIB disclosures, and threat-intel feeds
    to cross-reference known actor TTPs
- verb: reason
  purpose: apply behavioral, structural, and content-similarity heuristics to score
    artificiality
- verb: write
  purpose: emit a structured detection report with confidence tiers and evidence chains
inputs:
- name: campaign_sample
  type: table
  required: true
  description: A sample of accounts, posts, timestamps, and engagement metrics suspected
    of coordinated inauthentic behavior
- name: baseline_context
  type: text
  required: false
  description: Description of the topic, event, or platform context in which the activity
    appeared
outputs:
- name: detection_report
  type: markdown
  description: Structured report flagging coordinated clusters, behavioral red flags,
    confidence tier, and recommended follow-on actions
- name: indicator_table
  type: table
  description: Per-account or per-cluster table of indicators (creation date, posting
    velocity, content-hash overlap, cross-platform presence)
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Starbird, K., Arif, A., & Wilson, T. (2019). Disinformation as Collaborative Work:
  Surfacing the Participatory Nature of Strategic Information Operations. CSCW.'
- Stanford Internet Observatory (2022). Coordinated Inauthentic Behavior Takedown
  Archive. Stanford University.
- Renée DiResta (2018). The Digital Maginot Line. Ribbon Farm.
- 'Luceri, L. et al. (2020). Detecting Troll Behavior via Inverse Reinforcement Learning:
  A Case Study of Russian Trolls in the 2016 US Election. ICWSM.'
defensive_boundary: 'Use Astroturfing Detection only for cognitive-security defense:
  recognize, assess, document, or defend audiences, decision-makers, and public discourse.
  Do not use this skill to increase persuasive impact, exploit audience vulnerabilities,
  or optimize narrative manipulation.'
misuse_redirect: 'If a request asks Astroturfing Detection to increase persuasive
  impact, exploit audience vulnerabilities, or optimize narrative manipulation, refuse
  that path and redirect to the safe defensive form: assess supplied material for
  manipulation indicators and recommend resilience measures.'
evidence_requirements:
- For Astroturfing Detection, bind each finding to a labeled source — content, behavioral,
  narrative, media, and audience-risk evidence, a cited reference, or an explicitly
  marked inference — and never present inference as observed evidence.
- For Astroturfing Detection, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Astroturfing Detection recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Astroturfing Detection: independent lines of content, behavioral,
  narrative, media, and audience-risk evidence converge, credible alternatives have
  been tested, and the conclusion would survive removing any single source.'
- 'Medium confidence for Astroturfing Detection: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Astroturfing Detection: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Astroturfing Detection cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Astroturfing
  Detection should collect to separate the live alternatives.
privacy_legal_constraints:
- For Astroturfing Detection, use only data the caller is authorized to analyze, drawn
  from public or source-approved records.
- For Astroturfing Detection, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Astroturfing Detection, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Astroturfing Detection failure: mistaking persuasive resonance for verified harm
  or intent.'
- 'Astroturfing Detection failure: producing guidance that would help a requester
  increase persuasive impact, exploit audience vulnerabilities, or optimize narrative
  manipulation.'
- 'Astroturfing Detection failure: hiding uncertainty behind generic confidence language
  instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Astroturfing Detection to increase persuasive impact, exploit audience
  vulnerabilities, or optimize narrative manipulation'' -> refuse and redirect to
  defensive risk assessment.'
- 'Unsafe: ''Turn Astroturfing Detection into an operational playbook to increase
  persuasive impact, exploit audience vulnerabilities, or optimize narrative manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Astroturfing Detection to assess supplied material for manipulation
  indicators and recommend resilience measures'' -> produce bounded findings with
  explicit evidence and uncertainty labels.'
