id: sat.analytic_matrices
name: Analytic Matrices
group: sat
version: 0.1.0
status: implemented
summary: Cross-tabulate variables to organize evidence and reveal relationships.
description: Analytic Matrices organize analytic variables (hypotheses, actors, drivers,
  criteria) as rows and columns of a structured grid, then systematically populate
  each cell with evidence, ratings, or judgments. The technique makes the analyst's
  logic explicit and auditable, surfaces blank cells (missing evidence) and conflicting
  cells (contradictory evidence), and reduces the cognitive load of tracking multiple
  dimensions simultaneously. It is used in intelligence analysis as a pre-step to
  ACH, in option analysis, and in influence-operation assessment to map actors against
  capabilities and behaviors.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- evidence-organization
- structured-reasoning
triggers:
- analytic matrix
- cross-tab the evidence
- organize variables in a grid
- map actors to capabilities
- compare options systematically
- evidence matrix
tools:
- verb: read
  purpose: ingest the evidence set, hypotheses or options, and relevant variables
    to populate the matrix
- verb: reason
  purpose: select the correct matrix type, determine row/column dimensions, rate each
    cell, and interpret patterns
- verb: write
  purpose: produce the completed matrix, a legend, a summary of patterns, and analytic
    implications
inputs:
- name: analytic_question
  type: text
  required: true
  description: The focal analytic question driving the matrix construction
- name: variables_or_hypotheses
  type: list
  required: true
  description: The set of hypotheses, options, actors, or criteria to place on one
    axis of the matrix
- name: evidence_or_criteria
  type: list
  required: true
  description: The evidence items, indicators, capabilities, or evaluation criteria
    to place on the other axis
outputs:
- name: analytic_matrix
  type: table
  description: Completed grid with rows and columns labeled, each cell populated with
    a rating, evidence summary, or consistency judgment, and a legend explaining the
    rating scheme
- name: pattern_summary
  type: markdown
  description: 'Written interpretation of matrix patterns: which rows dominate, where
    gaps exist, where conflicts occur, and what the overall pattern implies for the
    analytic question'
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Heuer, R. J., & Pherson, R. H. (2015). Structured Analytic Techniques for Intelligence
  Analysis (3rd ed.). CQ Press. Chapter on Matrices.
- Pherson, R. H. (2018). Handbook of Analytic Tools and Techniques (5th ed.). Pherson
  Associates.
- Heuer, R. J. (1999). Psychology of Intelligence Analysis. Center for the Study of
  Intelligence, CIA. Chapter on ACH (which uses a matrix format).
- 'Clark, R. M. (2013). Intelligence Analysis: A Target-Centric Approach (4th ed.).
  CQ Press.'
defensive_boundary: 'Use Analytic Matrices only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Analytic Matrices to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation, refuse that
  path and redirect to the safe defensive form: apply the structured technique to
  supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Analytic Matrices, anchor each cell rating and the pattern summary to a cited
  source excerpt or rationale, record blank cells as explicit collection gaps rather
  than silent omissions, and present the full grid as evidence so a reviewer can audit
  the reasoning instead of trusting a collapsed single answer.
- For Analytic Matrices, label observations, derived features, assumptions, inferences,
  contradictions, and missing inputs separately before writing the analytic matrix.
- Before recommending any Analytic Matrices action, identify the weakest evidence
  link, the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Analytic Matrices: the row and column axes capture a genuinely independent,
  decidable relationship, every cell is rated against a scheme fixed before population,
  blank and conflicting cells are explicitly adjudicated, the dominant pattern is
  corroborated by multiple sources, and no unresolved contradiction would overturn
  the leading row.'
- 'Medium for Analytic Matrices: the analytic matrix is plausible, but one important
  analytic question source, comparison case, or alternative explanation remains incomplete.'
- 'Low for Analytic Matrices: the analytic matrix rests on sparse, single-source,
  contested, or mostly inferential evidence; keep the result provisional and list
  the next check.'
uncertainty_handling:
- State what Analytic Matrices cannot determine from the supplied or authorized evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating sat evidence to collect when confidence is low
  or medium.
privacy_legal_constraints:
- For Analytic Matrices, use only authorized analytic question, variables or hypotheses,
  and evidence or criteria, public or source-approved records, and caller-provided
  context needed for the defensive task.
- For Analytic Matrices, minimize person-level detail in the analytic matrix; prefer
  aggregate, artifact-level, role-level, or case-level summaries unless an individual
  is essential to the defensive question.
- For Analytic Matrices, do not infer protected traits, private identity, intent,
  location, legal culpability, or platform account ownership beyond the supplied and
  authorized evidence.
failure_modes:
- 'Analytic Matrices: treating a grid riddled with blank cells as a finished analysis
  or letting the rating scale drift during population, so unexamined gaps and post-hoc
  scoring quietly manufacture a winning row that the underlying evidence never earned.'
- 'Analytic Matrices: producing advice that would help a requester force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation.'
- 'Analytic Matrices: reporting the analytic matrix without uncertainty labels, alternative
  explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Analytic Matrices outputs to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Convert the analytic matrix from Analytic Matrices into an operational
  playbook to force a preferred conclusion, hide uncertainty, or use the technique
  to rationalize manipulation'' -> refuse and offer governance, detection, or mitigation
  analysis.'
- 'Safe defensive: ''Use Analytic Matrices to apply the structured technique to supplied
  evidence while preserving alternatives and uncertainty with analytic question, variables
  or hypotheses, and evidence or criteria'' -> produce bounded findings with evidence
  and uncertainty labels.'
