# CogSecSkills — the enumerated catalogue of 100 skill areas.
#
# This registry is the PLAN; the skills/ tree is the BUILD. The validation gates
# (`python -m cogsecskills validate`) cross-check the two: every on-disk skill
# must be catalogued here, and every entry marked `implemented` must exist on
# disk. `planned` entries are areas not yet built — the normal state of an
# un-built skill; run `python -m cogsecskills scaffold <id>` to start one.
#
# status: implemented | stub | planned
# id format: <group>.<slug>  (group must match registry/groups.yaml)
# ageint_topic links each area to the educational upstream in docs/ageint/.

skills:
  # ───────────────────────── Structured Analytic Techniques (34) ──────────
  - {id: sat.getting_started_checklist, name: Getting Started Checklist, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Frame an analytic task: question, drivers, assumptions, and prior judgments before diving in."}
  - {id: sat.customer_aims_checklist, name: Customer (AIMS) Checklist, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Clarify Audience, Issue, Message, and Storyline so the product fits the decision it serves."}
  - {id: sat.issue_redefinition, name: Issue Redefinition, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Restate the question multiple ways to escape an unhelpful initial framing."}
  - {id: sat.chronologies_and_timelines, name: Chronologies & Timelines, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Order events temporally to expose gaps, correlations, and causal sequencing."}
  - {id: sat.sorting, name: Sorting, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Group large evidence sets by attributes to surface patterns and outliers."}
  - {id: sat.ranking_and_prioritization, name: Ranking & Prioritization, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Order items by weighted criteria (ranked voting, paired comparison, weighted scoring)."}
  - {id: sat.analytic_matrices, name: Analytic Matrices, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Cross-tabulate variables to organize evidence and reveal relationships."}
  - {id: sat.network_analysis, name: Network Analysis, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Map actors and links; compute centrality and brokerage to find key nodes."}
  - {id: sat.mind_maps_and_concept_maps, name: Mind Maps & Concept Maps, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Externalize a problem's concepts and relationships as a navigable graph."}
  - {id: sat.process_and_gantt_mapping, name: Process & Gantt Mapping, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Lay out a process or adversary plan as sequenced, dependency-aware steps."}
  - {id: sat.structured_brainstorming, name: Structured Brainstorming, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Divergent then convergent idea generation with explicit anti-anchoring steps."}
  - {id: sat.nominal_group_technique, name: Nominal Group Technique, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Silent independent ideation before discussion to counter dominance and groupthink."}
  - {id: sat.starbursting, name: Starbursting, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Generate questions (who/what/when/where/why/how) before answers to map the unknowns."}
  - {id: sat.cross_impact_matrix, name: Cross-Impact Matrix, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Assess how each driver influences every other to find leverage and feedback."}
  - {id: sat.morphological_analysis, name: Morphological Analysis, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Enumerate the parameter space of a problem to bound the set of possibilities."}
  - {id: sat.quadrant_crunching, name: Quadrant Crunching, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Systematically permute key assumptions into a matrix of alternative outcomes."}
  - {id: sat.alternative_futures_scenarios, name: Alternative Futures (Scenarios), group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Build multiple plausible futures around critical uncertainties to stress strategy."}
  - {id: sat.indicators_generation, name: Indicators Generation, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Define observable signs that would reveal which scenario or hypothesis is unfolding."}
  - {id: sat.indicators_validation, name: Indicators Validation, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Test indicators for diagnosticity: do they actually discriminate between outcomes?"}
  - {id: sat.signposts_of_change, name: Signposts of Change, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Track leading indicators over time to detect trajectory shifts early."}
  - {id: sat.analysis_of_competing_hypotheses, name: Analysis of Competing Hypotheses (ACH), group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Score evidence by diagnosticity across a full hypothesis set to find the least-disconfirmed explanation."}
  - {id: sat.key_assumptions_check, name: Key Assumptions Check, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Surface, classify, and stress-test the load-bearing assumptions an analysis rests on."}
  - {id: sat.multiple_hypothesis_generation, name: Multiple Hypothesis Generation, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Force a complete, mutually exclusive hypothesis set before evaluating any one."}
  - {id: sat.diagnostic_reasoning, name: Diagnostic Reasoning, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Apply Bayesian-style updating of a single new datum against competing explanations."}
  - {id: sat.argument_mapping, name: Argument Mapping, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Diagram claims, premises, and inferential links to expose logical structure and gaps."}
  - {id: sat.structured_analogies, name: Structured Analogies, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Reason from a disciplined set of comparable historical cases, not a single anecdote."}
  - {id: sat.red_hat_analysis, name: Red Hat Analysis, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Model an adversary's perceptions and likely decisions from their frame, not yours."}
  - {id: sat.outside_in_thinking, name: Outside-In Thinking, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Start from the broad external forces (PESTLE) shaping the issue before the specifics."}
  - {id: sat.causal_flow_diagramming, name: Causal Flow Diagramming, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Trace cause-effect chains and feedback loops driving a system's behavior."}
  - {id: sat.premortem_analysis, name: Premortem Analysis, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Assume the conclusion failed; work backward to find what would have caused it."}
  - {id: sat.devils_advocacy, name: Devil's Advocacy, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Build the strongest principled case against the consensus to test its robustness."}
  - {id: sat.team_a_team_b, name: Team A / Team B, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Pit two teams' competing interpretations against each other in structured debate."}
  - {id: sat.structured_self_critique, name: Structured Self-Critique, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Apply a checklist of challenge questions to one's own analysis before release."}
  - {id: sat.what_if_analysis, name: What-If Analysis, group: sat, status: implemented, ageint_topic: structured-analytic-techniques, summary: "Posit a surprising event as already true and reason out its precursors and implications."}

