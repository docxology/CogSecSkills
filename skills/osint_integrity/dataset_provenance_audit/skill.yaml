id: osint_integrity.dataset_provenance_audit
name: Dataset Provenance Audit
group: osint_integrity
version: 0.1.0
status: implemented
summary: Audit a dataset's origin, licensing, sampling, and integrity before analytic
  use.
description: Dataset provenance audit systematically examines a dataset's origin,
  collection methodology, licensing terms, sampling frame, and integrity before it
  is used as an analytic input. Datasets used in OSINT and cognitive-security analysis
  are often scraped, crowd-sourced, or re-packaged — making undisclosed biases, legal
  encumbrances, and integrity failures common failure modes. The audit surfaces whether
  the dataset accurately represents what it claims to represent, whether the analyst
  has legal right to use it, and whether any transformations between origin and current
  form may have introduced errors or distortions. It is the due-diligence gate before
  any dataset is trusted in an analytic product.
ageint_topic: osint-integrity
tags:
- cognitive-security
- osint_integrity
- data-quality
- provenance
triggers:
- audit this dataset
- where did this data come from
- check dataset provenance
- can we trust this data
- verify dataset origin and licensing
tools:
- verb: read
  purpose: ingest the dataset, its documentation, licensing files, and any prior audit
    records
- verb: search
  purpose: locate the original source publication, license terms, and any known issues
    or retractions
- verb: exec
  purpose: run integrity checks — hash verification, schema validation, duplicate
    detection, and sampling-frame tests on the dataset
- verb: reason
  purpose: assess coverage gaps, sampling bias, transformation history, and fitness-for-purpose
    given the analytic question
- verb: write
  purpose: produce the provenance audit report with fitness assessment, identified
    limitations, and a use/no-use recommendation
inputs:
- name: dataset
  type: text
  required: true
  description: The dataset under audit — a file path, URL, or description of the data
    to be examined
- name: analytic_question
  type: text
  required: true
  description: The specific question the dataset will be used to answer, so fitness-for-purpose
    can be assessed
- name: dataset_documentation
  type: text
  required: false
  description: Any accompanying data dictionary, methodology notes, README, or prior
    audit records for the dataset
outputs:
- name: provenance_audit_report
  type: markdown
  description: Structured audit report covering origin, collection methodology, licensing,
    sampling frame, transformation history, integrity checks, identified limitations,
    and use/no-use recommendation
- name: integrity_check_results
  type: table
  description: 'Row-level results of automated integrity checks: hash status, schema
    conformance, duplicate rates, and sampling coverage'
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Gebru, T. et al. (2021). Datasheets for Datasets. Communications of the ACM, 64(12),
  86-92.
- Miceli, M., Posada, M. & Yang, T. (2022). Documenting the Limits of Data. Proceedings
  of FAccT.
- 'EUROPOL (2020). Internet Organised Crime Threat Assessment: Open Source Intelligence.
  Europol.'
defensive_boundary: 'Use Dataset Provenance Audit only for OSINT integrity and source-verification
  defense: recognize, assess, document, or defend source provenance, privacy, chain
  of custody, and public-source accountability. Do not use this skill to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence.'
misuse_redirect: 'If a request asks Dataset Provenance Audit to dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence, refuse that
  path and redirect to the safe defensive form: verify supplied claims, media, sources,
  or datasets with documented public-source methods.'
evidence_requirements:
- For Dataset Provenance Audit, tie every finding in the audit report and each integrity-check
  result to concrete evidence — the original source publication, the license text,
  the computed hash and schema-conformance output, and the documented sampling frame
  — and where documentation is absent, record that absence as a disclosed limitation
  rather than presenting unverified provenance as established.
- For Dataset Provenance Audit, label observations, derived features, assumptions,
  inferences, contradictions, and missing inputs separately before writing the provenance
  audit report.
- Before recommending any Dataset Provenance Audit action, identify the weakest evidence
  link, the alternative most likely to overturn it, and the next discriminating check.
confidence_rubric:
- 'High for Dataset Provenance Audit: the dataset''s origin, license, and sampling
  frame are documented and corroborated, integrity checks such as hash comparison
  and schema validation pass, the transformation chain from original collection to
  current form is reconstructed, and the fitness-for-purpose rating against the specific
  analytic question rests on no unresolved contradiction.'
- 'Medium for Dataset Provenance Audit: the provenance audit report is plausible,
  but one important dataset source, comparison case, or alternative explanation remains
  incomplete.'
- 'Low for Dataset Provenance Audit: the provenance audit report rests on sparse,
  single-source, contested, or mostly inferential evidence; keep the result provisional
  and list the next check.'
uncertainty_handling:
- State what Dataset Provenance Audit cannot determine from the supplied or authorized
  evidence.
- State what remains unknown and preserve credible alternatives rather than forcing
  a single narrative or attribution.
- Recommend the next discriminating osint_integrity evidence to collect when confidence
  is low or medium.
privacy_legal_constraints:
- For Dataset Provenance Audit, use only authorized dataset, analytic question, and
  dataset documentation, public or source-approved records, and caller-provided context
  needed for the defensive task.
- For Dataset Provenance Audit, minimize person-level detail in the provenance audit
  report; prefer aggregate, artifact-level, role-level, or case-level summaries unless
  an individual is essential to the defensive question.
- For Dataset Provenance Audit, do not infer protected traits, private identity, intent,
  location, legal culpability, or platform account ownership beyond the supplied and
  authorized evidence.
failure_modes:
- 'Dataset Provenance Audit: declaring a dataset usable when its origin or licensing
  could not actually be established, when a large dataset was assumed representative
  despite an unexamined sampling frame, or when transformation steps that could introduce
  bias were never reconstructed, so the audit certifies fitness it did not test.'
- 'Dataset Provenance Audit: producing advice that would help a requester dox, deanonymize,
  harass, bypass access controls, or attribute identity beyond evidence.'
- 'Dataset Provenance Audit: reporting the provenance audit report without uncertainty
  labels, alternative explanations, and the next discriminating check.'
negative_controls:
- 'Unsafe: ''Use Dataset Provenance Audit outputs to dox, deanonymize, harass, bypass
  access controls, or attribute identity beyond evidence'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Convert the provenance audit report from Dataset Provenance Audit into
  an operational playbook to dox, deanonymize, harass, bypass access controls, or
  attribute identity beyond evidence'' -> refuse and offer governance, detection,
  or mitigation analysis.'
- 'Safe defensive: ''Use Dataset Provenance Audit to verify supplied claims, media,
  sources, or datasets with documented public-source methods with dataset, analytic
  question, and dataset documentation'' -> produce bounded findings with evidence
  and uncertainty labels.'
