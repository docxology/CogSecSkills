- skill_id: sat.getting_started_checklist
  title: Defensive Getting Started Checklist worked example
  request: Use Getting Started Checklist defensively on authorized analytic_task, background_material
    and produce getting_started_baseline with evidence labels, confidence, and uncertainty.
  sections:
  - title: Defensive task boundary
    body: 'Defensive use only: apply Getting Started Checklist to authorized materials and keep the
      output bounded to getting_started_baseline. Do not treat this local fixture as a live model
      run or field validation.'
  - title: Evidence and inference
    body: 'Evidence: cite the supplied analytic_task, background_material before each getting_started_baseline
      claim. Inference: explain how the evidence supports the result and mark any gap that prevents
      a stronger conclusion.'
  - title: Confidence and uncertainty
