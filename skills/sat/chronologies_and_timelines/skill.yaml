id: sat.chronologies_and_timelines
name: Chronologies & Timelines
group: sat
version: 0.1.0
status: implemented
summary: Order events temporally to expose gaps, correlations, and causal sequencing.
description: Chronologies and Timelines is a structured-analytic technique that arranges
  known events in strict temporal order to reveal gaps in the record, surface correlations
  between concurrent streams, and clarify causal versus coincidental sequencing. By
  making the time dimension explicit and visual, analysts can spot anomalies — missing
  intervals, suspicious clustering, or reversed apparent causality — that narrative
  prose conceals. The technique is foundational in targeting, deception detection,
  and incident reconstruction, and it underpins more complex temporal analytics such
  as event-driven scenario building and link analysis.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- temporal-analysis
triggers:
- build a timeline
- put these events in order
- when did this happen relative to that
- find gaps in the sequence
- reconstruct the sequence of events
tools:
- verb: read
  purpose: ingest source documents, reports, and data streams to extract dated events
- verb: reason
  purpose: assess temporal relationships, identify gaps, correlations, and causal
    candidates
- verb: write
  purpose: produce the ordered chronology, annotated gap analysis, and analytic findings
inputs:
- name: event_sources
  type: list
  required: true
  description: Documents, reports, or data items each containing at least one datable
    event (date/time + what happened)
- name: analytic_question
  type: text
  required: true
  description: The focal question the timeline is meant to illuminate (e.g., 'Did
    actor X have foreknowledge?')
- name: parallel_streams
  type: list
  required: false
  description: 'Optional: separate event series to be displayed in parallel lanes
    (e.g., diplomatic, military, economic)'
outputs:
- name: chronology
  type: table
  description: Sorted table of events with date/time, actor, event description, source,
    and confidence level
- name: gap_and_anomaly_report
  type: markdown
  description: Narrative identifying unexplained gaps, suspiciously clustered events,
    reversed apparent causality, and their analytic significance
- name: key_findings
  type: markdown
  description: Bulleted summary of the most significant temporal patterns and their
    implications for the focal question
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- 'Heuer, R. J., & Pherson, R. H. (2015). Structured Analytic Techniques for Intelligence
  Analysis, 3rd ed. CQ Press. (Chapter: Chronologies and Timelines)'
- 'Clark, R. M. (2019). Intelligence Analysis: A Target-Centric Approach, 5th ed.
  CQ Press.'
- Moore, D. T. (2007). Critical Thinking and Intelligence Analysis. National Defense
  Intelligence College Press.
defensive_boundary: 'Use Chronologies & Timelines only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Chronologies & Timelines to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation,
  refuse that path and redirect to the safe defensive form: apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Chronologies & Timelines, bind each finding to a labeled source — hypotheses,
  assumptions, indicators, evidence tables, and confidence notes, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Chronologies & Timelines, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Chronologies & Timelines recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Chronologies & Timelines: independent lines of hypotheses,
  assumptions, indicators, evidence tables, and confidence notes converge, credible
  alternatives have been tested, and the conclusion would survive removing any single
  source.'
- 'Medium confidence for Chronologies & Timelines: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Chronologies & Timelines: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Chronologies & Timelines cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Chronologies
  & Timelines should collect to separate the live alternatives.
privacy_legal_constraints:
- For Chronologies & Timelines, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Chronologies & Timelines, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Chronologies & Timelines, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Chronologies & Timelines failure: using the method as a checklist while skipping
  diagnostic evidence and disconfirming tests.'
- 'Chronologies & Timelines failure: producing guidance that would help a requester
  force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation.'
- 'Chronologies & Timelines failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Chronologies & Timelines to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Chronologies & Timelines into an operational playbook to force a
  preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Chronologies & Timelines to apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
