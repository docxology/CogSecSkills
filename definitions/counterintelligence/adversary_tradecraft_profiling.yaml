id: counterintelligence.adversary_tradecraft_profiling
description: Adversary tradecraft profiling systematically characterizes the methods,
  patterns, tools, and operational signatures an adversary habitually employs across
  known operations. Drawn from counterintelligence practice, it converts scattered
  incident data into a durable behavioral model that enables anticipation of future
  moves, attribution of ambiguous incidents, and identification of gaps the adversary
  exploits. The technique applies structured elicitation across the TTPS (Tactics,
  Techniques, Procedures, and Signatures) framework to distinguish stable behavioral
  fingerprints from adaptive camouflage.
tags:
- cognitive-security
- counterintelligence
- attribution
- behavioral-analysis
triggers:
- profile this adversary
- what is their playbook
- characterize their methods
- what TTPs does this actor use
- how do they typically operate
- adversary signature analysis
tools:
- verb: read
  purpose: ingest known incident reports, case histories, and prior analytic products
    on the adversary
- verb: reason
  purpose: extract stable behavioral patterns, rank by consistency, and distinguish
    TTPs from one-off adaptations
- verb: write
  purpose: 'emit a structured tradecraft profile: TTPS table, confidence assessments,
    anticipatory indicators, and collection gaps'
inputs:
- name: incident_corpus
  type: list
  required: true
  description: Known or attributed operations, incidents, or cases involving the adversary
    — sourced from case files, open reporting, or prior analytic products
- name: adversary_identifier
  type: text
  required: true
  description: Name, alias, or cluster label for the adversary being profiled
- name: collection_gaps
  type: text
  required: false
  description: Known blind spots or missing reporting that may skew the profile
outputs:
- name: tradecraft_profile
  type: table
  description: 'TTPS table: each tactic with associated techniques, observed procedures,
    confidence level, and frequency across known cases'
- name: anticipatory_indicators
  type: markdown
  description: Behavioral signatures to watch for in future operations, keyed to the
    stable patterns identified
- name: profile_caveats
  type: markdown
  description: Confidence-bounded caveats noting collection gaps, potential for adversary
    adaptation, and risks of mirror-imaging
references:
- Heuer, R.J. & Pherson, R.H. (2015). Structured Analytic Techniques for Intelligence
  Analysis, 2nd ed. CQ Press. (Chapter on Indicators).
- 'Byman, D. & Pollack, K. (2001). ''Let Us Now Praise Great Men: Bringing the Statesman
  Back In.'' International Security 25(4).'
- MITRE ATT&CK Framework (2023). Adversary Tactics, Techniques, and Common Knowledge.
  MITRE Corporation. https://attack.mitre.org/
- 'Grabo, C.M. (2004). Anticipating Surprise: Analysis for Strategic Warning. University
  Press of America.'
when_to_use:
- a threat actor has left multiple attributed incidents and a durable behavioral model
  would aid defense or attribution
- an analyst needs to distinguish a known adversary's pattern from coincidental or
  unrelated activity
- decision-makers require anticipatory warning indicators rather than post-hoc attribution
- a new incident is ambiguous and comparison against a tradecraft profile could resolve
  attribution
what_it_produces:
- a TTPS table mapping observed tactics to their techniques, confidence levels, and
  frequency across known cases
- a set of behavioral signatures and leading indicators to watch for in future operations
- explicit caveats on collection bias, mirror-imaging risk, and adversary adaptive
  capacity
key_discipline:
- distinguish stable signatures (consistent across operations under pressure) from
  adaptive camouflage (one-off deceptions); the former is probative, the latter is
  noise
- profile the behavior, not the identity — capabilities and habits leave evidence
  even when attribution is uncertain
- flag collection gaps explicitly; a profile derived from only visible operations
  systematically misses the techniques used when the adversary evades detection
workflow_steps:
- verbs:
  - read
  title: Assemble the incident corpus
  text: Gather all attributed or candidate-attributed operations, incidents, and case
    reports. Note the source, confidence of attribution, and date for each. Flag any
    periods of known low observability that could bias the corpus.
- verbs:
  - reason
  title: Extract and cluster TTPs
  text: For each incident, extract observed tactics (what goal was pursued), techniques
    (how it was executed), procedures (specific operational details), and signatures
    (idiosyncratic markers). Cluster across incidents to identify patterns appearing
    in 2+ independent cases. Distinguish recurring patterns from unique events.
- verbs:
  - reason
  title: Assess consistency and confidence
  text: Score each extracted TTP by frequency (how many independent cases), consistency
    under pressure (does the pattern persist when the adversary knows they are observed?),
    and cross-source corroboration. Assign HIGH/MEDIUM/LOW confidence. Flag TTPs that
    rest on a single source or a single operation.
- verbs:
  - reason
  - write
  title: Generate anticipatory indicators
  text: 'For each high-confidence stable TTP, derive one or more observable leading
    indicators: what would be visible early in the next operation if this pattern
    held. Express as ''IF [observable], THEN [TTP inference] with [confidence]'' to
    support future collection tasking.'
- verbs:
  - write
  title: Document profile and caveats
  text: 'Produce the TTPS table, the anticipatory indicators list, and a caveats section
    addressing: known collection gaps, baseline rate of adversary adaptation, risk
    of mirror-imaging (assuming the adversary thinks as we do), and explicit statement
    of what would change each high-confidence assessment.'
anti_criteria:
- do not assume the profile is exhaustive — adversaries operate outside analyst visibility;
  explicitly state what is NOT known
- do not treat frequency as proof of capability — an adversary may withhold their
  most capable techniques for high-value operations
- do not attribute purely from style similarity without corroborating evidence — tradecraft
  can be copied to frame a third party
- do not update the profile based on incidents the adversary may have staged to shape
  the profile
defensive_boundary: 'Use Adversary Tradecraft Profiling only for counterintelligence
  and analytic-process defense: recognize, assess, document, or defend analytic teams,
  collection processes, and institutional trust boundaries. Do not use this skill
  to evade detection, improve elicitation, profile targets for exploitation, or conceal
  tradecraft.'
misuse_redirect: 'If a request asks Adversary Tradecraft Profiling to evade detection,
  improve elicitation, profile targets for exploitation, or conceal tradecraft, refuse
  that path and redirect to the safe defensive form: review supplied interactions
  or processes for deception, elicitation, or insider-risk indicators.'
evidence_requirements:
- For Adversary Tradecraft Profiling, bind each finding to a labeled source — interaction
  records, process artifacts, deception indicators, and alternative explanations,
  a cited reference, or an explicitly marked inference — and never present inference
  as observed evidence.
- For Adversary Tradecraft Profiling, keep observations, assumptions, inferences,
  and missing information in separate labeled categories.
- Before issuing any Adversary Tradecraft Profiling recommendation, name the weakest
  evidentiary link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Adversary Tradecraft Profiling: independent lines of interaction
  records, process artifacts, deception indicators, and alternative explanations converge,
  credible alternatives have been tested, and the conclusion would survive removing
  any single source.'
- 'Medium confidence for Adversary Tradecraft Profiling: the evidence supports the
  conclusion, but one important input, comparison class, or alternative explanation
  is still incomplete.'
- 'Low confidence for Adversary Tradecraft Profiling: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Adversary Tradecraft Profiling cannot determine from the supplied
  or authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Adversary
  Tradecraft Profiling should collect to separate the live alternatives.
privacy_legal_constraints:
- For Adversary Tradecraft Profiling, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Adversary Tradecraft Profiling, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Adversary Tradecraft Profiling, do not infer protected traits, private identity,
  intent, location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Adversary Tradecraft Profiling failure: turning defensive tradecraft recognition
  into operational evasion advice.'
- 'Adversary Tradecraft Profiling failure: producing guidance that would help a requester
  evade detection, improve elicitation, profile targets for exploitation, or conceal
  tradecraft.'
- 'Adversary Tradecraft Profiling failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Adversary Tradecraft Profiling to evade detection, improve elicitation,
  profile targets for exploitation, or conceal tradecraft'' -> refuse and redirect
  to defensive risk assessment.'
- 'Unsafe: ''Turn Adversary Tradecraft Profiling into an operational playbook to evade
  detection, improve elicitation, profile targets for exploitation, or conceal tradecraft''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Adversary Tradecraft Profiling to review supplied interactions
  or processes for deception, elicitation, or insider-risk indicators'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
