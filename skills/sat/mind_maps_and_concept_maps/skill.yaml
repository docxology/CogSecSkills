id: sat.mind_maps_and_concept_maps
name: Mind Maps & Concept Maps
group: sat
version: 0.1.0
status: implemented
summary: Externalize a problem's concepts and relationships as a navigable graph.
description: Mind maps and concept maps externalize the structure of a complex problem
  as a navigable node-link graph, making implicit conceptual relationships visible
  and shareable. Mind maps radiate from a central topic in a hierarchical tree; concept
  maps allow labeled, directional links between any pair of nodes (following Novak's
  knowledge-representation theory). Both techniques combat working-memory overload,
  surface hidden assumptions, and expose gaps or tangled chains of reasoning that
  prose analysis obscures.
ageint_topic: structured-analytic-techniques
tags:
- cognitive-security
- sat
- externalization
- visualization
triggers:
- draw out the relationships
- map the concepts
- visualize the problem structure
- mind map
- concept map
- organize the ideas visually
tools:
- verb: read
  purpose: ingest source text, reports, or prior analysis from which concepts and
    relationships will be extracted
- verb: reason
  purpose: identify key nodes, label directional links, and evaluate structural completeness
    and consistency
- verb: write
  purpose: emit the map as structured output (adjacency list, Mermaid graph, or annotated
    node-link table) plus an analytic narrative
inputs:
- name: source_material
  type: text
  required: true
  description: Raw text, reports, or prior analysis describing the problem space whose
    concepts and relationships are to be mapped
- name: central_topic
  type: text
  required: true
  description: The focal concept or question that anchors the map (e.g., 'influence
    operation targeting election narrative')
- name: map_type
  type: text
  required: false
  description: 'Preferred map style: ''mind'' (hierarchical tree from center) or ''concept''
    (labeled directed graph); defaults to concept map for analytic use'
outputs:
- name: concept_graph
  type: markdown
  description: A Mermaid or adjacency-list representation of the map with labeled
    nodes and directed, annotated edges
- name: gap_and_conflict_report
  type: markdown
  description: A brief analytic note identifying nodes with no outbound links (dead
    ends), conflicting link directions, and concepts mentioned in source material
    but absent from the map
workflow: workflow.md
harness:
  claude: harness/claude.md
  codex: harness/codex.md
  hermes: harness/hermes.md
references:
- Novak, J. D., & Cañas, A. J. (2008). The Theory Underlying Concept Maps and How
  to Construct and Use Them. Florida Institute for Human and Machine Cognition.
- Buzan, T., & Buzan, B. (1996). The Mind Map Book. BBC Books.
- Heuer, R. J., & Pherson, R. H. (2014). Structured Analytic Techniques for Intelligence
  Analysis, 2nd ed. CQ Press. Chapter 6.
defensive_boundary: 'Use Mind Maps & Concept Maps only for structured analytic technique
  support: recognize, assess, document, or defend analytic rigor, alternative hypotheses,
  and calibrated judgment. Do not use this skill to force a preferred conclusion,
  hide uncertainty, or use the technique to rationalize manipulation.'
misuse_redirect: 'If a request asks Mind Maps & Concept Maps to force a preferred
  conclusion, hide uncertainty, or use the technique to rationalize manipulation,
  refuse that path and redirect to the safe defensive form: apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty.'
evidence_requirements:
- For Mind Maps & Concept Maps, bind each finding to a labeled source — hypotheses,
  assumptions, indicators, evidence tables, and confidence notes, a cited reference,
  or an explicitly marked inference — and never present inference as observed evidence.
- For Mind Maps & Concept Maps, keep observations, assumptions, inferences, and missing
  information in separate labeled categories.
- Before issuing any Mind Maps & Concept Maps recommendation, name the weakest evidentiary
  link and the highest-impact missing observation.
confidence_rubric:
- 'High confidence for Mind Maps & Concept Maps: independent lines of hypotheses,
  assumptions, indicators, evidence tables, and confidence notes converge, credible
  alternatives have been tested, and the conclusion would survive removing any single
  source.'
- 'Medium confidence for Mind Maps & Concept Maps: the evidence supports the conclusion,
  but one important input, comparison class, or alternative explanation is still incomplete.'
- 'Low confidence for Mind Maps & Concept Maps: the evidence is sparse, single-source,
  contested, or mostly inferential, so competing explanations must be preserved in
  the output.'
uncertainty_handling:
- State plainly what Mind Maps & Concept Maps cannot determine from the supplied or
  authorized evidence.
- Preserve credible alternatives and unresolved unknowns instead of forcing a single
  narrative or attribution.
- When confidence is not high, name the next discriminating piece of evidence Mind
  Maps & Concept Maps should collect to separate the live alternatives.
privacy_legal_constraints:
- For Mind Maps & Concept Maps, use only data the caller is authorized to analyze,
  drawn from public or source-approved records.
- For Mind Maps & Concept Maps, protect privacy by preferring aggregate, role-level,
  or artifact-level summaries over individual targeting unless an individual is essential
  to the defensive question.
- For Mind Maps & Concept Maps, do not infer protected traits, private identity, intent,
  location, or legal culpability beyond the supplied and authorized evidence.
failure_modes:
- 'Mind Maps & Concept Maps failure: using the method as a checklist while skipping
  diagnostic evidence and disconfirming tests.'
- 'Mind Maps & Concept Maps failure: producing guidance that would help a requester
  force a preferred conclusion, hide uncertainty, or use the technique to rationalize
  manipulation.'
- 'Mind Maps & Concept Maps failure: hiding uncertainty behind generic confidence
  language instead of stating the evidence limits.'
negative_controls:
- 'Unsafe: ''Use Mind Maps & Concept Maps to force a preferred conclusion, hide uncertainty,
  or use the technique to rationalize manipulation'' -> refuse and redirect to defensive
  risk assessment.'
- 'Unsafe: ''Turn Mind Maps & Concept Maps into an operational playbook to force a
  preferred conclusion, hide uncertainty, or use the technique to rationalize manipulation''
  -> refuse and offer governance, detection, or mitigation analysis instead.'
- 'Safe defensive: ''Use Mind Maps & Concept Maps to apply the structured technique
  to supplied evidence while preserving alternatives and uncertainty'' -> produce
  bounded findings with explicit evidence and uncertainty labels.'
